body:
  text: 大日經住心品疏私記第十一疏言湛寂者至故名為寂者是牒所云如是湛寂文而先釋寂義也寂是寂滅不生義云也是三乘聖人所證擇滅涅槃理是也疏湛者是甚至不測淺深者此釋湛義也湛者是不變異義不動轉義不遷流義是常住而深澄義也此以小乘中三乘果人所證生空無我理為此澄寂不動等甚深義也故諸外道等以不能識此深理故云湛深義也此生空理之澄深義譬如大河清潭底深七千丈計以七尺是為一仞云云然臨視是潭人敢不可測此潭淺深量也外道利智不可測此深理云也此生空理中諸煩惱染汚法寂滅故云清也此妙理甚深故云潭萬仭也此理離流轉生死法濁垢散動義故云澄恬也此理是能成無生智所緣境界而能引成生空之明淨智故名云鏡徹也疏故云三獸至其源底耳者是舉契經文配歸今所明義旨也此文是優婆塞經文也問此優婆塞經是大乘經也又彼經所説三獸渡河義是方明大乘共教中三乘聖人所證理淺深不同義之喻也今所云三乘人同所證生空理是小乘義也然何以大乘義為小乘義文證耶答此實雖大小乘二教義異而所望義是相似故且以彼經所云三獸渡河淺深不同義而為今經所明小乘之三乘所證生空之觀其淺深不同之喻無咎也此喻意云三獸是一兔二馬三象也此三獸渡大河時隨身大小泳渡河水有淺深差別相也兔是身體卑小故泳踐河水量甚淺也馬頗大於兔故泳踐水轉深也香醉山大象是身體廣大故則踐河底而渡之云也是名為三獸度河淺深不同喻也疏此中有三至得諸法實相者是從下明合喻中是先合三獸同度河義也小乘之中三乘果人俱同證得生空無我理云也於此生空之無我性之解脫涅槃理中都絶言辭故名云無言説故此疏第七云如聲聞法解脫之中無有文字者此義意也疏然聲聞入至生滅度想者是下明合三獸雖同渡河而有淺深不同義喻中是先明聲聞淺解證生空理義也謂此人根性從本愚鈍故深不能解生空深理云也如何知爾者心是有愚鈍性故尚於生死深生厭怖想於自證得有餘無餘涅槃而生究竟滅度想云也此愚鈍性不令已息故尚不能深證生空理云也疏辟支佛所至發起大悲者次明緣覺人漸深證空理而雖有勝前聲聞人義而尚劣後菩薩深證德義也此人從本根性賢聰故頗漸深證生空理也此人解心賢利故於生死苦患而殷勤不生厭怖也智慧聰利而深存無我理性深於淺智聲聞而彼雖知無我理為假我厭怖苦為假我求樂離苦也然緣覺人歡心深安住無我理不顧我相故何必可生厭怖生死苦之想耶但此人雖智慧聰利而深解無性理未逮菩薩根性求種智發起方便而利益諸衆生功德智慧云也疏菩薩悟如是至淨心漸現者是明第三菩薩乘人極深證達生空理義也文菩薩悟如是法時者是於十二因緣法中即證無我理云也文即知是心乃至淨心漸現者此十二因緣法中無我理從本來法爾常住也然何今始得知之理耶云也此悟達性得生空理故客塵煩惱除去覺悟淨心稍顯現云也此菩薩悟性空本不生理方轉深於前緣覺智也疏爾時便得至種種度門者此菩薩是依此修得菩提心勢力能引之用故為欲圓滿一切種智及利益諸衆生故偏不安住生空理湛寂涅槃法而能學六度四攝等一切法門云也是名云為種智之因故亦為利益一切衆生之方便故也疏故同共一至沈有異也者結合三獸度河不同義也疏經云一切至不能知者是為助釋先牒經文也疏此宗中説至無量寶王者下釋上經文也此宗者是示今三密真言家也此家立此內外兩種外道部儻云也文然不覺是中有無量寶王者是明彼愚法二乘人拙而雖不能覺知自所證得二乘菩提是終可回入佛大寶王位而即以此法為方便能入門義云也是二乘是流出從菩薩乘故還終可歸菩薩乘云也疏一則不入至而不識者明外道之不入咎也外道有二類一者外外道人則厭怖此無我義而不趣入此法也堅著我愛故二者內外道人才雖入此生空理方便門而不了知遂我等二乘徒悉皆回心向大而可成佛故云入而不識也疏先佛宣説至出於火宅者牒讃此菩薩乘經文而釋之也明於此小乘之三乘中唯有菩薩乘人獨遍利益諸衆生而有拔苦與樂恩德於餘二乘中無利益義也故應知三世諸佛誘引諸衆生三乘方便教中唯有菩薩乘一門而令諸子出三界火宅善巧方便門云也問此唯有一門誘進群迷出於火宅義可同法華所云唯有一門出於火宅義耶答彼大乘義也此小乘義也雖然義類是同意也疏無復障礙至出能其過者此十二因緣之生空真如正理是遠離邪倒咎真實正理故彼諸外道論師以聰利明了智德依因明門宗因喻三支比量而皆雖欲破斥此理此理即諸法真正道理故彼師不能破難此義云也疏然未度法至淨菩提心者是明此菩薩未斷法執三妄執咎也依此義故上文云淨菩提心漸現也而今此文中云未名真淨菩提心也淨除法執所知障品即名云真淨菩提心故也疏如蓮華已至尚未出水者以喻重釋上義也蓮華者合彼菩薩所得生空智也此智是與彼法空智之為因而未果智故也文已離濁泥者合此生空無漏智之遠離我執煩惱障咎義也文尚未出水者是合此生空智猶住生空真如理水中而未出此生空理水表義也理水表者法空理云也疏故經云出世間心住蘊中也者以散釋意歸本文也文出世間心者是生空智也文住蘊中者是五蘊中無我理云也疏以行者至著無為法者明此小乘菩薩生空觀之智深雖作證安住生空理而為求種智為他利故從空觀移假觀時乃為根塵識法執三妄執而被留礙可墮有所得心也為利衆生出從空移涉假有事時十八界相當菩薩心而現前故因之法執心現起云也為厭怖彼法執三妄執現前咎亦還住前生空觀云也文然涉事時者是出從生空觀而移入假有事時尚法執現前事云也天台此名云從空入假觀也已上明小乘分齊竟疏然以菩提心至如是惠隨生者從下明前小乘菩薩之終回心始趣向證寂然界大乘中義也此證寂然界大乘者當大般若經所明大乘之三乘共教之菩薩乘也即是當天台所立大乘通教也天台宗云二通教此教雖異三乘其以拙度拆空智同歸偏真理云云即空觀也云云此詮無生四諦二諦十二因緣六度法三乘共通稟故云通教也通義有八種教理智斷行位因果皆通也正為菩薩傍為二乘也是界內理教相即門也此教只立十地即名三乘共行十地云云一乾慧地即三乘初心外凡位伏位也二性地即三乘內凡位伏位四善根三八人地從苦忍至道類忍見修八忍名八人地也四見地即斷見惑位也須陀洹果也五薄地斷欲界前六品思惑即一來果也六離欲地斷欲界後三品思惑即不還果也七已辨地斷色無色八九七十二品思惑即阿羅漢果位也八辟支佛地斷正使除習氣也九菩薩地斷習出假位也從初發心至等覺地也化一切衆生也有大悲方便行也十佛地金剛心以後種智德備覺窮法性名佛地也又云通教菩薩以一念相應惠斷殘習於天衣座成勝應身佛也同居土佛也通方便有餘土云云又此大疏文所云小乘菩薩名為學摩訶衍人意者是約小乘中三乘相對而辨上中下時聲聞乘名小乘緣覺乘名中乘對此小中二乘且小乘佛菩薩乘名為大乘也雖然約理實義小乘菩薩遂非可名為大乘也故華嚴宗以小乘三藏教之三乘法通攝則名為小乘教而不名云大乘教也又天台宗以小乘三藏教之中三乘通稱名為三藏教等是義也唯通教以上後三教名云大乘故也是疏主一行阿闍梨者彼天台門人也豈強可違返彼説耶今謂此三乘共行菩薩及佛者則當證寂然界大乘人也文以菩提心勢力等者是指此小乘中修得菩提心勢用也依得此生空淺菩提心故從此理稍轉尋自比知而發後深法空菩提心云也或是依性得本覺大菩提心力發此初法空菩提心云也文有如是惠隨生者是指彼證寂然界之法空智也疏能於蘊等至離著方便者是明此修行寂然界大乘菩薩始方至此住心修習對治前心中所未捨離五蘊等法執三妄執之方便義也此大乘心中始方於離昔前所未離十八界中根塵識法執三妄執今即修此對治道方便悉離之云也此證寂然界大乘菩薩是依悟遍計所執空門中之情有理無義實我實法都無義故而遣於彼三科法中所執根塵識之法執三妄執也文離著方便者是除遣法執之能治方法云也疏於五種譬喻觀察無性空者是約能治方便中指所觀法境體而顯無性空理義也文於五種譬喻者正指所觀境體也文觀察無性空者明正所觀顯之正理也疏初句觀察至了不可得者釋第一喻觀相也此聚沫者是水上浮流河波也貌如雪此各別水渧之聚集雖種種形貌相而別無別實體性云也是用虛疏義偽假義為此喻意也疏色亦爾者是總合也疏若麁若細至本不生也者是別合也謂此諸色法是以從衆緣生義為所因而還顯示本不生義也能造四大種是依衆生業力生故所造十一種色以能造四大種為因而生故亦以自類種子生也若麁色者是五塵色境也若細色者是五根無表色也疏次句浮泡至但屬衆緣者釋第二喻也是明此浮泡生起因緣由來也此浮泡相其貌如白珠形也和云水穗也是泡是依夏時天暴雨緣與庭上溜水緣合故而此浮泡生起云也疏四句觀之都無起滅者是成此浮泡無自性義也謂浮泡是離水性之外無別性云也四句義至下十緣生句疏文可知也疏受陰亦爾者是總合也疏諸苦樂等至受本不生也者別合也以苦樂捨三受合浮泡義是受依止彼可愛不可愛等觸心所而以苦樂等受生義合天暴雨喻也以遇可意不可意等境而苦樂捨受生義則合地上溜水上加灑天雨義也此諸受是從觸心所因及六塵境界緣而和合生起故和合相而無別自性云也疏次陽炎至去之彌遠者釋第三喻也陽者是日之異名也炎者春日遲遲暖氣照曜曠野時地熱氣與日光和合而蒸涌似有水相也此時其曠野中似有水波浪故諸鳥獸渴乏人見之則生真水念追求之而欲飮此水終此水虛無也是陽之炎也疏衆生亦爾者總合也疏不知緣起至本不生也者別合也文不知緣起性空而有法想生者合迷渴者生真水解義也謂諸愚夫不解依他法自性空義猥狂作法實有想云也文若悟實相則想本不生也者是釋覺悟前想本不生義也是覺遍計所執都無理云也疏次芭蕉者至亦不可得者釋第四喻也行蘊是造作義也此造作法還破壞之時全無所存一法也為顯示此義故用此芭蕉中無堅實喻也文分分破拆之至於鄰虛者此中鄰虛者是極微義也若分拆此極微時即終歸虛空故名極微云鄰虛也造作色法下至極微量其性不可又拆云也疏行陰亦爾者是總合也疏一微涉於至本不生也者別合也文一微涉於至衆緣生者是明行蘊從緣生故假有義也一微涉於動境者是二塵合造作義也謂一極微之和合於他一極微時有涉於動境云義也彼極微與此極微兩塵動涉而相會能成麁色何況衆多塵和合義耶是動者動轉義也此塵境是塵與塵相涉合義也又色等境界剎那剎那生心心所法各別動轉和合無常準可知也如俱舍論光師疏七云或有動法行度一極微名一剎那諸法實無行動相續道中假説動云云以此文可解此一微涉於動境意也疏緣生無性則是行本不生也者是次明假有法必有本不生義也疏次幻事者至未曾有事者釋第五喻也幻師之作幻事方用呪術藥力而虛偽變化象馬車乘人鬼等金銀等珍寶物云也是幻事雖實無法依呪術藥物和合因緣力故忽虛狂變現無物而令似有物也疏識陰亦爾者總合也疏從一念無明幻心初出三界者明此識蘊是其流轉生死本源也是依業煩惱之助緣力故能造作三界之果報等諸法也云此從一念無明幻心初出三界者是義甚深而雖有重重轉妙義今且此中明大乘通教所説證寂然界義故只明六識相應無始無明義也此心法是能造作諸法之根本所依義猶如幻師能成幻事也彼第八識相應根本無明義如上所明起信論等所説義也此一念無明心義意如新譯仁王經云然諸有情於久遠劫初剎那識異於木石生得染淨各自能為無量無數染淨識本從初剎那乃至金剛終一剎那有不可説不可説識生諸有情色心二法云云今此疏意只明生得染法之根本義也是即輪回三界分段生死之根本也疏究其源本至本不生也者是依前所明識蘊能造作三界生死因果假有法義故今成本不生義也於此有二義一者本不生真空義二者隨緣生假有義也於此文中有三重次第也初尋根源而明本不生理義次明此本不生理即隨緣流轉義後明此流轉即終歸本不生性義也上來五喻觀義意是約體法空義而明無性空義也疏聲聞經中諸蘊性空者是簡別此大乘菩薩所解為顯五蘊法即空義而所用體法空之中五喻義與彼小乘經中但為顯人無我理而所明五蘊性空義中五喻懸其意異之所由也此明法空觀之體法空義也彼但明生空觀義拆法空義故也疏如觀五蘊至廣分別説者是以此五蘊法即性空義而例顯示餘諸法即空無義也疏如大般若經至了知心性者是引經所説義而證成此初重大乘中所用諸法即空義也大般若經者是明共教大乘義般若經是也此經中説遍計所執空義以為門而令破諸法實有執而證達法空理云也此菩薩漸始離遍計所執之法執迷倒方覺了法空真如理故名云得離一重法倒了知心性也此菩薩雖證達如此所執空門理而未遂依唯識門所顯得而證達依他如幻性真如圓成妙理義也疏如是不為至證寂然界者是依離與此法執三妄心被擾亂散動咎義故此菩薩名云證寂然界也前小乘行者起法執三妄心時能迷心名云能執也所迷境名云所執也或亦約所迷境之根塵識而識根名云能執也識心及色根是執取境界義有故也塵境等名云所執也與識根被執取故也六塵境即名為所執義者是在供養法疏上卷也此所執者不謂遍計所執也但是云能緣心之所取境義也疏證此寂然至二乘境界者是示對待前小乘菩薩是全未出過二乘之境界之咎今正明此大乘菩薩全出過彼小乘之二乘境界德也疏如蓮華雖至清流之上者是以喻重明此菩薩德用也文如蓮華雖未開敷者是菩薩是分雖離一重法執而得一重法空觀而尚未逮得彼他緣大乘乃至極無自性心等淨菩提心門因分德開敷因分究竟位故以此義則此菩薩喻未開敷蓮華也文而稍出清流之上者此菩薩所得法空智是更升出前三乘人所證生空理外故名云出清流之上也彼前心云譬如清潭者即此義意耳疏行者亦爾至名出世間者是結合也此菩薩觀心唯住蘊法之性空理而此蘊法之相尚當心成不顯現云也何況此蘊實有性執耶此不取彼世間蘊法相名云出世間心也次文可知疏祕密主彼至業煩惱網者此經文是明彼證寂然界菩薩之方能成就彼前所云世間中順世八心與出世間中之小乘之三乘人所成違世八心俱悉皆遠離事義也疏如前所説至順世八心者是從下釋上經文也文如前所説至順世八心者是説順世八心義如上來愚童持齋心中具説云也疏若三乘初至違世八心者從下釋此菩薩所離違世八心義也文若三乘初至名違世八心者是彼小乘三乘皆俱通合彼一一皆悉明彼有違世八心義云也謂第一心者文云三乘初發道意者則是第一出世間種子心也是三乘行者遇佛法緣方初發厭離生死苦勤求涅槃之心此名云違世中第一種子心也以五停心名第二牙種心也以別想念名第三疱種心也以總想念名第四葉種心也以四善根名第五敷花心也以見諦十六心名第六成果心也以修道中諸無間道解脫道正智名第七受用種子也以三乘諸無學果位解脫道智及餘諸功德相名第八嬰童心也已上三乘通攝違世八心義也是以此小乘之三乘極果望後大乘心尚有嬰童義也疏或可就見至有八心也者下就三乘之地前位及見道修道更分違世八心義也見道八心者於三乘見道皆有八忍八智今忍智合為一聚有八箇心如次名為種子等八心也是當八忍是無間道八智是解脫道也此一具無間解脫道合為一心義意也就修道中三乘修道各各別異也若約聲聞人次第得果義辨之者見道十六心則斷盡三界見惑後出見道生止息想名為預流果也置此預流果但於欲界俱生修惑有九品於斷前六品惑有三心一者一來向之加行心此加行心名第一種子心也二者一來向是無間道心是名為第二牙種心也三者一來果心是解脫道智即是名第三疱種心也於斷欲界修惑後三品亦有三心一者不還向之加行心是名為第四葉種心也二者不還向此名為第五敷花心也三者不還果心是名為第六成果心也於斷上二界修惑有三心一者阿羅漢向之加行心是名為第七受用種子心也二阿羅漢向是名為第八嬰童心也於第三阿羅漢果是屬無學道故不攝此修道也又次約緣覺修道辨八心者諸麟喻獨覺昔於凡夫時以六行智伏斷無處有處已下八地修惑故若修行十二因緣之法入見道時於見道前十四心中斷前已伏下八地修惑故因之隨入見道即斷下八地修惑而更於修道中不斷下八地惑也但於斷非想地九品修惑時更別起九無間道九解脫道斷非想地九品修惑也於此九無間九解脫道中前八解脫如次為種子心等八心也於第九無間與解脫兩心以此第九無間道返攝前第八解脫道中也此第九無間道尚是因位故也第九解脫道是無學果故除之不入此修道八心中也若又約菩薩乘之修道明之者菩薩十六心之後以九無間道九解脫道次第斷三界九地九品修惑但是總是此九地中一切上上品惑束為一聚惑而起一箇無間道智一箇解脫道智一度斷之也乃至斷九地下下品惑亦爾也無間解脫道心合為一聚一心而以八箇無間解脫道心如次為種子心等八心也至于第九無間道還亦屬第八解脫道也又斷下他惑以十六心斷畢故今但十六心後修道以九無間九解脫道斷非想地九品惑也獨覺既有此義菩薩豈無此義耶此第九無間心是尚因位攝故也第九解脫道是屬無學果位故此不攝修道位也問疏云等諸位分之各有八心也者是等取何位八心耶答此等言是等取地前有八心義也非謂於無學果位有種子心等八心也於無學果位何更有種子等八心耶無學位是成辨果圓義云何此位亦可有種子心牙疱心等耶云也於地前有八心者一者最初遇佛受三歸戒法心是當第一種子心也二者五停心是當第二牙種心也三者別想念是當第三疱種心也四總想念是當第四葉種心也五者暖善根是當第五敷花心也六者頂善根是當第六成果心也七者忍善根是當第七受用種子心也八者世第一法是當第八嬰童心也疏大乘行者至亦無所捨者是明此大乘菩薩正離前所云順世違世各八心之所由也謂此菩薩依所執空法門理除遣一切實法執故了達於此空理中無世法可棄捨義亦無出世法可取求義畢竟都無故云也疏雙離違順至業煩惱網者出此菩薩之正所離染法體也我蘊兩倒者是示除遣實我實法二種所執之情有理無法也二種業者一者是見惑相應之發業也是此分別起煩惱所發業也二者修惑相應之覆業潤業是也是俱生煩惱所資助業是也發業煩惱者大乘法門章云三根煩惱發思三毒煩惱發身口意業三根者大乘義章云貪瞋癡也思前煩惱發生業故名為根文言覆業者大乘義章四云謂造業已重於前境起貪瞋等覆助前業貪其增長云云潤生煩惱者章云亦名受生謂受生時諸煩惱等云云若依成實者唯愛若依毗曇者八十八使也云云二種煩惱者一者見所斷是分別起煩惱也是依邪師教與邪分別起惑也二者修所斷是俱生煩惱謂從無始來任運不依邪師教及自邪分別緣也此二種煩惱是繫縛諸衆生令不出生死牢獄故名網也疏是名越一劫瑜祇行者是經之總結此證寂然界菩薩之斷惑修善德也此中超越一切者是明所超越妄執劫跛義也瑜祇行者是能超越善行劫跛義也疏瑜祇行至則曰瑜祇者是釋瑜伽與瑜祇聲轉不同所由也謂三十四根本梵字之所發聲名為男聲歟此根本字是男義也第二阿等十一韻字是女字也如是男女字展轉增加相合而所成字不同也或二合三合四合五合等聚集隨字成聲也是女聲者譬如女人與男根和合而女人受取男精而與自女精和合以此為種子能生子也今檢此祇字是字上加字而此字是女字也以此而返音則成祇聲也聲是男聲此字增加其字點畫時則成女之聲云也或天竺有男女聲非男非女三種聲具如八轉聲中明也又解三十四字女義也十一韻字男義也此三十四字體文即名為字母故云女耳疏所謂相應至應理之人者是釋瑜祇之翻名之義也此能觀智能於所觀正理境界而會稱名云相應也疏依常途解至阿僧祇劫者明顯密二教所説遲速勝劣不同意也疏行者未過至無言説處者謂彼小乘菩薩前第一僧祇中所得生空觀所照理尚是等同辟支佛所證無言説生空解脫理云也又此小乘菩薩與辟支佛同俱有拔業因種斷染用故彼此所斷所證齊等云也然過彼第一瑜祇劫而證此寂然界諸法無性理時乃成不共辟支佛行云也疏爾時心滯至證小涅槃者是方明彼小乘菩薩若拙沈沒留滯生空理時即退佛乘菩提心殆可墮二乘涅槃失也文失方便者亦示彼前小乘菩薩若失求種智方便及利生大悲方便時可墮二乘涅槃趣寂果失也又此中方便者利衆生方便也如上文云疏從此已後三乘徑路始分者是明此證寂然界大乘菩薩今此位始永別離彼前第一劫中小乘之二乘行義也是不共小乘德也問設有云此證寂然界大乘者前文所明小乘三藏教之菩薩則是也但得大乘名義是如此疏上文云學摩訶衍人初得出世初心等者小乘中菩薩乘且亦名為大乘證寂然界人云云今謂然者有衆多伏難也一者小乘菩薩乘者初僧祇劫之修行行也此證寂然界者是第二僧祇行也而何倒以小乘菩薩行而為大乘證寂然界人耶故此疏文云是菩薩從發心已來經一大阿僧祇劫方證如是寂然界今祕密宗但度此一重妄執即是超一阿僧祇劫行者未過此劫與辟支佛位齊時名為極無言説處爾時心滯無為法相若失方便多墮二乘地證小涅槃然菩提心勢力還能發起悲願從此已後三乘徑路始分所觀人法俱空文又云由約偏真之理作平等觀耳故以三乘上中下出世間心合論一僧祇劫至第二僧祇乃與二乘異也云云又第三卷云若度違順八心證寂然界是名阿闍梨云云是文意豈以小乘菩薩之留滯法執行名為阿闍梨耶又法花云貪著小乘三藏學者皆勿親近又云有所難問不以小乘法答但以大乘而為解説令得一切種智云云又云若以小乘化乃至於一人我則墮慳貪此事為不可云云以如是等處處文説應知以小乘菩薩而不可為阿闍梨義也疏然所觀至平等觀耳者明此寂然界大乘菩薩所證法空理雖勝過前小乘菩薩所解單生空理而不超過彼小乘部中若適於成實宗等説諸法空義也諸宗者是説出世部説俗妄真實義一説部説諸法但名義等是等小乘部中所説法空義與此寂然界菩薩所證法空義尚未懸隔殊異云也問成實論説法空義意何答私檢成實論第十二云問曰若以無性名無我者今五陰實無耶答曰五陰實無以世諦故有所以者何諸佛説諸行盡皆如幻如化以世諦故有非實有也又經中説第一義空此義以第一義諦故非世諦故空第一義者所謂色空無所有乃至識空無所有是故若人觀色等法空是名第一義空云云彼成實論盛談此義云云則鄰近此大乘通教所説法空義也故云與成實論諸宗未甚懸絶也基師法苑林五根章云成實論師名師子胄本數論宗中出家云云同師法花疏第一云成實論經部別師宗是破法有體唯有相故是名破性宗云云花嚴五教章第一云説大小乘宗立義不同乃有十一我法俱有宗乃至四者現通假實宗謂説假部等説彼無去來世現在世中諸法在蘊可實在界處假隨應諸法假實不定成實論等經部別師亦即此類五俗妄真實宗謂説出世等世俗皆假以虛妄故出世法實非虛妄故六諸法但名宗謂一説部一切我法唯假名都無體故此通初教之始云云私云此章所云此通初教之始者是當今所明證寂然界大乘所説遍計所執門諸法單空義意也此章文意與此疏同意也此章所立大乘始教中有二義一者所執我法空義是即大乘始教之始義二者依他成圓法妙有真空義謂依他妙有圓成真實空也是始教之後義也説假部意云在蘊可實者彼立諸法假義也謂蘊是積聚義故是假也而彼以説諸法假義故以此今為實義故諸法在蘊中云實義也處界是有自性義意也而諸法在處界義即不稱諸法自性空義故説為假説云也問若彼證寂然界人所行智與成實論等諸宗義遂可異耶可同耶答證寂然界人正修證法空理兼覺生空理成實等諸小乘師正修得生空理兼解法空理也故正兼異也疏由約偏真至平等觀耳者明此菩薩所證法空理尚不逮彼他緣大乘心等所云妙有真空理云也是依所執單空門義存我法都無解故云偏真理作此平等觀耳也平等觀者我法二執都無解名也問此住心中諸法空義云何答此義意大歸如唯識論中安惠論師義問其師義云何答彼論説遍計所執性處云有義三界心及心所由無始來虛妄熏習雖各體一而似二生謂見相二分即能取所取是二分情有理無此相説為遍計所執云云私云證寂然界菩薩所解法空義似是安惠菩薩所立見相二分遍計所執空義也疏故以三乘至二乘異也者是結歎此證寂然界大乘菩薩之所得功德出過彼初劫小乘中三乘人功德義也謂前第一瑜祇劫中以菩薩緣覺聲聞人之出世八心為善行瑜祇劫云也始從上乘向下乘而如次分上中下而取此三乘人之違世心為善行劫跛義也是名第一劫義云也文至第二僧祇乃與二乘異也者此如上文云彼離違順八心相也至此第二劫大乘心而遠離前小乘中三乘違順八心故名為過初瑜祇劫分離二乘地云也彼人未離法執此人已離一重法執故小乘之三乘人與大乘證寂然界菩薩其功德懸異云也問若此證寂然界大乘可所攝何住心耶答十住心論中無其明此心説處也但約此經疏意而可立別住心歟問若爾者何住心中可安此心耶答是證寂然界心是於拔業因種心後他緣大乘心前別所可安此住心義也此經疏列之次第如是故也問若爾何十住心論不開立此證寂然界心耶答彼論意而攝入第六他緣大乘心中也問其義意如何答於他緣大乘心有初分後分二種行位也而以其初分行法而而攝入其後分之行法也故十住心論者以此證寂然界之初分心而攝入他緣大乘心之後分而攝入他緣大乘之後分心立十住心也問以何證文得知初分後分二義差別耶答花嚴五教章云此通初教之始云云此義意云始教大乘有二分謂初分是三乘共教大乘法也是約遍計所執體用都無義而立一切諸法畢竟空理也此教正當此證寂然界大乘所立偏空義也彼後分義者是當他緣大乘所立所執都無依他似有圓成真空三性不即不離義也故十住心論初分後分相攝不別開立也問若爾者何是經疏別開立是心耶答約此他緣乘即有初分後分二法故開立二種住心無失故經疏中明各別住心也問經疏別開立證寂然界大乘者十住心論可依此説而何不依是説耶答此所依菩提心論釋摩訶衍論共無此説故別不開立此住心而只以證寂然界心攝入他緣大乘心之中初心是意最吉也又解明順世十心始從第一愚童持齋心至第十決定心有十心也準此義意者此於十住心亦始從愚童持齋心乃至證寂然界大乘為第五乃至祕密莊嚴可為第十心意也問若依此義故彼異生羝羊心立不可為第一住心耶答是異生羝羊之行偏所厭法故不可最初住心也意云此十住心如治病方藥也此異生羝羊心是如所治病故立不為能治藥中住心歟問若爾者何故彼論立此所治法為住心耶答彼論是約病返成藥義病為藥成因故立為別住心也論與經疏各取邊邊義開合不同無相違咎也問何故以所治病返攝能治藥中而病即名為藥耶答此義即是涅槃經第三十五中有其文云一切無明煩惱等結悉是佛性何以故佛性因故從無明行及諸煩惱得善五陰是名佛性從善五陰是名佛性從善五陰乃至獲得阿耨菩提心文又依此義意故以所治病之異生羝羊心而返為入能治藥而成初住心無失也若置第一異生羝羊心不攝入能治教藥而始從第二愚童持齋心至于第九極無自性心為八種能治教藥義者又大師所説也故三摩耶戒序云法藥雖萬差前所説八種法門是彼之本然猶隨順機根故有淺深遲速為欲簡擇如是諸法教發第三勝義心云云此文是明大師亦一途別説意文也
