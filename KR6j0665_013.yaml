body:
  text: 大日經住心品疏私記第十四疏第三重微細至此相續生者是別明第九極無自性住心能斷第三重極微細妄執畢而堪能入真言門淨菩提心用云也文云曰離於根境等者言以釋意令歸本經文也依此文意故十住心論第九云等空之心於是始起寂滅之果果還為因是因是心望前顯教極果於後祕心初心初發心時便成正覺宜然也初心之佛其德不可思議萬德始證一心稍現云云即釋此極無自性住心玄意也文云業壽種除復有佛樹牙生者是有深義也謂業壽種除者是除斷分段生死之中業果命根正報依身等云也佛樹牙生者是標得不思議變易生之中身命等花報德也佛樹者指法身常住佛果也牙生者指不思議變易身德也此變易身者是當成法性身佛之牙種義也故大日經第五云真言遍學者通達祕密壇如法為弟子燒盡一切罪壽命悉焚滅令彼不復生同於灰盡已彼壽命還復謂以字燒字因字而更生一切壽乃至清淨遍無垢以十二支句而作於彼器云云以此文可檢知大疏第十六卷也疏既不壞因至即是緣起者是約此極無自性心而明於此住心之淨菩提心門中所覺了緣起諸法是即有為無為二法互相融事理該攝性相交徹義也謂緣起之諸法即相是真如理性故言不壞因緣而悟入法界也此義意云是緣起諸法即空義是非如彼小乘宗所云拆法空觀云也此緣起諸法即空觀方當大乘所立體法難解真空義也此義如般若心經云色即是空空即是色受想行識亦復如是云云是中色即是空義者是緣起諸法為即體本覺真空義也彼空即是色者此本覺真空妙理之則隨染緣能成諸有為生滅法也故云不動法界即是緣起也故般若心經云空即色等也此義如仁王般若經云於解常自一於諦常自二了達此無二真入第一義云云此義意云以了知二諦互相融攝而無二無別之不二觀行即為究竟了義云也疏當知因緣生滅是法界生滅者是釋成妄真相融義也謂因緣者是因緣生滅者衆緣所造諸法是也此緣起諸法者即體本覺真如理性也然物即隨妄緣即流生死際而成生滅門諸法云也真如法之外更無生滅法云也故經云空即是色者此義也又法藏師云不異常之無常者即此義也疏法界不生滅即是因緣不生滅者是謂諸依他因緣生滅諸法以真如法界為其自體性故此之所依法界性從本以來不生滅法故此能依生滅法即成不生滅義云也故經云色即是空者此義也藏公云不異無常之常者即此義也疏故曰離有為無為界者結以釋文歸本文也意云依此極無自性之究竟無性觀行故於緣起諸法離單生滅偏執之咎也亦於真如法界離單凝然而不隨緣執之咎也謂執因緣法唯有生滅義而何於此因緣法即體可為無真如法界義耶但爾云故不謂於因緣法無生滅義也但為遮俗真隔別執故説二諦相即義也又執法界理唯有凝然性而何無隨緣性耶而何於此法界理可為無即生滅義耶但爾云故不謂於法界理失其凝寂真性也但是為遮真俗隔別執故云爾也是於有為緣生法即離單生滅之偏執於無為法界理亦離單凝然不隨緣執云也故藏公云攝論云智障極盲暗謂真俗別執此之謂也云云疏若如來出世至離諸造作者是釋離諸造作向也此句意云此真如法界是即緣起即無性義即是法爾常恆理也諸佛出世演説此理時非始有此理也從諸佛不出世演説此義時以前此法界緣起無性義常恆不變理也此真妄相即法界即緣起理是非佛及人天造作法云也疏如般若中至亦如是者是引他契經文證助釋此經云離眼耳鼻舌身意文也謂且成此法界中離內六根法義也此經文有三初標法也文云一切法趣下是也第二喻也謂文云由如百以下是也第三合喻也謂文云是故當知下是也文云一切法趣眼者此句意云説眼界即為真如法界意也謂眼界與真如法界即體混泯而為無二無別義也謂以眼之外都無真如法界性真如法界性之外即都無眼界故也彼般若經云色即是空空即是色受想行識亦復如是者即此意也重意云於此真如即眼理中而令歸攝餘一切有為緣起諸法而全體遍收真妄融徹義名云一切法趣眼意也謂以妄之交徹於真義故名為真如法界即是眼法云也以真之交徹於妄義名為眼界即是真如法界云也約此二義都成真妄相融而無二無別義也然則成有為無為法極無自性義也文云一切法趣眼是趣不過者謂真如法界與眼界即成一性法而以餘一切有為法令歸趣於此眼界即真如性云也此眼界即真如性之外更無有所可歸趣之餘實際真性境界云也文云是故當知眼即是第一實際者是釋成眼界即真如法界義也文云第一實際中眼尚不可得何況趣非趣耶者是文遂則顯示諸法之極無自性理也謂遠離於眼界之物者即是寂滅之真如真如實際實際名為第一義諦也此第一義諦極理中都眼界不可得性也以此義故為眼界即法界性也而其能可被歸趣眼界尚從本以來寂滅都無性也何況與此今更可成歸趣之能趣義豈可成立耶云也真如平等理中有何能趣所趣差別相耶云也而真如之若隨無明染緣而變作諸法時則雖有成眼等諸法而論實者是虛妄顯現也而唯此真如性從本以來離無明染熏故是約道理義即離諸妄緣而寂滅離相云也此真性理中眼等諸法都無而皆一切斷絶云也既如眼界即都無而一切物斷絶矣何有歸趣於此都無眼界理之能歸趣之諸法耶云也疏耳鼻舌身意亦如是者舉眼根一種例顯示餘五根之本不生性而示緣起即空真妄混融義疏故曰離眼耳鼻舌身意者以釋意歸本文也此文中離言意者謂此極無自性心者成遠離有為緣生之六根等十八界相亦成離此六根等十八界之即體性空無為性定執云也謂六根六識六境之中者六根者是作用殊勝故且舉六根而意者攝取餘六識六境義也疏行者得如至心之實際者是遂明此觀行者之觀察是緣生法之無自性甚深義其微妙之觀行成就而到真如實際境云也文云觀一切染淨乃至不從緣生者上文指十八界之中眼界且明其緣起性空義了也今者例此眼界即空義而遍歷餘十七界而即成此緣起無性義也文云如鄰虛等者是指極微少之色心心所法也謂分柝色心等而至極微小時亦若至一轉而更分柝之者既應成虛空體許物指名云鄰虛也如是於至最極小位法皆悉是無不緣生物云也文云若從緣生乃至即是心之實際者是文約諸有為法且成極無自性義也文云心實際亦復不可得者是文約無為實際而又成極無自性義也文云故曰極無自性心生者是文總結極無自性心義也謂始從證寂然界大乘心至于一道無為住心皆悉以真如實際則為諸法之至極理也而彼住心等者以此真空理即為所存宗趣也然今此極無自性心意者尚即除遣此真如實際理已即無全所存法則以為此極無自性住心大意也問若爾者是極無自性心與彼覺心不生心之本不生義及一道無為心所云所謂空性離根境等義是有何差別耶答此三種住心所説義趣最難差別也今試將決之也凡檢此本經及疏所釋總有六重大乘義也謂一者第二阿僧祇劫初分中所有證寂然界大乘心是三乘通教大乘法也二者第二劫中間所有他緣大乘心三者此第二劫終所有覺心不生心四者第三劫中分所有一道無為心五者此第三劫終所有極無自性心六者既過此三僧祇劫已以後所有祕密莊嚴心是也問此六重住心淺深差別如何答第一證寂然界大乘心者是但説遍計所執空義而未顯示依他圓成之法妙有真空義故亦未辨依他八識之能變成諸心內境界又未解心內境能引生能緣心識義也但依柝法空門及體法空門二種觀而才雖破實我實法二種妄執而唯解了遍計所執情有理無義尚未及解了依他如幻假有義圓成實性凝然常住義也又未解以圓成實性而與依他起性為其真實自性義也又未覺諸有為諸法者以蘊阿賴耶識為其根本緣起法也但以覺所執實我實法都無義而為究竟妙理云也雖解如是無性義尚依未解為諸法緣起根本阿賴耶識故於有空二觀常沈邊有邊空見失如實之中道理也故上疏文云行者解諸蘊唯心即是知法自性未了如是自性時畏墮有所得故不能盡理觀有畏墮斷滅故不能盡理觀空非但見有不明亦復見空未盡云云此大乘者雖遣一分法執斷一往智礙未能斷盡無明及餘塵沙所知障也此人能證有餘無餘二種涅槃而終應入無餘涅槃也雖然依被依持佛菩薩利生大悲本願力故方不入涅槃而尚轉向餘勝乘漸遂入真言門也華嚴宗探玄記云戒賢第二時中雖依遍計所執自性説諸法空猶未説依他圓成唯識道理故亦非了者即當此證寂然界住心義也此住心是三乘共大乘教所明乾慧等十地因果分齊此法也大般若經等盛談此義也天台宗以此等經教立通教大乘義也問若此證寂然界大乘心是十住心論中者可所攝何住心耶答十住心論中無其明此住心説處也但約大日經及疏意而可立別住心歟問若爾何十住心內可安之耶答是住心是於拔業因種心之後他緣大乘心前別所可安是住心義也是經并疏列之次第是意也問若爾者如何十住心論不開立此住心耶答彼論明第六他緣大乘之中初分義內攝是證寂然界大乘法故不開立別住心也依此義故華嚴宗五教章云此通初教之始也云云此義意云初教有二分初分是當此證寂然界大乘義也後分是當此他緣大乘義也故十住心論以此證寂然界大乘即攝入他緣大乘中但云第六他緣大乘住心也然於彼他緣大乘心有三性法所謂遍計所執性依他起性圓成實性也而以遍計所執性空義而為此證寂然界大乘心之法空義故今則以是所以名為他緣大乘心之始分云也而加依圓二性法之即被觀妙有真空而為他緣大乘心之後分義也故十住心論意於後分他緣大乘中攝初分證寂然界心也故十住心論雖不開立別證寂然界住心無失也第二分他緣大乘心者是依唯識觀而遣所執之心外實有境及遣境外實有心而存依他之心內境境內心之如幻假有法義也而以觀依他起性之非有似有似有即空義為門而顯證圓成實性凝然常住真空理也而依此二性不即不離義即離偏有偏空失成中道正理也又於此住心中解了一重緣生諸法之流轉還滅本末正理也謂解了緣生諸法之由來者是了知依止蘊阿賴耶識也此蘊阿賴耶識者諸有為法之生起根本因緣是也圓成實性者是但諸法之迷悟之所依也依迷此真如者即流轉生死中依悟此真如即升進菩提涅槃彼岸也遍計所執者是雖體用都無法而妄情前似實有性現起分別執著能生煩惱作業因令流轉生死也而觀行者觀所執性體用都無即除遣之即觀依他性非有似有似有即空理正證圓成實性凝然常住真理時則永斷二障染法方證得四智心品得住菩提涅槃二轉依果盡未來際而自受法樂攝化利益諸衆生也此住心是雖能證四智有為無常而所證真如理性者是凝然常住也都遣遍計所執性而不存之於依圓二性雖了達不即不離義而未及解真俗融通性相交徹義也所以此住心尚有心境隔別真俗不融失也第三覺心不生心是為遣前心境隔別咎為破二性俱存過故立本覺真心之即隨無明染熏變成有為諸法故有為諸法即體無為性也無為法之即體即成有為緣生法也故真俗融通性相交徹義成也於此中義依厭離四相有為染妄法而顯得本始覺真性理也於是遠離無明染熏歸淨心本源義也本覺從本來常住故始覺即歸本覺即佛身常住義成立也從此本始兩覺而起不思議業相之應化佛二用盡未來際利益諸衆生也體無盡故用亦無盡也境智相融體用無別義也此住心是雖性相俱融真俗圓通猶為畏墮有所得咎故遣有病存空藥也故大日經云彼捨無我心主自在覺自心本不生云云心十住心論第七云吉藏法師二諦義云若有巧惠學此二諦成無所得無巧方便惠者學教即成所得失云云今私云是為遣有病而暫存空藥義也遂非好更可成空病也如是等文辨覺心不生心義也第四一道無為住心是從本覺一佛乘性流出染淨諸法而一切染淨諸法即體是本覺一佛乘性也雖然息妄歸真時有種種差別方便門所謂三乘五乘七方便九法界等遂歸一佛乘是義也此住心即彌妙有真俗圓融性相混泯義也是住心意是所以不偏畏墮有所得咎而亦不好存唯真空理俱雙存有空中道義而返對除遣前覺心不生心之所存諸法唯本不生真理之偏執失也故寶鑰一道無為住心章頌云前劫菩薩作戲論此心正覺亦非真者此義意也問此一道無為心者約所觀境一念具三諦境其義如何答此大疏一云又復從衆緣生故即空即假即中遠離一切戲論至於本不生際云云又第三云以皆從緣起即空即假即中故故曰如實遍知一切心相云云本覺佛性是雖性空無相而受無明染熏習即成諸法時是非無緣起假有義也故此住心意是任諸法之自相道理而立空假中三諦義為極妙義也謂於諸法既有有空二義故依此有空二相奪破而成中道義故必成非有非空之中道正理也故立中道義也故是住心則欲對破彼覺心不生心唯存真空義故於此一道無為住心即雙立三諦道理以為究竟義也故二教論云此宗所觀不過三諦一念心中即具三諦以此為妙云云問如天台宗者以三諦即是一心三觀則為所留存義者彼宗亦既以立非三非一義為究竟妙極義也若爾者何為成留存義耶答於彼宗所立三諦即是一心三觀義則有與奪二義其與義者任法相道理而成立三諦即是義也奪義者是為奪三諦即是定執故更成非一非三義也但是奪言非三時尚存一諦義也但奪言非一時尚成存三諦義也故應知是心尚未必遠離留存義也此義如二教論云即此三諦以此為妙者妙意尚當存三諦義也猶是不如彼極無自性心之除遣一切心境而全不留存一法義也第五極無自性住心意是本覺真心之隨無明熏緣雖成緣起諸法而俱不存有為無為性是若俱存其二性者可成執病咎故也意云所以一道無為心之存三諦即是理者是即為遣彼覺心不生心之所存諸法本不生偏見病故也既彼所治病方止息已何故尚可留存治藥法耶云也故菩提心論云諸佛慈悲從真起用救攝衆生應病與藥施諸法門隨其煩惱對治迷津遇筏達於彼岸法已應捨無自性故云云又祕藏寶鑰云此心都亭都亭非常舍隨緣急遷移遷移無定處是故無自性諸法無自性故去卑取尊云云此文明極無自性心義也是約觀心言之者有無之偏見與不二之中見並皆悉可除遣法也此大日經所明極無自性心義即是稍相當起信論所説心真如門極無性義及心生滅門中隨染本覺之無自性義也故十住心論第九云雖云能證所證平等無二然猶於二門真如作究竟之説文問若如所釋者於是如上四重住心者各各皆有應除遣盡執病義也其各各住心皆有有門空門非空非有門亦有亦空門及中道門故也如是等門是隨其所應悉皆非除遣其各各妄執病耶而何更立極無自性住心而云遣盡前四重大乘住心之所留存執病耶答言之有深意謂於是上四重大乘住心各各雖有有門空門非有非空門亦有亦空門等義意而有各各互偏增義而除遣妄執用各有重重淺深差別不同意也例如天台宗四教各各有四門所謂有門空門非有非空門亦有亦空門也是四教各各雖有四門義而三藏教依有門得道通教依空門得道別教依非有非空門得道圓教依亦有亦空門得道也云云今此四重大乘心之遣執義亦復爾也如彼證寂然界之所以立所執皆空義者是為對治小乘宗之法執實有之咎故用此所執空門也他緣大乘心之所以雖遣所執為空而存依圓二性為有者是為對治前證寂然界心之依被引發解所執皆空之義勢故凡泯而可有執依圓二性同皆空之咎故用此亦有亦空門也謂所執為空無法依圓為有義也故云亦有亦空也覺心不生心之所以立三性皆空理者是為對治前他緣大乘心之雖遣所執性為空法而存依圓俱有義故用是諸法本不生真空門也一道無為心之所以立三諦即是義者是為對治前覺心不生心之雖有三性法即妄有假立義而其以執三性皆空之偏見為究竟理之咎故是一道無為心且存亦有亦空亦中道三諦法也是一道無為心是實任諸法有為無為中道道理義而建立三諦即是一心三觀義也而但是極無自性心者是所以立諸法之至極無自性義者是即為對治前一道無為心之所存三諦即是一心三觀義尚有所留存法之咎故用此非有非空非中之都至極究竟無自性義門也於是住心中既遣盡一切所留存執心妄念心境相也故十住心論第九云故有真如受熏之極唱勝義無性之祕號驚一道於彈指覺無為於未極等空空心於是始起寂滅之果果還為因云云即是義意也問他緣大乘心之亦有亦空門義與一道無為心之亦有亦空門意其差別如何答他緣大乘亦有義約依圓二性而立亦有義也亦空義者約遍計所執都無體用義而立亦空義也一道無為心之亦有亦空義者是唯約依圓二性法而成立三諦即是一心三觀義也故其二家義異也問證寂然界大乘心之空門義與覺心不生心之空性義其同異如何答證寂然界心之空門義者是約遍計所執之體用都無義而立此空門義也是約依他起性之假有真無義與圓成實性之真空道理而非成立諸法空義也故大疏云行者如是觀察時從無性門達諸法即空得離一重法倒了知心性如是不為蘊處界能執所執之所動搖故名證寂然界又云爾時心滯無為法相若失方便多墮二乘地證小涅槃乃至云由約偏真之理作此平等觀耳文是文即亦證寂然界心之約所執空義而成立諸法即空義意也而是覺心不生心之所立空性義意者是為對破彼前他緣大乘心之所存三性各別有性義故今即立三無性義而存諸法空性義也問第六重祕密莊嚴住心義如何答依前極無自性心等而遠離除遣一切執著心垢已而更蒙金剛界之法身如來驚覺而初被教授三密教法方悟入法爾常住不思議境界也故寶鑰云第十祕密莊嚴心顯藥拂塵真言開庫祕寶忽陳萬德即證文又寶鑰頌云九種住心無自性轉深轉妙皆是因真言密教法身説祕密金剛最勝真云云問其極無自性住心之行者之蒙金剛界之佛驚覺而入真言門義如何答金剛界儀軌云空中諸如來彈指而驚覺告言善男子汝之所證處是一道清淨金剛喻三昧及薩婆若智尚未能證知勿以此為足應滿足普賢方成最正覺乃至云行者聞驚覺定中普禮足唯願諸如來示我所行處復想禮佛足白言最勝尊我不見自心此心為何相諸佛咸告言心相離測量授與心真言即誦徹心明觀心如月輪若在輕霧中如理諦觀察乃至自身為蓮華清淨無染著復白諸佛言我為蓮華身等云云問此祕密莊嚴心所明法爾常住法者何等義答菩提心論云第三言三摩地者真言行人如是觀已云何能證無上菩提當知法爾應住普賢大菩提心一切衆生本有薩埵為貪瞋癡煩惱之所縛故諸佛大悲以善巧智説此甚深祕密瑜伽令修行者於內心中觀日月輪由作此觀照見本心湛然清淨猶如滿月光遍虛空無所分別亦名無覺了亦名淨法界亦名實相般若波羅蜜海能含種種無量珍寶三摩地猶如滿月潔白分明何者為一切有情悉含普賢之心我見自心形如月輪何故以月輪為喻為滿月圓明體則與菩提心相類又云一切有情於心質中有一分淨性衆行皆備其體極微妙皎然明白乃至輪回六趣亦不變易如月十六分之一文亦祕藏記云凡佛者捨有漏五蘊等身有無漏五蘊等微細身如虛空者稱周遍法界理耳非無其體云云又大師真言二字義云問阿字本不生故何云如實知自心答指阿字本不生之理云實此本不生理為自心性故也問本不生者心性都無故云本不生歟為當雖有心性而無變易故云本不生歟答非謂心性都無自性清淨無改轉故云本不生如虛空性非有非無此心亦復如是不生不滅自性如故云本不生也云云又密嚴經云得解脫智慧如來微妙身云何為涅槃是滅壞之法又云密嚴中聖衆一切同佛相超過剎那壞常遊三摩地文又大師即身成佛義云大日經云攝持四界安住心王等同虛空成就廣大是非見果出生一切聲聞辟支佛諸菩薩位此文顯現何義謂表六大能生一切法何以得知謂心王者識大攝持四界者四大等同虛空者空大此六大能生見非見者欲色無色界下如文即是所生法如此經文皆以六大為能生以四法身三世間為之所生法上達法身下及六道雖麁細有隔大小有差然猶不出六大故佛説六大為法界體性諸顯教中以四大等為非情密教則説此為如來三摩耶身四大等不離心大心色雖異其性即同色即心心即色無障無礙智即境境即智智即理理即智無礙自在雖有能所二生都絶能所法爾道理有何造作能所等名皆是密號執常途淺略義不可作種種戲論云云疏此心望前至説成佛因者此上來歎極無自性心深妙德也從此下明此極無自性未究竟失也前二劫等者十住心論第九云前二劫者指他緣一道二種住心後二心者示真言門根究竟二心云云意云前二劫者是指他緣乘一道無為心之善行而名劫也真言門根究竟二心者是已入真言門內三密行法中因果二位也根者是三密相應供養方便行等是約因位修行以大悲為根義也菩提心論云所言三密者一身密者如結契印召請聖衆是也二者語密如密誦真言令文句了了分明無謬誤也三意密者如住瑜伽相應白淨月圓滿觀菩提心也云云真言究竟果者是三句中方便為究竟果分者即是上上方便也經云四分之一度於信解者是也菩提心論云五是證無上菩提獲金剛堅固身也然此五相具備方成本尊身也其圓明則普賢身也亦是普賢心也與十方諸佛同之云云文此心望前二劫由如蓮華盛敷若望後二心即是果復成種者此文是明以極無自性住心而即入真言門為親因緣義也十住心論第九解云有真如受熏之極唱勝義無性之祕告警一道於禪指覺無為於未極等空之心於是始起寂滅之果果還為因是因是心望前顯教極果於後祕心初心初心之佛其德不可思議云云同約十住心論意何故唯舉他緣與一道之前後二劫而不舉覺心極無二心其故何答他緣覺心二種心言同菩薩乘故此二心合攝也而舉初心即攝後心一道極無此二心同權佛乘故合攝是又如上義也前二劫者指他緣一道二住心云云具義如十住心論肝心抄第二卷明也問何此中用蓮華喻耶答為表此極無自性心因分中為極果佛是雖遠離麁細惑染而備性清淨義猶是修行種因海佛而非性德圓滿海果分佛義故用蓮華喻而不用蓮實喻也是極無自性心是望前一道無為心等時是極無自性是具隨分果義故云寂滅之果也是果遂成真言門之因行故云果還為因也疏於業煩惱至煩惱具依者是明此極無自性妙覺佛雖斷前第三重三妄執猶未斷極微微細細業無明煩惱義也若依此意者此種因海佛是恐尚未離極微微細細一分變易身歟猶未斷極微細業煩惱故又未入法性身果海故也問極無自性心名為業煩惱具依意云何答是極無自性心於二種生死之實無法而雖云了達非有似有義究盡而尚有微細妄念心慮而依未究極除遣此故未能如其自性理證達內證三密之真有法也故尚於性德本有法然有而猶有惑障妄念是無明微細念心垢有也是人雖云謂妄心都盡畢尚未除盡妄心義猶如彼灰身滅智二乘人雖謂身智都盡而未離界外微細身心義也是人適入三密法若見法身境界是如上所引涅槃經云十住菩薩見一切法無常等非一切法分見常樂我淨乃至十分之中得一分云云又云諸佛世尊見一切法無常等非一切法見常等以是義故見於佛性如觀掌中阿摩勒果者是義意也此極無自性佛是蒙金剛界佛驚覺以後得十分之中得見一分解之云也此中未離業等者是若無漏作業歟如寶性論所説無漏有分別業是也又次有義金剛界果分佛則驚覺極無自性種因海佛而示果分法門令勸修實成佛之事業也又此種因海佛未知果海法佛之成佛事業故猶帶智礙故云業煩惱具依也故金剛界儀軌云諦觀諸法性皆由於自心乃至不見於身心住寂滅平等究竟真實智乃至想身證十地住於如實際空中諸如來彈指而驚覺告言善男子汝之所證處是一道清淨金剛喻三昧及薩婆智尚未能證知勿以此為足應滿足普賢方成最正覺云云又爾時此極無自性佛則蒙金剛界佛驚覺則勤修真實成佛事業而白佛言復白諸世尊我已見自心清淨如滿月離諸煩惱垢能執所執等云云依此義意此極無自性佛尚未斷微細智礙又猶所應修作行業未滿足義也此即未離作業義故非所作已辨德也但是非謂三道中業道義也依是文者淨菩提心門極無自性心分證佛有得失二義也得者於隨緣法成無自性解是得也約法然法者於真有而妄謂是真無者即為是失也三密門果分佛是於隨緣法者如道理謂無自性也於法然法者如道理是覺有自性者是心有唯得而無有失也疏此中云佛至道玄同也者引能説者之證誠義而成此所説不虛義也若據極無自性心義如華嚴旨歸云二證法衆如發心品末云十方各有萬佛剎塵數諸佛悉號法惠現身讃述一切十方皆亦如是又性起品云十方各有八十不可説百千億那由他世界微塵數如來同名普賢現身讃述十方亦爾皆云我等諸佛為未來菩薩故護持此經令久住世也云云又約一道無為心義言之者法花經中以三世佛十方佛及現在釋迦文佛五佛章為證成法華不虛義也疏行者解脫至誰解脫耶者是明歎此極無自性佛之應供福田德之所由義也此佛依住不思議解脫德故則有應供德也謂證諸法本不生義故則不見能縛所縛能脫所脫差別義是則證知真如平等義意也故金剛界儀軌云諦觀諸法性皆由於自心煩惱隨煩惱蘊界諸入等皆如幻與焰如乾闥婆城亦如旋火輪又如空谷響如是諦觀已不見於身心住寂滅平等究竟真實智云云疏如良醫變至用除衆病者以喻明業煩惱即體是解脫義也此義如諸法無行經云貪欲是涅槃恚癡亦如是如是三事中有無量佛道見非見一相著不著亦然此無佛無法知此名世智云云疏又如虛空至萬像具依者又重以喻明真如本覺雖離色心等衆相而此本覺體能出生有為諸法義也若在纒位時此真如則受無明熏變成諸法故也上已云業煩惱相即是性真如義也今此中亦明真如即變成業煩惱義也疏若住此不至大供養者是結應供義也是依解上真如有即空即有二義故得解脫此業煩惱之德故此人可供養之也是真福田故也疏復次阿闍至寶珠譬喻者是為明此應供養故以本師無畏三藏説重釋此義也此中統論三劫始終者是取此初踰祇愚童持齊心乃至第三踰祇終因分滿足佛地也此中約善行劫波論三劫義耳意云取此如意寶珠喻意是取能識珠人見此珠時及見之竟則取之而能除垢穢能燒練之磨瑩之以後則令雨衆寶時作用而為此喻意故也若約法明之者最初取順世八心也是前異生羝羊心中從本已來雖具足性得本覺佛性今只取遇善友緣所成順世八心違世八心等之發心修行及三賢十地菩薩滿足種因海佛地功德而合如意寶珠之雨寶喻也但應供養是可用此珠瑩彰以後雨寶時勝用也若約法明之義此一道無為極無自性心等發心修行以後皆有應供德也故法華經中迦葉自云我等今者真阿羅漢天人魔梵普於其中應受供養云云是此意也疏猶如有如至即便識之者謂示世間黃石中從本已來自然有如是寶珠也然世間凡庶不能識知此珠在石中也是義當第一異生羝羊心也朴字或作𥐚也字書云𥐚者石云云此義具明如釋大衍論第七云就譬喻門中即有四種云何為四一者寶喻二者性淨喻三者垢染喻四者人衆喻言寶譬者謂即大摩尼珠之寶如是珠寶當有何處如是珠寶當有黃石如是珠寶其色如何謂深黃色其身形相當如何耶謂如方坐無長短故大小之相其量云何謂一丈故如是珠寶諸黃石中皆悉具足無有黃石而無摩尼其止住相次第如何謂第一珠第二黃金第三石體此摩尼珠一丈量者彼諸黃石或有極少或有極大各各差別豈可得言皆遍一切此摩尼珠有殊勝力雖一丈量遍於大中小中無餘無所障礙亦可得説遍一切處於彼石中有此寶故其石色黃應觀察言性淨喻者如是珠寶其體性甚極明白遠離塵纍故如本體性明白故言垢染喻者如是珠寶能為金石等之所障不能出現明白相故如本而有礦穢之垢故言人衆喻者謂極窮貧極懈怠故不求寶人并及精進樂求寶人故如本若人雖念寶性不以方便種種磨錬終無得淨故次説合説契當安立門寶喻中言大摩尼珠者當喻何法喻本覺佛性故所以者何本覺佛性隱藏衆生相續身中似彼珠故言黃石者當喻何法喻一切衆生相續故所以者何諸衆生身藏裏佛性似彼石故言色黃者當喻何法喻彼佛性不變義故所以者何真如佛性堅固不改似彼金故言如方坐無長短者當喻何法喻真如法平等無增減故所以者何此真如法一味平等無有差別似彼坐故言一丈者當喻何法喻真如法身具足圓滿無闕失故所以者何真如法身具足萬德無所闕失似彼丈故言如是珠寶諸黃石中皆悉具足無有黃石而無摩尼者當喻何法喻真如性遍諸衆生種種身中無有衆生而無真如本覺性故所以者何此真如性離不遍似彼珠故言第一珠第二黃金第三石體者當喻何法喻俱有次第法漸漸麁現故所以者何從本覺智流轉建立四相海時如其次第漸漸麁現似彼三故言此摩尼珠有殊勝力雖一丈量遍於大中小中無餘者當喻何法喻真如本覺有不思議業遍蚊龍等小大身中無妨難故所以者何此真如法其性平等遍凡聖中似彼珠故言於彼石中有此寶故其石色黃者當喻何法喻諸衆生悉有本覺有心相故所以者何一切衆生有覺心故有了別識似彼石故已説寶喻合説契當門次説淨喻合説契當門言如是珠寶其體性甚極明白遠離塵纍者當喻何法喻性淨本覺清淨明白離垢故次説染喻合説契當門言如是珠寶能為金石等之所障不能出現明白相者當喻何法喻自性清淨心為無明之所隱覆不能出現無漏性德故次説人喻合説契當門言二種人者當喻何法喻求佛法寶極精進人極懈怠人故云云私云此論寶珠喻甚奇妙而契今疏玄意故引用此文也疏先用利鐵至而瑩發之者是明始得在黃石內如意珠而漸次調瑩次第作法也疏既得光顯至普雨衆物者是明於此寶珠磨瑩既極得究竟明淨時則有雨寶妙用義也故密嚴經云如是之藏識是清淨佛性凡位恆雜染佛果常持寶云云此文中置之高幢能隨一切所求普雨衆物者以此喻則合以顯一切衆生本覺之如意珠故則升始覺因分佛果位而利益一切衆生妙用也疏爾時世人至所希願故者此明世人稱歎此寶珠之雨寶妙用義也此如大天者若是樂變化天歟此天有自在力有變化所受用樂具之功妙用故也俱舍論云化樂天樂自化諸妙欲境彼於自化妙欲境中自在而轉云云又如以大梵王為一切衆生能生父而又能生萬物義也疏然此寶至頓雨衆物者是明世人之於此寶珠妙用而生奇異想義也此寶珠之雨寶之妙用為實不可思議云也文於寶中先有耶先無耶者於珠中尋求此雨寶妙用性處是珠末瑩淨以前中先有耶若亦瑩淨以後始有此妙用耶云也又若先有者則此小珠何能頓藏衆物者是疑此珠中從先有雨寶妙用也謂何此小珠中含藏衆多珍寶耶云也文又何能頓雨衆物者是疑此珠中始無雨寶德而後頓有此雨寶妙用義也謂從本無物何今始頓有此用耶云也是故惟進退兩義都俱不可思議云也疏即此世間至菩提心寶耶者是以世俗淺喻巧妙義況類出世甚深不思議妙德也疏是故善知至菩薩亦爾者從下合喻也是總合也疏文已證知至置在家中者是別合中最初見寶收置喻之合也是合所被機之所成世間八心之所發生出世最初心種子義也疏次以三種至去其麁礦者是第二除去麁垢喻之合也三種三心者是小乘中聲聞緣覺菩薩三人之見修無學三道心是也此三道中但破我執斷煩惱垢故如次利鐵鑿去其麁礦也疏次觀無緣至而不傷之者是第三藥物消化喻之合也此既依法無我觀斷所知障而稍顯得二空真如理故如消化此寶珠之麁垢相而不傷其質性而稍顯得精實寶性也疏次生極無至雨種種寶者第四瑩淨雨寶喻之合也謂此寶珠依方術能瑩淨極竟則置高幢上雨種種珍寶猶如此極無自性心之因分功德窮滿時發生無量自利利他功德妙用也佛家者果分佛之家也生者尚是因分義也以此極無自性之能觀智喻灰水也以此灰水洗淨此珠垢穢令光曜義合極無自性心之洗除微細心垢而令清淨心性義也是因分佛能破盡諸染汚法稍令顯現本有功德故也問何故不明證寂然界心及覺心不生一道無為心耶答隨其便宜可攝前後二心中也雖別不明之理可有之也今且省略之故不明也
