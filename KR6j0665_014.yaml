body:
  text: 大日經住心品疏第十五疏以是因緣至大供養也者是結上所明應供德也疏若行者直至神力取之者是上來多分明單於顯教法中修行極無自性心等淺略門法中漸次行法畢故今是中對彼前漸次行法而明此頓入真言行者之依三密教法而速疾成就真言果德也彼前漸次行人多分是依自智力功用得成就也是頓入行者多分依三密行法之威驗力能得成就也疏雖巧拙至終無異路者是通伏難意也伏難意云彼漸次教行人與此頓悟行者其根機不同而其所行法所證理可有勝劣也而何終無異路云耶則通此難云謂於此二種行人既雖根機不同行法有頓漸彼此遂究竟得到真言法之寶處道場是同一種無異路云也但且有遲速不同耳疏故此經從至本末因緣者是結成以末法令歸本法義也意云前所説九種心相續止住由者是皆為令入證後祕密莊嚴寶處道場故云也疏若但依常途法相則不得言者是簡別前所明單顯教法與此真言法教勝劣不同義也意云前雖云巧拙難易不同等而尚恐有愚人為有執顯教與密教無勝劣咎故為破此執故安是誡也疏諸佛大祕至悉開衍也者是結上所明心相續義也疏經云祕密主至無邊智生者是牒於讃歎此淨菩提心門之中信解行地所有功德本經文也疏此經宗從至一切智地者是且先釋此淨菩提心門中信解行地之位分齊義也謂淨菩提心以上者是始從最初發淨信心之十信及十住十行十回向十地皆悉名信解行地也約此信解行地中有總別二義也若約總義者十信名為信義也十住十行十回向名為解義十地名為行義也謂十信位始聞信甚深微妙理事而於三賢位中悟解是理事法於十地位而能如法修行之證解之故十信三賢十地如次名信解行地也上疏文云淨菩提心者是白淨信心等云云故知十信已上是信解行地也若約別相義辨之者唯十地位名為信解行地也而是處疏文唯是約前所云菩提心為因大悲為根方便為究竟三句義而通攝十地位以為是三句義所用法即為信解行地也地上菩薩信解行用增勝故取之也若依此意者初地菩薩者菩提心句是信義也第二地已上至第七地者是大悲句是解義也第八地已上三地是行地義也是八地已上菩薩於任運無功用行中而念念行中修得一切行故也疏則初地為至此心決定者是明以十地位如次配種子等十心義也是等皆三句所攝也是皆名為信解行地也文唯如來名究竟一切地者以佛果簡別此因位信解行地義也信解行地是當因義而未究竟證達義故於佛果無此名也此究竟一切智地者果分諸佛之名也如華嚴中至果信成就果者是引新譯八十華嚴第三十四文而明信解行地之中初地菩薩所具足信解行義意也撿彼經文明初歡喜地菩薩所得信心文云成淨信者有信功用能信如來本行所入乃至信成就果云云此次經文云舉要言之信一切菩薩行乃至如來智地説力故云云疏於如是諸至修行地也者是疏主私釋約此初地菩薩之所具十種信心之不退功用而立此信解行名意也疏觀察三心至皆名方便地者是釋經文三心觀察義也文即是因根究竟心者是辨釋三心之名義也文若通論信解等者是以此三句義則通攝十地位而隨其所應有此三句義云也故云通論也文則是初地菩薩乃至以此即是菩提心為因句者是且約初歡喜地人明初菩提心為因句義也文歡喜地菩薩得此虛空無垢菩提心時自然於十無盡界生十大願乃至滿足百萬阿僧祇大願者是亦約八十華嚴經第三十四文意而明此意者此十大願具文彼經第三十四云佛子菩薩住此歡喜地能成就如是大誓願如是大勇猛如是大作用所謂生廣大清淨決定解以一切供養之具恭敬供養一切諸佛令無有餘廣大如法界究竟如虛空盡未來際一切劫數無有休息又發大願願受一切佛法輪願攝一切佛菩提願護一切諸佛教願持一切諸佛法廣大如法界究竟如虛空盡未來際一切劫數無有休息又發大願願一切世界佛興于世從兜率天宮歿入胎住胎初生出家成道説法示現涅槃皆悉往詣親近供養為衆上首受行正法於一切處一切而轉廣大如法界究竟如虛空盡未來際一切劫數無有休息又發大願願一切菩薩行廣大無量不壞不雜攝諸波羅蜜淨治諸地總相別相同相異相成相壞相所有菩薩行皆如實説教化一切令其受行心得增長廣大如法界究竟如虛空盡未來際一切劫數無有休息又發大願願一切衆生界有色無色有想無想非有想非無想卵生胎生濕生化生三界所繫入於六趣一切生處名色所攝如是等類我皆教化令入佛法令永斷一切世間趣令安住一切智智道廣大如法界究竟如虛空盡未來際一切劫數無有休息又發大願願一切世界廣大無量麁細亂住倒住正法住若入若行若去如帝網差別十方無量種種不同智皆明了現前知見廣大如法界究竟如虛空盡未來際一切劫數無有休息又發大願願一切國土入一國土一國土入一切國土無量佛土普皆清淨光明衆具以為莊嚴離一切煩惱成就清淨道無量智慧衆生充滿其中普入廣大諸佛境界隨衆生心而為示現皆令歡喜廣大如法界究竟如虛空盡未來際一切劫數無有休息又發大願願與一切菩薩同一志行無有怨嫉集諸善根一切菩薩平等一緣常共集會不相捨離隨意能現種種佛身任其自心能知一切如來境界威力智慧得不退如意神通遊行一切世界現形一切集會普入一切生處成就不思議大乘修菩薩行廣大如法界究竟如虛空盡未來際一切劫數無有休息又發大願願乘不退輪行菩薩行身語意業悉不唐捐若暫見者則必定佛法暫聞音聲則得實智慧才生淨信則永斷煩惱得如大藥王樹身得如如意寶身修行一切菩薩行廣大如法界究竟如虛空盡未來際一切劫數無有休息又發大願願於一切世界成阿耨多羅三藐三菩提不離一毛端處於一切毛端處皆悉示現初生出家詣道場成正覺轉法輪入涅槃得佛境界大智慧力於念念中隨一切衆生心示現成佛令得寂滅以一三菩提知一切法界即涅槃相以一音説法令一切衆生心皆歡喜示入大涅槃而不斷菩薩行示大智慧地安立一切法以法智通神足通幻通自在變化充滿一切法界廣大如法界究竟如虛空盡未來際一切劫數無有休息佛子菩薩住歡喜地發如是大誓願如是大勇猛如是大作用以此十願門為上首滿足百萬阿僧祇大願文但百萬阿僧祇大願説文彼經第三十四卷中不明之也其文闕故不能具引此也此初地菩薩之所發願也得此虛空無垢菩提心時者是此初地菩薩之所得始覺菩提心是也或約能觀智得此名謂此能觀正體後得二智清淨無染著廣大無邊際智相猶如淨虛空無邊際也或此菩薩之所證真如法界清淨廣大義亦如是也故云虛空無垢菩提心也十無盡界者十大願之所緣境界也謂十法界是也是地獄界畜生界乃至佛界是也於是十法界含攝無盡衆生界故名云無盡界也疏從二地以至於十法界生根者是從第二地至第七地者是且相配第二大悲為根句意釋也此二地已上菩薩之所修大悲萬行是勝於前初地所修大悲行故也問若爾者菩提心亦可爾也答二地已上菩薩菩提心義是實亦雖勝於初地菩薩之菩提心義但今約取菩提心句者以初地菩薩菩提心為因句而屬總菩提心句意耳文無盡大願於十法界生根者是釋先華嚴經所云於十無盡界生十大願文意也疏乃至漸次至名方便地者是明第三句所在位也謂第八九十之三箇地是隨分自行化他方便善巧進趣義具足證得故得此名也疏佛性論云至為階降耳者是引論證文別證第八地已上三地名為方便地義也意云十地所緣境界同皆是緣真俗二諦境也又是有自利利他勝用也然至八地已上三位其所得功德巧妙無功用也約此巧妙方便而作此第三句階降云也是雖有此八地以去三地差別義並皆具無功用妙行故合為方便究竟義云也疏若觀一一地亦自有三心者是下約十地中一一地別各各皆明有此因根究竟三心義也或若以入住出三心為因根究竟也疏如以衆多至名究竟者且約初地中明有此三心義也文如以衆多十因緣得入初地者撿彼八十經文云佛子此菩薩以此悲為首廣大志樂無能阻壞轉更勤修一切善根而得成就所謂信增上故多淨信故乃至常求上上殊勝道故佛子菩薩成就如是淨治地法名為安住菩薩歡喜地云云此經具文中列三十種淨治地之因緣也故疏云以衆多因緣也謂以修學此三十種因緣而為入初地之菩提心因緣義名為菩提心為因句意云也文既安住已以種種大悲萬行淨治是地名為根者是既初得入初住心已以後以種種大悲萬行為利生化用名大悲為根句云也文説治地果相及方便業名究竟者此證得初地中有為無為諸無漏功德義兼亦説名方便究竟義也亦自利利他巧妙方便及勝進後後地之方便名為方便究竟云也是隨分究竟義也疏餘皆準此者是餘第二地已上中所有三心次第準此初地三心義可比知云也疏經無量波羅至是治地行者是牒經文而釋此意也謂此無量無數所積習六波羅蜜布施愛語利行同事四攝法行是淨除煩惱障所知障而為入菩薩初無漏地位之因緣行法云也疏從此無有至地果相也者是明初地菩薩所得分果相之殊勝德也於此初地菩薩證得是諸功德時此初地之功德是無待對云也又此初地功德是凡夫二乘及三賢菩薩以自智力不可測量之故云出過心量不思議地也疏華嚴之十大至轉入如來地者是引八十華嚴經第三十四卷等明初歡喜地菩薩所得衆多十心文證而寄釋此大日經所云十心無邊智生義也凡撿彼華嚴經此疏所引此三十介心外亦更明餘衆多十心也十種大願亦有此經第三十四卷中初地菩薩初得入初歡喜地依發生是十大願力故得是衆多十種心於自他利益成就也疏更約前三心至此心決定者是通約十地而以此種子心等十心如次配釋之者始從初歡喜地次第乃至第十法雲地以種子心等十心如次可配十地也是約十地所得無相觀義而作此釋耳是十地菩薩皆以大寂無為果為所求本意故也若依如實義意者初歡喜地始得真如無相觀名為初種子心也第二離垢地以妙修正觀了知法性行而顯現無相觀增進故名為牙也第三發光地圓體照虛明惠心曜故名為疱也是真俗合觀大樹果可得之前相漸發生義也第四炎惠地靜照真極正觀現前平等大惠火燒三無明煩惱薪故是真俗合觀大樹果之增上緣莊嚴具發生故名為葉也第五難勝地是惠觀轉明妙通理事動而常寂寂而常動不住二邊有無雙遊此地是純無相觀之親因緣故名為花也第六現前地是無相觀多時現前故此名為果也第七遠行地是無相觀現前時用功用加行而引起後不動地純無相觀故此地名為受用種子也第八不動地是純無相觀無功用現前而煩惱不現起故此地名為無畏依也第九善惠地是起從純無相而進趣求妙覺地湛寂常寂無為解脫果故名為進求佛惠也第十法雲地是因行滿足決定登妙覺位時之親因緣故名為決定心云也疏此二心無至開出之耳者是明第九第十地之差別中無差別義也第九第十地是起從第八地無功用無相觀地而進趣求妙覺地故名為方便也是進趣義及巧便義也其第九地進欲求佛果心第十地者欲決定成辨果德心也疏若一一地中亦自具此十心者是又於十地中每地地各各具足此種子心等十心也疏且如住初地至推之可知者是準例此上所云初地中所明善知諸地障善知成壞乃至善知治一切菩薩地轉入如來地文説則以於此初地中種子心等十心義而應比知餘上九地所有種子心等十心次第意云也此中淨治諸地法者謂前十心中第十心是也又云及知諸地相者是前九種心總合是也文即是先解乃至更解二地者謂以前初地之中十心為因而登第二地更有十心云也名義準前説可知之也疏華嚴十衆至分別説也者是凡華嚴經所明十地中所修學衆多十心之義皆是準前義如次可配是種子等十心云也疏然此經宗至金剛寶藏故者是以真言門初地菩薩而簡別於前顯教所説初歡喜地菩薩也故即身成佛義云歡喜地者非顯教所説初地是自宗佛乘之初地云云謂彼華嚴經等所明初歡喜等十地菩薩所證真如理境是隨緣諸法之自性本不生之寂滅法性理是也而今是真言門中初歡喜地菩薩等所證理者是有二種也前所云諸法空理並法然三密境界理是也文然此宗從初地得即入金剛寶藏故者是義也問此金剛寶藏者是佛果之名歟為當所證理之名歟答非佛果名所證理名也問以何文證知爾耶答六波羅蜜經超悟師疏第三云經金剛阿尾奢等菩薩異口同音共説法身種子陀羅尼解曰言金剛阿尾奢者如上所列三十二聖皆言金剛者表所證法不可毀壞故涅槃經云譬如金剛所擬之處物無不碎金剛無損即其義也云云此文證最明鏡也是入者修入義也故祕藏記云真言行菩薩超過十地者其心如何所修之行也非謂所得之果如何其行超過初從阿闍梨入曼荼羅灌頂授法之人其所修之行是佛境界之行也非十地菩薩分齊是故曰超過十地所修之行佛境界行者所得之果亦可佛果不然現身獲得初地經文明説云云是三密宗初地菩薩始修入法然理性名為入金剛寶藏云也祕藏記云密教所説初地者佛也是心也是法文也云云付法傳云初者本初心者心地也云云菩提心論云夫會阿字者當觀圓明淨識若才見者即名見真勝義諦若常見者即入菩薩初地若轉漸增長則廓周法界量等虛空卷舒自在當具一切智云云問從初地得即入金剛寶藏故者是從初地不經餘九地而直到妙覺果云歟答不爾也故菩提心論云若轉漸增長乃至當具一切智也云云又五祕密儀軌云現生證得初地漸次升進云云又琉第一云次第此生滿足此中次第者梵音有不住義精進遍行義謂初發心欲入菩薩位故於此真言法要方便修行得至初地爾時以無所住進心不息為滿第二地故乃至第三第四五六七八九地亦如是乃至滿足十地唯一行一道而成正覺云云是意云從得初地一生而無間次第滿足十地而到金剛解脫道常住理云也法藏者是法身常住性德之能含藏無量無邊功德莊嚴藏而令受用於自他猶如轉輪王寶藏無盡無窮用也理趣經云一切有情如來藏以普賢菩薩一切我故一切有情金剛藏以金剛藏灌頂故者是義也此疏第一云奮迅示現無盡莊嚴藏者又如國王有大庫藏若須示人則自在開發而陳布之故云莊嚴藏也云云疏華嚴十地至深祕釋者彼華嚴經所明菩薩十地名義凡有顯略深祕二種釋云也是義即疏主本師無畏三藏所傳也文華嚴十地經一一名言者是有二意也一者謂約華嚴經所説十地名義而經歷此十地彼各各一一名義皆悉有淺略深祕二意也一者謂明菩薩十地名義即有二種經説也謂華嚴經及十地經是也十地經有九卷也或又此十地經者彼華嚴經中十地品所明菩薩十地法是也疏若不達如至涉於十住品者是若不能解悟此菩薩十地所有淺略深祕二義差別意人唯悟十地之淺略名字而不能解深祕之密號云也若唯依顯露文相意而解知菩薩十地名相人唯解彼經所説淺略名字不能解是大日經所明真言門中深祕趣菩薩十地密號云也顯教密教説十地名相大概是皆同故云因緣事相往涉於十住品云也十住品者是指彼華嚴經之中十地品也是謂彼十地住品者不謂指三賢中十住品也疏若解金剛至當證知也者是已上略辨顯密二教所説十地義差別意故是今略表示真言門中約深祕釋菩薩地住之密號義也此義有行因至果從本垂迹二種十六大菩薩義也此義如金剛頂發菩提心論云我見自心形如月輪何故以月輪為喻為滿月圓明體則與菩提心相類凡月輪有一十六分喻瑜伽中金剛薩埵至金剛拳有十六大菩薩者乃至四方如來各攝四菩薩東方阿閦佛攝四菩薩金剛薩埵金剛王金剛愛金剛善哉南方寶生佛攝四菩薩金剛寶金剛光金剛幢金剛笑西方阿彌陀佛攝四菩薩金剛法金剛利金剛因金剛語北方不空成就佛攝四菩薩金剛業金剛護金剛牙金剛拳四方各四菩薩為十六大菩薩也乃至云一切有情於心質中有一分淨性衆行皆備其體極微妙皎然明白乃至輪回六趣亦不變易如月十六分之一凡月其一分明相若當合宿之際但為日光奪其明性所以不現後起月初日日漸加至十五日圓滿無礙所以觀行者初以阿字發起本心之中分明只漸令潔白分明證無生智云云問以此十六大菩薩而配釋歡喜等十地方如何答若依三十七尊心要意者最初金剛薩埵是當初發信心位及十住位也王菩薩是當十行位愛菩薩當十回向位喜菩薩當初歡喜地寶菩薩是當離垢地光是當發光地幢是當焰惠地笑是當難勝地法菩薩是當現前地利菩薩及因菩薩二種人是遠行地語菩薩是當不動地業菩薩是當善惠地護菩薩是當法雲地牙是當等覺位拳菩薩是當妙覺位也是約行因至果義也若約從本垂迹義一一菩薩皆悉攝得諸位功德也具如別抄釋也疏云我一切諸至因此得之者是牒經文釋此意也謂此文是歎此大日經王之顯説諸祕要法德是教理行果深義者皆悉依止上所云三句法門而得此祕要之果德云意也文如上一切無盡莊嚴境界及無不因此得之者是指上經文所云毗盧遮那如來加持故奮迅示現身語意無盡莊嚴藏等文也是偏明法佛自證三平等法也文及餘無量修多羅佛所稱歎一切行果無不因此得之者是明十種住心中始從愚童持齊至極無自性心九分住心心續生句皆是顯教之無量無數契經中三世十方諸佛所稱歎法是云也疏是故餘經至莖葉花果者應化諸佛所説顯教諸契經中雖宣説佛果法身種種功德相及一切有情心內常在佛性如來藏義而未顯了開示此佛性如來藏之離垢纍方法也而今此經中顯示顯得此自性清淨心相之祕方術計云也沙羅樹者是合法佛果地功德常住堅固義之喻也吉藏師云沙羅樹者六卷泥洹經云堅固林云云寶法師云西域記云在拔提河西岸其槲而皮青白葉其光潤四樹特高而是如來涅槃之所也云云疏今此經中至生育因緣者是明此經中顯説此三密方術而顯得本覺佛性之修行軌則義云也疏若離此因至無有是處者重成此經祕要義不共之所由也若離三密行業登法佛常住果地者無此處云也明此三密行業之方軌義唯有此經教而餘顯教契經中無委説此祕密義事云也疏所以大日至非為此平者是結此經不共德也疏經復舉益勸至僧祇劫也者是舉淨菩提心門中極無自性心之斷惑功德而勸進諸真言門中行者之辭也文復越一劫升住此地乃至僧祇劫也者是有二義一者是明此極無自性人之既超過第三劫義也謂是初證入是信解地之所得極無自性心行時即能遠離第三重極微細妄心云也二者明超過是第三僧祇劫極無自性心之行而更入真言行大悲為根句人之證法斷惑德行也謂即是云初入此信解地故方應知是指超越前二劫而初入極無自性心中之信解地人也非謂彼今極無自性以前信解行地也彼必定不今初入人也彼從久遠證入故也疏行者初觀至亦名無記心者是為欲顯示入修極無自性心之不共德因緣義故先敵對是住心而明彼前證寂然界心等不離妄心過失所以而為入修此極無自性心之因緣云也約此義有二解一者是依彼高野和尚御意義二者依此疏上文意義也初義云十住心論第九云警一道於彈指覺無為於未極等空之心於是始顯寂滅之果果還為因云云案此文意彼論意是則明今疏之於是所説文意也若不此義者彼論據何處作此説耶依此應知於此所云行者者是約初觀空性時覺一切法皆入心之實際等者是明前一道無為心之中事也彼一道無為行者之泯空性觀時不見衆生不見佛果也了覺一切諸法皆悉真如平等義故也故住此心時捨諸樂欲之心離諸厭離心故云退不墮二乘地不進得上菩薩地也二者依此疏上文意者指此行者初觀空性時意者是明前第二劫中所云證寂然界大乘行者所為事云也故上疏文云大乘行者了達諸蘊性空於一切法中都無所取亦無所捨等云云又云依常途解釋是菩薩位發心已來經一大阿僧祇劫方證如是寂然界今祕密宗但度此一重妄執即是超一阿僧祇劫行者未過此劫與辟支佛位齊時名為極無言説處爾時心滯無為法相若失方便多墮二乘地證小涅槃然以菩提心勢力還能發起悲願從此已後三乘徑路始分云云此所引上文意與此今下文意此義甚同也故恐亦私存此義耳疏然以菩提心至發起悲願者明起從空觀而移假觀而發生上求菩提下化衆生事業義也此中以本覺菩提心而為因以諸佛之加持驚覺為緣不沈空觀遂勝進於彼後住心意則通上二解義也疏爾時十方至無自性心者是明此前住空觀行者之出從空觀而勝進於後極無自性心之因緣也謂依蒙此種因海諸佛等驚覺之教諭故則轉生此極無自性心云也疏乃至心之至不思議地者是明此極無自性心之無性觀行之得離細妄執及業果義也又并明所未離極微細之業煩惱果報義也具如上釋也疏乃名真離二乘地也者是上明證寂然大乘菩薩行者雖云始離二乘行而約今對於此一道無為住心中真實離二乘地尚彼為真實未離二乘行義也今此一道住心為真實離云也意云上云證寂然界菩薩是雖遠離小乘中愚法二乘行此菩薩是猶於三乘共教中得證三乘同坐一解脫床故則約是菩薩尚證得諸法無自性觀是唯解遍計所執空義也又三乘同終應入灰炭涅槃故也故此通教菩薩真不離與三乘通教中不愚法二乘共行云也故上疏文云前二劫中雖云度二乘地然須菩提等由能承佛威神衍説人法俱空而於此祕密一乘心生驚疑不知所趣乃名真過聲聞辟支佛地也文是此説一道無為心之實出過三乘共中之二乘境界義也何況極無自性心真不出過二乘行義耶疏就前三句至一切智地者是於上心續生句十重心中今約此第十祕密莊嚴住心者立究竟一切智地之名號云也謂四分之一義者是約前三句法門中更同一分而成立此第四分之究竟一切智地義云也意云初菩提心句是為下分義也第二大悲句是為中分義也第三方便滿足句是為上分義也於此上分之方便滿足句中更開出二分也一者只為上分是前極無自性心之中辨隨分因滿果佛矣是佛名為種因海佛也二者更開出上上方便圓滿佛果也是名為法佛三平等究竟一切智地云也疏故曰四分之一度於信解也者以釋意歸本也約菩提心為因大悲為根句及方便滿足句之三分句今更加上上方便句名為四分之一度於信解也此上上方便地即為超過於彼信解地也信解地唯以不名究竟一切智地亦此性德圓滿海佛果地不名信解行地也唯是極果地名為究竟一切智地也疏第二卷抄了上來是明十住心相已畢從下是明六無畏義也此六無畏是於前十住心中所得隨分利益也疏經云爾時至答前心相句者是牒經之問答六無畏義之文而總釋此問答之意也經云爾時執金剛至如是説已者此二行是金剛手菩薩請問六無畏義之辭也此請問意彼前九句問中上既有第四第五兩問也是一者問凡夫心相二者問行者之為斷此凡夫心相故作對治行之方法而將得其利益時所經曆時項多少分齊相義畢而今又更重問於前第五相更應廣説其義也復次上文有第九問也彼問此行者與凡夫之殊異義也今亦於此處更問顯前第九問中其所得利益之殊異心相及問其所得利益無畏法多少義也經摩訶毗盧至當得一切法平等無畏者此八行文是佛説六無畏而答前問也但疏文略牒初後各一無畏文而括攝中間四無畏也疏以金剛手至得無畏處者是重廣釋此金剛手問意也此教菩薩直乘真言門上菩薩地者是指入真言門頓入者也上疏文云唯以一行一道而成正覺者即此人也又菩提心論云從凡入佛位者即是三摩地者是人也謂此直往菩薩初入真言教修學此教門終極佛果以前中間有得幾許無畏安穩利益處問也疏佛還復約前三劫作差降對明也者是略釋佛答也故疏上文云心諸相與時願佛廣開演者問諸心差別之相及相續勝進問凡經幾時而得究竟淨菩提心也今此佛答文是約彼前問意答此義也約佛答意有淺略深祕二種義也多分約淺略趣明六無畏義也疏梵云阿濕至蘇息處也者是尋梵音示正翻也疏如人強至復得蘇者此正翻義之喻也疏衆生所復至名蘇息處者以此所喻方合是蘇息法之所安處也問何故名為再生耶答是約本覺之淨法之變受無明染熏習而流轉生死中者今亦更始還淨時才得始覺初相義故名為再生也是此當蘇息義也此義如釋論第三偈云諦聽諸佛子我從具縛凡具經一切地圓滿行因海莊嚴大覺果我從清淨地具經一切地持一切萬行得第一信位入無明藏海如是二大事一時非前後又長行云此二大事顯示二種般若智云何為二一者始覺般若二者本覺般若始覺般若者從具縛地漸漸出離乃至金剛圓滿因行發究竟道頓斷根本無明位地覺日圓照無所不遍是名為始覺般若本覺般若者從清淨性漸遠離乃至信初發究竟智斷滅相品入無明海隨緣轉動是故名為本覺般若云云此論文意云本覺淨法之漸漸不守本性隨無明染熏而雖於生死中流轉終還淨時漸漸得始覺智云也此始覺還淨義是同再生蘇息義也問何但説是六處名蘇息處而説法佛妙覺果地不名蘇息處耶答是蘇息義是對悶絶可死義所得名也既蘇息畢以後得長生不死德者何尚可名蘇息處耶如是流轉生死業煩惱彌可增長位中不可立無畏義也今於此六位中漸漸隨分除斷惡業煩惱而不增長之故立無畏義也是明始從凡夫至菩薩等覺地之間所得利益安樂義也問此六無畏是三賢十地佛地中何答此六無畏義中第四五六三心中可有隨分三賢十聖位及佛果地位也證寂然界大乘及他緣大乘覺心不生一道無為極無自性此五重可有隨分三賢十聖義及佛地義故也問若爾者何此疏第三云第六無畏於平等心中修曼荼羅行離垢地以去各於自地觀心中修曼荼羅行略以行位分之已作十六重淺深不同云云今視此文案意唯於第六一切法平等無畏但可為初地位也於四五六三無畏中不可立十地佛地也答此處初地者唯是真言行之初地也不顯教修行之初地也於此密宗初地中攝彼極無自性心等顯教所立十地及佛地也第二離垢地者此亦不謂顯教之離垢地故無相違咎問以何義得知此十地是真言家之祕密十地義耶答此疏第三云經云為彼從初發心乃至十地諸菩薩者謂從發淨菩提心時見曼荼羅已遍法界升第二住又逾深作十轉開明乃至第十一地而後所見圓極云云此義意耳問十六重中後十重何位耶答始從第二離垢地至菩薩第十一等覺位歟問以何文知為第十六是等覺人耶答疏云略以行位分之已作十六重淺深不同此一一位自有菩提種子心有大悲胎藏增長因緣有惠方便受用之果云云既此文中云行位及增長因緣有受用之果故定可知是非妙覺已圓滿果位也故知是等覺位也若不等覺者取何者有可成此第十六重義耶六無畏中法無畏法無我無畏一切法平等無畏此三無畏中攝顯教三賢十地與佛果及密教初地已還位也疏亦如度險至無畏處也者是依義翻意而立此名也是無災難而安隱處名無怖畏處也此六處則漸次對治惡業苦患果及智障因與變易報之處故立此名也此中第一善無畏是依修三歸五戒十善等離三途苦果到人天樂處第二身無畏是為依修四念處等離四顛倒厭離欲界不淨依身苦聚果報方生棄捨欲染想漸入無畏處云也是修六行智生色無色界人及若修習小乘七方便位當此處義故也第三無我無畏是小乘學無學人分全斷三界煩惱業果若除遣我執已而得有餘無餘二涅槃樂云也第四法無畏是證寂然界菩薩依所執空門故除遣一切我法二執而住一切諸法無自性空觀故隨分離煩惱所知二障則得到菩提涅槃二勝處云也第五法無我無畏是依唯識無境觀斷煩惱所知二障證菩提涅槃勝果云也又攝覺心不生心也是雖云此二種住心淺深不同而此同第二瑜祇劫所攝而與他緣乘共故合為一無畏也彼此共菩薩乘故合為一無畏處也又解不合之也此攝第六無畏故第六一切法平等無畏是則攝覺心不生一道無為極無自性三種心合名為一切法平等無畏也此三界住心俱漸漸從淺至深則有真俗二諦圓融無礙平等不二義故合為一無畏也又解此第六無畏但攝一道極無二心而不攝覺心不生住心其一途義也一道極無二心俱是同一相行故也凡此處亦斷二障捨分段及變易生死果到菩提涅槃勝處故立無畏名也無畏名是據所得安隱花報及果報立此名謂是約漸漸終到菩提涅槃人而得此無畏名也或亦修因位不被繫縛惡業煩惱故立無畏名也約深祕義六無畏皆一一有深祕行至下可釋也疏佛言祕密主至十善業道者從下牒經文而釋六無畏義之中是先總釋其第一無畏義之淺略義也此第一無畏義中唯取有漏不殺生等十善業道云也無漏十善業及無漏生法二空觀相應善根是有於修後第三四五六無畏中也是義此約淺略義也經諸善言是十善非一故用諸言也不謂一切有漏無漏善根皆此第一無畏中攝盡也疏如世人以至初蘇息處也者是善惡相對而指示其現事而明於行十善人而立蘇息義也謂行十不善業道者名可為必死命終人也必墮落三途而難拔出期失善故也翻之修十善業者名為蘇息取人天果漸漸發生菩提涅槃因故也此中以十善業為首而攝三歸五戒八齋戒等也是皆離惡趣為人天業故也此十不善業感惡趣果義如十住心論第一云此是羝羊凡夫所動身口意業皆是惡業身惡業有三謂殺盜淫口惡業有四謂妄語麁惡離間無義是也意惡三謂貪瞋癡是也如是十種惡業一一皆招三惡道果且就初殺生業説之由貪衆生皮肉角等故斷有情命令彼受苦痛故感地獄苦由味著其血肉故感餓鬼果一切衆生皆是我四恩彼由無明愚癡罪故感畜生果若生人中時亦感二種果斷他命根故短命生他苦痛故多病如殺生業招三惡趣果者餘業果亦復如是云云疏若真言行者至此齊等也者是下述約祕密趣釋第一蘇息處義也此祕趣中第一無畏處與前淺略中第一無畏處其義相似云也此疏第三云漸次證入者如初無畏時以聲字觀修曼荼羅行云云解曰此義意是真言行者若遇灌頂大阿闍梨初受三昧耶戒已被授祕密真言法則以後方能一心可修學觀察梵字種子真言四十二字五十字等法曼荼羅祕法之字相字義及其音聲韻曲相云也故聲字實相義云且就大日經釋此經中所説諸尊真言即是聲也阿字門等諸字門即是字乃至云彼字母者梵書阿字等乃至呵字等是此阿字等則法身如來一一名字密號也乃至天龍鬼等亦具此名名之根本法身為則源從彼流出稍轉為世流布言而已若知實義則名真言不知根源名妄語妄語則長業受苦真言則拔苦與樂譬如藥毒迷悟損益不同文應修習如是觀法行即是修曼荼羅行也又此疏第十五卷末祕密曼荼羅品釋中云三昧耶略有五種也三昧耶者如有人於衆多國王大臣所尊重集會之處而自發言作大要誓我今如是之事永當不作如是之事當依行之以自對可信之人而發誠言若有所違即得重罪是故三昧耶即是不可違越義也略而言之即是戒義也云云此殘文有五種三昧耶義可尋知之三密者又同品疏云復次行者身有祕印口有真言心有本尊境界之觀以三事畢竟無生故即是三輪清淨一相平等也云云供養義者又同品疏云供養略有四種一是供養香花等及塗香燈等乃至飯食此是世間供養也但以物獻也二者合掌謂禮敬也此是印也三慈悲四運心謂想香華法界運心已即用合掌印也并慈悲三事皆運心也此義廣臨文可知之也修行者前所標五種三昧耶即是義也五種三昧耶具義如疏第十五明已上第一無畏義了疏經云若如實至而生貪愛者是明第二無畏淺略義中是明以初身念處觀之藥而對治欲貪病義也修修身觀者是身念處之名也此中觀自身五種不淨者一種子不淨二住處不淨三自相不淨四自體不淨五究竟不淨也此三十六物及五種不淨者無相宗賢聖義記第一云問就自身五種不淨何云種子不淨等答約種子有二種一以過去結業為種子二現在以父母精血為種子此二名種子不淨言住處不淨者即母胎有處名依處不淨故章云在母胎中生藏之下熟藏之上兩界之間安置己體云云言自相不淨者九穴流出不淨即眼出粗液耳出浩𦡲鼻中出涕口中出嘔吐大小便道流出屎尿言自體不淨者即三十六物一髮二毛三爪四齒五皮六肉七骨八髓九筋十脈十一脾十二腎十三心十四肝十五肺十六大腸十七小腸十八胃十九胞二十屎二十一尿二十二垢二十三汗二十四淚二十五浩濘二十六涕二十七唾二十八膿二十九血三十黃癊三十一白癊三十二肪三十三𦙱三十四腦三十五膜三十六精也或論本九穴不淨名共相不淨三十六物名自相不淨云云又云何第五終竟不淨者謂是死後之九想之不淨是也云云又云何云觀他不淨觀自不淨答觀他身九相云觀他身不淨問其他身九相者何答他身九相者一死相二脹相三瘀青相四膿爛相五壞相六血塗相七蟲噉相八骨鎖相九離壞相也問智度論何故除死相加燒相答欲顯觀行清淨義捨死相加燒相即以脹相為第一以燒相為第九云云文終不為此而生貪愛者是明不淨觀益也疏次復觀受至得蘇息處者是舉次受念處心念處法念處三種藥而足上身念處觀則明為對治淨樂我常四顛倒義也謂依不觀知我無自性義故四倒起云也問四念處治四倒義如何答大乘法門章第三云智論云破四顛倒故説此四念處云云問對治義何答章云凡夫多於色中計淨受中計樂心中計常想行等一切法中建立有我為破是見觀色不淨破除淨倒觀受是苦破除樂倒觀心無常破除常倒觀法無我破除我倒問以何義故初説身念答此有二義一麁細次第二觀求次第問二次第其義云何答麁細次第者色麁易觀是故先説受細前色麁於後二如人有病受心先覺是故次辨心體雖細而麁於法故次明心後説其法觀求次第者凡夫本來男為女色女為男色而生煩惱故先觀身又入法初門故先觀之便作此念云何衆生樂著此色由樂受貪故次觀受更推求誰受是樂所謂心識故觀心復更推求誰使是心所謂我也故後觀法問觀相云何答約觀有內外兩觀觀自身不淨名內觀觀他身過患名為外觀謂於內身觀五種不淨於外身觀九相等云云疏若真言行至位與此齊也者是明第二無畏之深祕義也又此疏第三云第二無畏於有相觀中修曼荼羅行云云是即與前淺略義相似也此觀本尊三昧衆相現前義意如此疏第十一卷云然此中行時略有二地一者謂非摩呬多地二是三摩呬多地譯為等引也於未成就時要當先有成就之相乃至欲成就時亦有欲成就相此皆是非三摩呬多地也謂初得世間成就時所加藥物等皆有不思議力用乃至能遊佛剎是未成就之相猶得此現驗不思議事故心得決定信更增勝得入等引地也行者初修出世間觀方便時先觀本尊依畫像善觀已初時閉目而得明了其後漸開眼亦見顯現明了無有隱昧此是未等引若以得如是事故其心倍生信樂由此信故其心清淨漸當不取著等心無二此無二亦除無有中邊差別之見除諸心緣萬法平等爾時名等至相也以衆相現時雖未成就然由此故能得漸成故云彼為未等引地也注云私云謂如世間未到定也隨取彼一心以心置於心證於極淨句無垢安住不動不分別如鏡現前甚微細若彼常觀察修習而相應乃至本所尊自身像皆現者初觀本尊得明了現已於四字中隨取其一置本尊心上此是經中云與心相應也謂以此佛心之字安本尊心上注云取心謂取佛心字也置佛心上名與心也隨取一真言心於本尊心上而想置心真言或自身為本尊而置心字於心上故云以心置心等也如是觀時作極淨無垢之觀以一切心本尊常爾故如是觀淨之時以不外緣安住不動不分別一切法相不生妄想爾時與觀佛三昧等相應譬如淨眼之人面對明鏡此中鏡者即是觀本尊心上圓明清淨無垢所謂極微者謂初觀種子字時極令細少以是心種子故也先既觀見本尊像已於本尊心上觀此明淨鏡鏡中有此字一心觀此字即於此中得見本尊真實之相亦自於圓中自見其身此猶是未等引相也如是唯住一境不為垢障所動常如是修習故自影像現時心上亦有圓明及字初觀之時隨見一字三事自然現也後時心中圓明上見本尊本尊圓明上復見自身如是互相照見無有障礙名影像成就此亦是非等引地也文問注云取心謂取佛心字也置佛心上名與心也者意何答私云取佛心字者是四種阿字中隨一阿字可取云也若第一阿乃至第四惡字也置佛心上者阿字是諸佛種子以阿字即於本尊佛之心上可觀之也或亦指行者自心名為佛心也謂是即八分肉心也此肉心即是質多菩提心之所依託處故名曰佛心也與心者彼紇哩多菩提心與此種子字心相應云義也謂紇哩多之圓明菩提心內可觀質多之慮知心即種子字云心義也下與心者是上句所示真言心義也與是相應義也謂心處心與真言心相應云也具如慈氏儀軌明説也此義如菩提心論云夫會阿字者當觀圓明淨識乃至阿字是菩提心云云此義具意如疏下第十七卷説謂彼文云次佛答中心心作餘支分布如是一切皆作我佛自住瑜伽座者而以心布於心餘者布支分一分如是一切作即同我自身作謂置也謂如是作之也布於心故名心心也謂以阿字而布於行者之心阿字是一切法心而布於心故名心心也猶此是最初故先布於心心是一切支分之主阿字亦爾是一切真言之主既布此竟其餘諸字則布於一切支分如下品説也然布阿字法即是前文所説先觀其心分八葉開敷置阿字於其上此阿字即有圓明之照也將行者染欲之心與真實惠心而相和合即同於真而共一味也如是觀者即是如來故云彼若如是作者即是我也我者佛自指也云云以此具釋文可知以心置於心文意也上來疏文是與此第二無畏深祕義相當也上初文所明非三摩呬多地者當真言門中十信中行法也後文所明三摩呬多地者當真言門之三賢十地行也此疏十七云等引者梵云三摩呬多即以三平等法引攝一切功德攝在自身故言等也舉此三平等即是普攝一切功德照此三事究竟皆等攝入自身名為等引云云私云未等引義者準之可知也是中意者等引與非等引俱是同雖定地心約三平等功德成就義邊名為等引地也約未成就此功德聚之義邊名云非等引地也是義如四禪八定中未至與根本定之差別不同義也亦三事自然現者是隨見初阿字智成就已時云也次亦自然見餘第二阿引聲第三暗第四惡字也又事者字之借音也又解三事者一圓明字二本尊三自身相也問等至與等引俱定義也然何名此等至成就相即云非三摩呬多云耶答未至定成就者等至也成就根本定者三摩呬多云也文等心無二者謂觀見一切諸法是平等一心也者謂是唯識周遍義云也等心無二者正當心境無別之唯識義也又文云無二亦除者約實相觀中者除遣唯識之觀解之智而唯證入真如理性云也疏經云若於取至我不可得者是牒經文而總先釋第三無畏之淺略義也此中意是取聲聞乘人之依生空無漏觀遣我執斷煩惱而得擇滅而證有餘無餘二涅槃義故名為無畏也取蘊者煩惱名為取蘊也此煩惱能取執分段生死苦果故也五蘊通皆有煩惱相應義故也取即是蘊也持業名或亦此世五蘊是依過去世煩惱業而成就現世蘊故名取蘊也是取之蘊也依主名也又執取五蘊以成我執而生煩惱故名為取蘊也疏捨此自色至影由何生者是釋捨色像義也以樹喻五蘊也以影喻喻我體也若樹無時隨影已故知影是非實有性但待他而假立也疏今五蘊至而有我耶者下是合喻也於此聲聞乘法中有依折法空觀而知五蘊無性義故以此義理故了知蘊法中都無實我性也今五蘊尚從緣生等者是約流轉生死因緣成五蘊無自性義也謂十二因緣與苦集二諦是也疏如上所説至得蘇息處者指上經文已所明唯蘊無我住心所證德也疏若真言行至位與此齊也者是明此第三無畏深祕趣義也此疏下第三云第三無畏於唯蘊無我心中修曼荼羅行云云此中義就修行儀分位者三月行法中當第一月行也若指觀行之相釋此義如上經中既所明五番遣執中第二三番所觀無相菩提心義是也問初觀本尊今但觀佛意何云本尊即佛佛非本尊耶答初觀本尊者隨行者所樂不同義也而總相者佛者通三重曼荼羅聖衆而名佛也而今但觀佛者是且可指大日尊也問聲聞乘唯蘊無我之行與此第三無畏深祕行如何齊等耶答聲聞乘人唯蘊無我心之行生空智者是始出世間行也又明此第三無畏深祕行即是疏云此出世行中先承事法云云故知彼是義甚齊等故也問其第一月行法如何答疏第十一云次第二正覺句者初觀本尊今但觀佛所以爾者一切尊形皆是見法身門故於鏡曼荼羅大蓮華王座深邃住三昧者又此鏡中如有窟像觀此窟甚深中有如來在此窟中深邃而坐之也總持髮髻冠無量炎圍繞離妄執分別本寂如虛空於彼中思惟作攝意念誦一月修等引持滿一落叉於中作如是觀是名真見佛也如是見時彼佛心上作字真言字一心誦之此是一向攝意在於一境更無一外緣心心念誦不令人聞然於定中自然有聲流出如流水不斷也所以落叉者此譯為見謂心住一緣明了現前也若就世語則是十萬遍耳一月誦者一月是等引圓滿入於初地祕藏中初地是第一月也私云此初地者是信行地即最初行位故不歡喜地也云云私云謂初得等引地故名曰入於初地也此是等引云地前約三句初菩提心為因句者初也大悲為中方便為後也此中具説行法也又第二句觀佛在於心鏡深窟中乃至自形作本尊先觀本尊心上圓明淨鏡鏡中有窟狀中有本尊即是真見佛也見佛已此佛心上復有圓明圓淨初觀此極淨心鏡甚微小後漸大也對面宛然故云現前也淨無比中有種子字一心正觀此種子字即是誦彼字也從此得見其心又見己身如本尊體相在佛心中若觀自心上圓明亦是如來本尊在中如是展轉相現不相妨礙本尊清淨離諸分別劑此名見菩提之心為初成佛種子也此亦名為一見一境故名一落叉是此出世行中先承事法如此成者是入信地梵音即三摩呬多是等引義亦名攝心一境之義即一心之義也文準疏下第十七卷云等引者梵云三摩呬多即以三平等法引攝一切功德攝在自身故言等也舉此三平等即是普攝一切功德照此三事究竟皆等攝入自身名為等引又定慧等合為一名等引能住如此真實乃至等引即是住佛戒也云云私云此行當深廣行位也此行中應用入我我入觀行歟能所可得意也窟狀者表佛所在處甚深奧幽而難可覩見義意歟此中具説行法者是明大悲為根之句中修行義云也此經第二云而以觀心處當心現等引無垢妙清淨圓鏡常現前如是真實心故佛所宣説照了心明道諸色皆放光真言者當見正覺兩足尊若見成悉地第一常恆身文疏經云若害蘊至得蘇息處者是牒經文釋第四無畏義也害蘊住舉緣者是指前唯蘊無我心智及拔業因種心之既雖離我執住法執攀緣失也疏爾時幻炎至得蘇息處者是舉此證寂然界大乘勝德也此大乘心觀智是殺害前小乘法執失義故也疏法謂十緣生句也者釋上所云於法言也疏若真言行至位與此齊也者明此中深祕行也此疏下第三云第四無畏於法緣心中修曼荼羅行云云此中行位是當第二月行歟疏第十一云次於第二月奉塗香花等而作饒益種種衆生類又復於他月捨棄諸利養者如前世間行中亦有塗香等供養此中復説者意與前殊異也此中已得等引其以清淨調柔隨事能成隨奉一香即能如實遍滿法界普遍一切衆生界作種種利益隨事皆成如香花者隨有一切所作亦復如是無不成就大作佛事也文疏經云若害法至都無所得者是牒經文而釋此意也於此中有二重無畏一者他緣大乘之離法執而得法空觀之無畏義二者覺心不生之離法執得法空智之無畏也此是初義也害法者若是斷除心外實有法執也住無緣者明住此心人則覺悟無所可緣慮心外境界義故云害法故解深密經云我識所緣唯識所現云云此中意云指依他八識心變成一切所緣境界云也疏心王自在至得蘇息處者第二約覺心不生義明離法執厄縛得證法空無為理也此中意明是真如本覺心之變作有為諸法義也疏若真言行者至得自在用時位與此齊也者此中祕密趣行者此疏下第三云第五無畏於無緣心中修曼荼羅行云云是如疏第十一云他月捨利養謂第三月於內外無所貪著名捨利養然外事從不求不受施也捨此利養而不捨衆生由真言行故皆得成就也又云彼時行者復更如理思惟即是菩提心而發悲願理攝而起故言如理思惟而得自在時彼於瑜伽思惟而自在願一切無障安樂諸群生等文私云上來三月行位者是可配真言行菩薩三賢位歟問此三月者何義答淺略義者是指修行法成就時節也故準此疏下第十七云謂六月者舉數也初六月不成更六月作展轉乃至得成乃止如説三月亦例可解也先誦經六月若無相更經六月若有相已方作成就也云云亦深祕釋者同卷云若祕釋者六月謂淨六根故也云三月者為淨身口意也又第十一卷説三月行文云若祕釋者一月者是一見也若得見法入於初地任運增益一切三昧陀羅尼等及諸地位也云云又同卷云一月修等引持滿一落叉於中作如是觀是名真見佛也乃至所云落叉者此譯為見謂心住一緣明了現前也若就世語則十萬遍耳一月誦者一月是等引圓滿入於初地於祕藏中初地是第一月也云云今私云若於修習時頃而暫指一月二月三月之時頃也若約顯觀法義者月者是顯示清涼離熱義等明了義圓滿義可見義也修習時節三月者是一往顯速疾成就時義也若約遲行人者實可經衆多年月等也疏經云若復一切至自性空無性者是牒明第六無畏經文而釋其意也謂觀自心畢竟空性時我之與蘊法及無緣皆一性者此中明三法無自性平等義也所謂一者所執我性二法執五蘊三者依他心境皆悉無自性平等理云也又一切法平等者如具緣品疏云界有三種所謂法界心界衆生界離法界無別衆生界衆生界即是法界離心界無別法界即是心界當知此三種無二無別云云即當是一切法平等義也疏此空智生至性心生也者謂釋極無自性義也解此無性理之智生名云極無自性心生也理實此中攝一道無畏心也疏於業煩惱至自性平等者是釋一切法平等義也此觀智之前所顯道理真如性是也疏爾時於有至得蘇息者是釋此中無畏義也此住心菩薩是不滯有為有相執及無為之空無性理也而遠離一切者遠離有無非有非無亦有亦無亦非有亦非無等執云也疏虛空無垢菩提心生也者是歎此行者能證得功德也此位當真言門中初歡喜地歟故此疏上第二云已歎入真言門功德竟然行者復以何法入此門耶故經次云所謂空性空性即是自心等虛空性上文云無量如虛空乃至正等覺顯現即喻此心也前劫悟萬法唯心心外無法今觀此心即是如來自然智亦是毗盧遮那遍一切身以心如是故諸法亦如是云云文云此心望前二劫由如蓮華盛敷若望後二心即是果復成種故曰如是初心佛説成佛因故於業煩惱解脫而業煩惱具依云云又云第三重微細百六十心煩惱業壽種除復有佛樹牙生故曰等虛空無邊一切佛法依此相續生云云又云若通論信解地則是初地菩薩得此虛空無垢菩提心時自然於十無盡界生十大願云云又若約祕密行明此第六無畏義者此疏下第三云第六無畏於平等心中修曼荼羅行離垢地以去各於自地觀心中修曼荼羅行云云私云以此文意知此第六一切法平等無畏是即當真言門中初觀喜地義於平等心中修曼荼羅行者是於第九識淨心處修曼荼羅行云也故菩提心論云夫會阿字者皆是決定觀之當觀圓明淨識乃至若常見者即入菩薩初地量等虛空卷舒自在云云問於自地觀心修曼荼羅行者意如何答若淺略義者於後九地每地其各各地地亦修曼荼羅行云也若祕釋者此第二地以去亦觀身分上中下於此自身三分而配觀三重曼荼羅相而明了見法界曼荼羅義歟此義具明如此疏第三具緣品中釋其文云經云世尊一切支分皆悉出現如來之身者前現莊嚴藏時普門一一身各遍十方隨緣應物今欲説曼荼羅圖位故還約佛身上中下體以部類分之自齊以下現生身釋迦示同人法及二乘六趣種種類形色像威儀言音壇座各各殊異及其眷屬展轉不同普於八方如曼荼羅本位次第而住自齊以上至咽出現無量十住諸菩薩各持三密之身與無量眷屬普於八方如曼荼羅本位次第而住然此中自有二重從心以下是持大悲萬行十佛剎微塵諸大眷屬從心以上是持金剛密惠十佛剎微塵諸內眷屬通名大心衆也從咽以上至如來頂相出現四智四三昧功德佛身即此八身於一切世界中徒衆剎土名號身業諸受用事皆悉不同亦於八方如曼荼羅本位次第而住經云為彼從初發心乃至十地諸菩薩者謂初發淨菩提心時見此曼荼羅已遍法界升第二住又逾廣逾深作十轉開明乃至第十一地而後所見圓極如是安布分位已即皆遍至十方於自法界門施作真言事業示現進修次第教授衆生此相現前了了無礙已上文疏然此心在至畢竟無相者此明此極無自性心之真如理體恆常不變義也謂凡位聖位中從本以來此本覺不變異云也疏以如來五眼至生滅中人者是明此約能證佛智之不謬解義而證是所證淨菩提心門極無自性心理即離一切色心等諸相義也疏今所以廣至之淺深耳者是明顯説此六無畏之淺深次第由來也謂皆是擬儀外迹以明修證之深淺者謂外迹者是顯教所説之六重淺略義也是能擬儀法也所擬儀法是真言門六重行位是也疏上已明見至何表示耶者是歎第六無畏依之滿足所依止之義意也謂此心中斷第三重極微細妄執故過此心更有何因門而為果分成勝因耶云也彼上文見煙之相者此指此極無自性心之菩提心名為煙相也是於祕密心無漏無為一切智智火之能表示煙故也以有此種因海之煙相而可比知有性海果分之法佛境界之究竟性也文更欲如何表示耶者是明因分究竟滿足義也
