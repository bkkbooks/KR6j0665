body:
  text: 大日經住心品疏私記卷第四疏次明群機至句法門也者下舉如是執金剛及大菩薩衆同時所聽聞法也此即指經本文處而明其法體也疏然此經至説法者釋傳法菩薩之安佛日言之意也意云見此經十萬偈梵本十佛剎塵數執金剛衆及大菩薩衆各隨自所證法門各各説自證三密法門其所説法無盡無數量無限故其説法時分且無前後齊限云也為欲顯示此義故置佛日言辭也佛日者是法佛也此法佛及諸執金剛并菩薩衆是離生住異滅四相而恆常不變凝然湛寂德故也為顯此佛之説法無始無終義故傳法菩薩置此佛日言云也如超悟六波羅蜜經疏第一云經云何乃令發如是願為佛應身剎那遷變化身佛者疾入涅槃功德法身湛然常住以是歸依清淨法身解曰言應身者勝應身唯識論名他受用身從佛平等性智顯現應大菩薩名曰應身此是有為無漏之身故有剎那念念生滅故言遷變化身佛者是劣應身唯識論名變化身也成所作智出現此身八相成道為於地前菩薩二乘凡夫故現此身緣盡息化故曰疾入功德法身湛然常住者本有功德修成功德總名功德法身修成功德自受用身性同本有俱不生滅是凝然常故曰湛然真如法身並具四德常樂我淨故曰常住常是法身住是報身名為常住佛報身者四智菩提以之為體此菩提智金光明經名如如智佛法身者名法如如故法與報並是凝然又不生名常不滅名住亦名常住以是歸依清淨法身者總結願求由是湛然常住身故勸總求也文又同疏第三云經曰然我國土無有去來生滅之相若無去來即聖智所行之處若有去來即是世間生滅之相解曰不眴世界是彼普賢如來淨土是密嚴國實報淨土離生滅相佛身佛土正報依報皆是真常同無生滅故曰我國無有去來生滅相也若無去來即是聖智所行之處者聖智如理理是真常智亦真常理同其智智有妙用理是真如智是真智無二無別如乳投乳更無異相故曰聖智所行處也所行是理智證於理名所行處若有去來即是世間生滅相者三界凡夫心有生滅境有生滅二乘之人自共相觀是生滅現取生滅相總名世間凡夫衆生不離分段名為世間二乘之人未逸變易亦名世間文以此等義意即為其法佛所談法相也問何為以不瞬世界普賢如來所説法為今大日如來所説法同耶答彼六度經所云不瞬世界者是當今此廣大金剛法界宮也於此法界宮中能住佛菩薩等悉眼目無瞬相故法界宮亦名不瞬世界也以何所以知爾者大日經第一奧文云爾時執金剛祕密主於一切衆會中諦觀大日世尊目不暫瞬云云此法界宮亦名密嚴土亦名華藏界亦名色究竟天亦名法性土亦名胎藏世界亦名金剛界亦名不瞬世界等也於法界宮有衆多異名雖國土體一種是依義異立此名別異也皆有證據文廣故不能具引注也又普賢如來者是為大日世尊異名也故菩提心論云然此五相具備方成本尊身也其圓明則普賢身也亦是普賢心也云云但是指大日為普賢總通義也問彼不眴世界名為自受用報佛土者此佛土應無方分也而何彼經云從此東方有世界名曰不眴云云而是自受用佛土是似有方分矣是則無周遍法界義也而此為自受用佛土之不眴世界何有東方耶答約真言家明胎藏界金剛界各各曼荼羅法中八葉九尊之五佛四波羅蜜佛菩薩等皆示有方位義也故約不眴世界普賢如來以是且為八葉中之東方寶幢佛名阿閦佛故以是意不眴世界即為東方佛國無咎也二教論云瑜祇經云大菩提心普賢滿月者注曰大圓鏡智云云即知此普賢者東方阿閦佛也於此東方不眴世界即能該攝餘諸方世界互無礙無障也問於普賢有通別二義意耶答通意者一切佛因佛果總皆名普賢也普賢名則共通因果二位故也約別立者東方阿閦佛名普賢者是以普賢金剛手菩薩為其自分四攝眷屬故以為其能攝佛即別文名為普賢如來無咎也是即有財釋意也問阿閦者何義耶答菩提心義云此云不動云云又大日經疏云以大菩提心不動名不動佛云云而不動佛亦名普賢如來義者是約因行行證入方便具足五義而此不動者形初發菩提心之分齊之佛位故且以不動佛名為普賢如來也問何故不動佛是云東方佛耶答如大日經抄記云四者約諸尊種子第一字為菩提心乃至第五字為方便初阿字在東方如梵音東方即在動首之義以順世間法諸方中東為上故喻菩提心最是萬行之初也云云今云以此義意可準知此義也如三十七尊禮懺經云金剛堅固自性身阿閦佛云云依如是等誠證文説者東方不眴世界普賢如來名為自性受用身法佛既有深所以敢無咎也疏如世間時至代謝相推者此明世間日與法佛之日不極相似義中是先顯世間日之不常住失也俱舍論説百二十剎那為怛剎那量臘縛此六十此三十須臾此三十晝夜三十晝夜月十二月為年云云時之極少名剎那感士屈申譬頃許時分也又法華統略云時量短長有十二節極短名剎那翻為一念百二十念為一瞬六十瞬為一息三十息為一須臾三十須臾為一日夜十五日夜為半月兩半月為一月等云云疏以淨眼至修短之異者此明法界宮常住之一時相也若以何由故定證知之常住時者得淨眼人即得見此常住湛然時故知是不虛妄力得淨眼者是佛眼歟疏然以佛至如來日也者此佛日時雖常住恆時而以佛神力不思議用更又令行者有令念須臾用云也此佛延促劫智之德也此佛之加持日故也故維摩經云或有衆生樂久住世而可度者菩薩即演七日以為一劫令彼衆生謂之一劫或有衆生不樂久住而可度者菩薩即促一劫以為七日令彼衆生謂之七日等云云又法華涌出品云娑婆世界三千大千國土地皆有震烈而於其中有無量千萬億菩薩同時涌出乃至如是時間徑五十小劫乃至五十小劫佛神力故令諸大衆謂如半日文又如來神力品云釋迦牟尼佛及寶樹下諸佛現神力時滿百千歲然後還攝舌相云云是延促劫智神通力也釋迦住世八十年也成道義古來明德所説不同也或説十九出家二十五成道五十五年住世云云或説二十九出家三十五成道住世四十五年云云説法華經時節有二説一者八箇年間説法華畢云云一者一年間説法華畢耳故彌勒經遊意云如來大期八十於第七十九年説大涅槃經若爾者法華云四十餘年者此必是大經之前者更退一年是七十八年上説法華云云唯是義應知延促劫智自在神力也何況法佛所為事耶疏如是時中佛説何法者下明所説之法體中此其問也疏即是身語至云平等也者是從下廣釋其三密平等相也般若寺抄云如來日加持故身口意三平等句法門也者言離三際始終常住不變大日如來加持故説此教門言也平等者攝如大海同一鹹味言也云云此義如即身成佛義云六大無礙常瑜伽四種曼荼名不離三密加持速疾顯重重帝網名即身法然具足薩般若心數心王過剎塵各具五智無際智圓鏡力故實覺智釋曰此二頌八句以歎即身成佛四字故略樹兩頌顯無邊德頌文分二初一頌歎即身二字次一頌歎成佛兩字初中又四初一句體二相三用四無礙後頌中有四初舉法佛成佛次表無數三顯輪圓後出所由謂六大者五大及識大大日經云攝持四界安住心王等同虛空成就廣大見非見果出生一切聲聞辟支佛諸菩薩位此文顯現何義謂表六大能生一切何以得知謂心王者識大攝持四界者四大等虛空者空大此六大能生見非見者欲界色界無色界下如文是所生法如是經文皆以六大為能生以四法身三世間為所生此所生法上達法身下及六道雖麁細有隔大小有差猶不出六大故佛説六大為法界體性諸顯教中以四大等為非情密教則説此為如來三摩耶身四大等不離心大心色雖異其性即同色即心心即色無障無礙智即境境即智智即理理即智無礙自在雖有能所二生都絶能所法爾道理有何造作能所等名皆是密號云云又云六大無礙常瑜伽者解云無礙者涉入自在義常者不動不壞等義瑜伽者翻云相應相應涉入即是即身成佛四種曼荼各不離者大日經説一切如來有三種祕密身謂字印形像字者法曼荼羅印謂種種標幟即三昧耶曼荼羅形者相好具足身即大曼荼羅此三種身各具威儀事業是名羯磨曼荼羅是名四種曼荼羅如是四種曼荼四智印其數無量一一量同虛空彼不離此此不離彼猶如空光無礙不逆故云四種曼荼各不離不離即是即義三密加持速疾顯者一身密二語密三心密法佛三密甚深微細等覺十地不能見聞故曰密一一尊等具剎塵三密互相加入彼此攝持衆生三密亦復如是故名三密加持若有真言行者觀察此義手作印契口誦真言心住三摩地三密相應加持故早得大悉地重重帝網名即身者是則舉譬喻以明諸尊剎塵三密圓融無礙帝網者因陀羅珠網也謂身者我身佛身衆生身是名身又有四種身言自性受用變化等流是名四身如是等身縱橫重重如鏡中影像燈光涉入彼身即此身此身即是彼身佛身即衆生身衆生身即是佛身不同而同不異而異佛法僧三身語意三心佛及衆生三如是三法平等平等一也一而無量無量而一終不雜亂故曰重重帝網名即身法然具足薩般若者大日經云我一切本初號名世所依説法無等比本寂無有上謂我者大日尊自稱一切者舉無數本初者本來法然獲得如是大自在一切法之本初如來法身衆生本性同得此本來寂靜之理然衆生不覺不知故佛説此理趣覺悟衆生法然者顯諸法自然如是具足者成就義無闕少義薩般若者梵語也翻云一切智智一切智智者決斷簡擇義一切佛各具五智三十七智乃至剎塵智次兩句即表此義若明決斷德則以智得名顯集起則以心為稱顯軌持則法門得稱一一名號皆不離人如是人數過剎塵故名一切智智心王者法界體性智等心數者多一識各具五智者明一一心王心數各各有之無際者高廣無數之義圓鏡力故實覺智者此即出所由一切諸佛因何得覺智名謂如一切色像悉現高臺明鏡之中如來心鏡亦復如是圓明心鏡高懸法界頂寂照一切不倒不謬如是圓鏡何佛不有故曰圓鏡力故實覺智云云私云此疏三平等義以此即身成佛義意可知之也疏言如是種種三業皆至第一實際妙極之境者此佛三密則至本不生際法然常住三密性云也此如彼即身成佛義云法佛三密甚深微細等覺十地不能見聞故曰密一一尊等具剎塵三密互相加入彼此攝持等云也又疏云身等於語語等於心等者身語者是色攝也心者是識也是明色與心即融無礙義也如彼即身成佛義云四大等不離心大心色雖異其性即同色即心心即色無障無礙智即境境即智智即理理即智無礙自在云也疏猶如大海遍一切處同一鹹味故云平等者此喻有周遍一味義則合法身平等義也謂周遍義如即身義云以明諸尊剎塵三密圓融無礙又云大空位者法身同大虛空而無礙含衆像而常恆云云祕藏記云諸佛遍法界等云即此意也同一鹹味者此法身三業不變常住實際解脫甘露味云也即是解脫已離生死之苦味也諸佛法身三業皆俱如是甘味義也疏句者梵云至同一名耳者礙梵語唐語相對正翻名成立也意云句者義正是約梵語當足義是有迹用故依其所具之用而足即轉立句名也句者謂稱迹義也迹之所依處正是正足也能依物是迹也若約實言之者應云足但足是於迹之本故本即借末名而立此句名也足之迹義有故今迹義是當句意也是進行者是足義住處義是迹義也唯識義記云句者何義答梵云鉢陀此云迹順古云句梵云幡陀此云足也迹者譬如尋象迹得象體依句知差別義言也句者彰義也句云足者皆舊人謬中邊疏下卷云梵云鉢陀此翻為迹梵云幡陀此翻為句以聲相近譯者誤言舊論云金剛足非也亦云又云番陀者此云足非云云今私云依此意者足與迹雖義異句義相當迹義云也疏今就此宗至故名為句者此明以三平等教之文字言辭名為句義謂如尋象迹遂得象體依尋知此言教義遂到本有法身地故也疏即以平等至為所入門者謂成上句義也如尋迹得本體謂以行者之修得之三平等門而為因以法佛三平等加被及三平等教迹而為緣以顯本有性德三平等而為所趣果為所入境云也門者所遊入處也疏謂以身平等至受用身者明以前行者修行三平等因方便而得見本有能加持之法佛自受用身云也此中逮見加持受用身者是行者已成佛果後而如實證見本覺自心理義也是等覺菩薩不能證見法佛自身是尚疏見法佛猶如隔羅穀見外月云也因此義故涅槃經第八云乃至十住猶未能見所有佛性如來既説即便少見又云如是菩薩位階十地尚不了了知見佛性何況聲聞緣覺之人能得見邪又云譬如仰觀虛空鵝鴈為是虛空為是鵝鴈諦觀不已髣佛見之十住菩薩於如來性知見少分亦復如是云云又此逮見加持受用身者若如此疏下文云於此生中逮見無盡莊嚴加持境界非但前而巳若欲趣佛地即同大日如來亦可致也云云若依此義彼前文是非謂必成佛已正逮見加持身但依自所得三昧力故見所加持身之他受用身等云也疏如是加持至平等智力者此明大日能加持自受用法身等與行者及一切衆生本覺法身無二無別義即不二義也又此加持身設雖他受用身亦是大日尊內證智德差別用之外現用故即大日尊遍一切身云也此大日尊智用差別外現無量佛身即是在行者及一切衆生第九識之處云也然衆生不覺知之云也疏是故住至平等法門者此遣妄執之辭也未斷惑之行者若堅執如是法佛身常住真實義者則可墮法執也未覺了依地如幻即空義時猶未遣法執未遣法執遂不能成佛故也復次是本有法也更今始不可求也此義如祕藏記云又觀我我今觀斯心所得淨菩提心已離造作法本來宛然而有之本因是我物今更非求而可得者夫見前境追求心發既知本來有我物也於茲追求心息故曰無願雖然不可無願無記故無念而念無行而行云云此義亦爾也以不行而行等者此約行者迷執之辭也此不行等者約因位也不到等者約果位也此二實無差別中有差別義約無差別義是名平等之道云也而實無能入者等者是約凡夫迷執之辭也又此本有理中無能趣入人亦是無所趣入處是則平等義也疏平等法門則此經之大意者總結所説法而成經本意也疏時彼菩薩至深入語義者下牒經文而釋成其意也此有三種因緣顯現三業無盡藏也謂一者能加持法佛依本誓悲願二者依所加持之持金剛衆普賢等感發助成心三者依實行機之得益因緣故法佛顯現此無盡莊嚴藏云也此中如來加持者是法佛能加被義也或又展轉增多義又本有新顯義皆加持意也奮迅示現身無盡莊嚴藏者是三業俱皆有無盡莊嚴藏義之中此且舉身業之無盡義也此中奮迅示現身等者是法佛之所顯現他受用法身普賢金剛手等菩薩也或亦有本有法爾心數眷屬無數界會聖衆也有情類業壽種除者是舉實行者機滅德益也業者是分段生死一切發業潤業等是也諸俱生及分別煩惱染品皆攝在此緣中也壽者三界果報是也信行之涅槃經音義云壽亦命也壽取一期之名命取人之生分俱異名耳説文云壽久謂生已久遠氣終盡也云云種者是種子也是即阿梨耶識所持之業種子及名言種子也是十二支中無明行種子即是業種也識名色六處觸受之種子即壽之種也是即名言種子也如是種子法以能對治力故漸漸斷滅故云除也此是於順世八心漸漸對治也疏復有牙種生起者即是違世八心初起也是法佛沙羅樹王之牙種子生長云也文有情類業壽種除復有牙種生起者是文有深祕釋也護摩述記上卷云問依覽字火壇修法有何義耶答有焚燒降伏義問其意如何答火主焚燒是出降伏法譬如火界燒一切薪無有厭足覽字智火燒一切無智薪無有厭足即降出世之魔軍伏世間之怨敵燒彼壽命令不復生問燒彼壽令不復生者意如何答義釋云今且有妙方便大惠之火而焚彼業煩惱身便不復生也一切衆生皆以業煩惱蘊積續而得生長輪回無絶故名為壽今即焚之令盡無餘也業煩惱為薪方便智為火此因緣而得無餘此薪既盡能治亦遣也即以字燒字者即是而已問以字燒字者意如何答以阿字為衆生身便以阿字遍作其身也次此惠火之字焚彼菩提之性真金之礦令垢穢無餘故以囉字而阿字也問然既焚竟豈異二乘斷滅灰燼而不復生耶答不爾義釋云諸垢之薪已盡更有妙生所謂淨菩提心真實生也此生即是清淨之性如來種子也問所以何方便令此灰燼復燒盡同於灰彼等便更生耶答以字燒字方便力也義釋云想阿字同方壇弟子在中而以囉字燒之燒故同為一體也身同阿字而自燒一切煩惱罪除乃至身亦除體同金轉也生妙牙也云云問以此覽字燒盡分段身而受四生之行者依身者分段變易二身中何身耶答是準大疏意是可云相當變易身也故疏第十六云行者既得如是遍淨無垢身壽命還活悉皆無垢也意生之身復為欲令堅固如是意生之身故文私云此意生身者是當變易身義也自在加持者能應義謂佛之能加被護念義也感勤大衆者所被機之能感於佛日也是法身主伴互為眷屬義也悉現普門境界等者從二法和合中而明示現無盡莊嚴藏境界義也疏因彼疑問而演説之者佛自現無盡莊嚴藏內證眷屬菩薩而返令疑問於佛云也若不佛身之能者誰人可敢請問此內證不思議事耶故佛自現差別智身而返問法身境界而為顯示甚深境界令當會聞者及未來敢衆成深信恭敬樂欲心故寄金剛手問而説此經云也復若無請問者於難遇法徒不可輒施設故也疏如法華至廣説之者舉例也如天台宗等者於法華經判二門序分謂迹門序分是初序品見也於此中具六瑞希有相仍彌勒疑問於文殊是佛欲説何法也本門序分者從地誦出品是也大會見從地誦現千世界微塵數菩薩衆故而彌勒疑問佛於何時何佛何處教化如是若干菩薩也此大日經亦復如是見法佛示現三業無盡境界則金剛手等下將欲請問於法佛法佛欲令説一切智智境界故而疑慮其因果相何等相也此皆驚瑞相而比知所説法之深廣義也云也疏復次普賢至神通力也者是明上首普賢等將欲疑問本意也是非自不知問不輕觸問不試驗問唯為利益有緣衆生故致此請問云也此中十佛剎塵數諸菩薩是皆以大日尊之一平等智之中差別智印分位即名金剛手乃至普賢故豈不知此境界云也此諸差別智法身菩薩等令諸真言機菩薩證入真如法界輪圓界會故示現如是無盡莊嚴藏神通事云也疏如師子王至後發聲者是釋奮迅之所因義也奮威之所因義奮威猛勇健力如力士勵力須臾頃成辨大力事也此師子奮迅義如涅槃經第二十七師子吼品明疏如來亦爾至莊嚴藏者是合也意云法光奮威神力以此為因而後吼説法音云也疏所謂莊嚴也者下釋無盡莊嚴義也意云法佛之三業一一業遍滿法界互無障礙云也法界者地獄等十法界也亦真如法界也通融此真俗二境無礙無別故也謂十佛剎塵數各各三業一一業互相攝入涉融無相障義猶如帝網無礙互相涉通顯現云也又身即語語即身身即意意即語身口即意意即語如是無二無別如是三業即體真如法界凝然湛寂體云也此則莊嚴義如是無生無滅三業遍滿法界無前後始終邊際亦無數量齊限云也是無盡義也疏如來祕密至然後還歸者下明引無盡義證也有二初約眼見聞聲之境明無盡亦明身語業無盡義例後約覺知境明無盡義亦明意無盡不思議義例也此即其初證也問周極十方者若有方角之齊限歟答不爾是約除蓋障菩薩及目連神力有限量故盡其神力所不及即曰周極十方也疏見除疑天至住此三昧者是後約覺知境而明無盡義也疏又盡心力觀之等者明心緣境無盡義也聚集無量天鼓等者明所覺知境無盡義疏即是無邊際義也者釋成其意也已上證故也疏如是毗盧至無空隙處者是合比也已上是無盡義釋畢疏又如國王至莊嚴藏也者下釋藏義謂開顯自證無量功德珍寶而令受用自他一切衆生無乏少窮盡故名曰莊嚴藏也此納法寶處而開用名曰庫藏是也莊嚴之藏也主目則法佛是也亦莊嚴即藏也是持業釋也疏復次此諸至所能及者下遣堅執意也執意云若行者依見自所得三昧所顯現無邊海會普門塵衆若執謂實有境則成法執也故此中可作本不生觀也謂我所修功德力與如來能加持力和合而能所見所現普門海會曼荼羅衆也若捨佛能加被時則所現普門身都成不生云也故祕藏記云約法者以觀心為因以三密為緣所現普門海會即所生法以由緣生法擬三諦所現前普門海會有以四不生推求斯有了不可得是即空本有三密即中云云則此義意也疏如行者至了了無障者是明行者自善根力與佛加持力故得見因緣所成影像曼荼羅莊嚴云也此般舟三昧者準此疏第十一具文云如是觀之時以不外緣安住不動不分別一切法想而不生妄相爾時與觀佛三昧等相應云云是此般舟三昧義歟摩訶止觀第二云般舟翻為佛立佛立三義一佛威力二三昧力三行者本功德力能於定中見十方現在其前立如明眼人清夜觀星見十方佛亦如是多故名佛立三昧云云疏然此境界至被故生耶者是責問此行者所緣曼荼羅境界是若行者為因獨生耶若為佛緣獨生耶疏若由心即至外道論議者從下約四不生句為明行者所見之緣生境界畢竟非有義故假破外執之四實生義也即且四不生義中是第一因不生句及第二緣不生句也四不生義準此疏下第二説其文云然我心亦畢竟淨佛心亦畢竟淨若望我心為自即佛心為他今此境界為從自性耶他生耶共生無因耶云云文云即從自性生者是外道四計自性義也故密嚴經中卷云胎藏之身虛偽不實非自性生云云此義如疏下第二卷四明外道四計阿賴耶之生諸法義也亦文中云即是從地生者是又外道所計自在天時方四大等生諸法云義也意云若言佛法中若自生他生義決定有者猶如外道所計自生他生義失也疏以自他無故和合亦無者是責第三共有生句咎而亦成此境界之不生義也謂和合法是以自他聚集義為體然自他既無何得和合義成耶疏文復非無因緣而得成就者是責破第四無因緣自然生句之咎而成此因緣生境界而不無因自然生義也疏何以故內至不現前故者是遮無因自然義而成因緣相待假成境界義也疏當知如是至不出於如者是依上四不生道理而結成此行者四緣境界即體本不生真如理義也疏故經云毗盧至道句法者是舉證成義也此所引經文有二意一者明因緣所生莊嚴藏假有即實意也所謂經云非從毗盧遮那佛身生乃至邊際不可得者即是也二者兼以法爾常住三密義而合此文意也法然本有無盡莊嚴藏義是此法佛自內證境界也所謂經云而毗盧遮那乃至真言道句法者即是此義如祕藏記云以我能觀心觀本有三身又云本有三密即曼荼羅本初不生理即體云云疏此轉釋至不滅之身也者此釋後法然本有莊嚴藏義也是無盡海會十佛剎塵數聖衆是大日尊之差別智身分位故也常住不滅而簡異前所明隨行者三昧所現因緣成莊嚴藏生住異滅無常遷流義云也疏雖常無至令至佛道者明此法爾存實身遠為利他因緣而説真言法教義也是法佛竪利生意也即返前所云行者之依三昧所見普門海會身是依法佛加被即此義也疏經又現至又廣前相者牒經文其意也意云是釋前所云法爾常住他受法身常住三世不變説法相云也問先所言無盡莊嚴藏與此所言現金剛普賢蓮華手菩薩等其差別如何答此有二意一者此疏意二者二教論意也問其義如何答先二教論云又現執金剛普賢蓮華手等像貌普於十方宣説真言道清淨句法此明等流身説法言等者舉金剛蓮花手兼等外金剛部諸尊此經四種法身亦具竪橫二義文勢可知也云云初義是此疏意也意云前所云無盡莊嚴藏是心王大日尊處所具足塵數功德法門智用差別義後所云現執金剛普賢蓮華手者是心數之處所具足恆沙功德智用差別法門也以何知爾者即身成佛義云法然具足薩般若心數心王過剎塵各具五智無際智圓鏡力故實覺智云云即是義意耳問云有情類業壽種除復有牙種生記云云經文既上牒畢亦此下文重牒之文有何所由耶答上文牒之意是明心王大日尊説法化他勝答此下文牒之意是明心數諸尊説法化他勝益猶如大日尊之勝用故重再牒之歟疏言非但示至稱首也者此明如心王大日尊諸根相好法性依身及福智解脫功德説法利他德一一皆遍滿十方法界而無障礙涉通攝融義心數諸尊一一功德亦復如是無差別無增減云也所以舉此三上首者是欲攝餘一切若等同者若劣衆意耳疏執金剛至持言之者此釋舉此上三聖意也謂佛法大綱無過大般涅槃物也大般涅槃者三德一體也所謂法身般若解脫三德也此三點攝盡一切功德海也故舉此三德攝餘一切法也執金剛是無漏智之斷惑之勝用也普賢是法身真如義謂法佛八萬四千相好海及無量無盡諸根相好乃至無漏五蘊法皆無生無滅凝然常住實際真如界是也蓮華三昧自性不染是解脫德是遠離煩惱礙智礙分段變易二種生死染界而清淨性故名曰解脫德也金剛智斷惑用是有淨除怨敵功名降伏觀顯真如法身而滅盡一切有漏法而遂歸本源不生真理故云寂災方便也觀諸法本性不染性而始覺萬德現生故云增益方便也疏所云等者至可知也者此釋等言所表也是等取餘諸聖衆也謂此大悲胎藏三重曼荼羅聖衆即此義也疏如是等至祕密加持者是明此莊嚴藏橫竪二義不同所由也此即平等中差別差別中平等自在無礙圓融涉通義也若約竪義第四重曼荼羅從淺至深行因至果義也有淺深差別不同相也從深至淺是從本垂迹義也是復有淺深不同相若約橫義四重曼荼羅皆悉一昧相解脫實際常住不變理云也佛智之覺此理即現自受法樂兼説法利生之用故則名曰祕密加持也疏各能開示至清淨知見者明自下法佛所現十佛剎塵大會説法相也疏若離如是至句義耶者其明所説法離執染相真實清淨義也若與貪愛及五見相應而執曼荼羅境界實有法是為不淨見義也若有貪愛執見除去而可見本有曼荼羅境界也是與清淨知見相應云也以宣説此清淨句門為為此大衆所説相云也如寶鑰云頓越三妄入心真褰霧見光無盡寶顯藥拂塵真言開庫祕寶忽陳萬德即證云云此即是深意也疏次又釋言至神通乘也者第二明復次釋也此頓覺真言乘如法修行一生頃速到法佛果故所以此三密教名為清淨句也云云真言行者如説修學頓滅盡有漏不淨緣業生真證入清淨三平等法佛常住果地云也又義是顯教中所説極無自性等種因海佛尚是具惑不極淨佛云也故此經下文云如是初心佛説成佛因故雖業煩惱解脫於業煩惱具依云云疏如餘乘至加持境界者下對辨顯教密教勝劣差別而欲顯密教之究竟清淨義其於顯教修行者多劫間輒不能滅緣業生染故不名究竟清淨句也此如金剛頂五祕密經説若於顯教修行者久經三大無敷却然後證成無上菩提於其中間十進九退或證七地以所集福德智惠回向聲聞緣覺道果仍不能證無上菩提若依毗盧舍那佛自受用身所説內證自覺聖智法及大普賢金剛薩埵他受用身智即於現生遇逢曼荼羅阿闍梨得入曼荼羅為具足羯磨以普賢三摩地引入金剛薩埵入其身中由加持威德力故於須臾頃當證無量三昧耶無量陀羅尼門以不思議法能變易弟子俱生我執種子應時集得身中一大阿僧祇劫所集福德智惠則為生在佛家才見曼荼羅則種金剛界種子具受灌頂受職金剛名號從此已後受得廣大甚深不思議法起越二乘十地云云問何故云或證七地以所集福德智惠回向聲聞緣覺道果而不言或證八地等耶答七地者是三乘共十地中第七聲聞地是也退大乘菩提者是退十信行而墮二乘菩提時或先墮聲聞乘中後或有移緣覺乘果人也是人即先證聲聞乘預流果後出無佛世獨覺果也是部行類也退大乘人無直成麟角獨覺人也彼成麟喻獨覺人必異生時於外道法中必伏無所有處已下九品修惑後若入佛法中若入見道時一座斷盡三界九地修惑一度證獨覺果也退大人成緣覺非如是但成部行類也或亦可有菩薩直墮緣覺地者但部行耳問於其中間十進九退者何答是辨暫退大而亦捨小遂證大者之進退相也或證七地等者辨永退大沈墮小者相也長退大雖取小果亦久久而遂入大成佛果也疏於此生中逮見無盡莊嚴加持境界者此辨因位中觀行熟所見境謂由自心三昧所現與佛加被故因緣和合以見自心之影像所現曼荼羅界會也疏現前至亦致也者是明依此三密行力到究竟果海地也是清淨句義意也疏復次行者至此生滿足者明第三復次釋也於阿字有法然隨緣二義中是此明修學法然義者功能也隨緣義通顯教修行故也此入字門之三密修行未致果海以前無間任運數數勝進增修而至究竟果位圓滿海故無復可修增義云也猶如月至第十五日無更亦所增勝義也疏此中次第至足十地者明一生項無間增修此生內菩薩十地滿足義是皆依真言門三密行業殊勝力故有此功能也問疏第六末云又如上所説一生補處及八地三昧是約教道法門作如此説耳云云若依此意真言門菩薩無實成十地功德證道義耶答彼文意云於真言門借説修行顯教菩薩一生補處及第八地三昧道之所修之相是為教道義云也然其所由者彼一生補處菩薩是漸次為成就如來金剛事業入重玄門千劫頃學佛威儀也又第八地菩薩能恆住無想觀上不見諸佛可求下不見衆生可度謂是住大涅槃於萬行休息爾時十方佛以此三昧道發起其心得度菩提心難地是故別説也然真言門頓悟菩薩一生間速疾運運到佛果何能別漸漸修第十地重玄門威儀事業及於第八地滯留無相觀萬行止息已生證涅槃想耶故於此真言門説彼二種三昧道義是為教道門法非真言門證道義云也實是他教之義不踏此宗實義云也雖然真言門菩薩一生間實證十地功德云也於真言門菩薩非謂無證道功德但無別漸漸修學萬行休息義云也此中説此義是教道法門云也疏唯以一行一道而成正覺者是明於此三密門從凡夫地到佛果始終相也菩提心論云從凡入佛位者即此三摩地者者即此義也疏若於異至寶乘也者此顯教若粗顯三密義應知是則密陳真言義也又解諸顯教不明三平等義皆名密意説隱密法佛內證境故然此顯教亦是不離真言乘云也法花中如開會三乘行名為一乘也疏緣業生者至備受諸苦者欲明清淨義故先顯所治染汚法也此中緣者諸煩惱障所知障也業者分段變易有漏諸惑業及無漏有分別業也生者諸分段變易二種果是也是皆染汚法也無漏之所治障也疏今修平等至大菩提心者正明能治清淨法也一切蘊阿賴耶等者明所治法謂有漏五蘊所攝生滅藏識之所攝持一切有漏業種子名言種子皆悉滅除云也得至虛空無垢菩提心者若是真言門中初歡喜地所證菩提心歟正斷惑之所顯故也疏一切如來至菩提樹王者此無垢大菩提心是從大悲胎藏曼荼羅王法佛之方便善巧三密加持門中被養育攝持而始生法性牙疱乃至開敷菩提樹王位云也上來諸句多所明十地功德又佛果德可攝此中也意云一切如來平等種子者一切衆生本有菩提心佛性是也此佛性是大悲曼荼羅所被養育而生長佛性牙莖云也本有佛性是因也四種曼荼羅是緣也開敷覺樹是果也又解一切如來平等種子者是觀勝義空之無相菩提心是也此極無自性心等也又解一切如來平等種子者標也從大悲藏中者是釋此所從來也大悲藏者是如來藏也是佛性也總意云一切如來平等種子者即建立如來藏之上義也一切衆生心藏中本覺性是當得佛果功能名平等種子也生法性牙者是明修得佛性之最初相也疏然以四不至大空生也者此破法執也四不生義如上記也此十地功德未究竟故猶帶如幻義故可遣實執也未泯法性理故不可留存也且於佛果常住理然初修業人不可堅執增法執故猶以四不生句奪可作如幻等十緣生句觀也疏復次如來所現至神通瑞相也者是明以十佛剎塵數海會聖衆所現瑞相不思議妙用而表此大日經王所詮義理甚深微妙義也疏如文殊師利至説法華經者引例將欲成所説義也疏當知金剛至成佛之教者正示依止所現瑞相而比知將所可説法佛之境界之五種三昧門各各開心蓮入中胎大日尊之三密法教云也疏故下文至此而生也者依此瑞相現金剛手發生云何如來得一切智智乃至以何為因云何為根云何為究竟之請問云也已上此別序了建久八年八月二十二日於高野山往生院書寫了執毫禎惀之
