body:
  text: 大日經住心品疏私記卷第十六疏經云祕密主至問中修行句也者是下釋明十緣生句經文也就中有二初牒經文後總釋大意也此經文來由是為答前問中之第七句之及彼行修行問故是經文方起也上疏第一云第七云及彼行修行者次問當以何行云何修行而能獲得無上悉地亦可分二句也者今於此處方答彼分二句為二問中之第二問意是也前未廣答之故今至于此處更廣問起之故廣答之也故經云若真言門修菩薩行者是標此真言門菩薩行法也上佛略答偈云供養行修行是名初發心者即是意也經云諸菩薩深修觀察十緣生句者是廣答彼上問中供養修行之中相應方便行也此段中十緣生句是也若約合句義是答第七問若約開句義即答第八問也疏如下文萬行至淨除心垢者是明修三密行法中用此十緣生觀法為最要殊勝義云也若不用此十緣生觀行時即心墮有所得而不能淨除我法二執云也若不能淨除二執者云何得到法佛果德法耶疏是故當知最為旨要者結歎此法之要用也疏真言行者特宜留意思之者是勸進此十緣生句觀法也疏然統論此至略有三種者是標三重十緣生句觀行淺深差別義也疏一者以心至之幻是也者從下一一列名釋其義也此第一即空幻者是約遍計所執都無義而明五蘊實有自性不可得義也猶如幻事都無實有體也是明此證寂然界通教大乘所觀義也是但不謂依唯識門義覺了心外所執實法即空義也此唯才覺因緣成法本不生理耳疏二者以心至即心之幻是也者此第二明上所云他緣大乘所觀唯識無外境中如幻義也謂以心沒法中者是心外實有執也為治此心外執故修唯識無境觀也因此義故心境自相待成立故萬法悉如幻而即心義成也疏三者以心至不思議之幻也者此明第三幻義也此中如幻是真妄交徹真如受無明重而成依他諸法依他諸法即體真如性也此如彼幻主之即不見幻事而但見實草木等也若約法釋之者約真如理中都雖不可有業煩惱等染法而此真如拄受無明等染熏而成染法所依性云也是此不思議熏不思變義故云即不思議之幻也此第三幻即含攝覺心不生一道無為極無自性三心之幻喻意上來三重如幻義是旦約幻喻作此義理實涉十喻一一皆可有此三重義耳疏摩訶般若至含三意者是引文證而助上三義也是不共般若經所説義也疏今此中云至明第三重者今明於真言門中特勝所用第三深妙不思議十緣生句義也疏旦如行者至亦畢竟淨者是指事而明此第三不思議幻之假有即空甚深妙義也謂感應相稱所現之隨緣佛身即相有畢竟不生理云也疏若望我心至無因生耶者是以四不生句而顯示此隨緣佛身即相虛無義也此行者所見佛身是以法佛為緣以行者為因而行者之自心上所現佛身也若尋其自性即體空無相云也此佛身是不自行者獨所生法也依此義故責為從自性耶也亦此佛身是非法佛獨自所生也依此義故責他生耶也亦實不自他共生也自他是俗諦假立法也自他既真諦中都無也豈此所緣佛身實共生法耶故亦責之也又此佛身是非自然無因所生法也待假合因緣義成隨緣佛身故也依此義責無因生耶也疏以中論種至生不可得者引證而成四不生義也疏而形聲宛然即是法界者此隨緣佛身及説法音聲即相真如法界凝寂無為性云也疏論幻至遍一切處者是明真俗交徹圓融相通即一無二義也此佛身即真如法界也此真如法界即隨緣化現佛身也是尚如云色即是空空即是色義也亦此性空理能遍融一切有為中也又此有為法同遍融一切真如法界性也又此有為法亦遍融餘一切有為法中也此即理事圓融事事圓融理理圓融義也疏論幻故名不可思議幻也者是結而成其不思議名也法藏法師云不異常之無常名不思議無常常亦不異無常之常名不思議常者即此義意耳疏復次言深至言觀察也者是約三句行位而明隨位淺深高下而漸遍歷一切緣起法而一一觀此十緣生句法中空假中三諦理也疏得淨心已去者以信心名為淨心也故此疏第一云以信力為初而能初入佛法為令如是淨信心堅牢增長云云或亦是三句中第一句之淨菩提心義是也疏旦如四諦至何可窮盡者是指事明遍歷一切諸法有三諦義也疏今行者於至舉體皆常者明真言行者於淨菩提心門中於正所修成四諦境而可觀顯三諦理義也無量四諦者天台法花玄義第三云無量者迷中重故從事得名苦有無量相十法界果不同故集有無量相互住煩惱不同故道有無量相恆沙佛法不同故滅有無量相諸波羅蜜不同故大經云知諸陰苦名為中智分別諸陰有無量相非諸聲聞緣覺所知我於彼經竟不説之三亦如是是名無量四聖諦云云疏以三法無至不思議幻者此意明約三諦即一義而無偏有偏空邪執失而即是有亦有亦空中道義故名為不思議幻云也疏如四諦者餘一切法門例耳者是餘蘊處界三科法門及十二因緣二諦六度等亦有空假中三諦義云也故天台云一色一香無非中道者即是意也疏唯有如來至達其源底者是成前所云深修觀察之究竟至極義也只是在妙覺位也疏此經所以至綜該諸地者是明説此十緣生句義之生起次第也是觀心是於三劫六無畏位中一一皆可用此觀心云也故於第六無畏中虛空無垢菩提心後方所以説此十緣生句者是欲顯括攝前後一切位可修此觀所由故云也此六無畏中後三無畏則攝菩薩十地位也故云綜該諸地也問入真言法以後行位所經真言家十地以去可修習此十緣生句觀耶答可有二義差別謂頓入者與漸入者不同故若頓入者初從入真言行法位至初歡喜地乃至第十地皆悉修此十緣生句觀法也若約漸次入行者於前極無自性心等中既成作證之故入後真言門行不可更始修歟如金剛界儀軌云舌柱於上腭端身勿動搖諦觀諸法性皆依於自心煩惱隨煩惱蘊界諸處等皆如幻與焰如乾撻婆城亦如旋火輪又如空谷響住寂靜平等究竟真實智諸佛如胡麻遍滿虛空界空中諸如來彈指驚覺告言善男子汝之所證處是一道清淨金剛喻之定及薩婆若智尚未能證知勿以此為足身心不動搖定中禮諸佛行者聞驚覺定中普禮足唯願諸如來示我所行處諸佛同音言汝應觀自心既聞是説已如教觀自心久住諦觀察不見自心相復想禮佛足白言最勝尊我不見自心此心為何相諸佛咸告言心相難測量授與心真言即誦徹心明觀心如月輪若在輕霧中如理諦觀察云云案此軌文意極無自性心種因海圓滿已既於十緣生句法決定作證圓滿已而始蒙金剛界佛驚覺方被授內證心地祕法以後方云入真言行中之真實十地義也故可知未入真言門之以前修行極無自性十地時必修習此十緣生句法已畢故也既蒙驚覺以後入真言法畢別更不可修習此十緣生句觀歟前顯教分齊中既作證故於是是觀任運現前故也疏既觸緣成觀不可縷説者是明説此十緣生句決定有其次第由而不猥誤説意也謂所以於第六一切法平等無畏後説十緣生句是欲顯括攝前後一切位應修習此十緣生句義故觸事因緣所説此義云也又解觸緣者若行者之約緣慮所緣一切境界時若可發實我實法妄執心則作此十緣生句觀行而可蕩除其所生妄念云也此十緣生句之方便是對治心病之妙方藥也故無病以前及病療已以後不可説此藥云也此義意如發菩提心論云諸佛慈悲從真起用救攝衆生應病與藥施諸法門隨其煩惱對治迷津遇筏達於彼岸法已應捨無自性故又云妄心若起知而勿隨妄若息時心源空寂云云疏今旦依釋論明其大歸耳者是正依智度論所明十緣生句義之子細釋文方寄釋此經略所顯示十緣生句深義云也疏經云何至旋火輪者是此舉經之所明數而列一一名相而勸進於行者文也疏云何為幻至本性淨故者是此文方釋初幻之喻相也經如是真言至能生一切者是明合喻義也疏佛説藥力至乃證知耳者下是為讃造幻者所用藥力不思議妙用故先約泛爾義明因諸藥力妙用奇異而能作證之者能自證知之義也疏又如藥術因至思量之境者是正明幻師所現幻事之因緣所用藥術妙用不思議相也疏釋論云佛至所作內有不者從下引智論而釋幻喻細義也是此佛假問也疏答言不也者問者返答也就此幻事問答中有二番問答旦就於初番問答有六重問答之中是此第一重問答也初番問答意是顯此幻事實性不可得義也此幻事是雖似有現則不因緣相續妙有法但其誑人五情心而虛妄顯現義云也一者約內問答此幻事有無義二者約外問有無義三者約內外一雙問有無義四者約三世問相續流轉義五者約諸法共相問生滅義六者就幻師所作義問幻體有無義也問意云若自類因緣相續相生法是實有義也若虛狂令迷惑人眼耳心識所現法是虛無法云義也疏皆答言不也者是上問之總答也答意云但是欺狂衆人心眼而妄所現似有法何有實內有實外有乃至實生滅實所生義耶云也疏佛言汝頗至亦見亦聞者是就第二番有二重問答之中是初問也義意云欲顯示幻事之假有似事是非全都無體義故也疏答言我亦見亦聞者是上問之答也女亦答幻事似有是非全都無義也疏佛言若幻至而可見聞者是第二重問答也是欲顯示此幻事雖非實有法而依呪力及藥力妙術因緣不可思議義而似有觀令衆人見聞覺知之幻事義云也疏佛言無明至因緣諸行生者是下此合喻也此義述無明之能生業煩惱而令生死相續義也疏若無明盡行亦盡者是明染法還滅意也已上智論文意也疏今此真言至亦復如是者是以上幻喻總類合此真言行者用此幻喻義也疏如下文廣至宛然不謬者是別指事於前幻喻而合法也此義意云若行者依三密加持力故成就奇特事境時若於所現境界生實有執者則墮法執不可進真言妙果也故須用此如幻喻可淨除法執云也彼為破法執求無生觀時先於緣生法境上以四不生句而可觀察本不生理也雖觀此一切法本不生性而此不生理是不背幻有法也是不生真如之即受無明染熏而成幻有事故也故可知幻有事是不異於本覺淨心而乍虛假亦則似有自在神變事業顯現也是色即是空空即是色義也疏此事亦非至自證知耳者是合上所云持用藥術者乃親證知喻也依此三密加持所現不思議神變是持真言行者只獨所證知耳餘人不能知之云也猶如法花經所云唯獨自明了餘人所不見義疏經云復次至唯是假名者是牒第二喻文也疏釋論云以曰至見之為水者下是引智度論明陽炎文而釋陽炎之細義也曰名為陽月名為陰故日之熱氣之於地令生熱炎故是名曰陽焰則此陽炎實雖非水方似水相也理實應云陽炎水也此義如蜜嚴上卷云如熱時焰譬如盛熱地氣蒸涌照以日炎如水波浪諸鳥獸等為渴所逼遠而見之生有真水解云云若依此智論意風之吹飄廣野塵土時若當值日光照曜時則似水相也因之鳥獸等生水解欲飮之云也疏衆生亦爾至一相為女者是合喻也此中結使煩惱日光者是取無明中相應虛妄了別心識之分位是也是於所緣境雖不覺了如實義而邪曲生解了義邊名為日光也故摩訶衍論第四引契經文云以何得知一切衆生悉有佛性答曰一切衆生皆有心識故當知有佛性何以故佛名覺者能善照達一切法故衆生身中有此覺者故是故一切衆生得有了別識耳云云又云相應者所謂心品及念法異云何心品所謂本覺隨念之心云何念法所謂直依無明生長妄法以何義故名相應謂相與力故如是二法何故名異本各別故如本言相應義者謂心念法異故念法之依染心品之依淨如是一一依各各差別猶如水火而何言成相應義知相緣相令契同故云何名為知相契同心品念法不相捨離和會而轉云何名為緣相契同如是二品所緣同故如本依染淨差別而知緣相同故云云私云以所引論文意可準知煩惱喻日光義也意云一切凡夫心之緣慮六塵時必皆以二種法為所依也謂本覺淨識與根本無明染妄法也不和合此二法時未曾有衆生心識轉義也若衆生虛妄心生實我實法妄執時依得從本覺父邊流出故則雖虛妄邪執而有迷亂邊之覺了知解義也依從無明迷亂母邊流生故於如幻假有即相真空性理而妄解知有實我實法云也故以煩惱喻日光也文動諸行塵者此是六塵境界也此六塵境是於衆生六識心等令成染汚不淨相故名云塵也是為諸心行之塵云也文邪憶念風者是想念我法之能執心是妄分別心心所也此妄分別心心所是動轉不安義故喻風也文於生死曠野中轉者是明妄分別風之所行境處也是分段生死之六塵境界處也疏復次若遠至妄想盡除者是重釋前喻中法喻合義也疏此經意云至有所談議者是疏主以論意而寄釋此經意也此義意云陽炎水是無實物唯有假名言説及妄想云也疏如真言行者至是法界焰耳者是指行者勸進可修習此觀意也此中法界焰者此加持神變是彼法佛所證真如法界智火之即示行者前前相云也此焰所表火自性即讓法佛果及所證真如實性云也疏經云復次至應知亦爾者是牒第三喻文也牟呼栗多者是此云須臾是此一晝夜分拆三十分而其一分云一須臾時頃也剎那此云一念也圓輝師俱舍頌疏云由如壯士一疾彈指頃云云疏釋論云如夢中至而還自笑者下引論釋助釋經義中是初喻意也疏人亦如是至亦復自笑者是合也前喻及此合中俱皆有二義謂夢中妄見境有義與覺悟後知非有境也是以覺悟後念前所見境都無義返可知夢境不真有義也疏又如以眼至怖事而怖者又重明隨夢中可意不可意境界差別相不同義而有夢心瞋喜等差別義喻也疏衆生亦爾至憂怖等故者是合也疏今復明此至一念間耳者是又重明夢中境希有事也是一眠一念心間能經多劫亦究竟無量種種事云也疏於覺心眠至了不可得者是舉覺悟後夢境都無義由而證知夢中境不真有義也疏而夢事照至親諸知耳者是明約夢中所現境義而種種夢境非都無義也是一念頃謂經千萬歲又以睡眠妄心而能想念無量境界故也此事非都無云也是夢者獨所證知故也疏今此真言至亦復如是者是疏主總合也疏或須臾間至不出一念淨心者是別合也一念淨心者是指觀行相應信心也前如以淨信心而為淨心故也猶如明鏡淨時能現衆像也信心淨時能變現加持境界云也故以一念觀行淨心而為加持境界之能生體云也疏然亦分別至者自知耳者是明此行者所見佛加持境界以四不生理尋之雖即本不生義而亦依佛加持與行者自善根和合力故非無此加持境界也此事不虛謬實行者於瑜伽中親所證知云也疏行者得如至亦不生著者是於修得加持神變境界之事於此行者而勸進可修觀察此夢境喻云也疏即以普現至修十句也者謂此行者以如幻等十喻則修習普現色身三昧故云深修十緣生云也疏經云復次至鏡中像喻者下就明第四鏡像喻中初牒經文次以論意與經義同而稍以欲釋經義而引論文也疏彼論云如鏡至無因緣作者下引明論釋鏡像文也此文中約喻義有五句義初四句是四不生句意也第五句示因緣假成果義也疏何以非鏡至則無像故者是釋成上第一句非鏡作義也謂鏡獨非生像也鏡是待面而生像故若無面時鏡獨不能生像云也故云不鏡獨作也疏何非面至無像故者是釋成第二句非面作義也謂面獨不能生像此面必待鏡方作像故若無鏡時面獨云何作像耶故云面不獨作也疏何以非執至則無像故者是釋成第三非執鏡者作句義也此執鏡人若無鏡緣及面因時即執鏡人獨不生像云也疏何以非自至然後有故者釋成第四句非自然作義也謂鏡與面因緣相待時必然生像若鏡若面一一闕無時像則不生也故知此像是非自然無因生云也疏亦非無因至非無因緣者是釋成第五句亦非無因緣作義也謂此鏡像是明正相待明鏡緣與面容因而所生影像也然若有人云此像是雖因緣自然成作者即對彼邪見人可返質云此像是鏡及面無時處恆常可有此像也何以故離因緣成自然作造法故也又此像離因緣所成者此像常可都無性也是又立道理可破邪見外人設計也如龜毛兔角都無法是不因緣所成性故是常無法云也疏當知諸法至不可得故者是總合也疏一切因緣至屬因緣故者是約法釋成因緣相待所成假立俗諦義非都無意也疏自作若自無至非他作者下約法中四不生句一一辨釋之中此釋第一二兩句義也自他差別執是妄情所取境界也約勝義諦道理中自他差別義不可得故也故不可有實自作他作義云也疏若他作則失罪福力者是就第二他獨生法義句破之也至如外道所計自在天等能生諸法義是諸衆生自所作罪福業果皆悉唐捐故也疏亦非共作以有二過故者就第三共作句而破之也問此句中二過意如何答義不分明若義推之者於自他共作義是為違翻義也若於共作義中約自力作邊者有即一過謂以自所作善惡業則相待他自在天等力者此自所作業即成無用也彼自在天等自在能造諸法云故也若於共作義中約他作力邊者亦有一過也謂若彼自在天等亦相待諸衆生自所作善惡業能生諸法者此計自在天等自在造作力用甚可成無用也何以故待衆生作業故若衆生無作業時何可云自在天力用自在無礙耶又至合喻處可知此義也疏亦非無因至不知耳者是釋法中第五因緣成句義也謂以三際兩重緣起義而釋成第五非無因果義意也謂依過去善惡業因故得今世善惡果報也又依今世善惡業因故當感得未來世善惡果報云也於緣起諸法中既雖有此因果相續道理世間愚夫不能了此理故生常有見與斷滅見云也疏小兒見鏡至聖人所笑者是明愚癡與智慧得失懸殊義也此中有喻及合文可悉也疏今此真言至猶如面像者是明於真言門中用此鏡像喻義也問上文既云以法佛本有三密境界為本質境以行者之觀心為明鏡而親見鏡為緣所現自所變影像境云云然何此處文中云以如來三密淨身為境自身三密行為鏡中像因緣有悉地生耶答上文是以法佛本有三密為本質時以自觀心為鏡以心鏡中所現影像而為自親所緣緣境云也今此處文意是以行者身中本有三密為本質以佛所成加持境界為明鏡以此鏡中所現影像而為自觀心親所緣緣義云也是佛與行者無二無二別義故也此加持義是共作義故也無相違咎也疏若行者悉至此喻觀察者謂明指事可作此觀事云也疏是事從自生自他生耶者是先且就自他生一句而責問其各各獨定能生所作法義也疏若謂他三月至不命成就者是以與義而破他偏獨成所生果義也文若謂下九字是與義也文則衆生下一行是奪破義也疏若謂自如説至求加被耶者是就自生句破自偏獨所生果義也此亦有與奪二義可悉疏若共生則有二過者是就共生句標其咎數量也疏何以故者徴其咎所由也疏若謂我心至方得成就者是與外人之設所計共生義也疏即此因中為先無耶者是且就共生義之中因生果義邊而責問此因中從本此果先有耶若先無耶也疏若先有之至復何所用者是就設先有先無耶執計而破先有先無二義也疏然是悉地至非無因緣者是顯示我自宗正義也此悉地果是依行者自善根力佛加被力故是即因緣和合法也不可執定有定無云也疏故智論鏡像至是名中道者是引論證成因緣成法之非定有非定無中道義也檢彼論第六有三行偈云若法因緣生是法性實空若此法不空不從因緣有譬如鏡中像非鏡亦非面亦非持鏡人非因非無因非有非無亦復非有無此語亦不受如是名中道云云就此第三偈非有者如鏡中像非定有是有為諸法是非定有也是待因緣假施設故也又如鏡像非定無也此有為諸法亦非定無也待因緣成故非無其假有其體故也亦復非有無者外人則聞前偈所明因緣成非定有義邪謂定空又聞前偈所明因緣成法非都無義邪執定有義故是為遣彼定無定有偏執故此説第二句也此句意非遮因緣成法之假有真空義也唯破迷情之定無定有執也故云亦復非有無也第三此語亦不受者彼雖有設説諸法定有定無之言教我亦不許之云也第四句如是名中道者是結成因緣成法非空非有中道理也疏不應如至取著也者勸進應離妄法也疏如作如是至不生戲論者是亦觀心之利益也疏經云復次至就悉地宮者是明第五喻文也疏釋論云日高遂滅者下引論證也問此乾闥婆城者是為實乾闥婆神之城為當似於尋香神之城物名為乾闥婆城而為法虛偽義之喻歟答是非取實乾闥婆神城也故真興僧都大般若音義第一云行𭹉云梵云健達嚩唐云尋香十寶山間有音樂神尋香氣處作樂故名尋香樂神若忉利諸天欲音樂之時便知往彼作樂西域依此呼散樂名為健達縛謂西國樂人多為幻術專尋香氣幻作城郭須臾如故因此名為尋香城今海中龍所現城郭亦似彼故復名尋香城云云疏飢偈悶極至渴願心息者此文是彼論為明此健闥縛城虛假義故重借此陽炎及谷響二喻而為例也故此疏所云乃至言所表意顯示陽炎水及谷響喻也檢彼智論第六謂如健闥婆城者日初出時乃至日高轉滅飢渴悶極乃至謂之為水疾走趣之轉近轉滅疲極困厄至穹山狹谷中大喚涕哭聞有響應謂有居民求之疲極而無所見思惟自悟渴願心息云云此文中有三種喻所謂尋香城陽炎水谷響音也初尋香城喻是正此中所明也以後二喻為顯示初喻義而助用之也疏行者亦爾者是疏主之總合也疏若以智慧至顛倒息者是正別合論文也檢彼論第六云若以智慧知無吾我無實法者是時顛倒願息云云今疏所引文中闕知字也疏聲聞經中至城為喻也者是又論文也於此文有二意初意凡小乘經中都不用此健闥婆城喻意也後義意彼粗雖明此健達縛城喻但以此城喻顯我非真有義也非謂五蘊法即空義喻云也於大乘中用此喻意是菩薩利根明智故為觀達諸法空深理故用此城喻云也疏此中言悉至修羅宮等者是明依修此觀所得利益三種悉地品類差別相也上謂密嚴佛國等者案密嚴經意有四種密嚴土一者上上自性自受用密嚴土彼經云超越於三界無量諸佛國如來微妙剎淨佛子充滿定慧互相資意成堅固性遊諸密嚴國思惟佛威德密嚴中之人一切同佛相超過剎那壞常遊三摩地又云賴耶即密嚴妙體本清淨等云云是諸法佛所證究竟境界也是不能行者因分所證悉地境界也二者上謂他受用密嚴佛土彼密嚴經云爾時金剛藏菩薩復告衆言諸仁者我念昔曾蒙佛與力而得妙定廓然明見十方國彼世定人及佛菩薩所住之處於如是處中密嚴佛土安樂第一諸佛菩薩數如微塵處蓮華藏云云又云螺髻梵王即白佛言世尊我等今者當何所作而能速詣密嚴佛土佛告之言汝可退還所以者何密嚴佛國觀行之境得正定之人所住處於諸剎最勝無上非有色者所能往詣云云解云此是他受用土也此十地菩薩實報土也於十地各各可有一種密嚴土也此不二乘所見也中謂十方嚴淨土者是十方法界中所有淨佛土也此分段生身行者所往生之淨土是西方極樂國土東方淨琉璃土等此類歟文下謂諸天修羅宮等者是指下品之所在處也等者是於山谷巖窟等中有此下品悉地宮處也補陀落山等中有持明仙若此類歟疏若行者成至悉地宮中者是明此三種宮之能住人之行位也疏當以此喻至燦然可觀者是勸進此觀也疏不應同彼至求其實事者勸進可厭離妄執貪著心行也疏以此因緣至所罣礙也者是指事明依觀察此喻之勝用故觀心於瑜伽中所緣境成清淨不染著利益云也疏經云復次至當如是解者是牒明第六喻經文也用此響喻意是行者於瑜伽定中若聞本尊説法妙音聲及聞我得舌根淨所出誦真言音聲而可成愛著時可用此響喻意歟疏釋論云若至名為響者下引智論文也文若深山乃至空大舍中者是明響之所出處也一者深山雨間峽谷二者逈絶洞三者洞然大舍也於此三處中若有人發音聲緣之時能生響也疏以語言聲至名為響者是明以能成響音之能因相而響成熟相也疏無智人謂至誑人耳根者是明於響聲有迷悟差別義不同意也疏人欲語時至是名語言者是明凡夫人吐發言音之因緣也憂陀那者翻名可尋知也天台小止觀云有師云臍下一寸名憂陀那此云丹由若能止心守此不散𨒬久即多有所治文但準偈頌名為嗢陀南義此嗢陀南此云遍施也是遍集佛所説四法印義而遍施諸衆生云云此義在俱舍頌疏第一中今準此意此憂陀那可名遍施歟所以者此風遍至發語人七處而施作言説故可名遍施歟疏愚人不解至諸法實相者是明於此衆緣和合假成語言音聲而愚人成三毒境界智人成實相真空解義也疏真言行者至違順之音者是明行者在於瑜伽中時天魔等説相似法門欲惱亂於行者時聞違順音聲相也八風違順之音者此義如蘇婆呼童子經云謂復次遠離世間八法所為善稱惡名及以苦樂得利失利毀謗讃譽此世八法當應遠離能生一切不善法故云云私云此八種法能令傾動行者之心故名云八風也又祕釋意云此表天魔所説相似八倒見也謂於生死法無常苦無我不淨境界顛倒説常樂我淨義於佛內證三密法常樂我常境界而顛倒説無常苦無我不淨義云也生死法上起常樂我淨四倒與大涅槃上超無常苦無我不淨四倒此八倒是順生死而違大涅槃法故名為違順義也亦此二種四倒分二類而互有違順二義耳於生死法上所起四倒是且乍雖順行者所求常樂我淨想而遂違正理故是即行者之所願求正智所違逆也行者於大涅槃法求常樂我淨處而魔狂橫於生死法而處説常樂我常義此且雖相似我所求而遂違返於行者之志也故於生死成違順二義也又於大涅槃上所起四倒亦此且乍雖順行者所厭無常苦無我不淨想遂有違逆義也謂行者於生死法生厭怖心求此法之無常苦無我不淨處而魔即説涅槃法無常苦無我不淨義故此且乍於生死法上雖似我行者所求遂不順本意故也故於涅槃有違順二義也疏或諸聖者至現前教授者是明聞佛菩薩説真實法如理説法音聲也疏或由舌根淨至遍滿世界者是明行者得六根清淨德而自所出言音普遍勝用也疏遇此諸境至響喻觀察者是勸進也是遇如上二種聲境而可觀此喻云也疏此但從三至妄生戲論者舉此聲所生因緣為所由而求此本不生理方不可成實有實無等戲論云也疏爾時自入至法門也者是明此喻觀之所益也疏經云復次至如是説者下牒明第七喻文也意云若以法佛究竟果及行者之本有三密佛性喻遊在虛空中本質淨月也以行者之觀心中所見曼荼羅界會種種境界而喻淨水中所現種種影月也此影月是虛偽月而非真月義為所喻本意也疏釋論云至影現於水者下引論文釋前義也義如前也疏實法性月至我所現相者此中喻言是翻前義即明迷心之水濁亂相現時淨月不浮影義也文如小兒至見之則笑者是明水月無實義喻也疏無智者亦至聖人笑之者是前喻之合也此中以凡夫濁心喻水以起我我所之執煩惱喻影月不現而塵垢浮水上義也此中本質月者是比有為無為真俗二諦境界也迷於此二諦境而生我法二執之煩惱也疏復次譬如至水則不見者是亦明此前第二喻中義也疏無明心靜至心水則不見者此合也靜水者是喻無明藏海也此義在釋摩訶衍論第三卷中可見之此無明藏海甚深而湛靜也此海能浮現與實我實法相應諸煩惱所知二障影像云也然以若正體智若後得智之杖而動搖此無明甚深澄湛水時則此無明藏海所浮影方不現前云也疏以是故説至如水中月者以上法喻合義而引結成此水月正觀之釋論文也疏持明行者至悉於中現者是疏主之例合也用智論第一義喻意也於此行者觀自心淨水中法佛月則能現其影云也疏或自以如至心水中現者此又返以行者自身化他用喻本月也以諸他有情觀心澄淨而被其化義喻淨水以行者自身本月化用之能令浮現於影他有情之心水中義喻影像月也疏爾時應諦至而有所生者就前以法佛為本月以行者觀心中所觀密嚴海會為影月義而以四不生義而可修觀之勸進也文從我淨心生耶從佛淨身生耶者是如次責自他實不能獨生而於衆緣所生法之義而成不生義也文自他實相尚自畢竟不生者成共生義亦不可得意也文何況相違因緣而有所生者此文可有二意一者是釋上共不生義也意云自他實體相即不可得也何況有自他相違法之和合共生所作法勝用耶云也二者是成自然生義不可得意也意云此行者觀心所現密嚴界會是返違於自他和合因緣生義用之自然生義亦不可得云也疏又如一切至衆水之中者是就以上所明行者自身喻本月以衆生受用喻水月義而明能化所化感應不思議身而化用周普功德喻義也疏我今亦復至實不虛故者前義合喻也疏當以惠杖至好之具也者是疏主成上所明智論所説如小兒見水月顛倒意歡喜義也意云行者以智慧杖攬動水中時水月自性成不現在前也遂知水月自性都無相云也而不同於彼小兒實執水月實有義云也疏既能自至當如是説者是勸進行者也謂依作此水月喻觀故深入法性真理而為利他行者亦可説此深法也疏經云復次至知亦示者是牒明第八喻文也此中意云於彼三密行業之不思議功力所起種種神通變化奇特希有境界恐行者可有生慢執咎故可作此浮泡觀除遣此執心咎也疏聲聞經以至意復殊也者此先明彼小乘經及三乘共般若經中所用泡喻與今此大日經十緣生句中泡喻其意不同彼義也彼雨家經中所用泡義為顯示忘念之因緣和合故似實有義及吾我似有義故用此泡喻也故彼般若經中明諸法都無性義十喻處中或時以變化事相替此泡喻云也故知般若中為明所執諸法都無性而但有妄相義故不用此泡喻也此大日經明有為諸法虛假義中用此喻意與彼般若意異云也疏如夏時雨至即是水滅者下釋以此泡喻而合行者之即心變化意也謂泡雖有種種形相差別而皆以水為自體離水無別泡故辨此中四句者以泡為自句以水為他句而泡中求此泡自性處獨離水即無泡別體是即泡自性無句也又於水中求泡自體處實無別獨泡自性也但隨從天下雨相加地上水緣故旦現種種圓形相也説之名為泡故於水外無別泡自性也是第二句也又於泡及水中二處求泡真實自性俱不可得也離此水無別泡亦離此泡無別水泡與水各各別相不可得也是第三句也又離泡水別求泡自性即無自然無因生泡也是第四句也疏故以此喻即心之變化也者正合也疏如行者即至無量法門者是釋所合法之義也此中即以自心者是本覺自心也作佛者始覺成佛也還蒙心佛示悟方便者是依始覺之悟入方便與本覺示軌方便故便證無量功德法門即能具變化自在德云也疏又以心為至思議變化者是明約心之緣境義成變化義也以心為曼荼羅者以本覺心地中本來具足三身四德普門塵數莊嚴功德智品而為所觀境及為所依因緣而新生曼荼羅莊嚴相云也是相即本有性得法之依修成功更顯現云也文此境與心為緣者以此本覺本有境界為所緣而緣之始覺現起云也以此能緣心與所緣境而為因緣能生無邊神通變化事境云也疏是故行者至不生著也者明修觀之得益也明浮泡喻畢從下為助釋泡喻故明變化喻疏釋論又云至法亦如是者是為明修真言瑜伽者之所作變化事虛假不真之具義故更引智論所明十四變化事非真實義也是取意略抄文也彼論第六云如化者十四變化心初禪二欲界初禪二禪三初界初禪二禪三禪四欲界初禪二禪三禪四禪五欲界初禪二禪三禪四禪是十四變化心作八種變化一者能作小乃至微塵二者能作大乃至滿虛空三者能作輕乃至如鴻毛四者能作自在能以大為小以長為短如是種種五者能有主力有大力人無所下故言有主力六者能遠到七者能動地八者隨意所欲盡能得一身能作多身多身能依一石壁皆過履水蹈虛手捫日月能轉四大地作水水作地火作風風作火石作金金作石是變化又復四種欲界藥草寶物幻術能變化諸物諸神通人神力故變化諸物天龍鬼神輩得生報力故能變化諸物色界生報隨定力故能變化諸物如化人無生老死無苦無樂異於人生以是故空無實一切諸法亦如是皆無生住異滅以是故説諸法如化復次化生無定物但以心生有所作皆無有實人身亦如是本無所因但從先世心生從今世身皆無有實以是故説諸法如化如變化心滅則化滅諸法亦如是因緣滅果亦滅不自在化事雖實空能令衆生憂苦瞋恚喜樂癡惑諸法亦如是雖空無實能令衆生起歡喜瞋恚如是故説諸法如化復次變化生法無初無中無後諸法亦如是如變化生時無所從來滅亦無所至諸法亦如是云云疏復次變至與泡喻意同也者是明彼智論所説變化喻意與此經所説泡喻同意義也謂彼此俱欲顯示諸法虛偽無實義故也文如變化相乃至罪福所行者是喻也變化諸法自體即空故何有不淨等義耶云也又諸法亦爾至自然常淨者是合也文譬如閻浮乃至種種不淨者是亦喻也此喻是旦為顯示有為有漏諸法自相染行不淨義故也四大河者俱舍頌疏云雪山北香醉山南有大池水名無熱惱生四大河一兢伽河從池東面出繞池一匝方入東海二信度河從池南面出繞池一匝方入南海三徒多河從池北面出繞池一匝方入北海此云孟津河是也四縛芻河從池西面出達池一匝方入西海此池側有贍部林樹形高大其果甘美依此林故名贍部洲云云閻浮提者古人所傳也新人云贍部也是同義也此疏入大海中皆悉清淨者成如上不淨遂成淨相義也檢彼智論正文此文是當合喻也故論第六正文云入佛水中皆清淨云云私云其此文甚佳也問此色界天等所變化事是定果變事故可有實用事然何云無實虛偽耶答彼智論第六有此問答故其文云問曰不應言變化事空何以故變化必亦從修定得從是心作種種變化若人若法是化有因有果云何空答曰如影中已答今當更答此因緣雖有變化果空如佛説觀無生從有生得脫依無為從有為得脫雖觀無生法無而可作因緣無為亦爾變化雖空亦能生心因緣譬如幻炎等九譬喻雖無能生種種心復次化事於六因四緣中求不可得是中六因四緣不相應故空云云問真言行者之瑜伽定所變境界有實體用耶何答云有二家異説所判説不同也若依智論意瑜伽者之所成境界無實體用云云若依唯識論意者八地已上菩薩之威德定所變境界有實體用變瓦石成金銀等令有情受用之七地以前不爾云云故知真言行者之所變境界是虛實難定判也問若爾者此二論相違何可會耶答或不可會之彼二家從本各別宗立義不同故也或又可和會之也若和會之者智論意是説七地以前菩薩等所變事無實體用義也不妨八地已上菩薩所變有實體用事尚同唯識論意也疏經云復次至種種妄見者是牒明第九喻文也疏釋論云虛至轉見縹色者下引智論明虛空中有物虛妄喻義中是先明虛空無實假名義文也色法之闕無所虛空相顯現也虛空是相待色法之無處立故是即假法也故唯有名字無實體云也故是虛空不可見相也文遠視故眼炎轉見縹色者是妄見此空意也縹色者是古德云青黃色云云疏諸法亦如至雜物心著者合也疏如小兒至謂有實色者亦引喻明虛空之妄有義也疏有人飛上極遠而無所見者明虛空之無實義也疏又如虛空至為不淨者又明迷人狂計也疏諸法亦如至謂不淨者合也若約覺悟人此義如智論第六偈云淫欲即是道恚癡亦如是如是三事中有無量諸佛道若有人分別淫怒癡及道是人去佛道譬如天與地云云疏此經云心迷至或可貪著者還釋經文也有人當若病惱狂亂心而鬼魅所著心迷亂時於淨虛空中顛倒妄見種種人物云也若依大圓覺經説彼經云譬彼病目見空中花及第二月空實無花病者妄執由妄執故非唯惑此虛空自性亦復迷彼實花生處云云疏若得本心時至非還淨者是明覺悟心所解義也謂穢事法之生時不能染汚於淨空此穢事法之還滅時亦還不能淨於虛空云也是於三世平等清淨云也疏本來不礙至不異於空者明此妄執色法與虛空不異不離無隔無礙義也疏行者修觀至如淨虛空者是勸進值可厭惡境時可修此觀事也疏雖於無量至所塵汚也者是明證得此觀者之利益也空一顯色者百法論義忠疏云於上虛空所見青等為空一顯色空之顯色即依主釋云云疏經云復次輪像生者是牒明第十喻文也疏如人持火至而生念著者下釋經文中是明旋火輪假成因緣及愚小者之迷執實有咎也疏然實都無至成無量相者是明實無法之似有現所由也疏真言行者至無量法門者此合也謂阿字有三義一者空義二者有義三者中道義謂阿字本不生空義之即成如幻有為法故此阿字旋轉無礙成無量法門云也此阿字空有義雙存故是中道義具也疏爾時當造至戲論也者此勸進制誡譬也文當造此觀下是勸進此正觀也文不應於中下是制誡邪執也疏釋論無火至實不可得者下引智論所説影喻而助成旋火輪喻也此中有喻及合也意云影是有假顯色故雖眼可見法無實色體故別不手等可投執物云也五蘊等亦爾也無別自體故只依衆緣和合似有假施作也疏又如影映至我相法相者影是喻由無明煩惱現起事是當時正現惠日光照此影不現前也方依無明暗相故我法影現云也疏又影人去至影亦如是者是明影與本質礙物相從不離喻也疏復後世去至就時則出者合也此明善惡因果法是從因善惡而果善惡相生於三世中不絶斷義也疏然是影非至意大同也者是疏主和會影喻與火輪喻意也已上十喻釋了疏祕密主至大乘生句者是牒勸進讃歎上十緣生句文也此六句文是讃美十緣生句法門種種義味義也疏此十喻皆至名大乘句者是舉能知人之勝義為所由而歎此所知法殊勝義也彼小乘經中才雖有色如聚沫受如浮泡想如陽炎行如芭蕉識如幻化義喻相是皆折法觀意未逮此緣起即空之體法難解深意也安足之處者是句之義也疏心之實性至故名心句者是釋第三句也此中心之實性者是賢實精要義也此有為染心之自性真實真如本覺心是甚深故直爾以無明癡暗心不可證知之故假此十喻方便乃漸證知此真心深理故名心句云也疏如來知慧至名無等者釋明第三句之中初無等一字意也謂佛智無等倫者亦無上勝故名無上也疏而心之實至曰無等等者是釋第二字意也是佛智能契會所證境而心境均同故名曰等也疏諸佛以此至曰必定句者釋第四句也師子吼義如上第一卷釋也文若有能信下是明師子吼之所利益相也諸魔皆化身作佛説相似般若者彼魔所説諸法空義是説偏空斷滅惡趣空義也是空是雖似大般若等所明所執空義而懸異也彼魔雖説諸法有義亦是説常有偏有義故與佛所説妙有義懸異也此説依他如幻有故彼説諸法常有之偏有義故也若解此十緣生句義行者聞魔所説偏有偏空義心不信受之亦不驚疑云也疏以此中道至正等覺句者釋第五句也此中句正意是約第九極無自性住心正顯示其中道義而釋成正等覺義也所以得此極無自性心中道正觀之者是由覺十緣生句方便也於緣起諸法遠離有為無為偏執是則成就中道正觀也此中道之正觀能顯現者名為始覺佛故也疏以深修觀至大乘生句者釋第六句也此意是取漸次轉增中之至極源義也毗盧舍那以上上智觀者涅槃經第二十七文意也謂經云以下智為聲聞智以中智為緣覺智以上智為菩薩智以上上智為佛智云云又天台以此四品智如次為藏通別圓四教證據文也故此大日經明依此十緣生喻證得緣起即空甚深妙智而窮盡緣起諸法妙理故名云漸次大乘生句云也疏如是六句至互相生也者此有二義一者此六句順逆互展轉相助釋義也謂若約順義第一句標第二句乃至第五句標第六句如是次第相標而釋成云也若順次釋之者第二句釋第一句乃至第五句釋第六句亦得之也亦此六句相生次第者此方可有順逆二義逆義準順義可知之也順者謂依第一句生第二句亦依第二句生第三句餘準之可知也若逆次生義者第一句以第二句為因而生第二句生依第三句而生云也餘亦爾也疏毗盧遮那至具足法財者是法佛所得之如幻三昧所變隨緣化現應化等流佛身是皆依止此十緣生句法而施作利生事云也此十緣生句立不思議法界名義依是妙喻即令觀顯真如法界性故也以此喻而為能入門而證入彼法性海故也彼法佛所現十佛剎塵數無量莊嚴藏之執金剛及大菩薩衆出現事皆悉是由於往昔如來所修行此十緣生法力與及諸行者所觀十緣生句喻功德之感應和合力故出現此十佛剎塵數無盡莊嚴藏云也又依觀此十喻智惠故即於佛及行者令證得五根五力七等覺支八正道支八解脫三十七品十八不共法乃至無盡佛法財也故於此十喻立具足法財名也疏一切如來至工巧大智者是總釋依觀此十喻而佛得究竟一切種智義也疏若於一念至一切心相者是廣釋種智相也此中一念心中者等是相當天台三諦即一之一心三觀義也上窮無盡法界者是上觀本覺真如法性界下觀無邊九界衆生世間如是淨法界與染法互相熏習互相生長緣起諸法興起故此緣起門心生滅諸法相即性即空即假即中義具足宛然云也此三諦義佛果及觀行純熟者之一念惠之所解也疏阿闍梨言至後通徹也者是三藏和尚御意云真言行菩薩是依佛加持力與自觀行三密之善根力故初修業位即得不思議十緣生句所顯緣起三諦即一妙惠云也此依佛加被力與性得法爾三密法殊勝之力及自根聰利力故速疾時頃得此勝利也具足此三種勝因人何煩可同經多劫修習淨業空捐功力致劬勞人耶云也疏梵本中云至經中具出者案此所引文意此住心品末具緣品前其中間方可有真言行者之持誦次第行法軌則與及説如理悉地成就法亦説如法得果義之文歟此所明如法悉地及得果義是極祕法故不載經文云也疏其大意言至諸心相竟者是説顯真言行法中淨菩提心門相應諸心相義云也上來凡總答説是上九問之所發生之要義訖云也總釋此住心品大綱訖云也意云於此住心品中雖有彼説持誦次第如法悉地如法果生義此枝末經本文闕故不明是法云也只以明淨菩提心相義正為此品大意故釋之畢云也疏從此已下至悉地果生也此具緣品以下是廣答上金剛手所問之及彼行修行之問意及依此修行因之所得無上悉地果義也故上疏文云次問當以何行云何修行而能獲得無上悉地亦可分為二句也云云上來住心品疏文私消釋畢具緣品已下疏不可消釋之也其中唯有極祕密事故也回向頌曰以我解釋密教力及諸如來加持力及以法界功德力自他頓入性海果
