body:
  text: 大日經住心品疏私記第八疏如聲聞戒至亦隨亡之者為顯示此無為戒之殊勝德故相對聲聞乘人所受二百五十戒而明其優劣相也於此中有三勝劣差別也一者具足白四羯磨得戒義也此可尋知也大底是受聲聞淨戒時所具足外作法威儀事業之數量差別義也謂若具足此威儀緣時得戒若不具時不能得戒云意也二者方便守護義謂聲聞人常作意住妨非止惡心故成持戒用也若適不妨遮則失戒行也三者只一生持戒謂期盡形壽故也若生命盡時則戒品隨盡又他生更亦待師緣及白四羯磨之外作法威儀緣而更得戒行成也白四羯磨義如道宣律師四分律六卷抄第一云次明衆法有三一者單白事或輕少或常所行或是嚴制一説告僧便成法事二者白二由事參涉義須通和一白牒事告知一羯磨量處可不便辨前務通白及羯磨故云白二三者白四受戒懺重治舉呵諫事通大少情容乖舛自非一白告知三法量可不焉能辨得以三羯磨通前單白故云白四若就緣約相都合一百三十四羯磨略言如是更張猶有單白有三十九白二有五十七白四有三十八云云問此白四羯磨者何義耶答白與三羯磨都合名曰白四羯磨也問白者何義耶答案六卷抄第一卷説云六聚僧殘中白捨行法白行行法白入聚落尼白入僧寺又云發心念境口自傳情非謂不言而辨前事毗尼母云必須口言若説不明了作法不成云云依此意者以啓白為白義也羯磨者同抄一云羯磨者明了論疏翻為業也所作是業也亦翻為所作百論云業也若約義翻為辨事謂施造逐法必有成濟之功焉云云問其羯磨三法者何等法耶答同抄一云就初總明一切羯磨必具四法一法二事三人四界第一明法有三種一心念法二對首法三衆僧法初就心念有三一但心法二對首心念三衆法心念言但心念者唯得自説有人亦成數列三種謂懺輕吉羅説戒上座發露及六念也二對首心念謂本是對首之法由界無人佛開心念三衆法心念謂本是僧柄亦界無人故開心念説戒自恣外部受僧得施及已人衣等云云疏此戒則至常無失犯者示於此無為性戒即無此三種劬勞也故以此無為戒相對彼聲聞戒而判定勝劣也此戒雖無上三義具足因緣而直成戒品義云也此無為性戒是不用白四羯磨等衆緣具足義亦不依故意而禁制妨遮心而於三世無持犯間斷義云也真如本覺性無間斷故此性戒用亦無斷盡云也此大疏第五云今行者深觀十緣生句了知三事畢竟不生法性自爾常無動作是名住無為戒也如是淨戒尚非如來所作況住斯戒而造作諸法耶經云何為戒所謂觀察捨於自身奉獻諸佛菩薩何以故若捨自身則為捨彼三事何等為三謂身語意文疏又由住此至遠離二邊者是歎此淨菩提心門菩薩依顯得此性戒時故有於染淨諸法中而離斷常二邊見得見甚深中道理之用云也疏故經次云至通達正見者以釋意歸經本意也疏迦葉亦云至邪見人也者引涅槃經第七文而證此淨菩提心門菩薩之離邪見成正見義也案彼經第七卷説八倒意云於諸有為有漏法有苦無常無我不淨過患二乘隨分了知之諸凡夫迷於此而執常樂我淨亦於如來所成常樂我淨之三寶境界而凡夫二乘迷執無常苦無我不淨是名云八倒云也然迦葉菩薩是雖遣昔有為法上四倒而未遣此如來自證得境界真如無為法上之四倒然今始離此無為法之上即説為無常苦無我不淨妄執之四倒云也此疏意只據淨菩提心門中本覺智者相待無明等有為法之無常苦無我不淨過患而所成立本覺之常樂我淨四德而成此諦實四德云也是天台宗涅槃經疏意歟疏是中惠不至大菩薩路者是釋上涅槃經所云皆名邪見人意也成此八倒皆名邪見也謂凡夫於有為無常苦無我法迷而執常樂我淨也二乘人於本始兩覺法而謬執無常苦無我不淨故亦成顛倒云也故依八倒不離故未到始覺菩提場也此中空者是依他諸法之即空義也不空者真如本覺法真實常有義疏今此菩薩至種種諸色者明此菩薩住法道理如實了達有為之無常苦無我不淨義了知無為法之常樂我淨義云也此菩薩既除蓋障之眩翳故則得惠眼法眼得惠眼法眼故明了達有為無為諸法契其自性如實發生有空中道解云也疏無量天魔至疑網之心者是明此菩薩外離難德也前已明內離蓋障義故其次明此義也起信論云或有衆生無善根力則為諸魔外道鬼神若於坐中現形恐怖或現端正男女等相當念唯心境界則滅終不為惱或現天像菩薩像亦作如來像相好具足若説陀羅尼若説布施持戒忍辱精進禪定智惠或説平等空無相無願無怨無親無因無果畢竟空寂是真涅槃或令知宿命過去之事亦知未來之事得他心辨才無礙等乃至云云以是義故行者常應智惠觀察勿令此心墮於邪網當勤正念不取不著則能遠離是諸業障應知外道所有三昧皆不離見愛我慢之心貪著世間名利恭敬真如三昧者不住見相不住得相乃至出定亦無懈慢所有煩惱漸漸微薄云云疏故次云至一切佛法者牒經本文也疏以如是正見至悉成就也者釋所牒文也文依此者指前除蓋障三昧力用德也文進修如實巧度者是指後所應修十地位中所修如實修行十度行也文得諸佛力無所畏等者是指當所得法佛果海位也疏龍樹以為至即成全體者引智論喻文成此義也此中有二例喻一者金師喻二者得五通者變化自在例喻也疏故云不久至一切佛法者以釋意歸經本文也疏以是菩薩至皆成就也者是釋經本以要言之等一行歎德意也此菩薩如實住諸法道理而解了有為諸法虛妄非實義也是有為法有無常苦空不淨義故如此境而智了之云也於無為諸法如實解了本覺真如等常樂我淨四德常住不生義故隨分名佛云也是內心稱法性理故外德無量無邊成就云也上來略問之略答已畢也自下是廣問廣答生起也疏爾時執金剛至以偈問佛者是標金剛手廣問發生相也疏乃至不知至離於斷常者是佛廣答淨菩提心門之真空理則遠離斷常邊見過失義也此疏乃至之言則攝取佛廣答中所云始從頌文越百六十心生廣大功德等三行頌即及攝取其中間文句乃至又攝取不知諸空非彼能知涅槃是故應了知空離於斷常文也是佛廣答前金剛手菩薩廣問云意也疏如上佛説至略已周備者是結上三句略問答而因其次當將此第二大段廣問答也文以偈問佛乃至不知諸空者此經下所云非彼知解空非空乃至離於斷常之二行餘文是廣答第三菩提心續生問長行文也文如上佛説經之大旨者此前三句法者此大經玄宗義云也文心實相門已周備者總結上三句義也疏時金剛手至廣演其義者明此廣問之所為本意也疏是中略有九句者是標廣問句之章數量也疏云何世尊至菩提心生也者牒第一句而標釋其意也疏今此中直至種子發生者是此所云發菩提心是上三句中第一菩提心為因句是也於此第一句發菩提心而有二種義一者顯略義是如花嚴經等所歎發菩提心功德者是十信及十住中初發心住菩薩所發菩提心也問其花嚴等諸經所歎發心住功德文如何答天台宗法花玄第五云花嚴云祕初發心時便成正覺了達諸法真實之性所有聞法不由他悟是菩薩成就十種智力究竟離虛妄無染如虛空清淨妙法身湛然應一切當知即是發真無漏斷無明初品也淨名云一念知一切法是為坐道場成就一切智故亦是入不二法門得無生忍也大品明從初發心即坐道場轉法輪度衆生當知此菩薩為如佛亦是阿字門所謂一切法初不生也即是今經為令衆生開佛知見亦是龍女於剎那頃發菩提心成等正覺即是涅槃明發心畢竟二不別如是二心前心難此諸大乘悉明圓初發心住位也云云問上明三句法門義處此疏一云最初發菩提心句是十信位云云然何今九句中所明義是十住中初發心住名為發菩提心義耶答此中所云初發心住處即攝取十信位也故無咎此義如智周師大乘入道章云問此住初首而有十信謂信進念定惠施戒護願回向計心四十何故但言三十心耶答即十住中初住離出以初發心而甚難故離出也設有聖教言四十心當知即據總別説也理實三十云云故無相違咎也謂上文是據開出説十信名為三句中初菩提心句十信是最初發心故也今此下文是約合義説初住名為發菩提心句也又解上文所明十信是不定聚十信也於此所云十住中初發心住亦名為十信也是非不定聚中十信也法藏師起信論疏云得值諸佛修信心者明修行緣謂約此緣修十種信心行也徑一萬劫謂十千劫修行信心成就也佛菩薩教令發心等者謂發十住初心也如瓔珞本業經云是信相菩薩於十千劫行十戒法當入十信心入初住位釋云此中言入初住位者謂十住初發心住位也以至此位方得不退信心是故亦名入十信心非謂十解已前之十信也何以知者仁王經云習種性有十心已超二乘一切善地此習忍已前行十善菩薩有退有進猶如輕毛隨風東西雖以十千劫行十正道發菩提心乃當入習忍位以是文證故得知也云云上文約始明十信也今於此文約終説初發心住遂無相違咎也故此疏第十五云無上悉地以前略有五種悉地一者信二者入地三者五通四者二乘五者成佛此是五種悉地也初信者謂隨分能分淨諸根深信如來祕藏決定不疑信佛有如是如是方便若依行者必成菩提此是地前信行也次入地者謂入初歡喜地也云云私云今依此説者三賢位總名為信心菩提心義也何況初發心住不名發心位耶二者深祕義是約三密內證三平等境界明發菩提心也此如上所引菩提心論三摩地門發菩提心相是也今此疏文所云今此中直問心之密印者是約三平等門意問發菩提心云也是為簡彼單顯教所明發菩提心意也疏若已發生其性云何者是疏家之結前第一發菩提心句相也疏復以云何至相彰於外者牒明第二句問之經文而釋其相義也性者是望自體之義也是物之精實義也相者是依他緣相義邊也是兩和合成義也若指其物言之者且如繩以麻為其自性以衆麻所集為繩其相云也文性成於內必有相彰於外者謂是且如火若火內有時必煙現外又若於內含容摩尼珠之石必有外現黃色相云是義也今於發菩提心亦可爾也發心內成者外相外可彰云也疏如般若中至相貌時也者是引般若經例也問彼經中如明三賢十地等菩薩修菩提心行相今此經亦可爾云者是何樣相有耶云也答此中發行菩提心人是上三句中當大悲為根句之義也是同上所云得除蓋障三昧菩薩三賢所發得菩提心行及十地修得菩提心并種因海佛果菩提心等是相貌也阿毗跋致是不退轉義也不退轉義是有三賢十地故了疏經云願至前二句義者釋此二句意也是讃嘆能説主而求乞所説法云也疏初云識心至不從他悟者是廣釋此二句深義也此義意通隨緣因分境界界法然果分境界意云初識心者是佛始覺智是證達識知諸法真空理之智惠是也是緣慮了別義有故名云識心也此中心義是質多心也緣慮心是質多義也次心言是真如實相境是此前正智所緣境界也是真如是堅實不壞義故名心也又是有集起用故名云心也真如是諸法之所重體故也此中心義是紇里陀耶心義也堅實精要心是紇里陀義也疏意明境智至故重言之者稱美此能緣智心與所緣理心之體無別冥合相稱義也文自然智至不從他悟者此始覺佛智此從本覺得之故名云不從他悟云也是此始覺心還淨時即還證本覺心云也疏言佛既至説之也者是陳應説所由而請當説也佛了達本始兩覺真如實相甚深理義故而堪能可演説此發菩提心相及此菩提心微妙功德甚深法門云也疏第三句云至之異名也者釋第三句意也此約文次第是當第七八句也然約義次第故名第三句也大勤勇佛之異名者是佛得十力德義邊得此號也十力是不屈伏義也亦約大精進德立此名歟文有幾心次第而得是心也者是問始從初發微善心終至佛果相續善心意也案此問之答義下有十重次第續生住心也依祕藏寶鑰十住心論意有十重心所謂第一異生羝羊心第二愚童持齋心第三瞿童無畏心第四唯蘊無我心第五拔業因種心第六他緣大乘心第七覺心不生心第八一道無為心第九極無自性心第十祕密莊嚴心是也是義至下可釋也是問意是請問此心之次第由來義當説也疏第四第五句至淨菩提心也者釋第四五兩問意也此兩問意是問凡夫心相及行者心之斷此凡夫心相而得生聖人心相之時所經歷時項遠近義也案此第四問之答文經云我密主諦聽心相謂貪心無貪心乃至如是同性者是明凡夫心相也故此疏第二云祕密主諦聽心相貪心無貪心乃至云何受生謂諸有修習行業彼生心如是同性此答前問諸心相句也云云第五問之答文者經云祕密主彼離違順八心相續業煩惱是超越一劫瑜祇行又云復次祕密主大乘行發無緣乘心法無我性乃至如是知自心性是超越二劫瑜祇行又云復次祕密主真言門修行菩薩行諸菩薩無量無數百千俱胝那庾多劫積集無量功德智惠具修諸行無量智惠方便皆悉成就等乃至云信解行地無對無量不思議建立十心無邊智生我一切諸有所説皆依此而得是故智者當思惟此一切智信解地復越一劫升住此地此四分之一度於信解云云已上文是明始從初發微少菩提心終至方便究竟位之所經歷時項遠近時劫分齊也是即前所云斷凡夫心相之所經時項也疏第六句云至故云亦然也者是釋第六問意也是問此十重菩提心之微妙相及功能勝業用也又答此第六問經文是此疏自釋云百字果等即是答殊異心及功德句云云疏第七云至為第二句也者此問意是請問三平等中修行軌則也即此問是當上所問三句中大悲為根句義也此義是合為一問義意也以此及彼行修行一句或分開為兩種問云也初及彼行三字是直問所應修三密行法也彼者是指上所明淨菩提心句及方便究竟祕密莊嚴句也彼之所行之行云意也次修行二字問之意是於此所修三密行法方與此有何方便行而相應之云也此修行相應方便有二義一者此經偈云供養行修行從是初發心云云此偈是合答與此三密行相應修行方便之二問義也內外供養行是與三密行能成方便云也依此義故攝大儀軌上卷云廣大念誦儀軌供養方便者此義也亦此疏下文云以三種祕密方便供養行門消融百六十心礦石之垢者此意也意云廣大念誦儀軌者是直三密行也供養方便者能成就彼三密行之相應方便法也二者此疏第三云若真言門修菩薩行諸菩薩深修觀察十緣生句當於真言行通達作證者是略答前問修行句也文此十緣生句喻亦是成就三密行之能成方便云也文次問當以何行者是開分二問時先直問三密行意也文云何修行而能獲無上悉地者是問其能相應方便行也無上悉地者是問其行所成就法佛果德也問何故及彼行者必云修三密行耶答菩提心論云凡修習瑜伽觀行人當須具修三密行證悟五相身義也云云故知爾也疏第八第九至殊異之心者釋第八九兩問句差別義也第八問是問衆生異熟識心相也第九問此瑜伽行者所成心正殊異於彼前凡夫之異熟識心義也今此第八九兩問之答是疏第二云經云祕密主一二三四再數凡百六十心超世間三妄執出世間心生乃至四分之一度於信解者亦是答諸心相及心殊異也云云又下經文所説六無畏義是答行者殊異心問也又疏第一云百字果等即是答殊異心云云即是答此第九問意也問衆生異熟識心云如何答唯識論第二云異熟習氣為增上緣感第八識酬引業力恆相續故立異熟名感前六識酬滿業者從異熟起名異熟生不名異熟有間斷故云云意云第八識是此識無覆無記義而自羸劣法故以自勢力不能現起故必待餘七轉識中所作善惡等資助勢力故此識方得現起云也猶如羸病人依杖方起行也此識以善惡等心為因而總業之所感報而識性無記故名異熟識也又前六識中無覆無記性心亦彼引發六識之善惡等別業之勢力而得現起事名云異熟生心云也八識義記云第八識名異熟識果異於因故云異熟識也因善惡果無記而生故名異熟識也云云又唯識疏第二云有四義謂變異而熟異時而熟異類而熟異熟因所招感義云云先德解云正以異類而熟義與異熟因所招感義而名異熟識兼以初二義名異熟識云云是八識義意也問以此等義云何此疏所云衆生異熟識心義可成立耶答此疏所云衆生異熟心是通下經所云百六十心妄心故不相當唯識論等所云異熟心第八識及異熟生前六識中無覆無記心也故知以別義成立異熟心義歟問其別義意如何答推此事可云百六十心是有善惡及有覆義而招感彼無覆無記第八識及前六識中無覆無記心故翻可知此百六十心名異熟心歟此百六十心等實雖不異熟果等而於此心有感招異熟識用故約有財義而此名歟此義雖似背恆性相所判例道理義若不爾者此義何可會耶但俱舍論所明有異熟義頗同此義意也疏亦願世尊至大牟尼也者是結歎説主德而請當説之意也此中文有牟尼義之大義所由可悉之也疏阿闍梨言至文無定準者此文中有二意也一者明第七問之開合不同義之所由文如是九句至為十句者是也二者明佛答不依問次第而前後不同意也文從此以後至文無定準者是也是依隨順當機聞者從先欲聽聞決了之意樂故且置前問先進説後問之答義或亦酬前問而説前問之答義據後問説此後問答義云也不如是問次而爛説佛答義是為令當會聞者早易解了又直忽急令尋求宗要義故也説如是不次答也疏或轉生疑問以盡支流者依聞者聽法機説此九問之答義以直所聞義不足故亦重有疑慮心故為斷此疑心佛轉説種種諸品不同義云也疏如下文入至及功德句者指明此例也此入大悲藏曼荼羅等者是即且指入曼荼羅具緣品也此等取餘息障品普通真言藏品世間成就品悉地出現品轉字輪曼荼羅品成就悉地品密印品字輪品祕密曼荼羅品入祕密曼荼羅品入祕密曼荼羅位品祕密八印品持明禁戒品阿闍梨真實智品布字品受方便學處品及説菩提性品三三昧耶品説如來品世出世護摩法品説本尊三昧品説無相三昧品世出世持誦品等是等品正答上第七問真言行者之修行義或又説上悉地果義也傍答上第六問功德聚義與第九問殊異心義也疏百字果等至及功德句者是即等取説百字生品百字位成品百字成就持誦品百字真言法品等也此等品正答上殊異心問與功德聚問傍答上修行句問也疏其餘隨有至之義可知也者且舉上所云入曼荼羅具緣品百字果相應品一兩例之而此餘二十八品所明義勢是皆應比知也此等品皆是為欲説盡上修行句義與殊異心功德聚義而令無餘疑網故也疏次如來答至發如是問也者是於釋佛答偈中是釋初二句偈意也此佛子者有二意一者隨心王如來成始覺時此本有心數金剛手等亦自然成正覺義故云以從如來種性生也心數即是同心王之種姓也二者此金剛手等十佛剎塵數衆會是非別人但是心王法佛內證差別智即分位故云從佛身語心生故也疏次云勝上至故名大乘者牒次一行偈文先示總立大乘名也謂勝上大乘句者是總標大乘之中猶殊勝大乘義云也謂真言是最上上乘義故也下三句是別顯名大乘之所由也心續生之相者是此所目大乘之體也所謂十住心是也諸佛大祕密者是佛菩薩大人之自內所證之自行化他方便善巧方術故也今約能證人之大義故此所證法亦名大乘云也下別釋七義大中是當第一法大義第四性大第六時大第七智大義也外道不能識者簡小乘及外道之偏見邪見之自利行自損損他行等劣乘故今立大乘名云也疏一者以者以法至大人所乘者自下明七種大乘義中皆悉有標句釋可悉之也此第一大義意云顯密一切教及行是皆大日尊所乘境界云也此有二義故立大名也一者當體大義謂此教行皆廣大無量無邊故也是持業釋也二者此大人所知境界故亦立大名云也是依主釋也是法佛一切種智之境界故名大人所乘之大乘也此義如釋大衍論第一卷具明也疏二者發心至法界衆生者是第二大義謂真言行菩薩初發心時所發弘願也是所度衆生廣大故於願立大名也亦所求大菩提大故於發心而立大名云也疏三者信解至成就衆生者約得淨菩提心門菩薩具足自利利他廣大信解之功德義故立信解大名也此菩薩解依他諸法即空理悟真如本覺自性清淨心及信法佛內證法然常住境界故立信解名也此信解大故立大名也亦利生化用廣大故立大名也疏四者以性至共有言者約本覺理而立大名也此有顯密二種義也顯義如起信論釋大衍論等具明也密義如菩提心論等具明也其文證前具引畢也涅槃經名字功德品金剛寶藏滿足無缺云云此經文通顯密兩教意也即是今此意也又大般若理趣分云一切有情皆金剛藏以金剛藏所灌灑故云云此一切衆生所有本覺佛性無變異義也疏五者依止至依地而生者意云此真言乘是有法界一切衆生普遂所歸依之用故名云大也本源法故立大義云也疏六者以解時至未曾休息者是大意云上疏所云越三時如來之日加持故等文即此義意也此法佛果地所證壽命無盡義是即凝然常住義也疏七者以智至實相源底者是示佛果一切智智廣大義此有二智一者俗智二真智也文諸法無邊等是俗智也智是依所緣境而起故知無邊俗境即是智無邊義也文窮實相源底者是真智也文譬如函蓋相稱者是明真智之證會真如理義之喻也疏以如是七至勝大乘也者結釋意歸經本也乘名進趣者是釋乘義也於所應到處進趣義名云乘也如乘船車等趣所到處也疏句名止息之處者具義如上釋也句是迹義也迹是足迹之止息處也此大乘之教行是古佛昔趣大菩提果足迹云也疏心續生之相至有心相生者明十住心之續生之因緣義也意云若約心真如門意一切法唯真如理故不可有妄心麁細覺悟淺深也唯一味平等寂滅無相故也今約心生滅門隨染業幻似有門意而於悟有淺深於迷亦有麁細故約此門即有心續生次第差別云也故釋大衍論二云位地異真如門中相雜住住故生滅門中往向住故又云於真如門唯有一向雜亂住位無有餘位是故頌言唯亂餘契經中次第往向種種住地生滅門有二種位一者向上門二者向下門云云今所明心續生義當向上門意也疏猶如大海至鼓怒相續者是以浪波非常非斷義之喻明心生滅門相續不斷不常義也疏當知是心至不妄宣示者是合喻也意云真如本覺淨法之隨無明等染法熏習而雖流轉生死中而本覺之凝寂常恆不變易云也文即是不二者是指真如本覺之本有寂靜自性也是即無生無滅法體故也文而生者此真如本覺之隨無明等染緣變成生滅妄法而流轉於生死義也文生而不生者此真如所變生滅妄法即體無生無滅云也是非有法之似有現故此似有現法返即成空義云也文無相之相等者準前可知也文甚深微妙等者此真如成諸法諸法之即體真如義是處甚深難見云也文兩種外道等者此二類人唯非有不識心真如門甚深絶理之咎而亦迷心生滅門之緣起法相向上向下門對治方法云也此等文釋經外道不能識句也疏我今悉開示一心應諦聽也者是總被上引諸問而以二句頌答許説義也疏次偈云至是略初問者略釋此所牒一行頌大意也始從此越百六十心句至從是初發心之三行頌是正答問文也問此三行偈於九問中答幾數問耶答據此疏顯義言之者此三行偈答三問也謂第一行偈是答第一菩提心生問也次一行半偈答第二菩提心相貌問也第三偈下二句是答第七及彼行修行問也問何故問題有九種於答文但有三種答而闕餘六答耶答此義難決可問明匠也但今私回愚慮作二途會釋謂於此三行答偈中於此且是答三問略雖不答餘六問而又是悉自然被答盡前九問云也但疏主以總相就顯了義及肝要之正旨義而云三行偈答前三問云也理實細尋之於此三行偈兼傍亦答餘六問也謂於初一行偈答第一菩提心生問又答第三菩提心續生問又答第四心相問及第五時項問又答第六功德聚問及第八凡夫異熟心問也於次一行二句偈中答第二菩提心相貌問及第六功德聚問又答第九瑜伽行者殊異心問亦兼答前第三菩提心續生問也於後二句偈中答前第七問及彼修行問兼答瑜伽行者殊異心問也問此義意如何答依斷惑必用智德故智德顯是即菩提心生義也斷惑人必知惑相貌以是第八所問凡夫異熟心義也彼問即被答此越百六十心處也超三重妄執百六十心是依智品麁細故依之建立十住心續生相也故此偈中被答此第三次第續生問也又約超此百六十心而建立三踰祇劫分齋也故於此一偈中即被答彼第五所經時項問也約超此三妄執之功德智用義故被答彼第六功德聚問也就次一行半偈雖顯答第二菩提心生相貌問兼密被答第三次第續生問又被答第六功德聚問又被答第九瑜伽者殊異心問也此義所以者何示此淨菩提心之本性無量功德成就者此豈不答功德聚義耶又此無量智成就正等覺顯現者此豈不答十住心續生義中他緣大乘已上五種住心義耶又此二句義不答瑜伽者殊異心耶後二句是合答前第七及彼行修行問也謂於瑜伽中三平等行及相應方便供養行而顯雖答彼第七問密被答第九瑜伽者之殊異心問也問何故於佛答三行偈強答盡上九問義成立耶答佛説法一言含無邊義理一念説盡恆沙教法故此三行偈何於不答盡金剛手菩薩之九種請問耶故依此道理此於三行偈建立九問之答其義勢有此處也學者可察之也疏云何即知至淨菩提心者此據金剛手問辭顯佛答也是釋越百六十心句也意云淨除百六十心垢即是初發生淨菩提心云也此發菩提心人當十住中初發心住人也此初發心住菩薩所離百六十心或是若準摩訶衍論第四意是煩惱障也故論云以有境界緣故復生六種相一者智相依於境界心起分別愛與不愛故二者相續相依於智故生其苦樂覺心起念相應不斷故三者執取相依相續緣念境界住持苦樂心起著故四者計名字相依於妄執分別假名言相故五者起業相依於名字尋名取著造種種業故六者業繫苦相以依業受果不自在故此六相中第一二相即是法執第二二相即是人執第三二相即是業因果報別相復次初二地上所斷中二三賢所斷後二十信所離云云故知初發心住菩薩所斷百六十惑是我執相應執取計名字相兩惑也若依三論宗天台等意者十住已上位斷無明及法執所知障也云云疏有人問云至醍醐生也者此喻在涅槃經第二十七文也意云譬如乳酪等四味之麁濁中終有醍醐性漸次淨除其麁濁成精極清淨時是此醍醐也發此淨菩提心亦爾也終得醍醐義屬佛果也但漸漸百六十妄執除去而將顯本性清淨本覺真心時名為淨菩提心生云也疏行者最初至佛樹牙生者是合喻意也文開發金剛寶藏等者是於此淨菩提心門中初時將開發自分中種因海佛性云也謂一切有情心藏如來藏佛性是也或亦通法佛法然佛性也就初義初開發人是當十住中初發心住人也此金剛寶藏義上所引涅槃經第七所云貧人之依善知識教誘而開發宅中金剛寶藏義也依此義故動為金剛寶藏言也文見是心性如淨虛空等者是釋淨菩提心之性淨義喻也此義如上三句菩提心中具釋畢也又文離因業生等義如上具釋畢此釋文是釋前所云知彼菩提生句意也是依初發心住菩薩所發菩提心功所離執取計名字起業相業繫苦相是也文佛樹牙生者釋知彼菩提生句也是指果分性德圓滿海佛之牙漸漸發生云也何以故此淨菩提心門是因分也波法佛是果分故也此中佛樹牙生者有二解一者謂此淨菩提心即名為佛樹之牙生義謂佛樹者是果海佛也牙者直此淨菩提心是也此淨菩提心是因分故也故十住心論第九云等空之心於是始起寂滅之果果還為因是望前顯教極果於後祕心初心云云二者如十住心論第九云三藏又云極無自性心生此心望前二劫由如蓮華盛敷若望後二心即是果復成種故經曰如是初心佛説成佛因前二劫者指他緣一道二種住心後二心者示真言門根究竟二心云云已上論文今私云依此解意者此第二義意云佛樹之牙生者是真言門中大悲為根義是也所謂此經所云供養行修行從是初發心者即是意也疏此牙生時至枝葉花果者是釋生廣大功德句也此菩提具自證化他功德廣大故云遍法界之枝葉花果也疏以過心行至説其過惡者是釋其性常堅固句也此淨菩提心其深義理是用因明門立破方便而不可破壞之云也此義如密嚴經云密嚴微妙土是阿若悉檀非諸因明者所量之境界云云疏若知自心至菩提生也者是結釋第四句也已上是答第一問之結文也問前釋菩提心生問之處云此菩提心生義是前三句中第一句義是即發淨信心云云然何今答此第一菩提心生問之處中即此菩提心相是説行菩提心位地耶答前問中所云是直約十信位相明發菩提心生故於此所云發菩提心是十住中初發心住也彼上文取初修業位此取後成就位前舉初括終今舉終攝初義也又初發心住通發心修行二義也故不相違也疏次有一偈至如虛空者此釋次答第二菩提心生相貌問之一行半偈意也此中菩提心生義是當起從第二住後九住及十行十回向十地菩薩行義亦種因海果佛於此中菩提心生相貌義中取虛空喻意也疏譬虛空至非適今也者是釋彼小分相似義也此喻有四種義別也一者無染著喻謂不為煙雲等者是也二者自性常住喻謂其性常住者是也三者不動搖喻謂假使八方大風乃至不能令其動者是也四者常寂無相喻謂自本初乃至非適今也者是也疏心相亦爾者是總合也疏從無始以至永寂無相者是別合也文從無始以來自本不生者是合第二自性常住喻也謂此真如本覺法是從本以來不生不滅理故也文無有一法能令染汚動搖者是如次合第一無染喻第三不動搖喻也謂此真如本覺之具足無染無動德所以是依此真心本來無生無滅義故云也文常住不變永寂無相者合第四常寂無相喻也亦解此文是返釋上所云本自不生句也謂此不生義者是顯其體常住不變云也何以故此真心性是永遠離生住異滅及諸色心心所等衆相故云也疏不染汚常住至本來寂無相者是結釋意令歸頌本文也此三句偈是如次明本覺真心之備性淨常住德寂靜安隱德義也次文無量知見自然開發等者是明行者之始覺菩提智之證會如虛空廣大一切種智等無邊功德海義也疏爾時行人至如蓮華敷者是就第二答釋第五句意也意云此行者所顯得始覺菩提心是為本覺寂光智則所被照觸而始覺無量智德顯現成就云也是本覺心即能引成始覺義也寂光者是大日尊之本覺智義也疏即毗盧至心佛現前故者是釋第六句意也謂始覺自心大日尊即顯現成就行者觀心中云也此始覺種因海佛果滿義也疏佛已略説如是心實相印者是結上所明發菩提心及行菩提心之始覺成就智之所依境界也即本覺菩提心自性不共德相也疏若行者與至堅固信力者此所明能發菩提心堅固信力者是從真言門供養行中發得之云也謂與此相應者於此淨菩提心門本覺心之能相應始覺智用也力者或是智之根義也智根是智力所為用故也又解堅固信力者是若到得菩提心門相應時必有信力故到後祕密法然果分法身云也疏然此信力至淨菩提心者是釋末後二句答偈也若得此淨菩提心門中堅固不退信解相事必依止修行真言門三密供養行者法則而定自然得到此淨菩提心門之滿位云也指此位云真言門初發心住云也故經偈云供養行修行從是初發心者意云從修習此真言門三密供養行法中即得到淨菩提心中初發住等位云也是者指三密行者法也依此義故菩提心論云復修瑜伽勝上法能從凡入佛位者亦超十地菩薩境界又深知一切法無自性前以相説今以旨陳夫迷途之法從妄想生乃至展轉無量無邊煩惱輪回六趣若覺悟已妄想止除種種法滅故無自性又云當知一切法空已悟法本無生心體自如不見心身住於寂滅平等究竟真實之智令無退失妄心若起知而勿隨妄若息時心源空寂萬德斯具妙用無窮云云意云是依真言門行而修得此無相勝義菩提心云也又解此信力者是若信三密法事者慚悟菩薩若遇此三密教信受修行此法所由是必依淨菩提心門之發心住等云也依此解意者此供養行之修行之所因是從彼淨菩提心門初發住而發生之云也初解是約頓悟人先悟三密法故即時得到淨菩提心門初發心住等云也後解是依慚悟菩薩先發淨菩提心門菩提心乃至因分究竟位方始發真言門菩提心義云也上來三行偈是顯然略雖答三種問而實密亦答餘六種問也分明答上指問義有此住心品下文及下諸品中也疏或有人至行菩薩道者是出單顯教學者之堅執諸法無性空理而謂作究竟解而破難此三密修行法意也疏此説非也者是疏主總破前所難之辭也疏如以四種至無由可得者此立比喻之道理以而破前所難也其意顯了也疏行人亦復至淨菩提心者約合喻而破前難也疏龍樹阿闍梨至墮在失處者是明引論所明緣起似有義即空義即中義而助成三平等方便供養行之消融百六十心垢之功德能也文而汝謂龜毛兔角為無生是故墮在失處者是示迷執人之所堅執偏空理是執般若經中所明遍計所執皆空義門而未知依他似有即空義故墮此偏空見云也疏又如世人至不能得耳者前文破外人邪難也此文是約比喻而成自義道理也此喻意顯了也疏淨菩提心至不思議業者是約合法而成自所立義也謂真言門三密行供養方便妙術之直洗除諸心垢到淨菩提門而終升入三平等果海云也故不應至為極果也者此有二解一者結破前難也謂前人執大乘初入門之所執空義謂究竟義成此難故偏破人所計也二者此文是總結遣諸大乘者之執自分佛果而謂究竟成佛人之迷執種類出是也
