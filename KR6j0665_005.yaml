body:
  text: 大日經住心品私記第六上來依金剛手之請問而佛許説故即金剛手印可領受之已訖疏經云佛告至名為究竟者自下對金剛手之請問三句法而如來略答彼三句問也就此文中有二初牒經後約喻而釋三句大意也因緣果之三喻易知也疏然以中智至因果義成者正以觀中道正理之智而成此三句之因緣果法也是為真實不虛妄相之正因緣云也若法偏常住實有性者不成因果義也是可墮常見邊亦若是法偏空無虛偽義者不成因果義也所謂如幻事夢境兔角等是也此即可墮斷邊也故密嚴經第三云此性非是有亦復非是空如人以諸物擊破於瓶等物體若是空即無能所破云云問以中智觀之者何物耶答可有二意一者安阿闍梨菩提心義第一云問涅槃經云下智觀故得聲聞菩提中智觀故得緣覺菩提上智觀故得菩薩菩提上上智觀故得佛菩提云云天台以為四教證文下中智觀二乘非上根上智何入真言門上智觀即菩提心論上根上智應是天台別教菩薩上上智觀圓教菩薩應勝真言菩薩答涅槃經四乘根性約四教中以明四種望今真言前三為下圓人為中真言為上故不違也文若準此義者此疏中智觀是當彼圓教所説觀勝義菩提之智也二者復義中智觀者是直觀中道理之能觀智慧之目也疏若法不然者至不成也者如上所説因緣所成法若不有假有性空道理者是非真實義道理也是戲論言辭也則是成不因果牙相成義故即失中道理也此義如中論頌曰因緣所生法我説即是空亦為是假名亦是中道義云云疏今行者至得深信力者下合喻也是明菩提心為因相也出過一切戲論等者此所觀離一異等四句有無等四句斷常等四句也凡背百非不當千是云也文如淨虛空者虛空離戲論四句義如上記也文於內證所行得深信力於佛內所證正體智之所行境等者如法界而得深固信力云也是此釋菩提心為因意也於此意但取十信位又釋文云於內證所行得深信力者是亦信法佛所證三密境界云也疏薩婆若心堅固不動者辨菩提心為因句之勝因也是依前信心力故於佛果之惠根增長堅固用義也薩婆若是佛果一切種智之稱也是即信心之遂所究竟果也此智根之堅固不動義猶如大樹根深入地底無傾動也若此廣明信與根二義相如釋大衍論第一云復次信謂十信根謂從發心住乃至法雲地所以者何初信無根隨緣進退不定故後信轉勝堅固不動故信有十種一者澄淨義能令心性清淨明白故二者決定義能令心性淳至堅固故三者歡喜義能令斷除諸憂惱故四者無厭義能令斷除懈怠心故五者隨喜義於他勝行發起同心故六者尊重義於諸有德不輕賤故七隨順義隨所見聞不違逆故八者讃嘆義隨彼勝行至心稱嘆故九者不壞義專在一心不忘失故十者愛樂義能令成熟慈悲心故根有十種義一者下轉義能除憍慢故二者隱密義能詮甚深理故三者出生義生長種種諸功德故四者堅固義皆悉攝持不闕失故五者相續義轉轉增長無斷絶故六者出離義地地轉勝漸漸遠離故七者集成義修集諸道品故八者茂榮義以諸行德而所莊嚴甚可愛樂故九者具足義等覺位中圓滿因行故十者高勝義於妙覺果最勝廣大無能超過故云云疏離業受生者至從此增長者此明方便滿足位之斷惑證理德離業受生者法佛果位遠離分段變易二生死云也成就真性生者成滿法性常身無為疑然五蘊云也若是種因海佛果者始覺無相菩提心生云也萬行功德從此增長者大悲為根與方便究竟二種法皆從初菩提心發生云也疏故曰菩提心為因也者結也於此所云菩提心者始覺之十信也是始覺之初相分位故名發菩提心也疏此菩提心至名為果者此明初菩提心為因為果義也謂此發菩提心是為三賢十地及佛果為因義有也但為生死法之順世心以此違世淨信心而可為其果報故是即果義有也疏以覩佛法前相故者此約法結前因義也疏譬如有人至殊勝加行者下約喻明菩提心之發生大悲為根行義也疏此文略故引涅槃經所説義也具義有涅槃經第七云佛言善男子我者即是如來藏義一切衆生悉有佛性即是義從本以來常為無量煩惱所覆是故衆生不能得見善男子如貧女人舍內多有真金藏家人大小無有知者時有異人善知方便語貧女人我今雇汝汝可為我藝除草穢女即答我不能也汝若能示我子金藏然復乃當速為汝作是復言我知方便能示汝子女人答云我家大小尚自不知況汝能知是人復言我今審能女人答言我亦欲見并可示我是人即於其家堀出真金之藏女人見己心生歡喜生奇特想宗仰是人善男子衆生佛性亦復如是一切衆生不能得見如彼寶藏貧人不知我今普示一切衆生所有佛性為諸煩惱之所覆蔽如貧人有真金藏不能得見云云文堪能發起殊勝加行者是明以初發菩提心為因而生長大悲句義也疏故菩提心至信心義也者謂依上成立道理定應知此中於佛法最初發淨信心厭離生死苦樂求涅槃樂想名為菩提心云也文白淨信心義也者明信心之自相及所為作用也信心是自淨也亦令餘心心所法皆遂成清淨無漏法用故也疏釋論亦云至堅牢增長者引論文證而兼釋成此菩提心句是以信心即為其義意而歎信心功能殊勝用也此文有二初引文證後釋成文之意也釋意云佛法甚深難解故先發信心後漸漸修學遂得解悟故最初歎信心功也始入一切佛法者明決定依止信心可成就深行果義也餘行是不決定用故是勝獨歎信德也法花譬喻品云汝舍利弗尚於此經以信得入況餘聲聞其餘聲聞信佛語故隨順經非己智分云云新譯仁王經歎信心云若得信心必不退進入無生初地道化利自他悉平等是名菩薩初發心云云疏經中次説至不傾授也者下牒經文而釋第二大悲為根句意也金剛手問云如是智惠云何為根也問意云何菩提心為因是以何物為根本問也佛答中云悲為根也意云大慈悲心為菩提心因之根本云也大悲心是結大智根故此大智根堅固深入理中故此大悲心不可傾動云也故返以大悲而與佛果方便滿足句為根本云也問若爾者直以惠可云為根何以悲為根云耶答菩薩行是被引催大悲心而勤修諸萬行故以大悲心與大菩提果而為根云也故普賢十願云諸佛如來以大悲心而為體故因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺云云是方當大悲為根義也問根是三賢十地所有惠根也以此根望彼佛地之果實時是尚如彼娑羅樹王之根也佛是如此樹之果實義也然何此惠根説為大悲耶答悲是惠之利他德也根是惠之自行用德也舉此二行為諸行之上首而執持餘諸萬行故名根也而又是以利他行兼能助成自利行而遂成佛故悲名為根也如法花經云普為諸衆生勤求於大法亦不為己身及以五欲樂故為大國王勤求獲此法遂致得成佛今故為汝説云云又新譯四十華嚴第四十云若於衆生尊重承事則為尊重承事如來若令衆生生歡喜者則令一切如來歡喜何以故諸佛如來以大悲心而為體故因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺譬如曠野沙磧之中有大樹王若根得水枝葉華果悉皆繁茂生死曠野菩提樹王亦復如是一切衆生而為樹根諸佛菩薩而花果以大悲水饒益衆生則能成就諸佛菩薩智惠華果何以故若諸菩薩以大悲水饒益衆生則能成就阿耨多羅三藐三菩提故是故菩提屬於衆生若無衆生一切菩薩終不能成無上正覺善男子汝於此義應如是解文此等文意以利他行為因緣返則而成自利果義也況以自行德為化他成緣義耶大悲是智之化用也根者是智之自用也故二用相雙云大悲為根也此義如寶師涅槃經疏云諸大慈大悲大喜大捨總以智為體又説以定惠為體云云疏梵音謂至明大慈也者尋梵語大悲之義包掩大慈義也悲是拔苦用邊慈是與樂用邊也文迦是若義乃至藝除草穢故者是文是約喻明義也若約法言之者佛於諸衆生直欲與樂而若誤有受苦衆生先拔其苦而與樂云也又與樂因遮苦故慈悲必相雙義也疏且如行者至皆得成就者是約三密行釋大悲為根義也是以此三密供養方便行小功力故作廣大拔苦與樂功能用是大悲行所攝也文即以遍一切處淨菩提心興供養雲普作佛事等者是即普賢行願菩提心也一切真言行者以普賢行願菩提心為其軌則故也上疏文云普是遍一切處義賢是最妙善義謂菩提心所起願行及身口意悉皆平等遍一切處純一妙善備具衆德故云云是即此大悲為根菩提心是也故行者住此大悲為根之菩提心而作事理供養行而可成滿自利利他行果云也此二利勝行之自性則依止三種因緣和合力而得成就也謂一行者自修行力二佛加被助成力三佛性真如之如來藏內所有恆沙萬德法爾具足力故也若隨一闕時二利功能不成辨云也疏則是普至悉生根也者是重明依為上三力故所攝受故大悲之智根則成二利行究竟圓滿功德也疏隨行者至不障礙故者是明智惠自體是則為大悲之用方所被助成增長義云也以無住心者是無染著智惠心也此心是依大悲心故不住涅槃理也依大智用故不住生死海也故曰無住心也是真俗不二智之目也所修萬行者以智為上首其餘諸四攝四無量五度等勝行是也是等行皆為大悲心被攝受云也此大悲有五種勝用即喻五大能造所造諸色作用也謂是大悲之有執持萬行功德之用即喻地大之持四重擔義也疏大悲火界所溫育故者第二明以大悲之暖氣生長修得無漏智明道火故也疏大悲水界至所滋潤故者第三明由大悲心之能滋潤本有性德佛性種而生長修得佛果功德義也疏大悲風界所開發生故者明由大悲心之能開發本有性德佛性而令成就修得佛果故也疏大悲虛空不障礙故者示此大悲心即含容攝受一切衆生而勸進善根成不障礙之增上緣故也疏爾時無量至因緣之義也者總結上五種喻因義而示為方便滿足句之親因緣意也文於一切心法者是當佛地一切心法智功德也佛果是得十佛剎微塵數一切種智故云一切心法也此中因緣者直指第二大悲句而為佛果之因緣云也是了因也不生因也佛果非無常法故不待生因云也疏方便為究竟至三密之源也者是釋第三句之義也金剛手之問中云如是智惠云何究竟云云今佛答中云方便為究竟云云今案之義是可云方便滿足為究竟果也釋方便目者方便者方是軌義便是善巧義也方有二種一正直義是無邪曲義二方術義謂是方法義如醫方祕術即是意也又便者宜要義也亦是巧便義巧妙義也初義意云離邪曲咎而稱正理德之軌則即説名方此方法即是宜要故名為便云也是持業因也後義所學有軌為方隨宜便而巧修進名曰便也是如妙醫王隨病相而投方藥之方術巧便也凡方便有二種一自行方便二化他方便也自行方便是進趣義謂隨自執病而能修其對治道即趣進果位即是善巧進趣故也化他方便是權巧義謂能知他病隨其病相而妙投藥皆有權巧密術故也是如良醫隨病不同而讃毀藥不定是即權巧方便也佛即於一法或時讃之或時毀之是各各為人悉檀及對治悉檀意也是權巧方便也今此中方便究竟者此自行化他方便究竟圓滿説為佛果位一切種智滿足義此巧妙及進修義俱得也故祕藏記云方便為究竟是即真言行者用心也從凡位修行六度圓滿成佛故曰以方便究竟成佛以後以大悲濟度衆生故曰方便為究竟向上向下讀文有畢云云疏萬行圓極無可復增者是自行方便究竟義也疏應物之權究竟盡能事者是化他方便用滿足義也即醍醐妙果者是自行化他方便滿足義五味中醍醐味是果也謂於雜𥁊乳中有巧方便功而漸轉增得酪生蘇熟蘇後究竟增進而得醍醐復無可增勝物故云醍醐妙果也上來約淺略趣釋三句義也疏又淨菩提心至以授人也者此釋是約深祕意明三句義也第一句直性得本有菩提心體為淨菩提心也故祕藏記云又觀我今觀斯心所得淨菩提心已離造作法本來宛然而有本因是我物今更非求而可得者云云又菩提心論云應住法爾普賢大菩提心者即此義也問約菩提心句何前淺略趣釋中以最初發菩提心之中淨信心而為菩提心句約後深祕趣釋中者以本有性得菩提心為第一菩提心句義耶答此疏前後文説互影略説之義也理實者前後文處互皆應有攝説此性得本有菩提心與修得初發信心之菩提心義也故應知三句中第一菩提心句攝説性得菩提心與修得之發菩提心也問何以故知爾耶答此三種菩提心相攝兼合而應説故此彼兩種含之中合説也菩提心論云阿字具五義一者阿字是菩提心開者開佛知見即雙開菩提如初阿字是菩提心義也云云此義意云何開佛知見者此性得菩提心也即雙開菩提者此修得之發菩提心是也性得菩提心與修得之最初發菩提心處相攝合説之也其所以何者性得菩提心與修得最初發菩提心其相甚鄰近故也謂其最初發信心菩提心者是未斷一分惑染而尚有深染在纒位故以此攝性得之菩提心也譬如雖晦夜月有一分微小明相而尚攝無光分也此亦爾也所以前後文處以性得菩提心修得菩提心合攝互各各皆可説之云也此大悲句所攝者是即真言門菩薩初發信心及三賢十地始覺功德也方便滿足者是佛果圓滿始覺也文規製中權出過衆伎故者規者是模義製是作義巧習作密術伎藝而製作之規則中此人殊勝餘人也此大悲句所攝也意云此教菩薩習佛果諸伎藝而巧便能勝餘教菩薩三賢十地所得伎藝也權是巧義也習此三密軌則巧妙顯得法佛本有巧德云也亦是權義是方便意也亦是假義也若假義者假捨劣義而立勝義故是觀待假也疏其得意之妙難以授人也者是表三密意也此三密教輕於非機人不可教授也能鑒機待乃可傳授耳是諸佛己心中所證境界故也疏如摩訶般若至大悲句中者約此祕釋意般若經中所明十八空等是為遣行者執著能令顯現本覺功德故從諸佛大悲心善巧方便門而所攝出之能對治藥也故大悲句所攝猶如真金欲使磨時先以火燒盡其塵垢而顯真金性也此亦如是以十八空藥遣有所得執而顯本覺佛果云也故密嚴經云一切諸衆生生於種種見欲令斷諸見為説於空理聞空執為實不能斷諸見此見不可除如病醫所捨譬如火燒木木盡火不留見木若已燒空火亦應滅生於智惠火諸見得滅時普燒諸煩惱一切皆清淨牟尼以此智密嚴而解脫云云十八空義如大般若經初分第三及三百八十卷等智論三十二辨中邊論上卷説疏即彼萬行至説名方便者是明第三句之方便義也謂大悲所攝持萬行之所成方便也一切智智果是所成方便義也謂善巧修因所引成善巧果故果説為所成方便云也是自行方便也疏由內具方至即是利他者是明化他方便之所從來義也謂以自行實而為化他權巧之因緣云也自行方便是自體也化他方便是自行作用云也疏以梵音至以為名也者是明大悲與方便互為因果義也謂依前第二句大悲為因而成方便果亦以此方便果而為利他起大悲心施作利生事業返以前方便果為利他因緣云也上來三句菩提心總標已畢自下別釋淨菩提心門之菩提心義也是觀行者所緣慮境界真如實相本覺菩提心性也問三句中菩提心句菩提心與淨菩提心門之菩提心其差別如何答是有相通義也意云準上文三句中初菩提心句是初發淨信菩提心也淨提心門之菩提心是凡廣通種因海中因果理智法門也又義凡以顯教所説種因海中因果法法皆通為菩提心句以三摩地門中三平等供養方便行而為大悲為根句以三摩地門中性海果分佛為方便為究竟句也從此下所明多分以淨菩提心門中始覺菩提心義而為第一句又若準此疏下第二卷云若通論信解地則是初地菩薩菩提心為因從二地以去增修大悲萬行乃至漸次增長至第八地以去皆名方便地云云又大日經疏云十卷本又將阿字配法花經中開示悟入四字也開者開佛知見即雙開菩提如初阿字即是菩提心義也云云今私案此文初開佛知見者是指本覺性得菩提心理也次即雙開菩提者方是明修得中最初發菩提心也故應知此菩提心為因者理實可通性得菩提心及修得發菩提心也而經及疏中或互作遍遍説或説具足義也又抄記以四隅四菩薩配菩提心為因大悲為根方便為究竟義其文云普賢者是菩提心也若無此妙因終不能至無上大果故最初得名次文殊師利者是大智惠也先發淨菩提心普賢觀經次第乃至毗盧遮那遍一切處常樂我淨波羅蜜等之所成皆是淨菩提心也文私云此文是性德本覺菩提心與修得發菩提心一合總説菩提心為因句意也疏經云祕密主至寶所也者牒經文釋其意也云何菩提者徴問也謂如實知自心者答也已上經文即是開示等者釋上知自心句也此如來功德寶所在處者一切衆生自心處是也此處疏文句省略義難解故引餘處經論文可成其意也釋摩訶衍論第五云一切衆生悉有本覺如是本覺唯是一體遍諸衆生一一衆生各有別覺一切衆生唯有一覺無別覺故云云問此義本覺意如何答同論第三云謂心體離念相者即是清淨本覺心謂即是自性清淨心體謂即是本有法身體如是心體即名本覺離念相者即是顯示清淨之義所謂遠離大無明念故言離念遠離四種無常之相故言離相過於恆河沙煩惱眷屬此五有為以為根本是故舉無示眷屬皆空離念相者即唱清淨本覺人辭者即人故等虛空界無所不遍者如是覺者善證具足十種德義虛空理故法界一相者如是覺者於所證之真如法界而共和合一味一相無差別故即是如來平等法身者善證二種勝妙之理清淨覺者即是法身如來自性自體故依此法身説名本覺者本有法身自性德中而作歸依建立清淨本覺稱故云云疏如人雖聞至由進趣故者是約喻明菩提心之所在處也是前所云貧女寶藏喻是也其寶藏所在處是若約法即一切衆生自心是也一切衆生自心者衆生煩惱業果所熏隨染本覺真如心是也具向下可記也疏復指言至何處得耶者是牒上所明此疏意義而問其菩提心所在處也上疏文引智論讃信心文畢次後即有此文也即其文云佛意如是我第一甚深等云云疏即是行者自心耳者是答也問其行者之本覺自心何故名心耶答釋大衍論第四云本地契經中作如是説大末那識具十二轉者所依本覺以為一故相識兩字何差別有二義一者神解義二者暗鈍義神解義者據從本覺流轉邊故暗鈍義者據從無明流轉邊故依初門故建立識名依後門故建立相名二門差別應如是知何故如是所言識者解了義故順於本覺所言相者背本義故順於無明是故常住佛性契經中作如是説以何得知一切衆生悉有佛性答曰一切衆生皆有心識故當知有佛性何故佛名覺者能善照達一切法故衆生身中有此覺者故是故一切衆生得有了別識身故云云疏若能如實至不從他得者是明始覺成佛義也同論第三云次説離性二覺始覺義者依本覺故而有不覺依不覺故説有始覺者通示二種離性本始謂依本覺故而有不覺者即是離性本覺依不覺故説有始覺者即是離性始覺此義云何本覺般若不守性故善受染熏彼諸染法令得住止即是本覺離性之義始覺般若不守性故依諸染法如今方起被彼染誑即是始覺離性之義始覺般若能斷諸障證諸功德何故説言始覺之智被誑染耶私云是問也於無過法立諸過患斷障故於無得法立諸功德證得理故私云已上答也若爾始覺於何時中而得離妄極解脫道時方得究竟離於彼時中到無念故云云又本論云如菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性心即常住名究竟覺是故修多羅説若有衆生能觀無念者即為向佛智故又心起者無有初相可知而言知初相者即為無念是故一切衆生不名為覺以從本來念念相續未曾離念故説無始無明若得無念者則知心相生住異滅以無念等故而實無有始覺之異以四相俱時而有皆無自立本來平等同一覺故云云釋論第三釋此本論文云第四位言如菩薩地盡者即是趣向行者此字句中自有二人云何為二一者因圓滿者二者果圓滿者因圓滿者學地盡故果圓滿者無學之果圓滿圓滿究竟故初人對治俱合動相後人對治獨力業相及大無明獨力隨相非斷法故無對治道自此已下顯示二種圓滿者焉滿足方便一念相應者是即顯示因圓滿者謂此位中即有二種金剛喻定云何為二一者方便金剛二者正體金剛無垢行者二種金剛喻三摩提以為自體是故舉道而標彼人覺心初起心無初相者即是顯示果圓滿者大圓鏡智分明現前無所不通遍無所不窮法界一體無有與等獨力業相根本無明不能自有平等虛空一相無相無初念故以遠離微細念故得見心性心即常住名究竟覺者即是顯示始覺般若圓滿之相而得到於無生覺故是故修多羅説若有衆生能觀無念者即為向佛地故者即是引經贊自所説如是經文為證何義證佛果故云何證耶謂佛果中證成遠離二種念故云何為二一者大無明念二者細業相念如是二念極解脫道一時相翻不能俱行是故説言佛果無念若無妄念當有何念謂正念故云何名為正念十德相應故云何為十一者出離功德遠離一切難處故二者同體功德一切染法歸於自故三者常住功德遠離始有之過失故四者一味功德圓滿始覺常本覺故五者俱離功德遠離一切染淨法故六者還轉功德周遍誕生於諸趣故七者無住功德於一切處無在處故八者修行功德為諸衆生修萬行故九者圓滿功德為諸衆生成覺道故十者虛空功德如前所説種種功德從本已來自性空無無所有故是名為十如是十德與極解脫初剎那中俱行俱起無有前後一時俱轉是名正念所引經文不出此義又心起者無有初相可知而言知初相者即謂無念者即是除疑令生勝解謂有衆生作如是疑極解脫道會本覺時微細初生知得有耶知得無耶若知有者極解脫道當非無念所以者何知有初念故若知無者極解脫道當不能有所以者何既無初念待何念無立解脫有如是疑故今自通言所知之相從本已來自性空無能知之智從本已來無有起時既無所覺之相亦無能覺之智豈可得言有細初相智惠可知而言説知初相者即是顯示無念道理所以者何法性之理雖無所知之初起之相亦無能知之始覺智而能通達無所知相無能知智無所有覺都非空無是故今且依此道理作如是説知初相耳是故一切衆生不名為覺以從本來念相續未曾離念故説無始無明者即是成立上無念義謂金剛還一切衆生獨力業相大無明念未出離故即是顯示一切衆生皆是有念名為衆生一切諸佛皆得無念名為佛故云云以此論文而準知此疏所明種因海佛成始覺義也上來約竪義明淺略趣之菩提心義也若據深祕趣之橫義此經所説如實知自心者亦是含攝祕密莊嚴心之菩提心意也故十住心論云經云云何菩提謂如實知自心此是一句含無量義竪顯十重之淺深橫示塵數之廣多文是文正明深祕趣祕密莊嚴心之中淨菩提心義也又慈氏儀軌云觀遏字變成法界塔在於圓明中又轉變塔成慈氏本尊身即此尊身即是愈𭔈者身是故三密轉成三身故以心置心以心觀心如實知自心即是母地心初發心時便成正覺此心發時便成普現色身三昧耶身如是住心安布字輪輪轉字輪了了分明云云私云是文是如實如自心名為菩提心義之深祕釋之究竟證文耳又真言二字義記云問其如實知自心如何耶答阿字本不生故知自心本不生謂之知自心也問阿字本不生故何云如實知自心答指阿字本不生之理云實此本不生理為自心性故也問本不生者心性都無故云本不生歟為當雖有心性而無變易故云本不生歟答非謂心性都無自性清淨無欲性故云本不生如虛空性非有非無此心亦復如是不生不滅自性如故云本不生也文私云是名為祕密趣中如實知自心義也疏其實不由他悟不從他得者此明性德本覺之自然本有義也故同論第五云清淨本覺從無始來不觀修行非得他力性德圓滿本智具足云云又大師所造金剛頂經略記云實知實相者三自門實知實相一心門實知實相性德圓圓海實知實相各各重重差別今所言實知實相不二門實知實相是然通攝二門實知實相言實知者能達智實相者所達境又實知是心實相者是身密云云疏問曰若即至不得成佛者是伏難也此問意云如上云一切衆生從本已來本覺具足不待修行不依他力性德圓滿本智具足者何現見諸衆生沈沒生死海中耶誥難也又義如上所引云常住佛性經説一切衆生皆有心識故當知有佛性何以故佛名覺者能善照達一切法故衆生身中有此覺者故是一切衆生得有了別識身故云云若於諸衆生有如是本覺佛性何故現今不成佛耶難詰也疏答曰以不至愚童凡夫者答也此答意云一切凡夫依不覺了諸法本不生本覺菩提心理故則諸衆生沈淪分段生死中也此沈淪分段生死者名曰愚童凡夫也疏若聞是法至未如實知者是舉二乘者一分始覺德而兼顯彼人偏覺之失也謂凡二乘人於二空真如平等理中才雖得解一分人空理猶滯礙法空義故名未如實知也又義是即舉不愚法三乘共教所被之中二乘人也此人信解大乘教故謂舍利弗須菩提等諸大聲聞是依聞般若經等雖信解遍計所執空門法空理其情未知一切衆生本覺本來成佛義故猶可名未如實知也疏若實自知至便成正覺者是對前未如實知者失今明如實知者德也此文是華嚴經讃初住菩薩功德文也其具文云初發心時便成正覺了達諸法真實之性具足惠身不由他悟云云具義如上記也疏譬如長者至作賤人耶者是約喻明行者自心即佛性義也法花信解品有此文也喻意云長者從本已來自了知彼窮子是我真實了然窮子從初未知我是彼長者之子故自作容作賤人想云也復遂依長者告而使知我是彼長者之真子即今繼其家業也以此義即比合佛令知一切衆生身中有佛性遂令成佛義也疏爾時行者至如菩提相故者是示此隨分始覺者之覺了諸法本來不生理故則了知於有為諸法事相之自性皆悉非有非無不生不滅中道巧妙理云也畢竟如菩提相者了達此諸有為諸法即相假有真空性猶如本覺菩提性之衆相寂滅湛然常住云也疏經復云至以為喻者牒經本而釋其意也謂為欲顯示菩提極無相義故明小分相猶無義何況多分相有耶云也問於色法中極微為最極小色也然則可云菩提相是極微許尚無也然何以七微為小分而於菩提無相比無此小分許云耶答極微執實色是小乘薩婆多等義也大乘是説極微假色故今實為欲顯示菩提無相義故不取假色極微而舉實色七微合義也以七極微和合為七微合歟問大乘極微假色云意如何答成唯識第二云為執麁色有實體者佛説極微令其除拆非謂諸色實有極微諸瑜伽師以假想惠於麁色相漸次除拆至不可拆假説極微雖此極微猶有方分而不可拆若更拆之便似空觀不名為色故説極微是色邊際云云疏言彼法至無一法也者是示妄情所計遍計所執法都無云意也依他法是無相菩提之所攝也依他諸法即相無性理故也是妙有與真空即一無二義也無相菩提之外所執法畢竟都無故也疏經中次説至無相菩提心者牒經而釋此意也經何以故者徴問也經虛空相是菩提者是標答也意云借彼虛空無相之相即是欲顯示此本覺菩提無相相云也經無知解者無開曉者者謂於虛空無能曉能知人也故涅槃經第三十五云世間虛空雖以無量善巧方便不可得見云云於菩提心亦爾也實無知見菩提心人也此義意云如上所引釋論第三云又心起者無有初相可知而言知初相者即謂無念念即此義意也經何以故者徴問也徴意云何以故云虛空相是與菩提相類耶云也經答云菩提無相故云云此答意云此菩提無相義故是即與虛空無相義相類云也故云菩提無相故也疏譬如虛空至無相菩提心者是釋經虛空相即是菩提句意也此喻中有七種義別也一者遍一切處義是虛空遍在一切處故而無不到處故也以此喻即合本覺菩提心遍在一切有為無為諸法義二者畢竟淨故者是虛空是非塵垢性故無染汚一切色法義也又一切塵垢猶不能染汚虛空也以此喻即合本覺菩提心自性不染而離煩惱雜染熏習遂成始覺淨果義也虛空又不染汚於諸法也三者離一切相者虛空遠離諸色心心所等相也此合喻意云真如本覺菩提心是遠離一切有為諸相而寂滅無相義四無動義虛空無動轉往來義是凝然常住義也真如本覺菩提心亦有此凝然常住義也五者無分別者虛空是無心心所之分別緣慮用云也真如本覺亦爾也起信論解釋分云若心有起更現前法可念者則有所少如是淨法無量功德即是一心更無所念云云又釋論第六其文云所謂若一心法有動轉相更見前境有所緣者能見之心所見境二差別故本覺功德則不圓滿云云六者不可變易者於此虛空顯示無剎那四相無常義也本覺菩提心亦遠離剎那無常故也七者不可破壞者於是虛空顯示無一期無常義也本覺菩提亦遠離生老病死一期無常相故也疏然是中復至所能遍喻者從此下是明菩提心之即不共於虛空相之德也雖菩提心不共於虛空義甚多且出一兩義涅槃經三十五云衆生佛性非有非無所以者何佛性雖有非如虛空何以故世間虛空雖以無量善巧方便不可見佛性可見故雖有非如虛空云云又第三十七云虛空無故非是過去未來現在亦如兔角是無物故非是過去未來現在是故我説佛性常故非三世攝虛空無故非三世攝云云又同經第五云如來有時以因緣故引彼虛空以喻解脫而此虛空實非其喻為化衆生故以虛空非喻為喻云云疏冀諸學者得意忘筌耳者若行者證知菩提心之後則正可捨離虛空相云也為令比知菩提心無相義強用虛空之少分相似喻也若因之了知菩提心無相義竟即何猶可存虛空相耶云也為捕魚故貯筌也若得魚後即捨筌也疏又如虛空至當知亦爾者却釋合上所云經文無知解者無開曉者法喻義也謂依戲論言路分別心像故而有知解開曉用也然於此虛空自性都無寂絶故即言語道斷心行處滅也故離知解開曉義也是故經説世間虛空雖以無量善巧方便不可見者即此義意也本覺菩提心亦爾如密嚴經云若有勝瑜祇善住三摩地遠離能所覺寂然心不生是名真實修無相大乘若欲生密嚴常應如是觀又云若知唯識現離於心所得分別不現前亦不住其性是時攀緣離寂然心正受捨於世間中所取能取覺云云疏唯是心自證心心自覺心者是疏第六云是故正覺三昧覺諸法本不生故唯是心自證心心自知心從久遠以來常如實際無有變易即以如是心自住如是緣故得名為等持文又疏第九云諸法無形像清澄無垢濁意明法無形像性本淨猶如明鏡澄然清淨無有穢濁而能普現衆像當知此像不從鏡中生不從外質生不共生亦非無因緣有種種戲論皆不相應亦復不可執取但屬衆因緣耳緣合不生緣離不滅即言無常無斷無去無來當知即像是鏡即鏡是像若能知是解時即見諸法實相知心自性本無染汚也以此如鏡之心鑒如心之鏡故説心自見心心自知心智之與鏡無二無別文又私解云心自證心等者是明始覺心之還覺了本覺本有心義也此義如論云何以故本覺義者對始覺説以始覺者即同本覺始覺者依本覺故而有不覺依不覺故説有始覺云云又解本始二覺之自證會心真如理故云是心自證心也如釋論第三云如是真如染淨智親內所證相應俱有不相捨離云云又第二云心生滅門正智所證性真如理理智自理故云云心自覺心者是始覺心還覺本覺心如本論云又以覺心原故名究竟覺云云是心自證心者始覺證會本覺義也心自覺心者始覺之覺了真如義又可得也疏是中無知至開曉之者者是明本覺真如一心之外更無別所應知解境界相云也又本覺真如外更無別有能知人而有可知解此本覺者云也開曉義準之可知也知解句是當大悲為根義是行菩提心也開曉句當菩提心為因句是最初發求菩提心也總意云無相寂滅本覺真心外更無所可知解法及能知人云也亦無初最初開曉人及初所可開曉法云也況本覺真心外有方便究竟證達義耶云也又解曰知解者是發菩提心義也開曉者行菩提心義也是當大悲為根義也列發心修行淺深次第意也又初解如法花初列開發心後列悟入義也後解先列發解菩提心次列開入菩提行義也疏若分別至金剛惠耶者此釋成本覺真理中一切法唯一性平等而能緣所緣差別義都無意也若此真理之外執能分別心所分別境有微塵計人即是成顛倒想云也文少分如微塵者如上七微合成義是也文即取法非法相者意云即不可取法相非法相義如密嚴經云若知唯識現離於心所得分別不現前亦不住其性是時攀緣離寂然心正受捨於世間中所取能取覺云云謂取法相者是能取心相及所取六塵境相也是等諸法是即於本覺菩提心中都無而即空義云也取非法相者執取所取能取二法自性之空性之相亦是倒想義故不可取非法相云也若執非法相而成空見者呵嘖之如密嚴經云一切諸衆生生於種種見欲令斷諸見為説於空理聞空執為實不能斷諸見此見不可除如病醫所捨云云文不離我人衆生壽命者答執取此能所二取相及二取空之所顯真空理性人即猶不離遍計所執之增益損減二執過云也執空理為實亦病增故也我人等者實我執異名耳文豈得名為金剛惠耶者若此所執相應惠是不可名第十地菩薩金剛無間道及佛果金剛解脫道云也金剛無間道金剛解脫道智斷盡一切微細妄執故也取法相是即法執義也是帶法執惠豈可為金剛智耶云也疏復次經中至無相故者是以此菩提無相義故即喻虛空無相義云也以上所云虛空之無知解無開曉義而合釋菩提心之無知解無開曉義也謂本覺菩提心之真理中一切諸法本來寂滅理而無可知解境界相亦無能知解之心智云也開曉義亦爾也謂一切法唯本不生理故也疏如釋論喻至虛空相者下引智論文證釋成菩提心無相義如虛空無相義也此論佛智惠清淨故者是指始覺正體智也文出諸觀上者是顯此真勝義正體智之出過世俗盡所有智義也亦顯佛始覺究竟圓滿智之勝過隨分始覺智德也文不觀諸法常相乃至虛空者是明始覺淨智之所證真如理性遠離一切相狀義也文常清淨無量如虛空者是合喻也文是故佛智無礙者結成佛智離邊執妄失失德也文若觀生滅者乃至生滅不實者此顯彼隨分始覺者二乘等人邊觀失而欲成立佛圓滿始覺智德故也亦或此拙邊觀是即三乘共教菩薩之所成觀智也此經下文所明離一重法倒而證寂然界菩薩之觀法即此義也文如是等諸觀皆爾者舉此一類攝餘類意也即是結彼拙觀失也文如是淨菩提乃至得無罣礙者明此圓正觀智之勝過鄙拙偏單觀義也文譬如虛空之相亦無相故者是合喻也文萬像皆悉依空空無所依者是更明能生所生喻也虛空是五大中其空大是也是於所造諸色有不障礙增上用而令生長諸所造色法也然而無能生於虛空者也本覺真如心亦雖能生一切有為諸法而無能生真如之法也真如是諸法至極所依故也大般若經中云真如雖生諸法諸法不能生真如者此義竟也文即此諸法亦復如菩提相者謂成諸法性空實相義也起信論云心性不生不滅一切諸法唯依妄念而有差別若離心念則無一切境界之相是故一切諸法從本已來畢竟平等無有變易不可破壞唯是一心故名真如云云即此義意也文所謂淨虛空相者舉虛空無相義欲令比知菩提無相義故也疏故經復云至虛空相也者以論證文意而會此經意也彼論所引文意是即懸契會此經菩提無相謂虛空相義云也疏爾時金剛至一切智智者是金剛手菩薩即問本覺菩提道中遠離能知解者所知解境之義故今則致疑問也問意云本覺淨菩提心門中若無能開曉人所開曉法及能知解人所知解法者誰發生菩提心而依此發心力修菩提萬行而可成菩提果者有耶云也文尋求一切智智者是疑上疏文所云非始開曉之者文也文誰為菩提者疑上疏文所云是中無知解法句之義也文成正覺者是疑上所云無知解者句是義也此中者字是人義也意云依所緣境界故能緣智成熟者也是疑可成佛果意也文誰發起彼一切智智者疑成佛之方便句也此問中但舉初菩提心為因句與第三方便為究竟句而略去中間大悲為根句也又解如次以誰尋求一切智可配菩提心句也以誰為菩提成正覺句可配大悲為根句也此三賢十地始覺是有成菩提義大悲句所攝也此三賢十地成正覺義有故也故華嚴經云讃初發心住菩薩讃云初發心時便成正覺云云以誰發起彼一切智智句是可配方便為究竟句也又解菩提心句中即攝大悲行也此大悲之體即是智惠也故與菩提心相同也疏佛祕密至及一切智者下佛答也自心者是於能求人中所在自心是也是一切衆生妄心所熏本覺真如自心也於此自心即可發求修得菩提心云也此所被發求菩提心者即是本覺性也泯一切衆生名為本覺故也文尋求菩提心者是答第一句能求發菩提心之問也文及一切智者是答第二成正覺問也大悲句之問無故亦無答也若又尚約第二大悲句問義意言之者及正覺者云句是當第二大悲句問之答也次文何以故本性清淨故等三句是當第三方便句問之答而舉依本性性得因顯修得佛果可得義也若依前解者略去第二修菩提行是真乃至逮得一切智果可得義也疏何以故本性至皆悉成就者是明發菩提心之行即成果果所由也謂發求菩提心及行菩提心故而到大菩提始覺果是皆性得本有功德故也唯一向不謂依新修習力也疏時執金剛至誰為覺者者是釋金剛手成三種問之由來也是非自不知故問但為利他故問也文薩婆若惠唯是自心是本覺般若即是唯清淨平等不生不滅真空性是即諸法自性故是自心義也是有神解義故名覺亦名必也文乃至無有少法出此心者是無一切有為法出過本覺不生理云也一切有為皆悉以本覺真如理為自性也此義如釋論第四云覺與不覺有二種相一者同相二者異相言同相者譬如種種瓦器同微塵性如是無漏無明種種業幻皆真如性相乃至一切衆生本來常住入於涅槃菩提之法非可修相非可作相畢竟無得亦無色相可見而有見色相者唯是隨染業幻所作非是智色不空之性以智相無可見故云云文為未來衆生斷疑惑故而問佛言菩提心名為一向志求一切智智者此有二義初義意云此中舉發求一切智智果德菩提心之能求心而名菩提心是信心也文若一切智智即是菩提心者者復是欲顯因位人所求本覺果德也此本覺即是所求一切智智之菩提心云義也文此中誰能乃至誰為覺者者此正成疑難辭也難意云本覺般若唯平等理而絶能所差別義故以誰可為發菩提心人以何法可為所求菩提境又以何為所證究竟境界以誰可為能證果滿人耶云也此問中闕第二句大悲為根問也是舉初後影攝中問意而已疏又復離心至令至妙果者者是明第二復次釋也此義意云遮心外無法也謂本覺一心中唯有平等無二義故約此意不可有能所差別義理最可爾故也亦此本覺理外無實我實法故不可建立能求所求義及因果義云也文若法無有至自然成佛故者是因二種疑故正成無因難也難意云不假因緣方便而成就本覺菩提心者一切生死衆生雖無發心修行功自然可成始覺菩提難也疏佛答言乃至本性清淨故者佛答前疑難也答意云於一切衆生自心而自求發菩提心修菩提行而令顯本覺真如菩提即逮得始覺一切智果所由是由一切衆生從本已來其本性具足性德般若故也是偏不新修得法也故於本有法上今更顯得意也疏雖衆生至即是無明者是疏主通外人伏難辭也伏難意云若本覺本性清淨者何有煩惱染著衆生沈淪生死迷倒本覺而受若果者耶云也答意云一切衆生從本已來雖具足本覺菩提性不如實了知自心本覺菩提心性故有無明隱覆而流轉生死苦海云也此如釋論第四云是故修多羅中依於此義説一切衆生本來常住入於菩提涅槃之法非可修相非可作相畢竟無得亦無色相可見而有見色相者唯是隨染業幻所作非是智色不空之性以智相無可見故云云此文不如實自知故等者釋論第四云所言不覺義者者總標本末一切不覺根本不覺者謂不如實知真如法一故不覺心起者即是顯示根本不覺之起因緣根本不覺何因緣故得起而有因不如故得起而有何等法中而不如耶謂三法中而不如故言不如者當有何義謂違逆義故云何三法一者實知一法二者真如一法三者一心法一法是名為三實知法者謂一切覺即能達智真如法者謂平等理即所達境一心法者謂一法界即所依體於此三法皆違逆故無明而起是故説言謂不如實知真如法一故不覺心起彼三種法皆守一中終不捨離故通名一而有其念者即是顯示分離無明謂本已立一切眷屬皆得有復次依不覺故生三種相與彼不覺相應不離云何為三一者無明業相以依不覺故心動説名為業覺即不動動則有苦果不離因故二者能見相以依動故能見不動即無見三者境界相以依能見故境界妄現離見即無境界以有境界緣故復生六種相云何為六一者智相依於境界心起分別愛與不愛故二者相續相依於智故生其苦樂覺心起念相應不斷故三者執取相依於相續緣念境界住持苦樂心起著故四者計名字相依於妄執分別假名言相故五者起業相依於名字尋名取著造種種業故六者業繫苦相以依業受苦不自在故云云初三相是第八識自位分也第四分別有相是第七識自位分餘五相是前六識之自分也已上論文是依如實不知自心本覺而流轉分段變易二種生死中也此疏中舉根本無明與六麁重之中乃至業繫苦相而不言三細也雖然理實要可有之也此疏文是偏且説分段生死之緣起義故作此説耳問根本無明者何物名根本無明答能熏於本覺妄心之習氣是也體是能生業識等種子是也故釋論第四云無始無明攝持煩惱令得住止譬如諸種持隱顯子又云譬如有人見林樹等決定當知有其種子見諸煩惱知無明有義亦如是譬如種子唯一出生無量無邊花果枝葉等一切類根本無明亦復如是唯一無明能生一切無量無邊煩惱染法云云疏無明顛倒取相故者明依根本無明故生六麁之中第一智相起因緣也又解此中無明顛倒者是枝末無明是也是即智相相續相等是也是迷亂不了法故名無明也此義如法藏師起信論疏云初言智相者謂於前現相上不了自心現故始起惠數分別染淨執有定性故云依於境界乃至不愛故云云此句中不了自心現者是無明顛倒義也文取相故者是智相是法執惑故是即於所緣境相分別執取染淨定相云也此句中故字是為次相續相之生起因緣義也疏生愛等諸煩惱者是明第二相續相之由來也此依止前智相品故此相續相來也法藏云二相續中依於智者明起所依謂依前分別愛境起樂覺受不愛境起苦受數數起念相續現前此自相續也又能起惑潤業引持生死即令他相續故下文云住持苦樂等也故云生其乃至不斷故也云云又釋論第四釋此相續相云此相續識即有三義一者攝前不失義此相續識而能發起潤業煩惱住持過去無明所起一切種種善不善業而能令作成果力用故二者感果成就義此相續識又能發起潤生煩惱而能令已成辨業決定果報安立屬當故云云三者妄慮遍緣義此相續識攀緣轉廣分別更強緣已知境發樂不樂之心對現前境增愛不愛之心緣未知境不了妄計云云此疏文等字即等取執取相及計名字相二種相也法藏云三執取相著謂於前苦樂等境不了虛無深起取著故下文云即前相續識依諸凡夫取著轉深計我我所等也言依於前相續乃至苦樂者是前相續相也心起著者是此執取相也四計名字相者依前顛倒所執相上更立名言分別故楞伽云相名相常隨而生諸妄相故依於妄執等也上來起惑云云疏因煩惱故起種種業至種種苦樂者是明六麁相中之第五起業相及第六業繫苦相義也法藏師云五起業相者謂著相計名依此麁惑發動身口造種種業即苦因也六業繫苦者業因已成招果必然循環諸道生死長縛故云依業受果不自在也文疏蠶出絲受燒煮苦者示起業及業繫苦相同喻可易知也疏譬如人間至見苦樂者是明生死業果唯依妄心所變義也此文是阿毗達磨經頌意也彼經頌云鬼傍生人天各隨其所應等事心異故許義非真實文問此頌意如何答釋此阿毗達磨經有無著菩薩所造攝大乘論是論有無性菩薩所造釋論釋論第四云相違識相智者更相違返故名相違相違者識名相違識生此識因説名為相了知此相唯內心變外義不成故無有義説名為智如餓鬼傍生及諸天人等者謂於餓鬼自業變異增上力故所見江河悉皆充滿膿血等處魚等傍生即見舍宅遊徒道路天見種種寶莊嚴地人見是處有清冷水波浪湍洄若入虛空無邊處定即於是處唯見虛空一物實有為互相違非一品類智生因性不應道理云云基法師唯識疏成此無性菩薩意云相違即境各有別故相違之者名相違者或相違即者人境區別故相違者識名相違識生此識因説名為相菩薩之智了知此相唯是內心故一切法亦唯心變鬼等膿河魚等舍宅路天寶嚴地人清冷水空人唯空非一實物互相違返此雖非有遍計所執然業類如此各變不同舊云一境應四心今言境非定一故應言一處解成差證知唯有識云云疏由之當知至無有一法也者是結成三界諸法唯妄心所變義也此義如起信論云是故三界虛偽唯心所作離心則無六塵境界此義云何以一切法皆從心起妄念而生一切分別即分別自心不見心無相可得當知世間一切境界皆依衆生無明妄心而得住持是故一切法如鏡中像無體可得唯心虛妄以心生則種種法生心滅則種種法滅故云云上來明不覺妄念之境界皆唯識所成義畢自下約覺悟心而明唯識義也疏若瑜伽行人至一切智智者明觀行者所應修作唯識觀相也準此經下文云心虛空界菩提三種無二云云若如華嚴經云三界唯一心心外無別法心佛及衆生是三無差別云云是即觀三法實相一心云也又準此疏第三云界有三種所謂法界心界衆生界離法界無別衆生界衆生界即是法界離心界無別法界法界即是心界當知此三無二無別云云此中意云觀法界心界衆生界即一無二體是名見自心實相云也此無二無別性名無相本覺菩提云也亦名一切智智者名菩提之異名也故新譯仁王經云體相平等名一切智智也疏雖復離諸至而得成就也者是通前外人伏難意也伏難疏文云若法無有因緣而得成者一切衆生亦應不假方便自然成佛云云今此文通此難意也答意云若約真如本覺本來自性道理門而言之一切諸法皆本不生性不可建立能求人所求法能證人所證理義及菩提心因大悲緣等句也但今是約心生滅門之隨染業幻流轉緣起門而建立此向上還滅入佛道因緣漸次由云也若捨此起入方便門則一切生死諸衆生云何得可還歸本覺佛地耶云也
