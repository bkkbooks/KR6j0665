body:
  text: 大日經住心品疏私記第五上來序分已釋畢也自下正消釋經正宗分也疏爾時執至云何究竟者者是牒金剛手菩薩略舉三種請問之經文也是即總問法佛之成菩提因緣果報義也疏如來自證至不可示者是先明法佛內證法然三密境界甚深不思議義而為顯示此義故且表外迹大也疏前云奮迅至喻其宗本者是釋上所牒經三句問之來由也謂成此三問有其所由謂金剛手等見法佛所示現十佛剎塵數大衆會之外現瑞相微妙境界故感之欲知此瑞相之所表示法佛之所成就內證內行證入方便究竟大義故今當此時敢致此請問耳夫驚動瑞相故致請問也比知此法佛所現十佛剎塵數三業無盡莊嚴藏功德皆是表示法佛內證一切智智法門具足圓滿義故因之則問其法佛內證一切智智之成就因緣及究竟果滿相也疏如觀象迹至威勢必大者是明此所現瑞相有深義能表示之同喻也從此下喻有二一者象喻二者龍喻也是現見其象龍之所作用廣大相而可比知其所隱龍象體性廣大義云也諸禽獸迹中以象迹為殊勝云也此義有經槃經第三云如諸迹中象迹為勝云云又難陀拔難陀龍王於南閻浮提降甘露云文有涅槃經中可檢正文也文又如迅雷澍雨等者是明彼大龍之作用其威勢廣大義也迅雷者合能説佛澍雨者合説法用鳥獸震死者合説法之斷惑降魔用百川奔湧者合百億契經義盛宣正理懷山衰陵者合百億契經正理之方能沈沒邪見高山及過勝邪論崙峻峯也疏今諸大衆至當復云何者從下合喻也是辨真暗果德也此微塵數量之心數大衆併見心王法佛無盡三業化儀周遍法界衆生而普利益諸衆生界化用無邊際妙境界而須雖可比知法佛內證三密境界廣大無窮盡甚深妙體因之然何輒爾以是相得比知之耶云也文如來智力者是法佛所證十種智力也是一切種智也文於一念普鑑群機者明前十力智隨從所化機根而施化用之普遍速疾能也文本末因緣究竟無礙者是明見所化機之三乘五乘等種姓遂歸一揆無差別理也以一切衆生悉有佛性理為因故以悉皆當得阿耨菩提義也一乘是本三乘等是末義以末三乘終歸本一乘故云究竟無礙也約三乘等化他用邊云照俗權約一乘及自證智體邊云契實之境界也是權智之外迹所表尚以有廣大微妙德相也何況內證真實境界乎何以此外迹表示相而可比知彼內所證實智甚深廣大無盡相耶實不可測知其本地功德性然於如是甚深境界我等何可逮得知此義耶疏若法不然至我已盡覩者於此所表示內證境界非有如是勝妙難思議義而當可有麁劣表示外迹相者我等當可比知此所表內證德義耶云也然但無麁劣表示相唯有勝妙廣大甚深標示相云何以此可得比知彼內證境界耶云上文以能表相之廣大義顯示能表外迹深遠不可量義也疏然不知是法何從得之者重陳暗於因行也意云今雖見法佛所現無盡莊嚴藏外迹相是廣大微妙之相而不可測其所表示本地內證功德及亦何得知此內證廣大功德之所從來因緣義耶云也當雖欲覩見此法佛得果德之因相然方不可知修何等因而得此果報云也壞此疑惑心而欲聞金口所説決疑答故也已上釋生疑問之所由也問此十佛剎塵數大衆是大日尊之智用差別之外迹也然可不能知此心王自所證境界云耶答是為引攝實行菩薩不能知此事故假且表不知相也或亦是且為令顯有心王心數勝劣差別義云也實非謂金剛手不知也疏故執金剛至一切智智也者從此下金剛手結前疑問之所由而為因正發生請問欲顯宗旨也如來等者是指所問人也得此一切智智者將欲尋得佛自內所證究竟菩提果德之所從來因緣也是即總問自行德也疏梵本云至説義者尋梵語多含義而總成種種釋也疏如諸佛乘至名如來者下此別釋如來義也如者有二義一比例義謂如諸佛之所行是也二不虛不妄義謂契當正理義此如實義是也來者新成現顯義也意云本覺性是如也私覺果是來也亦如者此真如理也來者是正智也謂依如理而正智成故也疏一切諸佛至如實説者者是釋知解義説義意也疏一切諸佛至名如去者釋第四如去義也解脫一切生死海之有為有漏業煩惱果報而成就佛地之法身般若解脫三德故名涅槃也涅槃者此翻圓寂也圓滿三點四德而寂滅惑業苦果義也是三世諸佛究竟果之大安樂城𭏱也故遠離二種生死苦處到此涅槃樂處故佛云如去也故涅槃經第三迦葉菩薩問涅槃義云一切諸法中悉有安樂性唯願大仙尊為我分別説云云佛經師子吼品中説佛性涅槃安樂義即此意也疏釋論具含至順古題也者謂引四義證文而明之中今但用如去號之意也問何故阿闍梨好存如去義耶答如去義是所可厭所可樂義勝故最足存之也謂苦患是世人最所厭離樂受是衆麁之所樂求故也如來是約菩提得名如去是約涅槃得名也涅槃經中五種佛性中菩提是果性涅槃是果果性也故取勝果果義名如去也疏梵本云至害義除義者為欲釋本經之應供義故先明之所由而尋梵本對辨正翻謂有三一殺賊二不生三應供也疏釋論謂至以為名者下引證成佛之殺賊義也所殺有二一外天魔二內諸煩惱等是也以六度行而為此惡魔能治藥云也疏又阿名為至皮脫故者下出第三應供義以有前殺賊不生德者而堪能應受世間供養云也若無此德者不應受此供養也殺賊不生如次是當間道斷惑種解脫道捨習氣義也是如次盡智無生智之所為用也疏梵本云至正遍智也者下為欲明釋本經正遍知義故尋梵文而梵語唐語對辨翻出其義也疏釋論云至三佛陀者下引證文成此義也若依此文應供養以智德為所依因云也以殺賊不生二德為應供之因緣義是但約二乘羅漢為言也故法花第二云我等今者真阿羅漢天人魔梵普於其中應受供養云云今約佛更亦重以一切種智德為應供之因云也梵本所云三藐三佛陀者基法師法華疏云三云正藐云等又三云正菩提云覺又云正覺簡外道邪覺等覺簡二乘但了生空偏覺故又正覺簡菩提因覺未滿果位非正覺故此顯菩提道即四智品下一覺字貫通上四云云今私云等言與遍言其義同也是等者即周普義故也又菩提與佛陀其義同也菩提是覺義佛陀是知義其意甚同也故古人多分翻云正遍知新人多翻云正等正覺也疏然此宗中至名佛也者上來約他家釋佛陀云知也今約真言家意佛陀翻覺而釋其覺義也謂文由自然智慧遍覺一切法者意云以本覺般若為因而依新修熏習力故始覺智返即顯得性德本覺自然慧云也是自行德也是本有果實今更依修習緣而開敷之義也不新生意也文如感開敷蓮華無有點汚者是明佛果離染德也此涅槃三德中解脫德也文亦能開敷等者約利他德故説開敷義也疏梵云薩婆至一切智者上來釋所問人之具德名了從下正釋所宗旨之一切智之義也之中先梵語唐語對辨翻出此名也文薩婆若那即是一切智智者寶師涅槃疏第一引佛性論説佛性五因中第三四因緣云三生般若四生闍那由般若故翻妄執想由闍那俗智能顯實智故云云私云若依是義真俗二智合即梵亦云薩槃若那也薩婆者一切也例如薩婆多翻一切有部也若那者智也又解薩是一切義婆若那智慧義也良賁新仁王經疏云大品以若一字通名智慧以般助若若名慧以那助若若名智般若云慧闍那云智而亦慧處説智智處説慧云云疏釋論云至名薩婆若者引證成一切智義也一切智者心境相對名也一切者是所知境名也智者能緣心之名也一切智者依主釋也文名色等者是所知境也所謂五蘊十二處十八界二諦等一切有為無為法是也疏今謂一切至猶如金剛者上來明他家一切智義也他家一切智是橫雖知一切種類境竪未知法佛內證法然常住境界故彼即非智之中智也今此家一切智智是橫竪無礙窮盡了知一切法法然隨緣一切境界故云智之中智也即身成佛義云一切智智者決斷簡擇義一切佛各具五智三十七智乃至剎塵智如是人數過剎塵故名一切智智不同顯家一智以對一切得此號云云疏如是自證至他人也者此內證爾法因分人之四種言説九種識心量所不能及云也故高野和尚云如是絶離即是顯教分域因位人等四種言語皆不能及唯有自性法身以如義真實言能説是絶離境界是名真言祕教金剛頂經等是也云云釋論第二有此義其文云是五中前四言説虛妄説故不能談真後一言説如實説故得談真理又云如是十中初九種心不緣真理後一種心得緣真理而為境界云云具文如上引注亦具義如此釋論私抄明不同手中菴摩勒果可轉授他人也者此喻不同意約因人之言説之不能詮法自相義云也疏若可以言至方名佛耶者為成世間言語假立而不能如實親詮諸法自性義意故立理釋其義也何況以世間語言豈詮如實法佛自內證境界耶云意也故成唯識論云諸法自相假智假詮俱非境故云云金剛般若經云燃燈佛與我受記汝於來世當得作佛號釋迦牟尼以定光者是燃燈佛也彼燃燈佛隨順衆生故依四種所攝言説授釋迦之記猶不用如義言説歟所以知爾者如密嚴經云此法最清淨遠離於言説化佛諸菩薩經中未開演諸聖現法樂見真無漏界自覺聖智境清淨最無比云云疏又如目覩至明了耳者重引喻成言説假立義也此喻意云於所詮實事此能詮名言猶不能説此法自相云也若合法言之者於法佛內證境界是升法身果位時及可證知也如我等因位之假智假言是不能如實見知之故也因此義故我金剛手手者云何不升佛果而輒如實得此一切智智而轉為人可説之耶云也疏問意云至廣渲分布者是釋金剛手問之意也此問是雖似約佛已所得功德問一切智德及問佛隨應機説法德而其意返影顯金剛手於自當所可得一切智智功德及自當所可得應機説法功德義而即問於佛也疏隨種種至一切智智者是釋隨所被機根説所感法義不同差別也方便道者隨機功妙義也則此方便功妙術而稱衆生機性説種種法皆是即一切智智之差別分位云也疏所為安立無量乘至住彼威儀者擇其所乘衆多相也是十佛剎微塵數之諸菩薩等所通達三密本法是即無量義也文安立無量乘者明心密義也文示現無量身等者明説一切智道之身語二密儀式相也疏而此一切至解脫味者明此義差別乘是遂歸常住一相甘露法味也疏此妙方便復云何而得也者結遂歸本性之方便請問意也疏此中種種至世界耶者釋趣義此有三義一者趣義任業所引而所赴向故也二行義是諸衆生之隨造業所感往處故三名道義此亦隨諸衆生造業力所往之路故也婆沙者此引小乘論説五趣義也毗婆沙者此云廣義也可檢毗曇論第一文也摩訶衍人者引大乘宗説六趣義也五趣六趣廣略不同也俱胝者有多義一者十萬二者千萬三者萬萬可檢基師彌勒上生經疏也疏性欲者至多聞等當廣説者出所宜之根性不同類也文欲名信喜好樂者是釋性與欲中欲義謂心好能樂欲愛求義也於境有信好喜心數故起此樂欲心也是欲是總即通善惡性欲相如孫陀羅等者出性欲不同類此也疏性名積習者是釋串習所成性義也凡總是心之多串習積集力故則數數成習性而性輒爾不變改義也疏相從性生者此相者欲樂心麁顯相起是從本性串習力生云也疏欲隨性作行者是現起麁動欲染心者即隨本性串習力生而發起身口二業行云也疏或時從欲為性者習性是依數數串習力故於境起欲愛心亦更成習性云也疏習欲成性者是釋上從欲為性義也謂從欲為性云意是依此現起習性更成習性欲義也疏性名染心者是串習於欲之習性心名為染心云也疏染心為事者是習欲心性即於餘心心所令生染著而作身口二業事云也疏欲名隨起者是欲心隨境界緣而現起云也或亦依前時心串習欲性增長力故成更現行欲心也疏種種方便至各略名者釋上所云能應方便義方便有多義或進趣義或善功義也具義如下辨今此中所云是善功方便義謂鑒所被性宜而垂法是功便義也問般若與方便同異如何答般若是智慧性也直覺了一切境界義邊也方便是此般若之體上更有巧便功用也此修行般若時而有自利利他巧妙意樂妙術之勝用義説名方便又於佛果有巧妙方術名云方便意也故離般若體更無別方便體云也般若體上具方便即此勝用云也疏今毗盧遮至種種乘者方便之合法也本雖無差別平等一味常樂我淨一佛乘體而依巧方便故差別而説十佛剎微塵數種種寶乘云也依此義故法華云我有如是七寶大車其數無量者即此意也上來約顯略義成問意也疏復次此中至曼荼羅也者下約深祕趣中明請問意也疏於薩婆若至法界圓壇者是明所問深祕曼荼羅相也文於薩婆若平等心地者是所圖畫曼荼羅法則之所依本質本法是也故大日經下文云彼能有知此內心之大我隨其自心位導師所住處八葉意生蓮華極嚴農圓滿淨月輪離垢猶淨鏡真言救世者於彼常安住云云於此中所云於薩婆若平等心等者即此文意同也此疏七云超越於三世無垢同虛空者即是淨無垢不思議心地也以大方便於此地心上畫作普門曼荼羅故經次云住不思議心起作諸事業者是義也是此法佛一切智智體常住一味法然自性境界即是法也此本地常心也是有諸衆生心中菩提心者即是也故菩提心論説云一切有情於心質中有一分淨性衆行皆備其體極微妙皎然明白乃至輪回六趣亦不變易又説佛地圓明果相文云證無上菩提獲金剛堅固身也然此五相具備方成本尊身也其圓明即普賢身也亦是普賢心也凡人心合蓮華佛心如滿月云云又云若無勢力廣增益住法但觀菩提心佛説此中具萬行滿足淨白純淨法也此菩提心能包藏一切諸佛功德法故若修證出現則為一切導師若歸本則是密嚴國土云云又經云如是之藏識是清淨佛性凡位恆雜染佛果常寶持如是之藏識普現於世間其體無增減光潔如真金云云此疏文中於字是所依境界義也謂於如來藏佛性中恆沙功德為所依本質而以若圖畫若造立如是佛界功德之形像義名曰悲胎藏曼荼羅王也依此本法如説修行則一生間速疾到法佛果云也此曼荼羅是顯現緣起從法佛慈悲心以顯行者之自心之法佛功德而為所宗趣體也而新令顯生法界諸衆生之本有諸功德故名云大悲胎藏也是猶如母胎持所懷任之子羯藍種子令不失壞而漸漸增長終産生云也此曼荼羅略有四重第一重是中臺藏八葉九尊第二重東方遍知印諸尊及南方金剛部金剛手等菩薩西方般若菩薩不動尊等北方蓮華部觀音等菩薩也第三重東方文殊等菩薩北方地藏等菩薩西方虛空藏等菩薩南方除蓋障等菩薩也第四重東方釋迦文佛為主乃至菩薩二乘六道一切衆及皆雜居四方也凡此曼荼羅有從本垂迹與行自果二義可思之此曼荼羅即是圓滿究竟義也故新人翻云輪圓具足也古人但翻云壇也故四種曼荼羅義云古人翻壇新人翻輪圓具足古人稱壇者唯取怛然平義闕餘三密四智印等無量名義新人輪圓具足者諸義理成就而無闕少怛然者西國俗法祭天尊等封土令平為壇輪圓者且如車輪穀輞輻具而後成一輪闕一物者不輪故云具足云云疏此一一至差別乘也者若論竪義時四重有淺深差降若論橫義時四重界會十佛剎微塵衆皆悉法爾常住一解脫甘露味云也具如上釋畢也疏且如有人至遮那身也者謂法佛所現無量隨類等流身中是且出第四重所攝天乘之等流身之説法相也文有人者是能感人也文志求五通智道者此所感法也五通者一神境智通二天眼智通三天耳智通四他心智通五宿住智通也神境通有二一飛行速到山海等徹達石木山地等無障礙二能轉變自身他身等世間所有隨心自在天眼通發得色界四大清淨造色住眼根中能見衆生死此生彼等乃至見一切世間種種形色天耳通智如前天眼發得色界四大造色住耳根中能聽六道衆生語言及世間種種音聲他心通能知六道衆生心心所也宿住命通能知自他過去一世二世乃至八萬大劫所有之事也文現韋陀梵志形者是稱所被機現能應等流身之中其隨一即是人也是人此從法佛一切智智德生之其垂迹一分是也此疏第二云圍陀是梵王所演四種明論大圍陀論師是受持彼經教授者以能開示出欲心之行云云文説瞿曇仙等真言行法者是舉能應隨機説法義也涅槃經第三十八云瞿曇仙人大現神通十二年中變作釋身并令釋身作羝羊形作千女根在釋身耶云云問瞿曇云義如何答大安寺善澄法師新撰律抄云按遺教經論疏云彼名甘蔗種等因緣者昔有惡王議絶釋種尋求悉殺方有仙人悲釋種絶才取一人置自窟中隱而長養時彼惡王召占相師令人若有彼釋種殘即相師言尚留一人今在仙人所住之窟時王差使告彼仙人召其釋種仙人堅惜不許其身使者能伺得仙人去他處之間取其釋種奏王王即宣命囚於獄時仙人化為美好女所淫釋種即手受彼淫欲持來本處塗牛糞及以泥入中淫欲置甘蔗林灰於日光由衆緣之和合力故生一男子今佛世尊此是之種故外人名曰甘蔗種曰灰種牛糞種泥種云云等者是等取餘佛菩薩人天鬼畜等種種無量差別能應隨類身説法益物義也疏行者精勤至遮那身也者是明修得益相也是入從有緣門漸遂到究竟中臺佛果云也疏如是或至因緣故者是廣明隨類應度差別總想也若依安然闍梨菩提心義意者此已上疏文明入真言門三類行者之趣入證果次第相云也故彼菩提心義第一云問前云凡夫外道二乘菩薩引入曼荼羅時各於其人干栗馱心令觀八葉蓮華若爾凡入四重壇人皆觀心蓮成佛悉是超入之者有何次第入不定入之別答情機不同行相各異或有有情但著世樂不樂出世佛赴情樂説人天中息災增益等法有情得益雖復歸命未樂心出世漸次引導令知勝道終至中台至中台時始觀心蓮是名次第入者也若有衆生於其中間正因開發頓入中台入中台時亦觀心蓮是名不定入者也若初入處直觀心蓮是名超入者也問何以得知答義釋云於薩婆若平等心地畫作佛菩薩乃至或現佛身説種種乘乃至現非人身説種種乘隨類形聲悉是真言密印或久或近無非毒鼓因緣故經云皆同一味所謂如來解脫味義釋文此中或久是次第入或近是不定入若云五種三昧道皆開心實相門一生成佛者超入也云云疏經云皆同至解脫味也者以散釋意入歸經本也是以五乘法門約橫義為法爾性得常樂我淨一相一味甘露義而此經之此句意云也疏所以然者至成法界也者此明上文已所云此一一本尊身語心印皆一種無差別乘文及經云皆同一味所謂如來解脫味文之意所由也意云於一切衆生有從本來所具足無漏無為五蘊性得本覺佛性而以此佛性顯得即是為大日尊智法身云也云爾所以者謂以本覺菩提為所依本而始覺佛果顯現即説名法佛自受用智身故也依此義故即身成佛義云大日經云我一切本初者本來法然獲得如是大自在一切法之本初如來法身衆生本性同得此本來寂靜之理然衆生不覺不知故佛説此理趣覺悟衆生云云此疏文同意也文非是得菩提時強空諸法使成法界也者此以此宗所言法佛自證菩提義而簡別於顯家所言法身義也彼家云意是佛得菩提心圓滿時空一切諸法皆悉唯令顯清淨法界真如本不生空寂理云也故摩訶衍論第三云覺心初起心無初相者即是顯示果圓滿者大圓鏡智分明現前無所不遍無所不窮法界一體無有與等獨力業相根本無明不能自有平等虛空一相無相無初念以遠離微細念故得見心性心即常住云云此意但以空有為諸法而為得佛果菩提云也今此宗意不爾也空於有為諸法畢而顯得本有法然性得無漏無為五蘊法身實相云也是不空性德從本有物而今染法皆盡而以後今顯得之也故大師真言二字義云問阿字本不生故何云如實知自心答指阿字本不生之理云實此本不生理為自心性故也問本不生者心性都無故云本不生歟為當雖有心性而無變易故本不生歟答非謂心性都無自性清淨無改轉故云本不生如虛空性非有非無此心亦復如是不生不滅自性如故云本不生也文疏佛從平等至曼荼羅者此重明佛依本覺性得菩提正因而顯現修得萬德圓滿曼荼羅莊嚴藏而亦轉教導諸衆生時則以諸衆生本覺佛性為因而教之更令開顯此曼荼羅莊嚴藏云也是以明法佛境界本有不生義為本意耳平等心地者是第九識心也是干栗多心此名心處心也是即本覺心性也疏妙感妙應皆不出阿字門者妙應佛始覺妙感是衆生始覺此皆歸本不生義云也疏當知感應至阿字門者依本覺所顯得始覺佛果名所生方便即是亦遂歸本不生理云也始覺即返同本覺義故同不生義也疏譬如大海醎味故者此喻意云鹽味是資增餘諸味故以此義合阿字本不生義成解脫常樂味義也疏復次執至水火風也者下重金剛手菩薩以五喻問佛之中此是明用五種喻之本意也問何故為問顯曼荼羅祕密義故必用此五種喻耶答真言家用法爾常住六大而為諸法體性故稍為欲顯今此祕密曼荼羅義亦用此喻也故即身成佛義云大日經云攝持四界安住心王等同虛空成就廣大見非見果出生一切聲聞辟支佛諸菩薩位謂表六大能生一切何以得知謂心王者識大攝持四界者四大等虛空者空大此云六大能生見非見者欲色界無色界即是所生法皆以六大為能生以四法身三世間為之所生此所生法上達法身下及六道雖麁細有隔大少有差然猶不出六大故佛説六大為法界體性諸顯教中以四大為非情密教則説此為如來三昧耶身云云故知金剛手以五大為曼荼羅所依本因故即用此五喻也問若爾者此中何不用識大喻耶答如即身成佛云四大等不離心大心色雖異其性即同色心心即色無障無礙云云若據此義五大之處攝識大可云也疏初句云譬如至相喻耶者疑難以虛空比類法佛功德義也意云此中所云虛空是無功德無過失無記義也是即小乘論意也然何以此無記義比況法身萬德純善圓滿法耶云也疏但取其至況大空耳者此答也故祕藏記云比喻之極真過虛空故曰如虛空云云疏此中相況無分別故者下廣釋前所云小分相似義謂此宗用虛空喻不謂唯取無記義然以三種有德義略合菩提心之大底云也若廣明虛空德用如涅槃經三十七八及釋摩訶衍論第二虛空有十義云也文一者虛空畢竟淨故者彼論云六者淨義無塵漏故云云又心地觀經第三云法身本性如虛空遠離六塵無所染云云文二者無邊際故者彼論云二者周遍義無所不至故三者平等義無簡擇故四者廣大無分際故云云又心地觀經云法身體遍諸衆生萬德凝然性常住乃至法界遍滿如虛空云云又三者無分別故者彼論云八者有空義滅有量故九者空空義離空著故十者無得義不能執故云云無分別者是虛空義也此虛空執實亦遣故云空空也虛空即空無云也彼經云不生不出無去來不一不異非斷常法界遍滿如虛空云云是即無分別義也疏一切智心至難解空也者此合喻也此難解空者即是法佛之境界之正智所證虛空是也故即身成佛義云大空位者法身同大虛空而無礙含衆像而常恆故曰大空諸法之所依住故號位云云疏云初云離至分別義者下返更釋上言無麁分別無細分別句義意也依梵語下所詮義二重分別之意而成分別與無分別之分別義意云也疏義例如至細分別者是出麁細分別類義也此取例意云尋者是尋求心也是心之緣境時最初緣慮麁動心之尋求自所緣境自相義也伺者伺察義尋求心之後更細分別之伺察自境自相而微細了知之也依此義差別故於三界九地略攝立有尋有伺無尋唯伺無尋無伺三地義也尋伺者古人名有覺有觀新人云有尋有伺也是俱皆心所法也所謂麁細發言淺深推度者是如次尋伺之作用也彼無分別句義者是約無麁分別義為言不謂無細分別也如無尋唯伺地雖無麁分別心而有細分別心也次文如識生時等者凡眼等五識唯有自性分別無隨念分別計度分別故但證緣自境自相而不能分別此自境之種種差別義相也第六識有三種分別用故於眼識等所緣五境而此第六識更重分別推度此境之種種差別義相云也若依小乘義眼等五識唯一剎那緣自境此後意識起更緣此境種種分別之云也若依新大乘義八識俱起但前五識現量心自性分別而證緣自境自相不能分別他境共相差別義相云也疏舊譯或云以劫為妄執者此意舉古人之翻譯而欲助釋今劫跛翻分別義也妄執與分別其義稍相近故也疏喻意云亦無也者是於淨菩提釋分別無分別之都無所由也依無能生麁分別用故亦無所生細分別云也上來以虛空無過義喻菩提心之無過義也疏又如虛空至皆得成辨者下以虛空有德義而喻菩提心有德義也以上所引即身成佛義文可知此喻意也文以無所造作者此虛空是雖有能造義而離所造義云也合喻亦如是故如大般若經云真如雖生諸法而諸法不能真如云云疏故以為喻也者結喻也疏第二句云至可傾動者下牒經文而釋此地喻意也是取地之作用而為此喻意也此文有二初牒後釋也下可放之此喻意釋論第四云譬如大地有勝力故持四重擔故名住地云何為四一者大海二者諸山三者草木四者衆生云云文亦不作是念乃至不傾動者是明大地平等作用也是此大地無彼此愛憎簡別故有平等無差大用云也疏一切智地至所出生者此合大地能生草木等用也疏此諸乘至能動搖者合上大平等廣大勢用也此諸乘等者依法佛一切智智差別義用立諸乘義云也此一切智地是大悲與般若常所扶翼相助而相奪故見諸衆生受苦時住本來寂靜大涅槃想故而不生憂苦也是此般若之助大悲心而奪其大悲之邊憂苦義也見受樂衆生亦爾也又是雖住寂靜涅槃理而被奪大慈悲心故常不失利生作用云也生死涅槃二義相比住如牛二角雙云也疏以如是等至以為喻也者結也疏第三句云至然後隨滅者下牒本文釋第三喻意於此二一者燒盡諸物用二能照了諸物用也此中大者是劫災大火之燒盡一切色等用也疏如來智火至無所依者此初義之合也疏復次如世至一切諸物者是第二明能照了諸物用及能成熟所造色用也疏如是一切至一切佛法者此合能照諸物用及合能成熟所造色用之喻也結文如前也疏第四句云至能罣礙者明第四喻中牒本文而釋喻中此喻有五義一除塵澄晴義二除熱清涼義三增生草木義四摧壞萬物義五自在無礙義也疏如來惠風至都無所依者合也如次合前五種喻也疏第五句云至而生利樂者是牒經文也此有喻及合疏如水大德至多所饒多者釋初喻意也自下有七種喻中有初喻也降流水先潤高處次後漸漸流潤下處也鑁字智水亦爾也先利上根上智次及中下根也是饒益衆生用也疏能潤草木而花果者釋此第一喻之益物作法也謂水大能充潤諸草木而生長花果令受用利樂諸衆生故云有饒益衆生用也疏又復本性無垢無濁者是第二喻也水自性本無垢濁若雖有交雜濁泥時自性是常清淨也疏悉能滿足飢渴衆生者第三喻也疏洗諸滓穢者第四喻也疏蠲除熱惱者第五喻也疏澄深難入不可測量者第六喻也疏於坑坎之處性皆平等者第七喻也疏如來智水亦復如是者物合也疏從真法界至利益群生者合第一喻也謂從真如法界處流出智水而説聖法方充潤四禪四無色等諸定而生長三十七品菩提分等助道法遂令諸衆生至佛果菩提心處云也疏體無煩惱至故無濁者第二喻合也此有三義一清潔二無垢三無濁也穢無可交合故云無濁也初離煩惱障次離智障後純無雜唯性淨性又初性得自性淨不被染客塵次彼得淨故遠離煩惱障所知障所知障無垢穢咎後亦修得清淨故無惡業苦果間雜義是也疏諸有得之思願盡息者第三喻之合也疏獲清涼定者第五喻之合也是無漏定也疏洗除塵勞者第四喻之合也問第二清無垢濁義與第四洗除塵勞義有何異耶答第二義是約自體淨義邊也第四義是約淨他物之作用云也疏湛寂難思者第六喻之合也疏證平等性者第七之合也疏故以為喻也者是結也疏復次金剛至五字義也者明第二復次釋意也問上第一復次釋中云金剛手承佛神力為欲發起大悲胎藏祕密方便故之文與今此第二復次中金剛手説此五喻即是發起下文五字義者之文其義差別意如何答合案云若約四種曼荼羅言之時上第一復次中且約大曼荼羅三昧耶曼荼羅羯磨曼荼羅義而云為欲發起大悲胎藏祕密方便等於此等第二復次釋中直約法曼荼羅義而但云説此五喻即是發起下文五字義也可尋問也疏阿字門至門為空者此五字如次是地水火風空五大之能詮名字也或亦此五字即變現此五大法云也此義如此經悉地出現品説也疏文如世間至常住妙果者此總合上五大喻也問以法然常住五大為能生緣者法佛一切智智果是已成所生法也所以待能生因緣所生法豈成常住義耶答以此法爾五大為了因返而顯得本有一切智智功德云也不謂以生因始生一切智智果也顯得常住理可必用了因何必是有無常過失耶又即身成佛義云皆以六大為能生以四法身三世間為之所生此所生法上達法身下及六道佛説六大為法界體性雖有能所二生都絶能所法爾道理有何造作云云以此文可通此難也疏所謂不可至因緣也者是結法佛境界常住不變義也因緣者此五大是顯法身常住果之因緣云也是了因此助緣義也疏金剛手至生解之機者是顯上用五大喻而讃問法佛一切智智果德之意也此文有二重之義而成此讃問也一者是發問之本緣也謂先見如來所現十佛剎塵數無盡莊嚴藏之諸執金剛及菩薩等三業差別功德無盡而一一諸尊形類不同眷屬衆多充滿十方世界猶如帝網互無障礙之瑞相故因之為將發問之緣而是欲問此所現之所由故也謂文如來獨一法界加持之相者是表心王如來之德不共用也謂心數俱互皆是雖現十佛剎微塵等三業差別智用瑞相而心王勝於心數德云也法界者是法界體性智義即是能加持者也加持之相者是能加持之所現相貌云也法界加持者能加持自性受用佛也之相者是所加持十佛剎微塵數等他受用身等也文心所惟忖必知得説如是法門故先喻顯其功德發起大會生解之機者是為明第二生解因緣也謂依所緣境之所表示相而比知得説此大法故舉此五大喻問為所由而欲令諸同聽大衆依此問所顯義而漸漸解法佛境界微妙義故金剛手致此請問云也是於下佛正説法義中以此比解之智而為得得正解因緣云也疏然後問佛至分別説者下牒經三句問而總釋其意也是問上所問法佛之一切智智果生起因緣及果滿相貌也文如來智印者謂法佛境界一切智智是智智是唯有法佛自分而無於餘人分故名印印是印驗也亦是印可義也印可是決定不疑慮義也文即定其心廣分別説者是金剛手之能於內心伺察決定而舉此三句問題云也或是定字是唯義也意云相對上惟忖比知心故今即云即定其心也是決定一向唯請問佛一切智智定生起因及果滿相故也亦上經文云何如來得一切智智者是總略問也今此三句問是廣分別問云也疏例如彌勒至菩提記者是指比例就中有二一彌勒疑問二文殊決答此即其初也神通之瑞者説法花會座有瑞現二二從天雨花四四地六種震動一一眉間放大光三三大衆欣悅五五佛先序説無量義經六六佛入三昧也是皆不可思議神變故名為神通瑞云也依彌勒菩薩見此瑞相示現即比知若是佛欲説自證妙境歟若是於人欲授大菩提記別歟故彼經云佛座道場所得妙法為欲説此為當授記示諸佛土衆寶嚴淨及見諸佛此非小緣云云謂憤憤者以心度量之事而心之不審義也此鬱結義也悱悱者以辭欲陳説此境而口之閉塞義也疏文殊發至妙法蓮華者是示第二文殊分別判答也此答意云引昔日月燈明佛所現瑞先證分例知此釋迦文佛説妙法花經而即時顯實相義兼即於三乘人可授大菩提事記也故彼經云我見燈明佛本光瑞如此以是知今佛欲説法花經今相如本瑞是諸佛方便今佛放光明助發實相義乃至佛當雨法雨充足求道者云云疏然後如來至得離疑網者此六瑞問答後佛自説一乘境界有二章一略開三顯一乘章二廣開三顯一乘章也初略開三顯一章經文拾其綱要言之者文云無漏不思議其深微妙法我今已具得唯我知是相十方佛亦然諸佛語無異於佛所説法當生大信力世尊法久後要當説真實此略顯一乘也我令脫苦縛逮得涅槃者佛以方便力示以三乘教衆生處處著引之令得出云云是略開三義也三乘五乘衆聞此略説故皆悉墮疑網動執生疑而致廣説請問也依佛此殷勤請問故將欲廣説一乘時當座有謗法輩五千四衆也撥遣彼衆直為根熟衆廣説一佛乘法也所謂諸佛世尊唯以一大事因緣故出現於世欲令衆生開示悟入佛知見故出現於世是諸衆生從佛聞法究竟皆得一切種智故云云依聞此廣説一乘舍利子除疑網漸漸悟解佛乘唯一無二理而喜心內生踊躍外現領解具陳佛述成方畢受記始蒙此外餘中下根等相次有此得益臨經文可見也疏譬如春陽至苗能出生者以喻明法花會得益相也謂值春日遲遲暖氣其穀實種子漸漸欲解脫於穀皮以此喻可合本有佛性之依佛日惠光緣聞熏習力因故始欲生無漏牙莖之最初相也雷風鼓動者合四辨八音説法振響也時雨潤灑等者合降大法雨水而潤機熟衆生善根之種子令生菩提之莖云也謂以如一味雨一乘法而普潤令生長三草二木等云也此義如彼經藥草喻品説也得離莩穀者此依佛説法緣隨分捨麁分煩惱惡業等義也苗能出生者此始生淨信心義也如彼藥草喻品説也得入佛法者以信為最初牙也若無機之人等者謗法一闡提等人是人雖聞正法而無當機益但成未來世結緣益耳疏毗盧遮那至善哉善哉者牒本文而釋其意也此有二種由有二重善哉也謂一金剛手上仰測佛心而契合其聖意二下成機會之生解因緣而助顯佛之正説也故佛殷勤重善哉善哉言云也疏我觀一切至如是義也者是明第三重言善哉之所由也謂此所問三句法門是廣大甚深故然於如是廣大深義法請問之餘人力不可成故佛殷勤稱歎於金剛手也問此三句法門攝盡一切顯密正法方如何答攝盡一切教法也疏以如來至倍增復明者下是明佛之讃嘆於金剛手之得益義也是於此有二益一於己當得功德增長成就義也疏明於所受法終無漏失者二者無妄失益也謂於己身當所得功德終令無妄失云也疏次即誡言至明之儀式也者是明佛教誡試許説也諦聽者古來釋云是令成聞惠也極善作意者是令成思修惠云云此是教試於聞者詞也謂於此難過希有深法不可生輕慢想也故能傾耳靜心無亂意無散心而可能聞思惟亦能修證云也吾今説之者是許説也文為未來等者殷勤教試本意也謂於金剛手等雖不可有生輕慢想但約未來世微信行者成此試云也必須住深重殷勤求法志而可聽聞此希有深法云也所以佛世尊必置此試詞者於將來世為聽法者及能説者必置此教試也是三世諸佛之説法定規十方薩埵受法威儀云也疏深心受法之儀式也者是明金剛手之可受法之威儀羯磨義也經云金剛手言如是世尊願樂欲聞云云是明聞者之印可仰樂佛當説義也疏故釋論云至應為説者引論説證成聽者之應聽法之軌儀也此長行文意云聞者善心者具善十一心所人可堪聞法云也設雖不皆具足之若帶一兩等者堪聞法雖無當時現益有當益故也善十一心所者謂一信二慚三愧四無貪五無嗔六無癡七勤八輕安九不放逸十行捨十一不害也又具別境五數心所人可堪聞正法也一欲二勝解三念四惠五定也亦有遍行五心所謂作意觸受想思是是五心所一切有心時必具足也此中真信者簡邪信心也邪信是信受邪説無堪信受正法能故也偈頌意云重明身威儀與心樂求相相應義依此二用得解義而內心喜發外現喜相也文如是之人等者此結也疏及無盡意至廣説之者引經説成應聽法義也拾彼經文可知之
