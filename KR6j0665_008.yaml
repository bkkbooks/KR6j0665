body:
  text: 大日經住心品疏私記卷第九疏經云祕密主至心相續義也者是從下廣答上第三心續生問也文經云等者是牒也文者以下答心相續義也者以下總釋上所牒文意也從是以下明十住心差別相云也此中自然被答衆多請問也疏欲明淨心至違理之心者是明於第一重異生羝羊心是最初顯示之所由也意云於向上還滅門中始為欲顯淨心之最初起相故先説凡夫癡暗迷心之過失從此迷心過失中而才發最初微少善心云也重意云此凡夫極迷心之中才初發微少善心説名第二愚童持齋心意云依此義故第一異生羝羊心是雖不能對治藥體而與此藥還成資助因緣義故則先説愚童凡夫之違理心相名為異生羝羊心實雖非能觀行心而為觀心之因也此義如涅槃經三十五云一切無明煩惱等結悉皆佛性何以故佛性因故從無明行及諸煩惱得善五陰是名佛性從善五陰乃至獲得阿耨菩提云云愚童者是喻名也如世間幼少童子不辨知善惡道理也不辨善惡者如愚童疏無始生死至有始見中者是引智論釋無始義文而助釋此中無始義也謂生死之緣起其始初際不可得故名無始也意云本覺法身佛隨無明熏習始流轉生死中是初際不可得云也此義如密嚴經上卷云非如外道説壞滅為涅槃壞應同有為死有復生過涅槃若滅壞衆生有終盡衆生若有終是亦有初際應有非生法而始作衆生無有非衆生而生衆生界衆生界既盡佛無所知法是則無能覺亦無有涅槃云云明生死無始義此經文甚妙也亦釋無始義文有法藏師起信論疏上卷中也疏凡夫者至曰異生也者是依作業各別受果各別色心各別故名異生云也羝羊者是三歲羊也取愚迷者即比此喻也羊是獸中最愚癡者也羝者謂異生迷愚如被籠羝羊迷惑而失為方也疏其所計我至執著我名者是前所云異生類於迷心被狂亂而所計實我相是但有實我之言語而無有其我實體云也唯識論基師疏第一卷中依此義意故此凡夫所執我名云無體隨情假及以無依有假我也疏有者即是我所者是意云於我有所繫屬物故名我有亦名我所也唯識論云如屬我物立我所名云云疏如是我我至名為分者我執不同故名我分云也此十六知見等義如十住心論第三明也本義有瑜伽論婆娑論中也疏次釋虛妄分別所由者是欲釋上所云我執生起所由故先明其大意也謂此上所云諸我我所執是依非了達諸法之緣起自性即空真理故妄迷生實我之執云也是總破諸我執意也疏故云祕密主至我所生也者以釋意歸經文也疏若彼觀察至當得正眼者此辨對覺而起迷咎謂雖昔彼成我執凡夫若今設改作無性觀想時是虛妄所執我相都成不顯現云也文何者是我者總破諸我執之辭也我義是自體常一義作用自在義也然常一自在者凡於一切法中不可得云也一切有為諸法若染若淨若心若心所若色若有情若非情皆悉無常敗壞也皆是待因待緣而成就和合法體故何有我義耶云也文我住何所者亦非我不可得設雖其我有其所住處有何所方耶云也文為即蘊異蘊相在耶者謂是責問外人之辭也於五蘊中分拆一一求我自性處都我不可得也若離五蘊而外求我即亦我自性不可得云也故知凡我是從本畢竟都無法也但是衆因緣和合積集法似我相顯現而愚癡衆生執謂我云也疏然彼不自至餘皆妄語者是明諸愚童成我執之由來也此生我執者有二因緣一者自心不覺無我理故二者依邪師教誘緣義也文謂我在身中者是明彼邪師之所計之住所也文能有所作等者明我作用也文唯此是究竟等者是明著我迷執咎深重義是見即我見也疏經云復計時者從下經文於諸外道所計而出別其所執義也是此計時外道所計也疏謂計一切至以時為因者是釋彼計時者之所計意也疏如彼偈言至時為因者是引中觀論中所云計時者之所計義也此即以時謂常一自在義而計我意也疏更有人言至不壞故常者是又出中論所云計時宗中別師義也此義意云時是雖無能遍作一切用而體常一故猶計我耳文以花實等果等者是以比量心而知時實有云也意云春花開敷秋果實成熟是事決定不改法也此是時之果也時是因也故以果可比知因時之有義云也問先云一切人物者非時之所作云畢也然何今以時為因以花果等為果云耶而若許時為因何不有遍所作用耶答可尋此異人所計故義不必同也又解云上所云雖一切人物非時所作者彼義意云於一切法中一分非時所作云歟故無相違咎也所謂春無花秋無果實草木等此類也約有春花秋果草木等義比知時有實體義云也疏亦以不觀至妄計也者總破前二計也若約佛法中説時義者此時是不相應行法也返即以色心心所為時自體也無別離色心等有時自性云也疏經云地等至皆應廣説者是舉計五大而執我之各別宗計也謂五大是有成所造色增上緣作用故然外道迷執此作用而計五大謂能變化諸法之實我云也執實我故成恃矯想而陳供養而求請解脫云也疏經云瑜伽至離於因果者是亦出別師所計也此意云定心之相應於所緣境即説名瑜伽也是於此心與境相應而成辨色界無色界果報等事義即迷謂實我云也定心是離散動分別而專注一境湛寂安住也彼得定人出定後迷而執此義故謬計真我云也疏不觀心自至以為真我者是破此計也此破意云此定心是如幻即空法也此非有似有心法剎那剎那生滅不住也然虛幻非真依他心法之專注所觀境何即執可為我耶破也疏但住此理即名解脫也者是陳此外道所想至極之所計果義也疏經云建立至謂之為淨者牒建立不建立二計義而且先釋建立之淨義也此義意云一切染淨法皆悉隨心建立云也故次下文云建立如從心出一切法云云此義其意如因果經第五云阿羅囉仙人云衆生之始始於冥初從於冥初起於我慢從於我慢生於癡心生於染愛從於染愛生五微塵氣從五微塵氣生於五大從於五大生貪欲瞋恚等諸煩惱於是流轉生老病死憂悲苦惱又仙人言若欲斷此生死本者先當出家修持戒行謙卑忍辱住空間處修習禪家離欲惡不善法有覺有觀得初禪定除覺觀定生入喜心得第二禪捨喜心得正念具樂根得第三禪除苦樂得淨念入捨根得第四禪獲無相報別有一師説如是處名為解脫從定覺已然後方知非解脫處離色想入空處滅有對想入識處滅無量識想唯觀一識入無所有處離種種想入非想非非想處斯處名為究竟解脫是諸覺者之彼岸也云云今私云彼仙人所計是與此建立淨宗義甚相似也彼仙人所云依心之修行力而所成就非想非非想果而為淨法也是且約取淨一分名建立淨也此猶有妄執我義也亦以生我慢心我癡心力故建立餘諸法云故也疏次句謂至云無淨也者是明第二非建立宗所計義也此計意云建立所得造作法非真實淨法云也從本離建立造作法是真實淨法也所謂無為法是歟是若虛空無為等歟是自在天論者中執虛空為我或有執梵王大自在天等計本性淨者也此無為則名為真我云也此名無建立淨義也意云於此無為法即無始待建立之淨義故名無建立淨也雖然非謂如真如無為本性自清淨義云也疏由不觀我至如是見生者是總非前二計也疏廣説如上者是破如是等妄執文是指前所云五番所明破遣執文也疏經云自在至能生萬物者此出此句中第一計也疏如十二門至廣説也者是引論而破彼所計也義易了也疏計出者至差別形相者是明與上建立義同異相而釋流出意也此中約喻明流出義也若約法明之義者是自在天能生諸所受用法義猶如陶師以手功出生瓶瓦等云也疏次云時者至天種類也者此中計時宗與前云有時外道所計不同云也文皆自在天種類也者上三計皆自在論者宗所攝云也此義如十住心論第三云第七計自在論者凡諸世間士夫所愛彼計以自在變化為因或餘丈夫時方本際自然虛空極微我等不平等因云云古德云自在等宗是諸法自在天云之外道執也即隨所計為名也此外道執諸善惡果報皆隨一因生故是所計因不平等因言隨一因者或執諸法大自在天變化或大天變化或大梵變或時方虛空我等為因云云第一卷記竟疏第二卷疏經云尊貴至外道計者是總先舉此宗之能計之主也那羅延天者是此外道之所奉尊者也奉仕此天之外道故名那羅延外道也依主有財二釋也那羅延者真諦三藏云翻為人生本也玄應云此云鉤鎖力士也真興僧都云今案祕家亦名毗紐天云云信行云勝力天云云疏此天湛然常住至故名尊貴者是明彼宗所計也此中意云彼那羅延天王是如垂拱之君王雖無所為而命於餘眷屬諸天神下宣令令作諸法云也疏文此宗計至火風空處者是此尊貴宗義中之是第二義也此義意云以能造五大為究竟尊貴處云也是諸人法之所歸依云也疏昔有論師至如是妄計也者是為顯此宗所計非理之所由故出往昔能破之例而今亦破彼所計也問前所云地等變化與此中五大尊貴其差別如何答彼但云五大變化諸法義也今尊貴義意云五大遍在所造諸法中義云也疏經云自然者至皆自爾也者是舉自然外道之所計也疏有師難云至何自爾耶者陳彼能破道理也疏若謂雖有至須人功發之者是外人被前破而述返救答意也疏是亦不然者是重破前救答也意云若待因緣顯現法者是不自然有云也疏經云內我者至作諸事業者是出執內我宗所計也此計意云內心之外更亦有別實我體云也疏難者云至皆悉斷壞者是能立道理而破此邪計意也破意云計此我有能作事業故是即我能作因也因是生果義有故因即可有無常作用義也果是待因故即必有無常義也以我作用無常故定可比知我體無常義也我體定無常故我之所作罪福果報可滅云也疏如是等至中廣明者是指彼中觀論等明外道所計義與佛法差別之文處歟可尋知也疏經云人量至身大亦大者是亦出一類外道所計也此義有成唯識論第一中也疏智度云至即與此同者是依智論而出此外道所計宗義也文即與此同者彼論所云外道所計與此經所明人量義等同云也疏然彼宗至不然也者是能立理破此邪計也以彼外道所計而為因即破彼實我義也疏遍嚴者至是我所為者是出此宗妄計也此宗計意云世間富樂事是我之自在威力所作云也疏與自在計小異者簡別也彼計一切罪福是自在天所作也此唯嚴福事是我所作用云也疏如中論破至常自在耶者是引中論破自在天能作自在業文而例破此遍嚴自在我義也破意云若遍嚴者自在能生諸福樂事者於受苦者可拔彼苦與樂也而已不拔苦與樂故定知不遍嚴自在義也若於諸衆生有愛憎心者如智論所破是無自在義也疏經云若壽至睡眠故者是亦出一類所計也此宗意云壽命説為我義也疏難者云至妄見也者是立道理而破此邪計也文若見斬伐乃至豈無命耶者是立理破草木有命義次如合昏木乃至豈是常覺者立此理破草木有眠覺義也疏經云補特至識神為常者此計意云數取趣者是我之異名云也實神我而數取六趣之生死故云爾也文從今世趣於後世是即識神為常者此神我雖有於三世流轉相而神我體是常住無變易云也疏識神若常至則無有我者是下立理破此計也文中有二初就彼所計常我義而於此實我責有生死咎後依此難之道理成故即破有我義也疏如佛法中至破彼宗計也者是欲破此數取趣之宗計三世實有我性是妄計義故例出犢子部薩婆多部之為大乘論師被破彼三世實有妄計之咎也又解是亦別例破彼小乘二部所立三世實有義也文則同數取趣者失佛三種法印者是別明大乘者之破此二部小乘宗意也此中部小有二破一者部論師立三世實有義則是同外道數取趣我執者立三世實有之妄計云也二者違失大師釋迦文佛所説諸行無常有漏皆苦諸法無我涅槃寂靜三法印道理旨故此二部論師已可非佛弟子云也是順外違內有二咎故破之也疏經云若識至皆遍滿其中者此宗計意云眼等六識即遍在能造五大及所造諸色中云也此宗意云以此六識常遍義而計神我云也疏此亦不然至為無所用者下破此計也破意云六識即遍在諸色等六塵境中者此識發生時不須待所緣境及所依根而直識獨見聞覺知也然諸識生時必待所依根及所緣境界起故可知識不遍在一切色等境處也疏又若識神至有死生耶者又重破也又神識常遍在五趣中者何於此於此處死已於彼處可生耶常遍在法無生滅周旋隙故也文故知不爾也者結破也疏經云阿賴耶至亦是室義者此凡出阿賴耶翻名也此有二翻也法藏云阿梨耶及阿賴耶者俱梵言訛也梁朝真諦三藏訛名翻為無沒識今時玄奘法師就義翻為藏識但藏是攝藏義無沒是不失義一名異也云云此無沒義意云攝持諸種子令不失故名為無沒也疏此宗説有至則滿世界者是明彼外道所計也此計意云此阿賴耶我卷舒自在也若卷之時不可知其所在處是極微細故也若舒之時遍滿十方世界云也文不同佛法中第八識義也者法藏云所攝名藏謂諸衆生取為我故所以然者良以真心不守自性隨熏和合似一似常故諸愚者以似為真取為內我我見所攝故名為藏云云今以正而簡耶也疏然世尊密至亦同我見也者此明邪教所説聖教所説不同意也此義如密嚴經第三云如來清淨藏亦名無垢智常住無始終離四句言説佛説如來藏以為阿賴耶惡慧不能知藏即賴耶識云云意云佛説阿賴耶識義與外道所計賴耶識義全不同云也佛説賴耶意是如來藏之受諸染法熏習而變異諸染法令不失其業因果報故立賴耶義云也依此義楞伽經云如來藏是善不善因能遍興造一切趣生云云又起信論云與生滅不生滅非一非異名阿梨耶識云云疏若佛法中人至同我見也者是出佛法內人妄執賴耶有我見咎也故解深密經云阿陀那識甚深細一切種子如暴流我於凡愚不開演恐彼分別執為我云云又云由攝藏諸法一切種子識故名阿賴耶勝者我開示云云起信論云人我見者依諸凡夫説聞修多羅説如來之藏無有增減體備一切功德之法以不解故即謂如來之藏有色心自法自相差別云云疏經云知者至即是真我者出知者見者即執真我之妄計也疏智度云至事異名也者意云眼根之見色境名云見者眼等五識之知色聲等五境名云知者也是皆我之異名云也隨緣境事業差別而異名云也疏難者云至為是我不者是破外人之邪執也謂外人云以眼見色境義即依為我義而以此所計為所由亦以於餘耳等五識等同可為我之例責之也疏若皆是者至是亦同疑者是依前責而更以與義重破之也此破意云若説六識為我者此六根所取境界不同而眼識等各各互不得相知他也然眼識獨而如不能了作聲等諸五境餘五識互共均不可了作色等諸境故也故知眼等識無遍緣用故可無我義云也疏若有非我者是亦同疑者是總結破也意云外人彼許此一身中六識既有見聞觸知用故依是皆悉被責於其六識體悉可有六體我義故又六體都成一體一體成六體理最不可義故云也而亦轉救云眼識一是為見者智者而是即為我也餘五識是無我義云也今就救意可返破耳識等若有非我體者是即可許如餘耳等五識等非我而眼識之非我義者即返可知也彼所云眼識知者見者即真我義亦可同例難也是眼識為我可難也疏故知根塵至無別我也者是結明正義也疏經云能執至乃名真我者此中有三種義別一者離識心外別有能執持我二者識心即能執持為我三者所執境即名為我義也文此我遍一切處者明此我周遍用也疏然內外至故作是説者是破此妄執也文是中所執能執尚不可得者意云心境俱因緣所生法是假相而即空義也何況此有實我耶云也我之自性者是諸法即空性云也疏經云內知外知至是真我也者此明此宗之所執妄計也此意所云彼內知之我是似第七識之緣第八識成自內我執也但今此外道執內識而彼為自我義也此外知我是其以第六識之緣六塵境而於自心成我執也疏經云社怛至特出之耳者是出知者外道宗中之別師名云也但所立計義不分明也疏經云摩奴至以為名者是明人生者計執義也為欲明此為人生因當正翻義所以示相順梵名也此所計義相當此人生義也此摩奴闍者是正翻可云人生也然義翻云意生也此自在天論者內別師所計也彼自在天論者計是一切人從自在天生也今此師云人類從人生故名曰人生也疏唐三藏云至義別誤耳者是出大唐玄奘三藏云摩奴闍者翻意生義是不正翻是誤翻云也此義翻名有成唯識論樞要上卷中也文末那是意今云末奴聲轉義別誤耳者是述彼意生之名非正翻之所由也末那者此云意也若意生者是可云末那也然今云末奴故定可知是人義也非意義也意生者有古德云計此我隨意生云云疏經云摩納至可一寸許者明此毗紐天外道所計執我相也是明此儒童目非正翻義也故先出梵名而明其所執計義而相當勝妙義云也是依所計義此計主名毗紐天外道云也此外道宗中是別師義也毗紐天者百論翻云勝遍天也疏智度云至藏己莊者引智論釋成此摩納婆之所計我相也正是即勝妙義云也問此我名儒童意如何答三論宗賢聖義記第一云摩納縛迦者此云儒童意我猶如小兒其性不定有時高有時下於劣己高傲慢於勝己生卑下言云云此喻中像骨義不分明可尋也私案意云有情之形像身分是先內以骨為依質而其上用皮肉筋脈合集莊嚴成就五體等身分義也若以此意故取此例喻此外道所計身內我相義成立其義也疏唐三藏至義別誤耳者此亦明翻摩納婆名儒童非正翻之所由也問若依此經梵本文者摩奴摩闍正可翻人生及摩納婆正可翻勝妙也然何故於此經正翻本文既用謬翻之意生義及儒童義耶答此難難通也然嘗通之謂此意生儒道之翻名實雖非正翻今隨順古德玄奘三藏等舊翻義故且用意生儒童翻名也問其菩提阿闍梨誰人耶答此人不分明也以義推之若是金剛智阿闍梨歟其所由者彼人名縛曰羅菩地或又名菩提也菩地與菩提其音同故也故不動使者法內題下注云三藏沙門金剛菩提奉詔譯云云是金剛智阿闍梨也是此疏主之本師也故亦安阿闍梨言歟疏經云常定至故以為名者此計意云我從本已來常住不變云也無有更生者是無新生義云也疏經云聲非聲至自分異計者此中有二類聲論者也初聲顯論者意云聲體雖本有而三世常住但待緣而顯現故若緣闕時聲不現云也次聲生論者意云聲是雖本無性待因緣而新生若生已後常住不斷云也疏非聲者與至悉撥為無者是彼聲顯論宗與此非聲論宗相對辨其差別義旨也此宗計意云凡一切音聲都無云意也故破此云墮在無善惡法也疏亦無聲字處以此為實也者此出此宗所立計也是以撥無為所立義也疏經云祕密至無量無遍者牒經文總明此意也此諸異見我執差別分位不同所由是諸外道論師雖為欲求隨順道理解脫生死苦之勝法而不知此實義故依虛謬妄分別邪推智謂邪理而為真誠義云也故如是種類不同而無邊也三十事者是略攝説也若廣説者此邪執計類無數量也若處中説者六十二見及九十五種部類也但是中三十事者於最初總我執而加次次二十七種及三類此三十事歟又別我有三十種也疏如人坐得至例可知也者出此三十事之外餘我執類也此中有二初以所得世間四禪定謂實我云也次以能得禪定人謂實我云也疏皆由不觀我實相故者是總破也疏但從久遠至更無餘道者是明上來所述異見所計本起由來也諸見外道各以自師謂究竟一切智者以其所説為最上出世道云也其所由者此外道祖師尊者各自內堅執此自所得法外為人説邪執法云也疏如劫初時至不可勝記者是異計衆多是此且出以梵王為一切衆生能生父計意也文如是展轉下是明如是異計衆多不可舉盡義也疏希求順理至故云然也者是釋彼外道所云順理義也順理者是行因也是隨順道理之行云也解脫者是果也依此行因力故得解脫苦之果云也瑜伽者是於正理相應行云也以此解脫果而為諸法之究竟宗歸本源云也疏已上皆是至違理之心者是結也謂上來是外道異計或是第一異生羝羊心所攝也是一向有惡行相者是也是所可厭離境界也或又是有愚童及嬰童二種住心所攝行也尋之可知也疏次明最初至世間八心也者從下明第二愚童持齋心也此前一向違理心之次此微劣少善根最初來起云也其善體是順世間八種心之中第一心是也具如下辨疏經云祕密主至善業發生者明第二愚童持齋心之經文也是先異生羝羊心中若適發生此微少善根心者名云愚童持齋心也疏羝羊是畜至愚童凡夫也者此文中釋經所云羝羊及愚童二義意也可悉之也疏世間從久至八關戒也者是釋此持齋意生起因緣也文世間從久遠乃至而不能得者此明從昔以來異生羝羊心未離過惡義也謂此異生凡夫才聞善名字雖求善義利而未知小善之所歸自性云也文後時忽然乃至即是善法者明此愚童持齋心之漸始得小善根意也疏然猶未是佛法中八關戒也者是明此人所得小善於佛法中未及三歸八齋戒云也問八關戒者其義如何答毗尼討要第三云名八戒齋或名八關齋前八是關閉八惡不起諸過不非時食者是齋齋者齋也禁止六情不染六塵齋斷諸惡具修衆善故名齋也又齋戒體一名別若尋名定義義容少別齋者過中不食為名戒者防非止惡為義薩婆多云八箇是戒第九是齋齋戒合數故有九也依俱舍論合九為八故論云此戒分為八分前四名戒分離性惡故次一名不放逸分後三名修分云云若依此意者齋義意謂禁止六情齋斷諸惡云故是即制禁義也齋字加疑留也但於此云是制禁義也又齋義是齋等義也謂齋斷諸惡具修衆善云故是齋等義意也依此義故俱舍雜心云八戒是支非齋不非時食是齋云云意云每持八戒日均等必定可成過中不食行云也關者此閉塞義也問其戒相如何答彼討要云一者如諸佛盡壽不殺生我某甲一日一夜不殺生二者一日一夜不偷盜三者一日一夜不淫泆四者一日一夜不妄語五者一日一夜不飮酒六者一日一夜不坐高大床上七者一日一夜不著香花瓔珞不香油塗身不著香熏衣八者一日一夜不自歌舞作樂亦不往觀聽九者一日一夜不過中食云云略取意抄之討要云是以劫初聖人教人持齋修善作福以避凶衰是時齋法不受八戒直以一日不食為齋後佛出世始教一日一夜如諸佛受持八戒過中不食功德將人至涅槃云云節食者是六齋日過中不食云也若依此文是齋義是制止義也非齊等義也何以故此時無八戒與何物相對而成齊等義耶若約白黑兩月各各均有三箇日修善義者可有齊等義也疏彼由節食至而得安穩者是明持齋利益相也此利益有六種一者緣務減少謂飮食之經營行漸漸減少也二者飮食易飽足也謂一日一座食故減少多座多食也故食易足也三無馳求食之勞苦也少欲知足而不多求食故也四者減闕堅著欲染心也謂一日一夜是過中不飮食食欲薄是也五者持此齋戒故此人心得歡喜發生云也六者得安穩也依此持齋功德離衆災難諸天善神守護故也疏由見此利至種子心也者是此人依見前所云種種利益相故即無闕怠數數修此行者名為順世八心之中最初種子心云也是未依佛法中八齋戒云也疏經云復以至子生芽也者釋第二牙種生心也是初所持齋戒之上更修惠施行云也文由見止息貪求內獲利益故者是指前六種益也文欲修習此法等者明此第二心之生起因緣也文於持齋之日者正明此第二心相也齋日者太賢師云六齋者黑白各三謂第八日十四日十五日二十三日二十九日三十日鬼神得勢傷人為令勉害故須制也云云私云若依此文意黑白二月各各均有三日可愼日故云齋日歟或亦齋者制義歟文自念我無等者是為盜賊無被劫抄之怖畏也財寶積聚人多分為恐盜賊奪劫常加守護自致勞苦云也然此人既捨己財産施六親者無此勞苦云也文而令他人等者是於六親行惠施者美名聞八方諸賢善人崇重之故蒙孝義譽云也是以持齋行為善種子以於親識修惠施行為善種子之牙發生義云也疏經云復以此施授與乃至故為世間最上心也者是隨經文所明第三心第四心乃至第八心義而疏主釋之意也今取意明此義者前第二牙種心是雖施與於親愛恩處而施心不平等是辨親疏故此第三種心是無貪心漸增長施心漸漸廣不分別親疏故功德轉廣云也此心如種子之牙值水土緣而漸欲開發義也第四施心是漸漸頗崇重賢善輕拒暴惡義是善心轉增長故隨喜他善也願親近賢善者是遇善知識而蒙教誡因緣也此心是如草木之莖增長而生葉也第五施心是凡廣故擇德有能人成就才藝者與財物之心是於前心漸倍增云也是施心之歡喜轉深重云也此施心是如枝葉茂盛而生花也第六成果心是於前賢善有智人以親愛心崇重尊貴其有德之能而布施親近供養為求出欲行於彼令説離欲法而聽聞之云也是前持齋節食及親近施與行之果也第七受用種子心者是守戒行而為生天因故名云種子此種子現世有利益故云受用也謂美名聞諸方及離衰惱是也又此護戒心即招後世無量福故云受用種子也從下明心續生句中第三嬰童無畏心義也謂第八嬰童心者是依善友教誘而歸依欲天等心是也是見自持戒善離危難勝利故漸知因果道理故亦轉崇重諸大天等修善因而欲感得天果報故隨順於彼而恭敬供養此即諸天加護此人故流轉生死間得無畏所依云也此依信善友教誘猶如稚幼童子雖無勝惠解直信世人父母等辭也或又有信佛法人也疏問曰前説至不同前計也者是外人伏難及答義也文意分明故不釋之也疏商羯羅至首羅別名者明所歸依境界大梵天等也基因明疏云商羯羅者此云骨瑣劫初梵王下化人間以苦行形骨瑣相連云云安然云初禪主名商羯羅此乃大日經中商羯羅天於一世界有大自在非於三千界者是也云云自餘天龍等如文可知也問文云然佛法中梵王離欲無有后妃者如何金剛頂經云時有摩醯首羅天王即是三千大千世界主住於諸世界中之王有何等而召我耶乃至不動明王白佛言世尊此有情故犯三世佛三摩耶法以何法治之佛言可斷其命時不動明王則以左足踏彼頂上寶冠半月右足踏彼妃首冠半月中云云又十八會指歸云上界天王摩醯首羅等無量諸天及后皆悉引入云云若依此文第四禪梵王是有后妃義也答雖有此文其意異也是不謂梵王有實后妃也今私案理趣釋云降三世會中列五種無戲論之中欲無戲論者是無三界欲愛煩惱云也由此欲貪愛著之潤業潤生而受色界生也是屬愛煩惱名云女歟此屬見煩惱及無始無明名云男歟故此疏下文貪愛名云女即此義意也但此處意是有梵天后者是別出外道所計義也文梵王所演四圍陀典者悉曇藏云劫初梵王亦曰商羯羅天初從四面創出四論亦從頂上以出一論後人更造六論解釋彼四婆陀後面所説阿闥婆陀辨聲明法云云影興師觀無量壽經疏云毗陀論者正音吠陀有四吠陀婆羅門學一壽吠陀論謂養性繕性二祠吠陀論謂享祭祈禱三平吠陀論謂禮儀占卜兵法軍陳四術吠陀論謂異能伎數禁呪醫方今以所引第三平論文疏經云祕密主至解脫智生者是惣標第九第十心之生起所緣也謂以歸依外三寶為緣而發生求解脫智心云也是志求而欲樂勝進而望成於所歸依大梵天等位故也疏然以未知至而勤修學者是明彼悟所求解脫理之智未離偏邪咎義意也疏此中復有至凡有十心者是開釋第九第十心也唯歸依欲界天龍等而求其加護之心名為第八嬰童無畏心也歸依上二界天而求修習六行智因之心名為第九殊勝心也能修得作證四禪八定之心名為第十決定心也又於求學苦空無常等理之智而生發求心名為第九殊勝也已證得心名第十決定心云也疏世尊欲對至雙離是見者是以此外教中第九第十偏見過相對大乘緣起之妙有真性空義顯彼偏空之過失也文非彼知解空非空義者是明彼外人之不知諸法之即假有性空義也文了知斷常乃至不能雙離是見者是明彼外人之於彼斷常邪理而雖作俱非中道觀猶不離斷常二見咎云也此上句中空者是緣起性空理也非空者是緣起假有相也是即外道所不知也彼唯了知斷常二見云也非有非無見者雖彼生平等義想有尚帶斷常妄見云也絶諸戲論者外人觀此非有非無義故且云絶約彼妄情所謂有無之戲論咎云也問捨斷常二見咎是平等正見體何云妄見耶答斷常二見是直違現量因果道理義故顯此咎最重所以若有一類外道義或先除此見也雖然尚不覺緣起假有性空道理故迷失正道理故猶雖存非斷非常義餘他妄見尚不捨故未捨妄情執見云也地藏占察經菩提燈三藏疏云若如外道僧佉執有衛世執無尼乾陀執亦有亦無若提子執非有非無若言定有是增益謗若言定無是損減謗若言亦有亦無是相違謗言非有非無是戲論謗云云如彼長爪梵志之雖不能受斷常二見尚存斷常不受見返是尚依止斷常邊故尚終未離斷常之邊云也意云彼梵志好將非他外道所計斷常二見自雖不受斷常二見自未覺緣起假有性空理以前忽云何可離斷常之間云也又迷情所解四句之中後二句是雖有似平等義尚迷亂覺也是非平等見亦如是也疏由彼未解正因緣故者是明外人之斷常二見之迷亂之所由也是依未解知緣起法之性空假有義故也疏然佛法中至不墮斷常者是相對於彼外人妄分別失而明大乘中道德也文如若不達至無分別心者是明觀緣起性空智功用殊勝義也若不解緣起性空理時雖謂作種種無分別真知解皆是妄執而不離分別攀緣云也故密嚴經云若有勝瑜祇善住三摩地遠離能所覺寂然不生是名真實修無相大乘教云云疏猶如長爪至一切法受者出此妄謂無分別見外人實尚未遠離分別心義也不受一切法見是雖謂無分別見而存此不受見是猶不離分別心云也疏夫真空至分別空耶者是外人伏難辭也諸法真性理是離有空相無分別性也然何強用觀自性空義而為離執方便云也疏若不解空至於斷常也者是答也謂諸凡夫異生等從無始已來著有相故流轉生死中也故為對治此有執故則且令作有為法即性空解意也此解空則遠離生死趣向涅槃而離斷常咎云也疏由彼初種子至即入正道者是明依最初欲發節食持齋一念善心以之為因後九心漸次生起而遂入佛法之所由云也文若不遇善緣等者是明此十心之若遇惡緣時暫增長惡見義也文然其八心種子終不敗亡者若雖遇惡緣墮惡見而此既所植八心終成不朽種子而為後入佛道成因緣云也文若聞佛法等者是明此八心若相續遇善緣直成得三乘聖果之善因云也文若是未生種子等者是明未植八心種子人之失也疏又如行者至即能信受者是重明此八種心之即遇善緣而信受佛法義也是於順世八心中而漸信因果理故依此信心之串習力而亦信佛法云也疏復置是事者是棄捨外道所傳之八心而更今信用佛法內八齋戒行云也疏如彼修齋至如説修行者是明遇善緣始入佛法中因緣也是文有四意一者初善友問於行者欲持齋由來也二者行者答於善友欲持齋之所由也三者善友知行者本意故即為説持八齋戒法人之滅罪生福現世安穩後世生天終入大涅槃之福報利益也四者明行者信受奉行義也疏若無機之至餘深事耶者明邪見人之不信佛法失也此人或未植上所云八心種子故也或又雖植八心種子而遇惡緣信邪法故作此説也疏問曰如是至從是生也者問答第一種子心之最初生起因也是依善惡名字而發永善惡義云也此發求善心即説名順世八心之中第一種子心云也疏如劫初衆生至不亦善乎者指住劫始而明善名字之類也上所云世間久遠已來有善惡名者即此義也謂劫初時貪微少欲知足者名為善多貪者名云惡也聞習此名字即此人節食持齋是即善心種子云也疏然此衆生至稱譽之者是明住劫初衆生之善心尚未辨識因果道理也是雖不知善因招善果義但以不殺害行不邪淫行及慚愧推為善行云也慚者是崇重賢善意也愧是輕拒暴惡意也等者等取禮智信善也問其意如何答十住心論云夫五戒同於外書有五常之教謂仁義禮智信愍傷不殺曰仁防害不淫曰義故心禁酒曰禮清察不盜曰智非法不言曰信此為五德云云疏又如小劫至勸導使然者是重又出衆生自然發生善心時節也是彼減劫中小三災起時事也小三災若七日七夜或七月或七年等盛興畢後其中衆生更發起善心依此三業善行即脫惡道生人天二趣云也此義如樓炭經及立世毗曇論説也小三災者一盜兵二疾病三飢饉是也是如次七日七月七年之間盛興起也此災起畢此時所起無師智自然惠是云也疏當知皆是至因緣力也者上所云無師云自然發生其善心之惠是本覺佛性內熏力故此生云也故起信論云真如熏習義有二種云何為二一者自體相熏習二者用熏習自體相熏習者從無始世來具無漏法用熏習者備不思議業作境界之性依此二義常熏習以有熏習力故能令衆生厭生死苦樂求涅槃自信己身有真如法發心修行云云若依此義意一切善心之發生皆是真如熏習力故云也疏如最初種子至堅固性故者是明始覺善心之所依之真如熏習本覺佛性文有一切衆生心藏中常住不變義也謂順世八心之中最初種子心是微少善心即是方即依此本覺雖始生起而其所依本覺真性佛是本不生法云也此本覺法是依修得顯現名不生生也凡衆生厭生死苦樂涅槃樂有二種因緣也一者外緣力謂善友教誡也二者內熏本覺力謂一切衆生身中常住佛性是也故釋大衍論五云又諸佛法有因有緣因緣具足乃得成辨雖有正因熏習之力若不遇諸佛菩薩善知識等以之為緣能自斷煩惱入涅槃者則無有是處若雖有外緣之力而內淨法未有熏習力者亦不能究竟厭生死苦樂求涅槃若因緣具足者所謂自有熏習之力又為諸佛菩薩等慈悲願護故能起厭苦之心信有涅槃修習善根以修善根成熟云云又解文雖云善種子生其實即是不生生者是最初種子之離微塵許心垢時善心實不生性也謂諸法性不生理故也又解未生堅固菩提心故云不生生也其實出世心種子是初發堅固淨菩提心門信心生時是云生疏在衆生識心至更無住處者是明初發淨菩提心門中始覺淨信心人之所發菩提心不壞之義也此義如華嚴宗探玄記第一云二兼為者謂遺法中見聞信向此無盡法成金剛種當必得此圓融普法如下文吞服金剛喻云云此義意云若見聞信解華嚴一乘法者猶如吞服金剛人始從地上至金剛輪其中間更無所住處彼處處不能留住此人也但至金剛輪際而留住云也是此金剛輪是堅固性故堪能止住此吞金剛人故云也此初發菩提心人亦爾也遂不留住生死海及二乘地云也發菩提心堅固性故遂到佛果金剛解脫道云也疏雖果復成至不出阿字門者是前順世第十心亦返雖成違世十心之中最初種子心而其一切順世違世諸心是皆因緣成法故即是本不生義云也或又違世初心是即順世十心之果也此順世第十心是雖前順世九心之果亦是成違世初心之因云也如是因果皆是無不本不生理云也疏故云最上至不能知者是結釋歸經本也疏法華藥草至在於此也者是此心續生之相具義讓彼經藥草喻品也彼經云其雲所出一味之水草木叢林隨分受潤一切諸樹上中下等稱其大小各得生長根莖枝葉花果光色一雨所及皆得鮮澤如其體相性分大小所潤是所潤是一而各滋茂佛亦如是出現於世云云意云佛以善巧方便力稱衆生機根漸次説五乘法而展轉增長為一乘之因云也此義即會稱此大日經之心續生句云也疏復次行者至名初發種子者從下是明佛法中順世八心之中是明此第一種子心義也是行即是漸次厭離世間妙欲心之初起相也故終成涅槃之因云也疏為令此善至名受用種子者是為後後九心成因名第一心為種子義也疏復由親近至無畏依者是略超讃為佛法內親近善友聽聞正法因順世第八心功用也疏又於此中至生決定想者是讃外法之第九第十心相也疏從此即發聲聞菩提初種子心者是彼外法之第十心是返為聲聞乘中第一種子心云也何以故以彼順世第十心而決定信解聲聞乘法故為其初種子而成後之三賢四果云也疏乃至三乘至一一地皆具十心者是於三乘中俱各別皆立十心是三乘中各各具十心此一一地中亦有十心云也疏迄第十地至葉花果等者是別明回心從三乘第十地終入佛乘中者更亦經歷佛乘中十心義也具至下可知也疏有求佛地至今剛際也者是明等覺及妙覺佛果現起所由也文有求佛地智生者是明等覺心生義也此十心中第九心也文觀畢竟空等者尚明等覺心相義也是尚第九心也到金剛際者妙覺第十心是果分也是如實證得諸法本不生理故即至金剛不壞法身地云也疏爾時金剛至諸心相句也者從下是答前第四心相問也上心相問總有二義一者問凡夫心相二者問行者心相是即答初凡夫心相之問也此六十心文相易了故不須釋之也建久八年八月二十四日高野山於往生院書寫了
