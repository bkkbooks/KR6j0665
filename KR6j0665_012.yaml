body:
  text: 大日經住心品疏私記卷第十三疏經云祕密主至心本不生者從下釋明第七覺心不生住心之經文意也文彼捨如是無我者意云此住心意是棄捨彼他緣乘中唯法空無我之解而今依止此本覺心主自在義云也我者是主宰自在義也而於彼他緣大乘中所明圓成實性者是雖許有一分無為自在義未立此有為自在用義也彼他緣大乘心中不許真如之隨緣變成諸生滅法義故也彼他緣乘意者是為遣謂心外實有境界之妄執故強存唯識義是唯識觀義中存心內境境內心互相待成立義故諸法皆是緣起所作性云也此緣起諸法之其真實性是本不生真如理也故此真如性即無實我實法義云也此本不生真如性是雖與依他性為其真實自性而不謂真如自依有為自在力而即變成依他諸法義也故無真如有為自在義也故彼宗明真如但説凝然不作諸法義而不許真如即作有為諸法義也故彼住心中者唯於真如説無真實我相之義也而以真如為我義意者是此覺心不生心者明依此真如本覺即受無明之熏習而變作有為諸法有自在力義故於真如為我義也而彼他緣大乘宗不許此真如受熏義故不立真如即我義也所以彼住心中云無心主自在義也亦此住心者即捨無我説心主自在等云也此覺心不生住心者正依止此甚深心主自在我義也此即至于覺心不生心始正顯示此真如受無明等染法熏習而真如能變成有為諸法義故名心主自在義也心主自在義是即本覺真心之能受染熏能變成諸法義也此義如五教章第三云若依終教於此賴耶得理事通融二分義故論云不生不滅與生滅和合非一非異名阿梨耶識以許真如隨熏和合成此本識不同前教業等生故楞伽云如來藏為無始惡習所熏名為藏識又云如來藏授苦樂與因俱若生若滅又云如來藏名阿賴耶而與無明七識俱又起信論云自性清淨心因無明風動成染心等云云問何故言捨無我耶答前他緣大乘中為恐遍計所執我法迷倒義強於依他圓成法上除遣實我實法執也彼我法二執既除遣已故至于此覺心不生心中者還捨前無我藥而存真如自在之我義云也心主自在者摩訶衍論云一法界心有二種自在云何為二一者有為自在能為有為法而為依止故二者無為自在能為無為法而作依止故根本無明依初自在能作熏事非後自在云云心主者是本覺一法界心是也此心主義者當我義也疏覺自心本不生者解曰此有二義一者本覺自心二者始覺自心也若約本覺自心本不生義言之者若此句如是可訓謂本覺即自心而本不生義也此義如釋大衍論第三云謂心體離念相者即是清淨本覺心謂即是自性清淨心體謂即是本有法身體如是心體即名本覺離念相者即是顯示清淨之義所謂遠離大無明念故言離念遠離四種無常之相故言離相過恆河沙煩惱眷屬此五有為以為根本是故舉無示眷屬皆空離念相者即唱清淨本覺人辭者即人故云云復次若約始覺義釋之者謂此住心之行者今始究竟能證本覺自心之本不生理云也此義如彼論第三云覺心初起心無初相者即是顯示果圓滿者大圓鏡智分明現前無所不遍無所不窮法界一體無有與等獨力業相根本無明不能自有平等虛空一相無相無初念故以遠離微細念故得見心性心即常住名究竟覺者即是顯示始覺般若圓滿之相而得到於無生覺云云元曉釋云覺心初起者是明所覺相心初起者依無明有生相生相心體令動念今乃證知離本覺無不覺即動念是靜心故覺心初起如迷方時東為西悟時乃知西是即東當知此中覺義亦爾也心無初相者是明覺利益由是不覺有心起今既覺故無所起故言無初相云云此本覺始覺是終無二無別一體法也始覺歸本覺心源時本始二覺無別義也藏公云以對始故説之為本以始即同本者以至心源時始覺即同本覺無二相故云云疏心主即心王也者從下是疏主釋經文也此心王義如釋大衍論第二云四若名為染淨本覺阿梨耶識所謂不守自性陀羅尼智別立以為阿梨耶故本因緣起契經中作如是説爾時光嚴童子即白佛言尊者以何因緣故難入未曾有會中作如是言説隨他緣起陀羅尼智名為楞伽王識云何名為楞伽王以之為喻示彼緣起陀羅尼智於是尊者告光嚴童子此楞伽王常在大海摩羅山中率十萬六千鬼神之衆以為眷屬如是諸眷屬乘華宮殿遊於諸剎皆悉承賴彼楞伽王方得遊行所謂諸鬼神衆作如是言我等神衆無有威德無有氣力於諸所作無有其能如宜大王我等衆中與其堪能力彼楞伽王即隨其時與殊勝力不相捨離而共轉謂楞伽王雖非分身而能遍滿諸神衆中各各令得人身之量於一切時於一切處共轉不離不守自性智亦復如是能受一切無量無邊煩惱染法鬼神衆熏不相捨離而俱轉故以此因緣故我難入中作如是説隨轉覺智名為楞伽王識故此阿梨耶識當何決擇攝於本論中作是説自性清淨心因無明風動心與無明俱無形相不相捨離乃至廣説故云云又云十者名為染淨始覺阿梨耶識所謂隨緣始覺般若別立以為阿梨耶故圓滿契經中作如是説復次樹王始覺淨識及白本覺説染淨始覺阿梨耶識不守自性緣起本覺亦復如是故此阿梨耶識當何決擇攝於本論中作如是説始覺義者依本覺故而有不覺依不覺故有始覺又以覺心源故名究竟覺不覺心源故非究竟覺云云疏以不滯有無至心王自在者是明彼本始二覺心即有有為無為二自在義也彼論第二云所熏有五種謂一法界心及四種無為一法界心有二種自在一者有為自在能為有為法而為依止故二者無為自在能為無為法而作依止故乃至餘四無為亦復如是云云又云此識有二種義能攝一切法生一切法云何為二一者覺義二者不覺義者而總顯示大識殊勝圓滿相故此義云何所謂具足二種圓滿故云何為二一者功德圓滿二者過患圓滿功德圓滿者覺義字句能攝一切無量無邊過於恆沙者不離不斷諸功德故能生一切無量無邊過於恆沙不離不斷諸功德故過患圓滿者不覺義字句能攝一切無量無邊過於恆沙若離若脫諸過患故能生一切無量無邊過於恆沙若離若脫諸過患故云云文所為妙業隨意能成者起信論云本覺隨染分別生二種相與彼本覺不相捨離一者智淨相二者不思議業相不思議業相者以依智淨能作一切勝妙境界所謂無量功德之相常無斷絶隨衆生根自然相應種種而現利益故云云釋論第三釋此義云次説業用自在無礙門謂此門中本有性智以為所依起應化用為一切修行者顯示種種勝妙色相為眼根作境界出現種種勝妙音聲為耳根作境界發起種種勝妙芬香為鼻根作境界出現種種勝妙法味為舌根作境界出現種種甚深法藏為意根作境界如其次第光明日月寶德如來音聲梵響清淨如來香積芬流圓滿如來一味雜平等如來覺觸分別顯相如來智慧明達遍滿如來具足成就隨時隨處隨機根量教化利益無礙自在不動一念遍三世中不分一身滿十方中而能作佛事故云云疏心主自在明即是淨菩提心至於前劫也者是以上所明本始二覺心王中之體用二義之自在功德即令契會今此經所明淨菩提心門義彼此即一無二無別義也而疏更作一轉開明倍勝於前劫也者是挍量前他緣乘與此覺心不生心之勝劣也前無緣乘是唯知依他八識之能變諸境義未覺知真如受妄熏而變作諸染法義故心境未猶決融通義云也此住心是能立真如受熏而變作諸法義故一重之心境融通義妙成云也是依此真俗相融即是無二道理故遣真俗別執離染淨隔別妄念故云更作一轉開明倍於前劫也此前劫者指彼他緣乘善行瑜祇劫義也疏心王由如至客塵清淨者是以喻明心王性淨現時心數客染除義也心王者是隨染本覺心是也勝鬘經云自性清淨心不染而染者即是心也然始覺歸本覺心源時能熏無明業識等一切雜染法皆斷除也而心性清淨顯現云也此中心數者指於本覺能熏習一切無明等染汚戲論識是也此諸染法如客塵能汚穢淨物也然今始覺之還淨時淨除此染法故云客塵清淨也又勝鬘經云自性清淨心染而不染者即此義也疏是證此性至心本不生者是合喻也始覺之歸本覺時即覺了自心所作之一切諸法本來無生無滅理云也疏何以故以至不可得故者是明上所明心王之本覺佛性三世常住無始終起滅義之所由也疏譬如大海至前無後無者以喻重明心主本覺性與客塵諸染法相之存滅不同義也謂本覺菩提與客塵染法俱轉從無始來相待成立而雖似無前後相非無遂前後義猶如海水從本雖靜住但遇猛風緣忽發起波浪而若風緣息時雖波浪先息海水終無盡義也或本削非字作即字是吉也尚若存非字者此非字可屬上句也疏心王亦復至當無生滅者此合也私云已上是明自性清淨心主之遇境界風雖從緣起而自性不斷滅義意也文而心性常無生滅者法藏師云經云如來藏者不在阿梨耶中是故七識有生有滅如來藏者不生不滅解云此中唯生滅是七識唯不生滅是如來藏二義既分遂使梨耶無別自體故云不在中此約不一義説非謂不和合何以故此中如來藏不生滅即七識之不生滅故與自生滅不一也七識生滅即如來藏不生滅之生滅故與自不生滅亦不一也云云私解云是明本覺心主雖隨緣生滅而自性者常住義意也又明心王心數之斷不斷義者如釋論第三云無明本覺有二義故一者同體同相義二者異體異相義言同義者一切諸法皆是理故言異義者一切諸法功德過患各差別故若據初門不可斷除若據後門亦可斷除故諸法無行契經中如是説貪欲是涅槃恚癡亦如是如是三事中有無量佛道見非見一相著不著亦然此無佛無法知此名世智本地契經中作如是説根本無明暗其力最大故能障一切智令得不自在斷須般若劍飾須功德寶無明海漸竭法身山徐顯如本無明之相不離覺性非可壞非不可壞故自此已下顯示喻説大海者喻阿梨耶識此識有二種義廣大圓滿如大海故水者喻本覺心自性清淨心顯了明白如淨水故風者喻根本無明根本不覺能起動轉慮知之識如彼風故波動者喻諸戲論識如見識識遷動流轉往來無常如海波故水相風相不相捨離者喻真妄相資俱行合轉謂本覺心不自起故當資無明之力方得而起根本無明不自轉故故要因真心之力方得而始轉水不自作波故當因風之力方得作波風不自現動相故要資彼水方得而現動轉相而水非動性者喻本覺心離有為相諸本覺真心從本已來遠離動念解脫結縛體性清淨相用自在而不守自性故隨無明之緣作種種相如水非動性而不守自性故隨風之緣作種種波故風止滅動相則滅者喻根本無明滅戲論諸識皆滅無餘本覺斷證先對治根本無明後對治慮知攀緣之諸識故濕性不壞者喻本覺之智離斷滅法故謂無明滅諸識皆盡本覺真心無有壞滅如彼風滅諸波皆息而清白水終不壞滅故云云已上論文義巧相稱今疏意也疏覺此心本不生至微細妄執者是明此住心行者之利益相也此有二種利益一者於本覺心源得甚深無生觀門二者斷迷心三妄執染也漸言是對真言門頓入行者故云漸也是約行明漸義也是無生觀是漸於進趣真言門之法佛果海三密法爾常住無生果之初門也此中等言是等取前所云六十心也塵沙上煩惱者元曉起信論疏下卷云過恆沙等上煩惱者迷諸法門事中無知此是所知障所攝也云云又唯識章記有古德解意云上煩惱者是現起惑云云疏名第二阿僧祇劫者是結此住心相也此直以善行而名劫義也經云知自心性是超越二劫者是超妄執及時分名為劫義也超二劫者若約妄心釋之者越麁妄執及細妄執之二心也約時劫論之者第一劫已過畢於第二劫既過證寂然界及他緣大乘二住心已故云超越二劫也此覺心不生心在第二劫終分心也又瑜祇行者是善行為劫義也疏此中無為至論中廣明者是此大乘中所説有為無為諸生死義之若生起若對治之壞滅因緣義者讓彼勝鬘經寶性論佛性論所説云也此無為生死者是界外變易生死是也緣因者是變易生死之此起是若因若緣是也生者是變易之從因緣生起義也壞者是變易之依對治道遂被滅壞義也大乘法門章第三云經下文云生死有二種一有為生死二無為生死分段是有為生死變易是無為生死變易對界內名無為實是有為文問此變易之因緣義云何答同章云寶窟云繫業分段用罪福不動業為因四取為緣不繫分段用後業為因慈悲願等為緣自報變易用無漏業為因無明為緣為物變易悲願為因衆生相欲為緣云云又章云親生名因疏助因緣總相麁論分段生死有漏業為因四住地為緣變易生死無漏業為因無明為緣云云問證文何答勝鬘經云如取緣有漏業因而生三有如是無明住地緣無漏業因生阿羅漢辟支佛大力菩薩三種意生身云云問有漏無漏業者何答有漏業者善惡之業無漏業者三乘聖人無漏之解問何故名有漏業答寶窟云煩惱是漏善惡之業從於漏生與漏相隨名有漏業乃至引佛性論意云謂有三義一流入三界二退失如退失色界生下界等三流脫功德善根失戒定慧今無此三流故名無漏業者作意為義則無漏作意之義故名業文問此壞義何答同章云變易之中有因有果盡處不定小乘法中變易之因盡有二處一滅定暫滅那含已上二無餘永滅無學果中變易之果小乘未滅大乘法中變易之因種性暫滅至佛乃盡變易之果初地漸滅至佛乃盡文疏今且明宗義至故不詳説者是明此覺心不生心中所有無為生死等義具不陳説之所由也意云今約此住心唯取要而明此住心之大概宗旨而不具明彼自餘之枝末傍義云也疏然上來至心外之垢者是明上來始從愚童持齋心至于此覺心不生心七箇住心是有漸起次第所由云也謂第一愚童心是脫三途塗炭生欲界人天二趣也第二嬰童無畏心是依求解脫智及靜慮心之厭下欣上六行智故脫欲界五趣地而樂欲求上生上二界之行也第三第四唯蘊無我拔業因種二心是如次得聲聞緣覺之生空觀果而永離我執煩惱礙而得有餘無餘二涅槃也是未逮法空觀也第五證寂然界菩薩是依遍計所執空門才雖遣一重法倒是捨煩惱所知二障之一分而未解依他圓成有空中道妙理也第六他緣大乘心是雖解唯識無境及三性之有空中道理而亦分離二障而未解真如本覺受妄熏而隨染變作諸法自在義也今此第七覺心不生心中是始解真如受妄熏而變作諸法甚深妙理故亦彌重離二障垢穢染執過失云也故從麁至細重重洗心垢穢而淨自心性故云轉妙轉深也文對治心外之垢者此凡九種住心之觀心之除染垢作用皆名為對治心外之垢也此中心者是指第十法佛內所證法爾常作無漏五蘊三平等境界之祕密莊嚴心也凡因分淨菩提心門所攝一切法門是若極無自性若一道無為等皆是令淨除此內心之外垢方便云也是淨除此內心之外垢方便云也是淨除此內心之外垢穢之能治藥云也疏尚未開此至不思議事者明此覺心不生心之尚未逮得此三密門中心內法爾三平等事業云也疏從此已後方乃説之者是明第十祕密心中所有妙用也疏若不作如至其後微妙也者是明上來七重住心之重重生起所由也是待麁而成細義故也若麁細不對辨者因何方便而可知凡此十重住心如次麁細相望時前麁淺後是轉細轉妙甚深微絶義云也疏經云復次祕密主至先歎功德者是牒本經文從下釋此意中是總釋此文大意也上來覺心不生心等但是約顯家淺略行相而既明其義云也從此下是約兼修真言行門義而明此淨菩提心門義云也是即一道無為及極與自性心是也若據高野和上御意者從是下有三箇住心謂一者一道無為心二者極無自性心三者祕密莊嚴心也然約本經文科判此三重住心者謂經云真言門修行至皆成就者是總標彼三重住心之所作妙行也故應知本經所云復次祕密主乃至悉皆成就者是總明一道極無祕密莊嚴之三箇住心之總相證文也般若僧正大疏抄記云一道無為與極無自性住心經文相交難見別意一道者佛知見即佛性此佛性自性清淨故云極無自性也譬如真金每值阿練其形萬差而其性不故也問爾者可云極有自性住心何云極無自性也答其攝相歸性爾云可也文經云所謂空性至越諸戲論者是別明第八一道無為心之所觀境界相及觀心之作用也經云等虛空無邊至升住此地者是文別明第九極無自性心之所觀境界及觀行所成功德與未離過失義也經云此四分之一度於信解者是別略示第十祕密莊嚴心內證果海佛地相也是依祕藏寶鑰文及十住心論意作此科判也問以一道無為心為第八住心以極無自性心為第九住心者何此大疏第三辨阿闍梨義處云如説觀蘊阿賴耶覺自心本不生即攝諸經八識三性義如説極無自性心十緣生句即攝華嚴般若種種不思議境界皆入其中如説如實知自心名一切種智則佛性一乘如來藏皆入其中於種種聖言無不統其精要若能持是心印廣開一切法門是名通達三乘云云今案是説文於先列極無自性心後次更列一道無為心也故應知以極無自性心可為第八心以一道無為心而可為第九住心也況又準此處疏現文者更應無明第十祕密莊嚴住心之文説也一道無為心之外不明祕密莊嚴心故也答今案此處疏文謂大底其文義者總略也所以者何初劫明唯蘊無我心處則含攝拔業因種心也第二劫處明他緣大乘及覺心不生而含攝證寂然界大乘心也又明第三劫住心處交雜是明極無自性心處則含攝一道無為心也是二箇住心大底相似故也但於如實知自心名一切種等文者是更明第十祕密莊嚴住心也專不謂明一道無為心之句也以何知爾者此處文唯説一道無為心而不明祕密莊嚴心者何唯以此住心之中能證智慧可名一切種智耶唯了知一道無為住心義而未了知三密境界者豈有一切種智名耶此文中云如實知自心等文者此準疏上來處處文多約一道無為住心而作其解釋也約此常例習雖似明一道無為心義而尋理實唯慈氏儀軌祕説文有於祕密莊嚴心境界即為如實知自心之名為菩提心義也故其文云觀遏字變成法界塔在於圓明中又轉變塔成慈氏本尊身乃至如實知自心即是母地心初發心時便成正覺等云云此文豈非明祕密莊嚴中如實知自心義耶又大師真言二字義云如實知自心者非謂心性都無自性清淨無改性故云本不生謂雖有心性而無變易故云本不生也云云又十住心論第十云祕密莊嚴住心者即是究竟覺知自心之源底如實證悟自身之數量所謂胎藏海會曼荼羅金剛界會曼荼羅文焉知此文是不唯示一道無為心義也祕密莊嚴亦有此説也何況真實佛性如來藏與一乘等名義者於三密境界往往有此等名義也謂灌頂法中佛性三昧耶戒等有此名也又疏三云遮字無遷變即佛性文又大日經説無盡莊嚴藏者即是如來藏也云云理趣般若經云一切皆有情如來藏等者即是義也又三摩地儀軌云演説如來三密門金剛一乘甚深教等者豈不是耶即知明第十祕密心義也問若爾者大疏於何處文慥明十住心之前後次第相耶答第七卷云復次如此經初品中義若了知唯蘊無我乃至證寂然界時當約我人衆生壽者本不生故明種種法門以五喻觀察性空時當約諸蘊本不生故明種種法門觀察蘊阿賴耶乃至覺心前後際不可得時當約心之影像本不生故明種種法門極無自性心生時當約淨菩提心本不生故明種種法門乃至如來地當約大悲胎藏曼荼羅究竟不生義明種種法門文此文正是明十住心之出世間心之中後七重住心次第相也問其明七重次第心相方其相云何答初文云若了知唯蘊無我者是文明第四唯蘊無我住心也次文云乃至證寂然界乃至明種種法門者是文明第五拔業因種住心也已上是小乘住心次文云以五喻觀察性空時等者此中示證寂然界住心是心方攝第六他緣大乘心之初分也次文云觀察蘊阿賴耶等者是文是明第六他緣大乘住心也次文云乃至覺心前後際不可得者是文是明第七覺心不生住心相也次文云當約心之影像本不生故明種種法門者是文明第八一道無為住心也文云極無自性乃至明種種法門者是文明第九極無自性住心也乃至如來至明種種法門者是文明第十祕密莊嚴住心也依此疏證文次第説故大師建立十住心次第也文即是欲明乃至先歎其功德者意云若以凡夫身而直入此真言門修行此三平等教法者是即直往涅槃是也若以此行如次第漸漸修習雖於三無數曠劫須所可修得六度四攝四無量心等一切所修善行而唯是依法佛三密加持速疾功力故只一生頃修得如是廣大功德智慧而到妙覺果海云也以此殊勝利益而示於真言門初修業菩薩而能令彼勤進而欲令信受奉行尊重讃歎故先歎此速疾妙用云也菩提心論云從凡入佛位者即此三摩地者又云若人求佛惠通達菩提心父母所生身速證大覺位云云三摩地儀軌云若有衆生遇此教晝夜四時精進修現世證得歡喜地後十六生成正覺云云此等文是明即身成佛義意也疏經無量阿僧祇至淨菩提心門者是於彼顯教遲鈍修行之用或不必退失而對彼今顯此三密教行速疾用及必定妙用也此義如金剛頂五祕密儀軌云若於顯教修行者久經三大無數劫然後證成無上菩提於其中間十進九退或證七地以所集福智慧回向聲聞緣覺道果仍不能證無上菩提若依毗盧遮那自受用身所説內證自覺聖智法及大普賢金剛薩埵他受用身智即於現生遇逢曼荼羅阿闍梨得入曼荼羅為具足羯磨以普賢三摩地引入金剛薩埵入其身中由加持威德力故於須臾頃當證無量三昧耶無量陀羅尼門以不思議法能變易弟子俱生我執種子應時集得身中一大阿僧祇劫所集福德智慧則為生在佛家才見曼荼羅則種金剛界種子具受灌頂受職金剛名號從此已後受得廣大甚深不思議法超越二乘十地云云此文妙符合經疏意也問抑直修行真言教之淨菩提心門中解諸法空理菩薩之所觀法空觀相是若異與前於顯教中修行淨菩提心門菩薩之所觀法空觀義耶答此義最要之中要也今私案之義之義意云修行單顯教諸菩薩所修法空觀是唯觀隨緣諸法之二種生死境界及淨分依他性之假有性空義而未能雙觀法佛所證無漏五蘊三平等之真實常住境界性也而此入真言門淨菩提心之菩薩所解法空觀是雙觀隨緣之法空與法爾不空法身之二種境界故與彼懸異也此義如涅槃經第二十七云善男子佛性者名第一義空第一義空名為智慧所言空者不見空與不空智者見空及與不空常與無常苦之與樂我與無我空者一切生死不空者謂大涅槃乃至無我者即是生死我者謂大涅槃見一切空不見不空不名中道乃至中道者名為佛性以是義故佛性常恆無有變易無明覆故令諸衆生不能得見云云私云如是經意真言門淨菩提心菩薩之所觀空有相雙而觀之也又聲字實相義云法然隨緣有能迷亦能悟文即是義意耳釋大衍論第二所言如義言説等中即有此義意也疏若見此心至自然具足者是明真言門直往菩薩之法然有與隨緣空二觀相雙修時所得利益甚大義也疏譬如有世至乘法有殊者是以喻亦成真言門三密妙行速疾勝用也此中喻意云以世人乘舟車跋涉險難惡路得達五百由旬義合修行單顯教菩薩久經三無數劫後成佛果義也此達者出過義也此修行真言門神通乘直往菩薩於可修行三無數劫頃廣行法而速一生間決定修得之而成彼果分佛位云也五百由旬者吉藏師法華玄第八云三界為三百聲聞地為四百緣覺地為五百也問以何義故作此釋耶答今以二義作如此判一者三百為凡夫地二百為二乘地此二障於佛道須勉斯二障故釋論云菩薩退有二事一貪三界二乘小乘今勉二退故得入菩薩位進至寶所云云今私案云指三界與聲聞緣覺菩薩三乘配五百由旬也指一佛乘名為寶所道場也此一佛乘者是出過前五百由旬路之處是也謂以三界如次配三百由旬也以二乘合配第四百由旬也故經云以方便力於險道中過三百由旬化作一城者是合二乘二涅槃而為一化城義也是當第四百由旬義也以三乘共教中所明佛菩薩之所得菩提涅槃名為第五百由旬也過此第五百由旬已更有法華一乘之佛果之寶所道場菩提涅槃果德云也故天台法華疏第七云大論六十六云嶮道是世間一百由旬是欲界二百色界三百無色界四百是二乘又倒出數一百是二乘道二百是無色三百是色界四百是欲界此經明五百由旬即菩薩道若過五百即入佛道云云疏又世尊至中路稽留也者是重所以成於上來九種住心之淺深麁細義而對辨之者是為教誡此真言行菩薩之隨分得彼種因海功德者於其中途是若生己證得慢想故方止息後祕密莊嚴乘中勝進行而不欲求此真言門中殊勝果海功德法人故今方此十住心之中諸乘前後相望以前心為麁劣以後心為細妙云也故極無自性已還之住心猶帶麁淺義也唯祕密莊嚴心唯獨有殊妙義也疏復次如輪至王具體故者是重以喻歎此直往真言行菩薩所修功德也謂此菩薩雖未窮滿法佛果位而以此三密妙行備衆德不久只一生頃諸因分衆行皆悉成就故猶如輪王太子初生時雖幼稚而未廣遍習諸伎藝而此大根性聰利故堪大人之器也三十二相具足可繼輪王位可領四洲相相當也疏真言行者至具體法身者是合喻也此真言行直往菩薩是修行淨菩提心門時是只於一生頃集得無數曠劫可修集普賢行願也而大悲萬行智慧方便妙用皆悉成就故即是於法佛性得功德速可顯得故云即是毗盧遮那具體法身也疏故經云無量至悉成就也者以散釋意歸本經文也疏又如王子至亦復如是者釋本經云天人世間之所歸依文也此有開喻合喻也疏已為天人至作大歸依者約合而釋此意也疏若常途諸至即名為佛者是但約單證此淨菩提心門行者之因分究竟證者諸論名為佛果云也故釋大衍論第一云如是八種諸佛所得耶諸佛所得得於諸佛不故如是修行種因海是焉云云又第十云諸佛者即是不二摩訶衍法所以者何此不二法形於彼佛其德勝故大本華嚴契經中作如是説其圓圓海得諸佛勝其一切佛不能成就圓圓海劣故若爾何故分流華嚴契經中作如是説盧舍那佛三種世間攝法無餘彼佛身心亦復無有所不攝焉盧舍那佛雖攝三種世間而攝不攝異是故無過云云解云但約證得單淨菩提心門因分功德人名為種因海佛義也彼窮盡證得三密境界佛名為性德圓圓海佛也疏是故舍利至不能測量者是從下別約一道無為心歎此心之隨分祕密甚深妙德也疏文是故舍利弗等者是指法華經説也彼經有二種門一者迹門二者本門也迹門者於一乘始覺本法而令歸攝三乘五乘法也本門者於一乘本覺本法令歸攝始覺之末法也而於此中約初迹門中為舍利弗等三根聲聞佛説境行一乘所謂三乘五乘七方便九法界皆有一乘佛性理故會三乘五乘等行即令攝入一佛乘義也然以舍利子等利根明智聲聞及獨覺乘并大乘通教菩薩等智解而不能測量此甚深理趣云也是即為今淨菩提心門佛智境界是也但彼法華一乘是約單顯教作此説也疏以行者得至名為祕密者是亦約法華經中本門義而歎此住心之隨分甚深微妙德也彼經本門意是明此一乘果相也案彼經涌出品意謂從下方地中涌出千世界微塵數大菩薩是人所備功德深妙也然一生補處等覺彌勒等諸大菩薩於自智慧力都尚不能覺知此中一人菩薩之心行及本末因緣發心修行時分能化此人佛及此菩薩之所住遊化處等事云也何況知千世界微塵數人若干本末因緣等義耶因之墮疑網而彌勒菩薩以此事而啓請佛佛則於彼經壽量品中説此問之答也其答意云我釋迦牟尼佛報身成道是實過無量無邊久遠劫以前成無上佛果畢然則其成佛後從久遠無數劫以來能教化此微塵數大菩薩令發道心云也此報身久遠壽量是如來自受用身本地果報也此佛所居淨土名常寂光土此土三際不變易三劫火水風三災不能毀壞此淨土云也故彼經云衆生見劫盡大火所燒時我此土安穩天人常充滿等云云是此報身成道久遠義也是故以始成始覺之末法令歸攝於無始久遠成佛之本覺本法也故十住心論八云指本遮末談成覺之久遠云云而此千世界微塵數諸菩薩衆者是從報佛之內證恆沙功德智慧所出現之內眷屬故約彼修因向果門者彌勒菩薩者迹雖示現等覺補處位而尚未知識此地涌菩薩衆之中一人也是則表示此一道無為住心之佛依能修得此淨菩提心門之諸法性空妙理故即有成就如此祕密甚深德云也文以行者得此心時等者謂真言行者修學此淨菩提心門若到證達位時知見本覺本有之身土及自內證眷屬諸菩薩衆云也故菩提心論云當知一切法空已悟法本不生心體自如不見身心住於寂滅平等究竟真實之智令無退失妄心若起知而勿隨妄若息時心源空寂萬德斯具妙用無窮云云問上行等諸菩薩衆者是一道無為心之佛內所證眷屬也然物云何與彌勒居同一處而同修對治道云耶答此菩薩衆者示現同假居因位而修行佛道之相故此菩薩同與彼補處彌勒之垂迹因位之行業云也故云同會一處也又義上行等菩薩與彌勒共同修學淨菩提心處法故名為同會一處云也疏是故此事名為祕密者是總結一道無為心之具德也上來約一道無為住心明淨菩提心義了從此下且約極無自性心明淨菩提心義也疏又此菩薩至復名祕密者是文約彼極無自性心則明淨菩提心門法之具德義也謂前一道無為心與此極無自性心者其義稍相鄰近故於同一處經文而是疏主開作二途解釋也依此二種住心稍相鄰近義故菩提心論合明極無自性心與一道無為心其文云復次諸佛慈悲從真起用救攝衆生應病與藥施諸法門隨其煩惱對治迷津遇筏達於彼岸法已應捨無自性故如大毗盧遮那成佛經云諸法無相為虛空相作是觀已名勝義菩提心云云文於畢竟淨心中者是指極無自性心之淨菩提心法即名云畢竟淨心也文普集會十方法界等者法藏師華嚴經旨歸云初果德衆者謂盡法界一切諸佛皆在舍那海印中現同於此會共説華嚴然有二類一能加衆如第一會中盡十方一切諸佛悉現其身加於普賢餘準之二證法衆如發心品末十方各有萬佛剎塵數諸佛悉號法惠現身讃述一切十方皆亦如是又性起品十方各有八十不可説百千億那由他世界微塵數如來同名普賢現身讃述十方亦爾皆云我等諸佛為未來菩薩故護持此經令久住世也第七會末亦盡十方諸佛現面讃證述同解云當知示現今此經住世並是佛力二常隨衆者如普賢等十佛世界微塵數等大菩薩衆是盧舍那內眷屬故動止常相隨周遍一切微塵道處於華藏界助成能化顯一乘法如舍利弗等千二百五十比丘與釋迦佛亦常相隨於娑界助佛揚化説三乘故云云文亦自能普詣乃至諸天人莫能知者云云又藏公華嚴綱目章云第八會佛在舍衛國祇樹給孤獨園重閣講堂師子座上佛自入如來師子奮迅三昧説法界法門並善財童子歷百一十城求善知識所得法門於中有一品經謂入法界品云云又云童子詢友於南國百十城以一生云云文唯獨明了等者此解了淨菩提心門之甚深法性真理之妙惠及作微妙佛事者是則此極無自性心之菩薩獨所作證也餘三乘果人及世間人天等者不能知解此菩薩之所為事業本迹義也疏由此因緣復名祕密者是約極無自性心而結成祕密義也自下更返明一道無為住心不共德也疏前二劫中至支佛地也者是如彼智度論所明共不共般若義而今大日經意復約一道無為心之行者而論共不共義也彼智度論所云共般若者約遍計所執空門明人法皆空之偏真理説為共般若義也不共般若義者約不空如來藏義而明如來藏中具足恆沙功德無量性得之一乘佛性義名為不共般若義也説此一乘妙義唯令被菩薩機故名為不共般若也疏前二劫中者此義或是他緣大乘覺心不生二箇住心是也此二種住心者是俱菩薩乘故名為共三乘行也又解者前二劫者是前第二瑜祇劫中證寂然界大乘菩薩也此菩薩者明預三乘同坐一解脫床同證偏真理而終應入無餘涅槃人也疏雖云及二乘至不知所趣者是文更亦約一道無為住心而明此一道心之行者不共於二乘義也此義意云文雖須菩提等者是於三乘通教大乘之大品般若經等中約遍計所執空門教意須菩提等大聲聞人自悟解人法二空理而方承世尊教敕為餘聲聞衆及人天大會演説此人法二空門法也雖爾未離二乘法之終入灰炭之行云也又此須菩提等諸大聲聞人未悟入法華一乘妙義也此須菩提等四十餘年後待説法華一乘之中會權三乘令歸實一乘説今初悟入一道無為自性清淨本覺真心妙理遂應顯得之義也此義如法華信解品中迦葉領解偈云佛敕我等説最上道修習此者當得成佛我承佛教為大菩薩以諸因緣種種譬喻若干言辭説無上道但為菩薩演其實事而不為我説斯真要云云問須菩提等解二空門義文如何答同經偈云我等若聞淨佛國土教化衆生都無欣樂所以者何一切諸法皆悉空寂無生無滅無大無小無漏無為如是思惟不生喜樂云云問此經此文者約何義云一切諸法無生無滅等耶答此文意如解深密經説是約第二時教意依遍計所執空門義説一切諸法無生無滅等理也故惠沼唯識有義燈云解深密經一切諸法皆無自性無生無滅本來寂靜自性涅槃者依遍計所執與圓成説云云此説即是義意也疏而猶此祕至不知所趣者是明彼共教三乘聖者之俱迷惑此祕密一乘法義也故法華第一序品云諸求三乘人若有疑悔者佛當為除斷令盡無有餘又方便品云有諸聲聞漏盡阿羅漢阿若憍陳如等千二百人乃至各作是念今者世尊何故殷勤稱歎方便而作是言佛所得法甚深難解有所言説意趣難知一切聲聞辟支佛所不能及佛説一解脫義我等亦得此法到於涅槃而今不知此義所趣云云又云求佛諸菩薩大數有八萬等云云此則是義意也疏乃名直至支佛地也者是結釋歸本文也疏時大威德至近敬禮也者是歎此淨菩提心門修行菩薩之應供福田德也疏已歎入真言門功德竟者是文者是總明結歎能入真言門之一道無為心極無自性心之甚深微妙勝功德畢云也疏然行者復以何法入此門耶者是亦更問發此淨菩提心門菩薩之於此淨菩提心門中所悟入之所觀境界相也疏故經次云至喻此心也者是舉明所觀境界之真如理性之經文而略釋此所引本經文大意也此所引本經文者是通一道極無兩住心之所觀觀法義也疏前劫悟萬法唯心心外無法者是文者是以前所辨他緣大乘心之所悟入蘊阿賴耶之中唯識義則為淺近唯心義云也其正意者是約以依他起法即為本體而成唯心義故為淺近義也疏今觀此心至遍一切身者是文者約一道極無兩住心而明甚深唯心義也是義意者是以真如本覺理之真心義而為唯心義也故上所引經文云菩提所謂空性空性即是自心等虛空性者即此義意也謂本覺者是帶神解義與真實義故名為心識義也以本覺真心名為遍照義也故起信論以本覺真心名為六種義所謂一大智慧光明義二遍照法界義三真實識知義四常樂我淨義五不變義六自在義也依具足此六義故指本覺心名為毗盧遮那遍一切身也故普賢觀經云毗盧遮那遍一切處其佛住所名常寂光乃至云不住身心相處不見有無諸法相如寂解脫乃至般若波羅蜜多是色常住法故云云此義意云以本覺智性名為毗盧遮那佛以真如之常寂滅義即為常寂光土云也是即依正不二義也疏以心如是至入阿字門者是明以如是甚深唯心之心境二義而令歸入阿字本不生真如一實理義也疏故離於根境者是引經文即釋成淨菩提心門中遠離心與境差別義也疏影像不出常寂滅光故曰無相者又釋成經所云菩提心無相文也文影像不出常寂光者是即應化佛所現身土色身差別無量功德法門名為影像義也如是影像功德法門者是於真如本覺之本質法是明鏡上而影現是影像之色身等云也疏以心實相覺心之實相者是即成甚深真實之唯識義也謂能緣心所緣境俱同唯真如本覺法故名為唯心也疏境智皆是至曰無境界者是成唯心義也謂依起信論摩訶衍論意者以真如性一法為所緣義亦以即此真如之本覺義為能緣義也故能緣與所緣其性無二無別義也境智皆是般若波羅蜜故曰無境界者是釋成經文所云無境界義也謂是一切諸法者皆不出本覺真如理性云也觀察此道理者名為淨菩提心門之菩薩也疏以此中十至復成戲論者是成此一道及極無二箇住心之十喻意之殊勝義也文望前十喻者是指前第二劫證寂然界心中十喻及他緣大乘心中十喻也故疏第三意云第一即空幻者是證寂然界心之所觀十喻也第二即心幻者是他緣大乘心之所觀十喻也第三不思議幻者是一道極無兩心之所觀十喻法是也而以前二劫中即空即心兩十喻即為淺近戲論説也以此第三劫中一道極無中不思議幻等十喻為真實殊勝觀云也文故名越諸戲論者是釋成經文所明殊勝義也
