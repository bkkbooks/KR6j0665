body:
  text: 大日經住心品疏私記第十疏經云祕密主至心殊異自下是明百六十心義也是即擧前第八問凡夫異熟心義也又出世間心生乃至四分之一度於信解者是答第九問行者之殊異心之義云也疏由有無明故生至瞋癡慢疑者是明所答百六十心之自性體也文由有無明故者是以有現行心之根本無明爲本故枝末之惑隨彼而生起云也謂言此貪瞋等五種惑所由者依不覺之迷心所生有故此迷心本體爲根本無明惑也又義云根本無明者第七識相應惑也貪等五惑是多分六識相應染心也但此根本無明者能生各各彼妄染六識有無明故者是示第七識相應之本無明是也以此無明爲諸識染通依故如成唯識論云第六意識別有依要託末那而得起故云云又同五云惱恒相應故應説四中無明是主雖三亦名從無始際恒内惽迷曾不省察癡増上故云云意云依此第七識無明本惑故六識三毒疑慢等煩惱生起也此意不同釋論第四云根本無明攝持煩惱令得住止譬如諸種持隱顯名子藏住地及入楞伽經云如來藏爲無始惡習所熏識藏也以此惡習者是爲根本無明也而此中明者是尚取彼枝末無明也彼中所言根本無明亦是業識染法之熏於淨法而所成其自分習氣麁重是也即是諸染法之根本種子也彼能成現行業識種子染法也疏所以不説至六十心中也者是明於百六十心不攝五見之所以惑是雖有彼六十心中而更建此百六十心義耶第一貪心第三瞋心第五癡心第八彌盧等心是慢心也是等豈答今私案云彼六十心之中貪瞋癡疑慢等見煩惱之所引生惑也此百六十心之中五根本煩惱是直屬愛類也是類別故別開也問五見煩惱方雖類別而何再五重不數之耶答於五見煩惱亦再數更五重數之可有百六十心義也經影略唯雖説屬愛五根本煩惱百六十義實可影顯此屬見五根本惑亦展轉成百六十心義也是擧一隅更欲顯三端故也問若爾者可云十煩惱五番可數之也而何分二類各各五番數之耶答屬愛屬見二義已別故因之分二類各各五番可數之云也問此於百六十心中所明滿足畢何亦煩於六十心中有明五根本惑耶答彼中所有貪瞋等五根本煩惱是所被引生見惑文貪等五惑等是也此中百六十心彼中見所斷惑此中修所斷惑又彼分別起惑此倶生惑既二類別也疏此五根五本至一百六十心者是尋義成立其數量也意云第一番於此五根本惑更細分兩品數之也即成十種第二番於此先十種更細分兩品即成二十數第三番亦於前二十數更細分兩品即成四十數第四番亦於前四十數更細分兩品即成八十數第五番亦於前八十數更細分兩品成百六十數云也問何故如是番番計之耶答欲顯示煩惱種類廣多而有無量差別事而令斷除之故且一往約此五番則分析此惑類分位也問何故必五番數之耶答此根本煩惱故形對之故竪亦五重數之歟問何故必於此五種惑再數之耶答横既有二惑故竪亦必再數之歟横二惑者所謂疏云以衆生心常依二法不入名輒分爲二云云此義意云二法者一煩惱礙二智礙也或又名煩惱障亦名所知障也是障礙涅槃染心之流轉生死因名云煩惱障也障礙大菩提染法名智礙也故云隨事異名輒分爲二也事者是作業用也此二惑之障礙二法之作用不同故名云隨事分爲二也又若依釋大衍論意彼論立二礙別障用門彼煩惱礙多散動性是眞如智直寂靜性如是相違故立爲障如本又染心義者名爲煩惱礙能障眞如根本智故彼智惠礙漠冥之性是作業智聰明之性如是相違故云爲障如本無明義者名爲智礙能障世間自然智故前教意終教意也依了知眞如寂靜之智與依他假有智故則入中道理云也而依此二礙不覺知二種應知境故亦不能入中道云也問煩惱所知二障礙涅槃道法作法如何答二障用別體一也所以未斷二障隨一時二障倶合力同礙菩提涅槃二法雖然煩惱多力勝礙涅槃所知障多力勝礙菩提法也若進先斷煩惱未斷所知障時彼既得涅槃果故所知障獨礙菩提法也若進先斷智障時煩惱獨礙涅槃果云也故云衆生心常依二法不入中道也是爲表二障未斷時二法之一時有二礙用故於五根本煩惱再數之云耳問若爾先斷二障隨一時不必可再數之也答是從昔來以有二惑倶時有力礙二果義而自本已來再數之故設雖有斷二障隨一時再數之有何咎耶問二障之倶合涅槃隨一法之文證如何答成唯識論云既所知障亦障涅槃如何但説是菩提障説煩惱障但障涅槃豈彼不能爲菩提障應知聖教依勝通障二果云云又釋大衍論第四二礙別障門中此義具撿彼應知也若准釋大衍論二礙別障門意者此二礙從無始以來至成佛之以前於此二提無斷盡義故無隨一斷盡義也故三劫間亦二礙倶合力礙菩提涅槃法故於三僧祇劫中始終倶再數之有何益耶問何義故此煩惱障所知障倶總名煩惱耶答初煩惱障是直分段生死麁苦之因縁也次所知障是變易生死之細苦因縁也依此皆有擾惱衆生義而礙二空無漏道故立煩惱障名也二障總名煩惱義有勝鬘經釋大衍論也疏就此二中至十萬偈中説者是過此五番番若二十番等可數之則此惑數量甚成衆多故也疏若更約上至廣則無量者於此二障法若分上中下三品若分九品乃至廣分柝之成八萬四千云也又乃至無數量云也問若有於染淨法中分上下兩品義類耶答爾有也故唯識論第九明四尋思如實智各別上下義又明上下八諦觀法等是例也問此百六十妄心倶通見修二斷耶答爾可通也問如常途性相説者是唯見所斷惑也不通修斷者有何咎耶答此百六十心既通第三僧祇劫所斷故也疑唯云見所斷者大乘初教意也今此宗義不爾於三劫中一一劫可斷之也故知於此教中疑通見修二斷故菩提心義第五云一切法中自有五住始從自理即終至究竟即位位九識識別五住故涅槃經等覺菩薩白言從是以前我等皆名邪見之人地持等覺如見惑者四住亦爾云云若依天台圓教意言者邪見是雖云大乘權教中判唯見所斷而約實義亦通見修二斷云也故等覺迦葉始亦更斷邪見云也故例可知疑是大乘始教中判唯見所斷而今約圓密兩教中亦通修所斷云無咎也疏譬如從一至不可勝計者是明百六十心之廢立所由也意云一根本無明之現生五種煩惱云也所謂貪瞋癡慢疑是也彼根本無明是諸惑之根本法也是即於本覺處而能薫習於彼種子惑體之其種子之生麁品現行惑時分爲二類惑一者屬見煩惱二者屬愛煩惱也且於屬愛煩惱則第一番分二者成十種也謂於貪等五惑各各成二分故也第二番分二者成二十種也三番分二者成四十種也第四番分二者成八十種也第五番分二者遂成百六十種若之外展轉如是分柝之時應成無窮盡數也依此義故諸聖教中説有過恒沙無量煩惱者則此義意也而是於三劫而建立百六十心意者約横竪義顯示之者表貪等五種惑有同一品類衆多及具麁細淺深義意也謂於横義此五根本煩惱五重再計之意者不謂顯示於此五根本惑分柝麁細品位上下差別義也但是明其五惑同一品位惑之中有衆多差別類備義也但於三劫約竪義者於根本五惑則略分麁細極細三品位而爲三劫之所斷義者是欲顯示是貪等五根本煩惱則有麁細之品類上中下差別義意也問若爾者於初踰祇劫中行者唯斷一品惑而不斷他品惑耶答此不爾也於刹那刹那三踰祇劫毎一一劫能斷上中下品惑也問其義如何答於踰祇有三義一者約惑障麁細立三踰祇義二者約斷惑時分之前後而立三踰祇義也三者立善行爲踰祇劫也且約初義於三踰祇劫毎一一劫能斷上中下諸惑云也約後義亦得之也謂刹那刹那頃而建立斷惑之時分之三踰祇劫故也具義如下文明也疏又如劫初至次第而起者此明此五根本煩惱之生起縁由也謂成劫時衆生純善報之福利厚故此五根本煩惱不現起也此五惑漸生起相是從成劫末住劫初有如是五惑現起事是漸漸衆生福業減少依遇非如意境界現前故云也劫初入以念爲食者是四食中思食相當歟劫初人以想念而資養身心故名曰以念爲食也文然以不知心實相故者是明有無明根本惑生起所由也文婬盜殺妄等者是示依根本五惑而成業道事也疏是事阿含至究竟其條末者是明依根本五煩惱而有衆生之族性等不同義并有六十妄心及諸造業果報不同之生起義也族性不同者是四種性之不同類義歟文起種種業者是善惡有覆無記業也又生死潤業覆業發業是也文煩惱結者是分別煩惱倶生煩惱是也結者煩惱説名結結成生死果報故也亦是九結也或又結可屬下句是結成義也文成種種衆生趣者依前業煩惱故則感六趣四生報云也文造種種五陰之身者依前際業煩惱即造作後際五陰之身云也是則三世兩重十二縁起義也文不能究其條葉者是以彼無明爲根本所依其枝末業煩惱無數量而不可勝稱云也疏諸阿闍梨至妄執也者是上所云如從一種子生五根本喩是眞言宗祖師之結集傳法諸阿闍梨耶巧所用此喩云也此喩是於一種根本無明之發生枝末恒沙諸惑義以此喩巧況類此法義云也文隨事離分者根本無明之所現起我執相應煩惱則障礙涅槃説名煩惱障也此本無明之所現起法執相應惑之障礙一切種智菩提心則説名所知障也若准起信論意諸現行二障能礙眞如寂靜理説名煩惱礙根本無明之能礙世間一切種智説名智礙也依此義故云一無明心隨事離分也文即成阿僧祇妄執也者是明彼根本展轉所成枝末妄執二障惑類多疏越世間三至劫瑜祇行者從下明第五相續勝進佛果之間所經歴時頃間之答義也文越世間三妄執者是初僧祇劫中所離我執相應煩惱障也此煩惱感招分段生死報故名云世間三妄執也文出世間心生者至三劫瑜祇行者是明超此初無數劫三妄執而所生出世間生空觀智淨菩提心義也文超越三劫瑜祇行者是明初劫小乘菩薩單生空智之超我執相應三妄執義也此中三劫者此以小乘菩薩所斷三妄執而爲三劫義也及小乘菩薩所行三十七菩提分法等是善行瑜祇劫義也非謂極無自性心等所斷三妄執義也淨菩提心者亦小乘菩薩菩提心也於此未説彼後住心之深行故也小乘佛者初僧祇劫之行所攝也此佛則斷小分所知障也所謂不染無知是也經云謂如是解至十二因縁者是合答上相續勝進問中是明第四唯蘊無我心與第五拔業因種心二種住心義也唯蘊無我者諸愚夫從無始來於五取蘊法上執實我實法相然今聲聞乘人方始解知此五蘊是和合積集法故唯有分段假僞義而無實我性也故名云唯蘊無我也拔業因種者十住心論五云拔業煩惱株杌及無明種子是則辟支佛學處證處云云問於縁覺乘何不立唯蘊無我名於聲聞乘何不立拔業因種名耶答此有二意一者於聲聞無學果亦有拔無明種子義也故此疏云復次有三妄執所謂業煩惱株杌及無明種子即是無學聖人所斷最難斷處云云是中豈不關羅漢果人耶是羅漢果人小分斷無明種子也二者聲聞乘無學人多分不能斷盡煩惱種子也唯辟支佛及小乘佛果人者斷此無明種子故也故應知於縁覺乘雖可立唯蘊無我名而共通聲聞乘故唯就不共義別立拔業因種心名也但於聲聞乘不可立拔業因種名也問若於聲聞乘人實無斷盡煩惱種子義耶答於聲聞乘有二類一者小乘愚法聲聞二十部小乘則此類也二者大乘通教聲聞此人斷煩惱障種子也前所云愚法人不能斷盡煩惱種子也但是伏除煩惱現行也約此義唯雖有唯蘊無我觀義而無拔業因種義也故華嚴宗五教下卷云若依終教諸聲聞於煩惱障尚不能斷但能折伏何況能斷彼所知障故彌勒問經論云聲聞辟支佛不能如實終四無量不能究竟斷諸煩惱但折伏一切煩惱云云解云此文雖明小乘中聲聞縁覺倶伏斷煩惱障義但此中辟支佛是部行獨覺也如極七返有人出無佛世證獨覺果等是也實是聲聞羅漢果也故不通種子斷義也故大乘法門章第三云大乘同性經説縁覺十地中云十者習氣漸薄地云云但五教章約隱麟喩之人少分斷習氣義以就部行人之多分而不斷習氣義作此説也又此大日經云是中辟支佛復有小差別謂三昧分異淨除於業生云云是意云明聲聞不斷煩惱種子辟支佛斷煩惱種子義差別也此人智深利故斷煩惱種子云也此中業生者種子義也又天台云三藏教中辟支佛侵煩惱習氣者則此義也故天台五味義云辟支佛侵於習氣少勝聲聞故與菩薩同喩熟酥味也云云又解案十住心論第四唯蘊無我心中唯明二十部中愚法小乘義理分齊云云故於此教義不可有拔業因種義也於第五拔業因種心中總攝愚法不愚法大小二種縁覺義故約不愚法人義邊而唯於第五心總雖建立拔業因種名而不共通聲聞人也問以何由知爾者彼論第五云此拔業因種一句中悉攝辟支佛乘盡云云故此中亦可攝不愚法縁覺人也又以十住心論引守護經所明於十二因縁義爲此中辟支佛所觀法也以此義知通明不愚法辟支佛義也故知拔業因種名唯獨齊辟支佛乘而不通聲聞乘耳故疏云業煩惱株杌及無明種子即是無學聖人所斷者是不謂必指聲聞乘無學也是正當獨覺及小乘之菩薩乘無學人之多分全分斷之義彼聲聞無學人但依斷小分故無拔業因種義云也小分是如無義故也問若爾何寶鑰云唯蘊拔業唯小乘教云云答此義是對後他縁大乘等唯大義今但云唯小乘也雖云爾理實辟支佛通大乘之辟支佛也問十住心論四云五俗妄眞實宗世法顛倒但有假名出世非倒法是眞實此有一部即説出世部六諸法但名宗此宗所計世間若出世法但有假名而無實體此有一部即一説部然於此二宗何成唯蘊無我義耶而何以故十住心論第四釋唯蘊無我名云佛爲求聲聞者説人空法有之理所謂人則人我法則五蘊等法此唯蘊無我一句中攝一切小乘法盡故云云而此説出世部一説部已立法空義何此唯蘊句可攝此耶同彼論四云一我法倶有宗此宗所計我之與法二種皆有此有六部犢子賢冑正量密林山經量法上部云云若約此義意者何以此六部小乘宗立我義而可成唯蘊無我義耶答於此説有二義一者約總相義及多分義意故明唯蘊無我義也此義意云是二十部小乘不謂皆悉有唯蘊無我義也二十部中十二部是有唯蘊無我義八部小乘師或立有我或立五蘊皆無性義也故言依多分義也又解曰此八部小乘所立無非唯蘊無我義也謂六部小乘所計我不如外道所執實我執之能引起生死煩惱業果義歟故尚理實有無我義也彼六部小乘建立假我義故也又一説部説出世部雖遣妄執於世俗諦中之實有法執於勝義諦之理猶執眞實有義故返成法執也故唯蘊義不違也彼一説部意於諸法能詮名字雖遣實有執而存虚假義故尚依未遣其撥無於所詮法義之法執故尚有唯蘊義尚又是以法執妄念爲體故爲行蘊所攝義也故此二宗所立法空義皆唯蘊無我句所攝也問説出世部所云眞諦實有義是非五蘊所攝又一説部所云我法都無體之理性亦非五蘊門所攝也然何云唯蘊句所攝耶答此説出世部所立眞諦實有義與一説部我法都無義是雖非正五蘊門所攝而是法處法界所攝也故以類假云唯蘊句所攝也又一説部撥無五蘊法義返可攝五蘊中也是依止五蘊而起撥無見故也約眞實義諸部小乘雖空於實我所執而誰同共不撥無五蘊假者而於是五蘊互雖論假實義而不謂假五蘊都無故成唯蘊義也疏梵云劫跛至二者妄執者是釋眞言行者相續勝進於果地之頃所經歴時節之中劫義也謂劫跛有二翻一時分義二妄執義云也問此二翻相違何答此二翻無相違也謂時分義是無別體性故時是五蘊中不相應行蘊攝是假立法故以色心心所而爲時自性故也故此所云時分劫跛還即以所斷妄執爲自體云也謂行者斷此三妄執時以經歴時節而爲此時分劫跛故也劫跛名實是妄執之本名也豈離妄執外有時分耶又三妄執率爾不能斷之必是經多時頃而可斷也故斷妄執時還依時劫義故於所斷妄執假立劫跛名義云也又時分劫跛是以瑜伽善行而爲時分之自體性故此疏下文云爾時復離百六十心等一重微細妄執名第二阿僧祇劫也云云意云超越彼三妄執之能超瑜伽善行是亦名爲阿僧祇劫義也善行劫跛者智度論説云云瑜伽行名劫跛有二義一者此廣大所積集大菩提資糧善行是依經歴多時分劫數而所可積集義故於此所積集善行還立阿僧祇劫名也故此經本及疏所言知自心性是超越二劫瑜祇行者是以善行即爲劫跛義意也是有財釋義也二者此瑜伽行有斷無數量妄執之徳故依此能斷善行之斷惑作用時分返所斷惑轉亦名爲阿僧祇劫也此亦有財釋義也上來義是約顯教歴劫修行漸次成佛義意而此眞言家作此釋耳疏若依常途至得成正覺者是爲欲顯示眞言門超越頓證成佛義故先明漸次經歴三無數劫而成佛顯教常途義以是勝劣相對意也又若不顯漸次道理者因何法顯頓超勝用耶疏若祕密釋至阿僧祇劫者是約眞言家超越頓證義明三無數劫中第一無數劫之速超義也此文中超一劫者是總標超時分劫跛及妄執劫跛義也瑜伽行者是標善行劫跛義也下可倣此文也文即度百六十心等一重麁妄執者是釋前所標時分劫與妄執劫義也此中等言是意等取六十心及表屬見煩惱五見類亦有百六十心妄執義下倣之義文名一阿僧祇劫者是釋前所標善行僧祇劫義也斷此妄執時漸次不斷之但頓斷故則不經一大無數劫而直頓得能證智徳證所斷惑之理云也此第一劫所斷惑是單我執相應煩惱障故立麁妄執稱也此當小乘中三乘人所斷惑品也疏越二劫瑜至二阿僧祇劫者是明能超第二無數劫漸次行義也此劫中能斷人是有三類一者修行大乘共教證寂然界大乘心菩薩二者他縁大乘心菩薩三者覺心不生心菩薩也所斷惑品是法執相應所知障品也此有上中下品淺深麁細差別此上中下品各各皆有百六十重妄執也此所知障品是形對前煩惱障品時彼唯麁此細於彼故亦立細名也疏眞言門行者至劫成佛也者此更明超第三無數劫漸次斷惑行而頓證極無自性等菩提行義也此劫中能證人有二類一者一道無爲心人二者極無自性心人也所斷惑是所知障品也此亦雖有麁細上下兩品而形對第二劫所斷細惑而此第三劫所斷惑總名爲一重極細妄執也此中等言是顯然擧所知障中貪瞋癡疑慢五類中百六十心義而等取所知障中五見之分流百六十心義也雖云爾尚有此極無自性住心未離細惑而到彼祕密莊嚴果位乃離此惑也疏得至佛慧初心故云三阿僧祇劫成佛也者是一生間即超第三無數劫而得此中善行瑜伽劫功徳圓滿之極無自性心則進昇入後祕密莊嚴心果分法門云也若過此第三僧祇已滿極無自性心人必入後果分眞言門佛位故此極無自性心名云佛惠初心也佛惠者是果分眞言三密妙覺如來也此初心者此極無自性心是也此中三阿僧祇劫成佛者是尚種因海成佛也是極無自性心之圓滿位也是不謂必果海法佛之成佛義也疏若一生度至論時分耶者此外人伏難辭也難意云若眞言行者一生内速成辨究竟法佛果者何強可立三無數劫爲成佛時頃耶云也疏然就第一至越三妄執也者下通前伏難義以顯正義中是顯最初所離極細妄執相也凡答意云眞言家理實強雖不可建立三無數劫義今暫形對彼顯教家所云菩薩修行是漸次經歴三無數廣劫而漸次斷煩惱所知二障積集無量功徳智惠義故今眞言家不壞前顯家所云無數劫斷惑證理功徳差降而爲云顯此一生間此一切功徳頓證義故強且欲建立此速疾三無數劫義云也文然就第一重内至世間心生也者從是下約斷妄執而答一生成佛義何論時分耶之問也謂於三瑜祇劫中是當第一劫故云就第一重内也就是第一劫中有二種斷惑義也初重斷小乘中三乘見所斷三妄執惑也第二重斷三乘修所斷三妄執惑也但此中業與煩惱株杌是全示聲聞所斷也無明種子者辟支佛與小乘佛果多分全分所斷也或聲聞無學小分斷之也此疏文明初劫中見修二惑之三妄執之中間文處所辨根境識之上所起三妄執是法執之所知障故是非初劫中小乘之三乘所斷惑也三乘入見道人正此第一劫之初分中始斷見惑解生空無我理故云最初解了唯蘊無我等也文度世間六十心者是指前所明六十心也此六十心是三乘見諦人多分所離染心也離此世間六十心故三乘人入見道名云出世間心生也文離我倒所生三毒根本名越三妄執也者此三乘見道人是能所離我執相應分別起貪瞋癡三毒煩惱是也説此三毒煩惱即名三妄執云也問見所斷煩惱有十種然何於此但云離三毒煩惱而不云離餘煩惱義耶答理實雖可云離餘諸煩惱義而餘諸煩惱皆攝取上句所擧世間六十心中也但下句別擧此三毒煩惱所由是此三毒勝餘煩惱引起生死中三惡趣報故所可惡甚何物如之耶故就可厭離過重別擧此三毒耳疏復次有三妄至淹留修行者是第二明法執相應之三妄執義也是三妄執是隨小乘中佛乘學人之於根境識之三種法之上妄起有法執名曰是三妄執也是義隨所縁境有三種法故立此三種妄執義也淹留修行者是彼小乘中佛乘學者依是十八界法上妄起有法執而動念當情心現前故因茲障礙彼自乘中之菩提分法之修行業故曰淹留修行也疏謂六根六至謂六識界者是明開根等三法而成十八界義也疏以内外十至故合言之者且攝取根境二法之開義而成識之合義也但略不言識是合義也疏此是三果至留修行也者是釋上所標淹留義也是擧所被留礙人也又此三果學人者是若對後次文所明無學聖人所斷最難斷處云文也於此所明三果學人者若依十住心論等意者是應爲聲聞乘前三果人也此前三果有學聖人是於非有似有之十八界法上動起倶生煩惱所知二障而不能頓趣向後後阿羅漢向道等云也謂依被滯留此根境識三法似有相故或時起法執而障自乘所修聖道之人觀亦或時起倶生煩惱障而懈怠不能登後後勝進之向道云也又如初解三果學人者是小乘菩薩是也是人望自乘時雖求佛果而未得後果故名學人也而此人方雖當小乘佛果之地而亦今望後後大乘時尚立學人名也三乘中佛乘爲第三故名三果之因位人又此三果即爲因位人也是從淺至深次第耳此人被留滯十八界之似有相而不能了達諸法自性空理也故如下文云然彼行者有法執當心若修禪定道品種種諸度時雖不於中起諸我倒而住於禪惠等法稽留淹滯不能速至菩提以非如實巧度故淹留修行也者當此人所行之法也疏復次有三至最難斷處者是第三明倶生煩惱相應之三妄執法也是三乘無學位人所斷障也但聲聞羅漢果斷多分也縁覺果人及小乘佛果隨其所應多若分若全分斷之也所謂業者此過去已造業也是則潤生業及覆業也此二種業如下釋也是二種業是修所斷法也於是非斷發業惑彼前入見道時已斷畢故也二者煩惱株杌是修所斷一切倶生惑之種子是也又是現行惑根本之義是也株杌者猶是惑如樹木株杌之留後時發生樹木根莖若不斷煩惱之根源時如彼諸見外道等雖伏三空已下修惑後時還生而退墮下界是義也或五根本最初成立煩惱名爲煩惱株杌也故疏上文云譬如從一種子生五根本於一根本皆破爲二枝末乃至第五破則成百六十小枝故云云是意以五根本煩惱爲煩惱株杌義也三者無明種子者是能生起後十二因縁之種子煩惱也此疏云由有無明故生五根本煩惱心等此意也又十住心論五云業者惡業因則十二因縁種者無明種子云云已上一箇三妄執是三乘無學人倶皆斷之也亦可有多分斷中分斷全斷三種差別歟約有學聖者難斷此惑故名爲最難斷處云云疏凡有三種三妄執也者是結上來所辯三重三妄執也疏學摩訶衍至聲聞正位者是通外人伏難文也學摩訶衍人者小乘之三乘中菩薩佛乘且名大乘是義也於彼小乘之三乘中聲聞乘是小乘也縁覺乘中乘也佛菩薩是大乘義有故名大乘也故十住心論第五云次明大覺位者小乘成佛總有四階云云即此義意也問若以此人言通教大乘菩薩有何咎耶答若云爾者不可致此同斷等言之伏難也是從本來小乘之三乘與通教三乘其斷惑等義懸隔故也故五教上卷云其瑜伽中聲聞等教行位果及斷惑分齊與婆娑倶舍等不同者是事也云云問其外人伏難意何答難意云聲聞人次第行者入見道時八忍八智則斷見惑八十八使義畢此人則出觀於此第十一心道類智立預流果也菩薩坐樹下三十四心成正覺中之初八忍八智見諦十六心亦斷見惑八十八使也然是彼此同等也然菩薩是何如聲聞正位而不爲墮預流果耶云也今通此難云彼次第行聲聞入見道十六心之所斷八十八使煩惱與菩薩樹下入見道十六心斷八十八使惑時其行是雖同等而明菩薩是不墮聲聞初果位意也疏所以爾者至二乘地者是釋菩薩不墮聲聞正位所由也意云菩薩始從發菩提心求自心覺性之一切種智功徳此種智未成滿以前雖入見道斷八十八使惑而不墮二乘正位云也心不生止息想故文爾時諦觀乃至何者見神也者是明此菩薩能破此我執能治方便也是分柝五蘊而顯無我理意也文作如是推求乃至無量見網者依此菩薩所得生空無漏觀智遠離六十二見等無量見是名離生死之繋縛羅網法云也文淨菩提心少分増明者此菩薩求一切種智故彼小乘佛是滅一切種冥而得種智故又此菩薩即漸覺悟蘊等三科法悉從縁生無常變異自性空無我義故於生死涅槃染淨法而無染淨堅著執心故云淨菩提心少分増明云也彼二乘果人唯覺悟自性空無我理而未巧覺三科法無自性理故不名淨菩提心少分増明也彼二乘人拙纔雖觀四大五蘊等無常敗壞畢竟磨滅義未巧觀之故非淨菩提心増明義云也此義如菩提心論云又二乘之人聲聞執四諦法縁覺執十二因縁知四大五蘊畢竟磨滅深起厭離云云此義意耳是無性觀唯依折法義也文曰得菩提心乃至二乘地也者是明不墮二乘正位之由也此菩提心勢力義有二一者此菩薩分證得菩提心如上所明義也是依求一切種智及正觀五蘊等無性義始覺菩提心是也二者一切衆生心中自遍有本覺眞如佛性也此菩薩依此佛性菩提心漸漸開發力用義故此菩薩不墮二乘地云也問此菩薩初得出世心何唯云不墮聲聞正位而不云不墮縁覺正位耶答聲聞人見道十六心斷見惑已後出觀已生休息想方立預流果獨覺人入見道十六心後不出觀生息想故不可立預流果也然則以無菩薩可墮獨覺正位義故只云不墮聲聞正位而不論不墮縁覺正位義也彼小乘之三乘雖見諦十六心相皆悉同等但於得果位聲聞與菩薩各別相也問若爾者何此疏下文云所以不墮二乘地耶答是述菩薩遂不墮二乘極果地義也是求種智故成利益衆生願故也故上下文意別耳彼二乘無此義故菩薩不墮二乘地云也又解文云學摩訶衍人初得出世初心與小乘見道適齊然不墮聲聞正位者上一行是總以示菩薩見道與小乘之二乘見道齊等義彼三乘皆名小乘故也下一句但別簡異聲聞乘義也理實可簡別於縁覺也故後文但總云所以不墮二乘地也疏然彼行者至留修行也者是明此小乘菩薩尚未離前所云第一劫中所存淹留修行三妄所知障染法義也此人修習三十七品等種種助道法時爲我執雖不被迷倒而未斷法執故被引此法執而尚恣速不能得一切種智云也於此根境識未悟此法無性空義故此三妄執是即留礙菩提心種智徳云也文以非如實巧度故名淹留修行也者是結釋淹留修行義也此菩薩纔拙雖悟五蘊拆法空無性義相是不如彼證寂然界菩薩巧度體法空觀菩提心云也故此菩薩所得禪惠等諸善行尚不逮得彼證寂然界法空觀大菩提心云也此義如天台云三藏教以拆空觀觀生滅理斷事惑教鈍人通教以體空觀觀無生滅理斷理惑教利人故拆體異事理別云云疏然亦稍離至十二因縁者是明此菩薩所離三妄執失也文稍離下地三執者如此疏上文云義彼文謂然就第一重内最初解了唯蘊無我時即名出世間心生也度世間六十心離我倒所生三毒根本名越三妄執也者即此意也文能拔業煩至十二因縁者此菩薩亦明離前第三番三妄執失義也疏如是甚深至性相常爾者讃美義此菩薩所證得生空無我理是若佛出世若亦佛不出世若説顯此道理若亦雖不説顯此道理不待説者法爾而但其道理決然常住不變義云也疏如前所説至十二因縁義者是歎此生空理甚深難測義也彼諸見外道利根聰惠人之智力尚不能測此十二因縁之中實性無我理也
