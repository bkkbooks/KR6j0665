body:
  text: 大日經住心品疏私記第三上來是釋師子座義已畢疏其金剛名曰至同聞衆也者下第六列同聞衆名中是牒經本文而總釋其意也疏曰佛所説至眷屬耶者是問也問同聞衆所由也疏答曰譬如國王至不疑故者此答也謂引世間王法治國例而況類出世法王攝化諸衆生化儀適棧垂應而令生感義也意云是爲於帝王治國界之法則所以顯某甲群臣之承政令行其事人之名字者以此爲印驗而餘外官寮及國内人民悉令取信故云也此疏所言國王若有政令必先居外朝者是與此疏下所云如來内證之智設以神力加持亦不可示人前云奮迅示現無盡莊嚴藏者皆外用之迹耳義是即同意也謂内有無邊智性故以此爲所依本而外表無盡莊嚴之相迹云也故約喩云外朝也疏其時王在某處與某甲大臣等者凡總意云明上如是我聞一時薄伽梵一切持金剛者皆悉集會等文是皆證信序云意也凡明大眷屬意是有二義一者爲證眞聖王説故者此文證也二者大聖法王與智徳長宿良賢大臣倶驗議而宣政令故也豈有虚誑謬説之義耶云也是義證也疏法王亦爾至復生信者是合也此同聞衆中既有大菩薩衆故知是佛説大乘無上法也疏虚空無垢至金剛也者下正列持金剛者名中有十九句此其初也始從此虚空無垢至于第五善行歩此五人是表示因行證入方便究竟義次第也能持此五法人名持金剛者也此無差別中有差別義也此虚空無垢者是本有性得菩提心體也本性清淨如虚空無垢累染汚也取此中虚空離二邊亦無四咎也一離執取義謂虚空不可以手執取不可以心執取離四句相故二離戲論言説謂不可言有性不可言無性不可言有無倶性不可言有無倶非性也是皆戲論性故何以故虚空非有謂虚空相從本無所有物衆相寂滅故何以故虚空非無謂虚空六大法隨一所攝故於色等所造法有増上縁令生諸有色法故也虚空不有無倶相者有與無其性是相違故不倶住云也虚空非有無倶非相者非無空無性非有有相有礙相故如有無倶非義菩提心亦爾云也是故心地觀經云法身體遍諸衆生萬徳凝然性常住不生不滅無去來不一不異不斷常法界遍滿如虚空一切如來共修證遠離一切諸分別心行寂滅體皆如云云此疏亦是陳淺略釋也者若據深祕釋如菩提心論云令修行者於内心中觀日月輪由作此觀照見本心湛然清淨猶如滿月光遍虚空無所分別又云一切有情於心質中有一分淨性衆行皆備其體極微妙皎然明白乃至輪迴六趣亦不變易乃至所以觀行者初以阿字發起本心之中分明以漸令潔白分明證無生智即讃阿字是菩提心義又云夫會阿字者皆是決定觀之當觀圓明淨識等云云私曰是心性本覺第九阿摩羅識名阿字菩提心本不生義此本不生義猶如虚空種種義用具足故云譬如虚空故祕藏記云凡佛者捨有滿五蘊等身有無漏五蘊等微細身如虚空者稱周遍法界理耳非無其體諸佛身者如千燈同時照而不障礙佛與佛乃知見凡夫肉眼不得見比喩之極莫過虚空故曰如虚空文已上虚空離妄執及戲論言説過義也疏無有障翳無垢無染亦無分別者此明虚空無四咎義也一虚空從本自性無障翳義虚空是雖爲餘色等法被障翳而自無障翳於餘色等法云也二者無垢者此虚空自性無塵垢云也若空即是塵垢者何可名虚空邪虚空中不謂無客塵也但虚空非塵云也三者無染者虚空無染汚於餘色等也又空自性不被染於餘法是餘法亦不能染虚空云也四者亦無分別者是此虚空都無差別分界相亦無自他差別無自性分別隨念分別計度分別義心之分別境之縁慮想云分別也如此之眞心者第九阿摩羅識心具足如是如虚空功徳相云也故新譯密嚴經云頼耶即密嚴妙體本清淨無心亦無覺光潔如眞金不可得分別性與分別離文即是金剛智印者此第九識即是智也此阿摩羅即名無垢智故也此無垢智即堅固不殂壞故名金剛智印也故密嚴經下卷云如來清淨藏亦名無垢智常住無始終離四句言説云云能持此印名虚空等者是以徳用即屬人立名義也疏復次虚空遊歩至神變義者略先明第二行菩提之義也行菩提有二一者發菩提行二者修菩提行也於是第二修菩提行者須此行菩提心可置發菩提心之行以後也然而進所以安發菩提行前者是有二義一者疏文前後亂脱安之也是此疏恒例也二者先初列行菩提而後明發菩提者始從末而尋本行菩提心當末所以先明之也發菩提心是當本所以次後明之也是初也此中遊歩義如前遊戲神變義此如汲流尋源也此意約前後生起之次第而且成本末義也若約菩提心就末就義者發菩提心末也行菩提心是本也即約此意者先初明本次後明末也是初也此中遊歩義如前遊戲神變義中釋也此菩提心之能漸遊歩佛果位地也疏以淨菩提心至虚空遊歩者是廣釋此義也謂以前淨菩提心之所覺諸法空性理而爲所依境而修無所得行而隨分得其利益云也行菩提心之熟故内心稍會正理外用起神通云遊歩也可云此中攝之賢位菩薩也疏復次虚空無垢至金剛印也者却明第一發菩提之義也謂以性得阿字本不生菩提心而爲最初因而生起修得發菩提心而修後後修菩提行有功能云也以此阿字本不生理爲一切衆生之成菩提平等種子云也此中種殖方便者合發菩提心也根牙漸生故者合行菩提也意取發菩提心爲此中正意耳問何故逆先明修行菩提心後明發行菩提心義既是不次第耶答雖本有性得菩提爲因直先可明之初先明行菩提心意是行菩提心其功廣大故也謂修行六度四攝四無量心等故也故先明大行此大行依何因縁起者謂依止最初發求菩提心故依此因縁而成行菩提所以次尋之而更次却安發行菩提心也問此行菩提心先明發菩提心後明義若有傍文證耶答大疏中更此説證文可撿也疏第三至念滋長者釋第三隨分成菩提義也謂此義意云證達眞理以後名成菩提也前菩提是未證達眞理以前行也約喩中萠牙已生者指前行菩提事也四六時節念念滋長等者正明此成菩提義也此位當初地已上也證達眞理位也疏菩提心至名虚空生者是明第三合喩也眞實生名大空生義是如即身成佛義云大空位者法身同大虚空而無礙含衆像而常恒故曰大空云云此大空位顯得位名曰大空生也疏第四被雜至漸次滋繁者下釋第四義喩也是始從萠牙増長成菓實爲究竟義也是樹者此以沙羅樹王萠牙根莖花菓等爲其喩也疏菩提心至具種種色者是合也此成菩提是即果滿位也疏復次以至被雜色衣者明第四義中之復次釋也意云以眞如法界一味平等中有種種差別義塵沙功徳法門爲本而返爲表示從此法界出現此種種差別普門海會迹及四重曼荼羅身而自受法樂兼攝化利生義云也意云以無垢本性菩提心爲本質性以示現四重曼荼羅普門身無盡莊嚴名爲雜色衣也大師大日經開題曰經被雜色衣執金剛者即表此義上從大日尊下至六道衆生相各各住威儀顯種種色相並是大日尊之差別智印也非更他身故經文云我身即法界我即金剛身我即天龍八部等如是法身互相渉入猶如帝釋珠網云云疏第五善行至種子也者下釋第五衆之名中之最初字意也此有二義一善是端嚴義惡是醜陋義故翻之可知也二通種子義謂自既究竟成就已豈不傳繼後人耶若不傳後人者此道可永絶也以此義爲種子義意也以此道傳授後人是善義也不傳授是極惡不善行不報佛恩不利衆生故也以此義故善義通種子義歟疏譬如已得至種子也者明如世間草木以菓實返爲後種義也此法准之可知也以佛果返而爲後眞言行者因種義也疏善行歩至以爲名者是具足釋三字意也行歩是四威儀中其一分也擧此一威儀兼影顯餘三也諸佛威儀進止是無不利生方便故也疏謂善知時等者却釋善字也是巧方便義也上來五句有二義一者常途義如抄記云初阿字在東方如梵音東方即有動首之義以順世間法初方中東爲上故喩菩提心最是萬行之初也私云此動首者示初發心義也其佛名曰寶幢佛猶如一切萬行以此菩提心爲標爲主次阿字是行菩提也若但菩提心而不具萬行終不成果與先四菩薩不殊其佛是花開敷也花開敷佛行義十度萬行資菩提心次第敷榮牙莖葉花滋榮可愛次暗字三菩提心也以滿行故成正等覺其佛名阿彌陀即西方也次阿彌陀是受用佛成大果實受用其果無量不思議現法之樂皆得名也次惡是大涅槃其字曰天鼓音是正等覺之果果也鼓音佛者方便也既得大果豈自受用而已乃爲一切衆生演之種種方便成所作智智猶如天鼓之音而成事業次惡即入中字是方便也此是大日佛本地之身花臺之體超八葉絶方所非有心之境界唯佛與佛乃能知之爲念本誓開示大悲藏普引衆生入佛惠故以加持神力普現身口意遍滿生死中即是方便也云云已上疏二十未有此文也取意抄也二者此經第一卷通序所列五人執金剛者因行證入方便具足義頗雖異於彼抄記義意大途相似也今私案之彼抄記意約五佛明因行證入方便義是當横義也此經通序中約菩薩因果勝進義而明五種持金剛人因行證入方便次第當竪義也此序總意云初菩提心是單性得本有菩提心也與彼抄記意頗異也次於行菩提有二復次初復次初以修萬行是以未證達眞理之比觀相似位而爲此義意也第二復次是以發菩提心爲義也第三成菩提是行成就已證達眞理已去未果滿以前名成菩提歟第四證菩提是妙覺果滿位歟第五方便具足自行佛果已成滿返乃施利益於一切衆生義是以方便善巧利益衆生意也問彼抄記意與此通序意相違云何可會耶答今私試將會之抄所云第一菩提心者是性得本覺菩提心及以合初發菩提心爲其義故其初發信心位當十信也問以何知初阿字合説本有菩提心及初發信菩提義耶答大疏云十四本也開者開佛知見即雙開菩提如初阿字是菩提心義也此意也是本有性得菩提心與初發信心菩提心合説義也又抄記云普賢者是菩提心也若無此妙因終不能至無上大果故最初得名次文殊師利者大智慧也先發淨菩提心等云云是文明性得菩提心與修得發菩提心合説義也第二行菩提心是以當三賢十地位也第三成菩提是正成佛果滿位也第四入涅槃是成佛果之果也若約化他義成所作智是也以三業化用令被法界衆生故也第五方便具足前四義之本地所依法身自體云也今此經通序意云以第一阿字菩提心而爲後四行之所依因時則不開擧初發菩提心也第二於行菩提心而更開二位時有二復次也謂一行菩提心二發菩提心也行菩提心位當三賢發菩提心位當十信第三成菩提證達眞理位即當十地位第四證菩提當成佛果位也問以菩薩爲成菩提文證有耶答抄記意約四隅菩薩分別三句時其文云以普賢爲菩提心爲因句以文殊彌勒爲大悲爲根句以觀音爲方便滿足句也云云故可知菩薩位何不名成菩提耶此義亦如法花論判法花分別功徳品中五番成佛正云初地成道也今是於十地中成眞證覺故云成佛也又此疏十五明百心成佛義是初十地菩薩明成道義也第四證菩提當成佛果位也第五方便具足是大日尊本地中利他門義也問第四阿字與第五阿字其差別義何答第四阿字入涅槃義也是約應化身佛明入無餘涅槃義而當第四入涅槃字義也故抄記云次即是大涅槃迹極返本衆生有縁之薪盡則如來方便之火息故涅槃云云第五阿字是約三點一體之具足義而明第五阿字義也問若爾者何故抄記云次惡是大涅槃其字曰天鼓音是正等覺之果果也鼓音佛者方便也既得大果豈自受用而已乃爲衆生演之種種方便成所作智猶如天鼓之音而成事業次惡即入中字是方便也云云若依此文者第四第五兩字之所詮義無異也而今何辨第四阿字與第五阿字其懸隔差別義耶答彼抄記意者是第四字約迹門之淺略義而述淺義後文第五阿字是遂約本門用深祕義也問依何文證得知此義耶答六波羅蜜經第二云爲應身者刹那遷變化身佛者疾入涅槃功徳法身湛然常住是故歸依清淨法身云云准此文可知第四阿字與第五阿字差別義也此經所言化身佛是變化身佛也是約迹門明義也此佛遂入無餘涅槃佛也是五種阿字之中第四阿字義也功徳法身者是第五阿字義也其佛約本門明祕密實義如密嚴經上卷云得解脱智慧如來微妙身云何爲涅槃是滅壞之法云云此義委意如涅槃經第二十七云我令一切衆生悉皆安住祕密藏中我亦復當安住是中入於涅槃何等名爲祕密之藏猶如伊字三點若竝則不成縱亦不成如摩醯首羅面上三日乃得成伊字三點若別亦不得成我亦如是解脱之法亦非涅槃三法各異亦非涅槃我今安住如是義三法爲衆生故名入涅槃如世伊字云云第五惡字方便義者如抄記文云次惡即入中字是方便也此是大日佛本地之身花臺之體超八葉絶方所非有心之境界唯佛與佛乃能知之爲念本誓開示大悲藏普引衆生入佛惠故以加持神力普現身口意遍滿生死中即是方便也已上文此文明本門中方便義此中方便義者是迹門之中方便義最別異也第五方便具足是本門當利他門成所作智行也或亦當法界體性智之自行方便滿足義也是配端嚴義也此義具如無畏三藏尊勝儀軌辨之也故依廢立不同故其義頗異雖然道理無相違也是各各廢立意異而述異端故也問今此所云以初阿字爲性得菩提因義有指文證耶答有也故具縁品疏云第四觀作寶蓮華臺寶王宮殿於中敷座置白蓮華臺以阿字門轉作大日如來乃至次於四方八葉之上觀四佛東方觀寶幢如來寶幢是發菩提心義也乃至南方觀沙羅樹王花開敷佛乃至始自菩提心種子長養大悲萬行令成遍覺萬徳開敷故以名爲離垢云云阿彌陀鼓音佛如恒義也但阿彌陀名云方便智也此義與抄記意頗異也又祕藏記云中阿因本有菩提心依是因發菩提心故曰因云云疏第六住至爲名也者下釋第六之名義也此中義以前所明五種菩提之階降差別究竟平等無差別一味一相義爲此義意也是此有差別之中無差別義也若論竪則有五階不同義若論横則一味無差別云也此但横義耳疏然上來至次第説耳者此以此中無差別義爲因而却釋上有差別義來由也疏第七哀愍至故次明也者是依前平等義故此即起同體大悲心之智也疏第八那羅至故次明也者是隣次前義故此義來也謂依内心大悲外顯化用外顯化用必可用大勢力所以用那羅延力最至要也那羅延者此飜云勝力士亦云鉤鎖力士寶師涅槃經疏八云那羅延者帝釋力士云云疏經中校量至那羅延力者是欲顯法身利物之作用勢力勇健力如那羅延力之義是義表如來隨所被機縁而説諸法利益衆生之勢力妙用也餘菩薩二乘等不如是也先略標校量次第文證也此義若准涅槃經此本第十一云世尊如十小牛力不如一大牛力十大牛力不如一青牛力十青牛力不如一凡象力十凡象力不如一野象力十野象力不如一二互象力十二牙象力不如雪山一白象力十雪山白象力不如一香象力十香象力不如一黄象力十黄象力不如一白象力十白象力不如一山象力十山象力不如一象鉢羅象力十象鉢羅象力不如一𤘽物頭象力十𤘽物頭象力不如一分陀利象力十分陀利象力不如人中一力士力十人中力士不如一鉢健提力十鉢健提力不如一八臂那羅延力十那羅延力不如一十住菩薩一節之力一切凡夫身中諸節節不相到人中力士節頭相到鉢健提身諸節相連那羅延身節頭相𤘽十住菩薩諸節骨箱槃龍相結是故菩薩其力最大世界成時從金剛際起金剛座上至道場菩提樹下菩薩坐已其心即時逮得十方如來文私云此經所云十住者是指第十地菩薩也今依此經文校量説者是所云四重之各十象力不如一香象之意也第一十凡象第二十野象第三十二牙象第四十雪山白象故也又香象後更有十重校量之文而遂展轉至佛無上力義爲究竟也然此疏所引用經文又兼通此集一切福徳三昧經文是也彼經第一卷文具有説此例文廣博也可檢之也香象者住在香醉山中之象故名云香象如元曉劫章云閻浮提北有九種山九種山北有雪山雪山北有香醉山山有最勝處有巖其名雜地以七寶所成其巖縱廣各五十由旬唯是象王所住處云云倶舍等云輪王象寶是香醉山之象中最劣象云云疏故以喩至那羅延力者合也疏第九那羅至神通力也者下總釋第九義也此義意云示無性一闡提佛不捨衆生故後時當得菩提及入無餘涅槃定性二乘遂令起從涅槃趣向大菩提道義也是佛大神通不思議力故云也疏如一闡提至師子孔者下廣釋也此中有三類之病不治人也一者一闡提必死之疾也二者二乘作證人三者入無餘涅槃二乘也涅槃經北本第十一云迦葉世有三人其病難治一謗大乘二五逆罪三一闡提如是三病世中極重悉非聲聞縁覺菩薩之所能治善男子譬如有病必死難治若有瞻病隨意醫藥若無瞻病隨意醫藥如是之病定不可治當知是必死不疑善男子是三種人亦復如是若有聲聞縁覺菩薩或有説法或不説法不能令其發阿耨多羅三藐三菩提心迦葉譬如病人若有瞻病隨意醫藥則可令差若無此三則不差聲聞縁覺亦復如是從佛菩薩得聞法已即能發於阿耨多羅三藐三菩提心非不聞法能發心也迦葉譬如病人若有瞻病隨意醫藥若無瞻病隨意醫藥皆悉可差有一種人亦復如是或値聲聞不値聲聞或値縁覺不値縁覺或値菩薩不値菩薩或値如來不値如來或得聞法或不聞法自然得成阿耨多羅三藐三菩提所謂有人或爲自身或爲他身或爲怖畏或爲利養或爲諭諂或爲誑他書寫如是大涅槃經受持讀誦供養恭敬爲他説者等文問此必死疾何可治耶答寶法師一乘佛性論云楞伽經説第五性中燒燃善根一闡提極佛不捨衆生故後時當得涅槃第五性中唯有菩薩闡提更無畢竟故知即説是前畢竟闡提非暫時也又涅槃經説常沒闡提當得菩提故知不説暫時闡提又佛性論説有經一闡提決定無涅槃法者是不了説故知是説有畢竟闡提爲不了説涅槃經云説一闡提等悉當成佛是不聞而聞故知非是暫時闡提又云楞伽第一云大惠捨一切善根一闡提者復以如來神力故或時善根生此猶預説非決定也涅槃中是決定説經云不信一提闡等悉當成佛名常沒故由此涅槃經名不聞而聞又云涅槃經云一闡提人障未來故名爲無性必當得故名爲有性又云一闡提人現在之世雖不可治與作後世善種子故還可治也又云一闡提人雖未來世當有善根而不能救故地獄之苦未來之世雖可救拔現在之世無如之何是故名爲不可救濟云云問二乘實際作證者意如何答若如一乘佛性論云大般若第四百六十五遍學品善現云若菩薩摩訶薩成第八已乃至成預流一來不還阿羅漢獨覺已能入菩薩正性離生必無是處乃至佛告善現如是如是汝如所説若菩薩摩訶薩成第八已廣説乃至成獨覺已能入菩薩正性離生必無是處准此經文定不定性般若會中不説見道已上得成佛也云云私云以此義可准知也見道已上見道有八忍八智第八者是道類智或逆數之是苦法智忍也是作證位故爲難迴心向大云也此難迴心向大人則法花會及涅槃會等中迴心向大而授當作佛記問已死之人者何人耶答此人是入無餘依涅槃二乘無學人也身智倶灰滅如太虚空湛然寂靜故云已死人也此人猶如世死屍神識去四大捨已云已死人如此死人無所作用也此人亦如是最難發大乘心云也故菩提心論云當觀二乘之人雖破人執猶有法執但淨意識不知其他久久成果位以灰身滅智趣本涅槃如太虚空湛然常寂有定性者難可發生要待劫限等滿方乃發生若不定性者無論劫限遇縁便迴心向大從化城起以爲超三界謂宿信佛故乃蒙諸佛教化力而以方便遂發大心云云又涅槃經十一意云五果聖人如次入無餘依涅槃經歴八萬六萬四萬二萬一萬劫間住無餘依涅槃界而待劫限滿發生無上大菩提心等此類也疏諸佛醫王至不怯弱者意如涅槃經第二十七師子孔品云善男子如師子王自知身力牙齒鋒鋩四足踞地安住巖窟振尾出聲若有能具如是諸相當知是即能師子孔乃至師子孔者名決定説一切衆生悉有佛性如來常住無有變易云云文廣故略抄之疏諸菩薩至那羅延力者是返釋大字之義也此中那羅延者是取魔王名爲那羅延天義歟如十卷義釋云又梵天眞言初句云鉢羅惹譯云一切生次云跛多是主義曳是助聲所謂一切衆生主也如劫初時梵宮寂寞無人梵天適生念時有命盡天來降又皆不見梵王終始故便作是念我等從梵天生以能生一切有情故名一切衆生主而實衆生前際無始非有梵王所生云云此那羅延飜力天又云人生本也云云此中諸菩薩尚不能爾者是如上所引涅槃第十一文云三種必死之病非菩薩之所治能佛獨能治之也疏第十妙執至無過上義者下總釋第十義妙善意也是以最勝第一爲義也是究竟義也此是依前大那羅延刀今即所顯得佛性常住義也疏猶如醍醐至無間無上義者引最勝義喩也乳酪生蘇熟蘇醍醐五味是次第轉増以至醍醐爲究竟果復不可増勝法也疏如來亦爾至執金剛者合喩也此以表一乘佛性不變易故如來一乘果徳遂顯得義也如法花經云諸佛世尊唯以一大事因縁故出現於世乃至開示悟入佛知見故出現於世云云意云佛則知見一切衆生心藏中悉皆有一乘佛性常住理故欲令諸衆生顯得此一乘佛性故佛出興于世云也疏第十一至名勝迅者下釋十一義意也此是以表三密妙行有速疾勝用也謂父母所生身生間約顯得佛性醍醐圓滿妙覺果位義以有速疾功用爲此中義耳故隣前義此義來也此中大空者如前釋是佛性常住第一空義也是亦佛果功徳也此功徳有速疾成就妙用云也疏第十二至以爲名者下釋第十二義中有法喩二相可知之此中意是以修得離染清淨義爲其意也是依前速疾行所顯得淨妙果徳也能持此畢竟等者以法攝人立名也疏十三刃迅至以爲名者釋第十三義也此中以彼前所治微細垢猶雖爲難治之義而爲此中難斷悉斷難滅悉滅義意也此義理當金剛喩定所斷障佛地之極微細根本無明等斷也此甚爲難斷處也檢釋大衍論第四及起信論可知之疏十四如來至故以爲者下釋第十四義也意云前既難斷微細惑障斷盡自利功徳滿已所以可行利他事也於行利他事大慈悲爲其本縁也依此大慈悲故能堪修難行難修法故也謂遇不如意相違境時大慈悲心能不憚其劬勞故也猶如被甲冑無憚入戰陣也向生死嶮路爲利生導師何如慈悲心耶疏十五至如來句生者下釋第十五義也如來句者是明自證徳之本地也生者是利他徳也是迹也謂是所加持身此也是依前大慈心及大空故此利他功徳方來現也又其句者是法佛所得無漏無爲常住五蘊本體之迹也此五蘊是無分別無變易無齊限無染汚無障礙而含萬像恒常故如世虚空名曰虚空但之大名是爲顯不共義也此即所證理常住法門也是名句是三世法佛所行之迹眞言行者之所遊履道故云句也此疏下釋句之義之句者梵云鉢曇正翻爲足聲論是進行義住處義如人進歩擧足下足其迹所住處謂也鉢曇言辭之句逗義亦如是故同一名耶云云又生者是修得佛果也是從性得佛性句而生起故也此所加持身然有法爾隨縁二義倶皆阿字所攝如上釋思可知之疏十六至大空惠也者下釋第十六義中總釋住無戲論意也謂前第十五智之所印持之其所縁境也此第十六人者縁此境之能縁心云也疏謂觀縁起至以名爲也者是廣釋其義以立名也疏無生無滅等者義當三論宗八不中道也如彼宗方言義云問何云生滅斷常一異來出答小乘云可生事有云爲生可滅事有云爲滅生死無常云爲新佛果凝然云爲常眞諦無差別爲一俗諦萬有不同爲異從衆生無明流來爲來還本源云爲出問是何小乘答是諸小乘合總明其所執説也又云問八不唯言不生不滅乃至不來不出不遣五句何處遣五句答一不生云言竪遣五句横破八迷何八不言即不遣五句言也問何以其一不生言竪極五句横破八迷答約一不生言横云時世諦破性生執取不生眞諦破假性生執取不生竪之時世諦假生上遣性生等五句取不生眞諦假不生上遣性不生等五句取非不生云云又云且其五句云何答一生二不生三亦生亦不生四非生非不生五非非生非非不生也是俗諦所治五句也問以何爲能治藥答以假生一句爲能治藥問爾其以假生一句遣五句方如何答假生不可言性生假生不可言性不生假生也不可言性亦生亦不生假生不可言性非生非不生非不生假生不可言性非非生非非不生又眞諦亦遣五句一不生二非不生三亦不生亦非不生四非不生非非不生五非非不生非非非不生也能治以假不生一句爲能治藥謂假不生不可言性不生假不生不可言性非不生假不生不可言性亦不生亦非不生假不生不可言性非不生非非不生假不生不可言性非非不生非非非不生云云私云如是眞俗三諦中遣諸有所得執之戲論於此盡諸法眞空理顯現云也疏十七至以爲名也者下釋第十七義十力是能生法是實佛自證徳也生是所生法亦是化他用也是前所言利生法也十力者智度論第二十四云佛有十力菩薩有否答曰有一者一切智心竪深牢固力二者具足大慈力不捨一切衆生故三者具足大悲力不須一切供養恭敬故四者大精進力勤求一切佛法心不厭故五者禪定力一心惠行威儀不壞故六者具足智惠力斷一切憶想分別戲論故七者不厭生死力成熟一切衆生故八者無生法忍力觀一切法實相故九者解脱力入空無相無作解脱故十者具足無礙智力深法自在知諸衆生心行所趣故云云又有十力頗異此智論説如大般若經三百八十云疏十八無垢至以爲名者下釋第十八名也意云何利他權智是可無誤謬義是依五眼而成辨故是以五眼爲證明云也智論第九意云肉眼所見不遍天眼縁國土及衆生無障無礙惠眼知諸法實相法眼見是人以何方便行何法得道佛眼名一切法眼前了了知同論六十九意云肉眼天眼縁色惠眼縁涅槃法眼分別知諸法善不善有漏無漏等佛眼觀寂滅相云云金剛般若宣演第三云問云頗同凡下見障内故有肉眼不答言有者雖以肉眼通見一切且順淺知故答言有又即諸佛利他徳中亦有化身父母所生清淨四大報得肉眼其天眼中准例可知二並色質涅槃經云捨無常色獲得常色者是問肉天二體爲同爲別答在因有別處果無差別皆唯無漏非實業感及修生別不可佛身有麁細眼照理名惠觀教名法縁眞縁俗一智義分或時別起佛眼亦前四眼爲體遍縁一切總名佛眼云云私云以菩提心畢竟淨故等者五眼體是菩提心也一切種智等者是佛眼等也是菩提心之遍照一切諸法之見用也意云五智中法界智是體也鏡智等四種是用別不同是義也疏十九至互出也者下釋第十九名中且擧初金剛手名異説不同相而會其義同所由也疏西方謂主金者是約淺略義釋祕密主義也以其身口意等者正釋成祕密義也故舊翻或云密迹者引例也祕密主者即是夜叉王也者以名而指所因人之體也執金剛杵等者釋是祕密主即名金剛手義也是金剛手即祕密主也疏然是中至能知之者下明深祕趣中義也意云如來無漏無爲身口意三平等法門之速疾隱祕而難可了知故名夜叉云也夜叉者此云樞疾義也隱密義者謂有彼鬼隱形義故密嚴經有此文説也疏乃至彌勒至金剛也者是成甚深祕密唯佛與佛乃能知之義也是以法花經壽量品所明如來久遠實成壽量報身佛土滅彌勒等諸菩薩智力所不能及義也彼實即此法佛之三平等法門是也所謂心密之主等者依義立名云也謂三密之中心是勝故且曰心密之主也或又可云三密倶名心也此三密倶有縁慮堅實二義故也問何故金剛手列最後答上諸持金剛者之功徳遂歸此金剛三平等大海故爲表此義故安爾歟問何故此經本列十九人持金剛衆而足不言二十等減不言十八等耶答是爲表此經是枝末不具足經本義故歟問若爾者何於菩薩衆足擧四徳之人耶答是雖分流經本爲表所詮義不闕所由故歟疏如是上首至當具存耳者牒經本而明此等言之意也疏然統其綱至不足爲闕者明此枝末經本十佛刹微塵數辭之下安等言意不違大本經意所由也此中等言者是含容上首十佛刹微塵數人之所攝之其各各有刹塵數眷屬云意也故彼大本經梵本中引衆名句之下一一皆置等言也禪者得此十佛刹微塵數下皆各各安等言之意而於此上首所攝之諸眷屬衆存亦有無量衆意而於今所翻譯枝末經初列十九執金剛而後於等言總攝此等之諸眷屬衆也疏所云十佛至衆會之數故者此明十佛刹微塵數之決定數量無増減之所由也十種智力者如前所云十力智法門是也十智力是所對也十佛刹微塵數是能對也若不約如此義顯者何可知此衆會人數量多少耶云也疏世界海至中廣明者智度論第五十云復次三千大千世界名一世界一時起一時滅如是等十方如恒河沙等世界是一佛世界如是一佛世界數如恒河沙等世界是一佛世界海如是佛世界海數如十方恒沙世界是一佛世界種如是世界種十方無量是名一佛世界於一切世界中取如是分是名一佛所度之分云云私云此論第五十中明世界海世界種義而闕世界性名也尋餘卷文一知之若性者第二世界也界即性義同故也故此疏意論第二世界故云世界性歟然此疏所明一佛刹是當彼論所明第二重之一佛世界義也又是以一佛世界更展轉増多而即名曰一佛所度之分也故花嚴經探玄記第三釋此智度論文云若依終教如智論中以三千大千世界爲一數數至恒沙爲一世界性數此性復至恒沙爲一世界海數此復至恒沙爲一世界種數此復至無量恒沙爲一佛世界所化分齊云云若依此文者第二重直名世界性也但第五重亦可名云一佛刹義歟彼大日經供養法頌云千界爲増數等者蓋當此等義歟疏然此略至法界門也者明此十佛刹微塵數持金剛者差別各異之所由也此有二所由一是法佛心王所有過恒沙功徳差別相故是約自證徳二依所化衆生機根萬差不同故能化本尊種類差別云也然行者隨修一一本尊法皆悉即入眞如法界大界曼荼羅云也何以故如是諸本尊是皆大日尊智用差別故若得此中一智時即兼得一切種智一切種智故到佛位也上來列執金剛衆了疏次列菩薩至而爲上首者下列菩薩中分上下而以普賢等四人爲上首云也疏前明諸至別受名也者是明持金剛人與菩薩差別義也又執金剛眷屬者是以爲依止示執持五如來之上大空智之義其眷屬人名義成也如十卷義釋第五云執金剛眷屬用畢竟空智摧滅人法顛倒無復遺餘文又菩薩者是至假觀并中道觀之者名菩薩眷屬也故十卷義釋五云然大悲忿怒劑至中道文今此義意也問執金剛是唯有惠無定及慈悲徳耶答有之也然彼執金剛皆是備萬行故定無定慈耶問若爾何云諸執金剛一向是如來智印云亦菩薩義兼定惠又兼慈悲耶答彼執金剛衆持金剛杵是表是勝持智印意義不謂無定悲歟菩薩者具云菩提薩埵或翻云道心衆生故兼慈悲歟或求覺義此豈不求定與悲耶又此義可尋也今私案云執金剛者是表等覺菩薩證金剛喩三摩地備摧破用而將一向斷佛地障故具足無量智義也約此義邊云一向如來智印歟但菩薩衆者此十地菩薩雖住等覺位未得金剛喩定以前諸功徳是無勝不共徳故云兼定惠兼慈悲歟問若爾者金剛心菩薩得定勝何不歎定不共徳耶答今謂其定實依止勝智之所依定故且不歎定殊勝義而猶此歎智之徳義也若不爾者此義何可通耶此義且依心地觀經等所説轉識得智義及涅槃經所説四依義中不可依識可依智義故作此説也又解顯露雖欲能依智徳返密欲歎所依定徳既讃末智尚有徳於本定豈可無勝徳耶而何故不欲讃其定徳耶又解於智品總攝諸餘定等善品而示唯智義也疏亦是毘盧舍那内證功徳者此明是十佛刹塵數菩薩同法佛之智用差別分位義也疏如執金剛至微塵數者例同上持金剛衆數量義也疏以加持故至知識身也者是明説内證智徳顯外顯現垂迹意也加持者是加被義増加義以本有性得故而新修顯徳義也如上釋疏又般若至名大眷屬者是引例成義也若是智度論説歟若是金剛般若論歟可尋之内證眷屬者親翼從如恒相從影不離形也又内眷屬義者此親族義所以不知者阿難等是釋尊之親族故云内大眷屬義者此人即有大人義而具足廣大徳故云大也或此人亦所攝眷屬衆多故也問持金剛衆及菩薩衆中誰内眷屬誰大眷屬答倶皆雖具此義今依備増歟可思之疏今謂佛至名大眷屬者是同上例也疏故大品云至波羅蜜也者又引證成義也疏普賢菩薩至以爲名者從下釋四菩薩名之中是釋初菩薩名也義易知也此約修得之作用及自相立此名也亦約性得義立普賢名故金剛頂經頌云普賢法身遍一切能爲三界自在主無始無終無生滅性相常住等虚空一切衆生所有心堅固菩提名薩埵乃至利有情事諸悉地慈悲哀愍爲加持云云此是通性得與修得其心也疏慈氏菩薩至曰慈氏者第二菩薩也四無量心中慈無量心攝盡餘三無量心一切善法故也此菩薩爲佛之補處灌頂大士即繼如來家業故亦欲以自家業令繼一切衆生而嫡嫡相承不斷絶故也依此與樂意願立慈名云也疏普賢是至次明之者釋普賢次列彌勒之次第所由也此自行化他故以自爲所依本而成化他用云也疏妙吉祥至具衆徳義者釋第三菩薩名也妙者即智慧也智慧是衆徳所依本也依此義妙即吉祥也依持業釋者吉祥是説法用也若妙即是吉祥也是持業釋也疏或云妙徳至一切聞故者此擧異説而明以此菩薩列上慈氏次意也此據作用作此次第也疏除一切蓋至除蓋障者釋第四菩薩名也是以性得本覺之過恒沙功徳爲本因而依修得而除斷惑障方新顯本有萬徳而爲此義云意也疏如來諸有至妙音明之者明文殊次列此菩薩意也此上一切功徳皆悉遂欲令歸此解脱果海故云也疏復次行人至障三昧也者此明復次第二釋也此意云所學般若之行是普賢之行願及慈氏之大慈悲行是也依此行願菩提心作利他事業者是妙音説法用妙音説法用若不依止定心者何能如理説正法耶云盲者具蓋障人也開敷眼人是除蓋障者也又此句文中雖似闕慈氏之行是理實所開能作之本意也妙音説法是依慈心故也疏此四菩薩至無上菩提者明於此四菩薩功徳即攝盡佛徳而圓滿具足云也佛身四徳者如上所云四種徳也又以此四菩薩可配常樂我淨四徳謂普賢是常徳性得菩提心無變易故慈氏是與樂徳是自具樂故以此樂轉授他人也文殊是我徳智慧是自在主宰義故智慧名我徳可檢涅槃經也除蓋障是淨徳解脱惑染即清淨義故也疏是故到至塵沙衆徳者明以此四菩薩爲上首意於是此四徳欲含攝餘一切功徳故也疏諸大菩薩者具出梵文已下文釋菩薩義也文廣而易解故不釋之也智論菩提名諸佛道者是所求道也薩埵名衆生者是能求人也上來通序釋畢建久八年八月十五日於金剛峯寺往生院書寫之畢執筆沙門惠海
