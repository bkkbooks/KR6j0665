body:
  text: 大日經住心品疏私記第七疏復次世尊至分別演説者從下標佛亦重廣説淨菩提心門之無相因縁義之本意也疏所以然者至示其著處者是釋其廣説所由也謂諸衆生執著轉深轉廣種種不同故俄不能解了淨菩提心門無相勝義菩提心之寂滅眞如理故隨其執著差別説種種能治藥治彼有執病而令入此淨菩提心無相勝義門云也其所執著略有五番也所以除遣其五番執著也問其除遣五番執著處文如何答經云心不在内不在外乃至不可得者是第一番也是直爲除遣行者自内心所執著故説此第一番藥也第二番者經云祕密主如來應正等覺非青非黄乃至非男非女者是爲除遣外道執實我有色相之妄計故説第二番藥也正顯示本覺我徳實遠離諸色等相義而對於彼眞空理遣此所執我之有色執也第三番者經云祕密主心非欲界同性乃至非人非人趣同性者是又爲除遣餘類外道所執實我自性執同三界六趣相妄計故説此藥也第四番者經云祕密主心不住眼界乃至即同菩提者是重爲除遣行者於内六處十二界中心尚謂遍在心實有相之妄執故又兼爲除遣有内之外道一類於五蘊十二處等法中執有實我法妄計故説此藥也第五番者經云祕密主謂分段乃至求不可得者是重廣爲淨除前所執實我實法二計而令無遺餘而爲令觀顯成就是眞言教中淨菩提心門之諸法實相理故説此第五番藥也凡示約因縁所成法中求心自相而不可得義云也故此第五番藥來也前第四番別相之遣執也此第五番是總相遣執也凡約一切有執而總爲破其所執相故也疏經言心不在至攝一切法也者謂牒經文而釋其意也是第一番中擧内外十二處意是此處攝盡一切諸佛法故也十二處者色聲香味觸法處是外六處也是即六塵境也眼耳鼻舌身意處是内六處也是即六根也此第六意處攝八識心王及於第六法處法界攝諸心所也是處義是生義入義是則能生六識之處故大乘義章云生識之處名之爲入又復根塵迭相順入亦名爲入倶智餘虚明也疏行者無始至無有處所者是明所以於内六根處中而生妄執於内六處求自心之自性不可得義此六根是即因縁合集所成假法故此中豈有其根實自性耶云也疏而作是心至無有處所者是明於外六境求是心自性亦無其實心自性云也疏猶恐錯誤至不可得者是明於六根與六境中間求此心自性亦不可得義也於内外各各法中猶無心自性何況於此二法中間何可有心自性耶云也疏即悟此心至淨戲論雲者是明於内外中間三處求之終不可得故即得本不生解故除計有自性之垢穢之妄執説弊翳雲晴云也疏譬如珠力故水清水清故珠現者是明同喩也此喩意云以水精入濁水時即有令澄淨於水之用也水精之所在水澄淨故返即水精被徹見於水上云也若合喩可云無自性空觀行清淨成故即諸無始有執垢穢妄見皆悉被除遣而成清淨見云也疏定不從餘處來也者是本不生自性本覺即是唯在妄想心處云也又解如是無相觀是於行者之十二處而觀顯云也疏經云祕密主至不男女者是牒明遣第二著處經文也疏前約一切法明心實相已者是明此第二番遣執文生起由來也疏今復約眞我明心實相者是前第一番次而明第二番來由云也是總標義也疏今復約眞我明心實相者是約本覺眞心相而標此自心實相之遠離諸色相義也疏此宗辯義至大我也者是釋眞我義也般若僧正抄云約一切法明心實相了次約眞我明心實相此宗辯義即以心爲如來應正等覺所謂内心之大我也云云今私云此宗此大日經宗也此大日宗之淨菩提心之義意是以本始二覺而爲如來云也此如來説即爲眞我云也此眞我義對妄我而成立義也如前所引涅槃經第七貧女譬中所云我義也如釋大衍論第六云眞如自相者謂眞體中圓一切徳無所少故所謂六種性義功徳乃至常樂我淨義本始二覺從無始來遠離四障圓滿四種自然徳故又云妄法四相之所遷故非常三種苦倶轉故非樂二種自在無故非我一道清淨無故非淨此四種過以對量本覺體中四種功徳建立顯示云云疏如有一類至餘皆妄語者上來正明本覺眞心之遠離諸色相義畢故今文意是傍兼明破一類外道計於所執眞我即有色相之妄執云也前文中既正義顯故此次文於邪義爲破彼故此文先是擧彼所計義也疏然此等至眞實我邪者此正破彼妄執也破意云彼外道妄心所執我是於彼自内心之所變相依他法上迷而分別種種相貌故若離能縁所縁依他法而無實我故實云無我也疏對如是執至非青色等者爲欲對破迷執故明此第二番能治正觀來云也疏所以者何至如是諸相也者是亦上所言本覺眞我遠離色非色二定相義也故釋論第六云法身無相能現色相若能出現種種色相不可言説法身空寂離色像域自性法身能爲色相作所依止善出色相無障礙故所以者何能依色法所依心法從無始來平等平等無有二體唯一心量故云云疏如有外道至情計不同者是指其成執見類而成前義也此文在涅槃經中可檢正文也外道阿闍梨者是外道之師也阿闍梨者此云明解師云云於黒月夜者是喩在無明暗夜中習邪見而傳授邪教義也大象者是所執總我之喩也若身若牙等者所執我別相不同義之喩也餘義易知也疏若瑜伽行者至諍論也者是對前外道迷執失而今明觀行者觀心之徳也照見心王如來者是未圓滿者之始覺智隨分見本覺心性即遠離諸相義也疏次云祕密主至無變易者牒第三番遣執經文而釋其意也此觀行者之所觀本覺菩提心相是不同外道所執實我之即同於三界六趣有情云義也是簡別義也疏諸外道至生一切法者是擧彼外道所執計相類也此梵王毘紐天生諸法義至下可明也疏然此三界至不可得者是明三界是依他法故虚空假不實義之所以而欲顯示本覺眞心不壞眞實義簡異彼依他妄法義故也疏況令心性同於彼性耶者是正明本覺眞心之異於妄法假有法義也疏次廣分別至彼同性者是此眞心是明與一切諸趣衆生非同性義也經所言非天龍夜叉乃至人非人趣同性文即是也疏譬如虚空中至清涼如故者此喩也合意云諸有爲諸法之自性本覺眞心即雖是隨縁生滅而是種種萬差不同而其自性眞心終不變易云也文虚空中雨八功徳水者是標於眞如法界中建立八不所顯中道理也文一味䣼淨者是示本覺眞心之本性寂靜無垢義也文隨所受之器種種差別者此眞如隨縁成有爲諸法義也文或辛者是眞如成生死苦果義文或酸者此眞心成生死似樂果義也或亦對有爲恒沙過患而建立本覺恒沙功徳也文或温者此成生死熱惱苦患法義文或濁者此成生死煩惱濁亂不淨業果義也故楞伽經云如來藏是善不善因能遍與造一切趣生者即此義也文然八功徳性不與彼同温解濁息時清淨如故者是明有爲有漏諸法終盡時遂歸本覺此本覺眞心無終盡義也又楞伽經云七識生滅即如來藏不生滅即此義意也八功徳水者基師彌勒經疏云八功徳水者一清二輕三冷四濡五香六美七飮時不損喉八飮已不傷膓云云疏又如眞陀摩尼至應生滅也者是第二喩也蜜嚴經云如摩尼衆色合色而顯明云云意云於摩尼珠合會諸色時摩尼隨此所合衆色雖其所現色種種轉變而其摩尼自體不變異也本覺眞心亦如是受諸染法熏習雖流轉生死中而本覺自性凝寂不變云也疏若與彼同至應生滅者是釋成摩尼珠自性不改義也疏復次世尊至心實相門也者是第二復次釋也此釋意云遂直欲顯示法然常住内證曼荼羅深祕密境界故先是於行者令洗除其相濫之自心所變色相之法執垢穢故云也是返即釋前第三番遣執處之所由也疏何以故至生滅戲論者是明除遣法執慢意也謂以本有三密爲本質以佛加彼爲助縁以自心爲因所現生普門海會是所生果也此果是縁成法也是自心之所變相故也然執此縁生法而謂實法佛境界即是法然法而成法執故返於法佛法然曼荼羅境界而成迷倒也爲除此迷倒執故云如來非青黄赤白等云也若約此深祕趣釋意是於法佛非謂無法然常住色心等功徳也但於法佛自分境無隨縁假有色心等功徳云意也疏故佛説言至六趣同性者以此散釋意令歸本文也疏若能如是菩薩心也者是明作隨縁法即空觀心人即是爲離障礙方便而成究竟果分之菩提心義云也疏經文云至非顯現者是牒第四番遣執經文也前説不在至歴法分別者明前第三番次此第四番文來由也意云前第三番遣執意總擧三界六趣中十二處之内外中間三處而雖云總攝一切有爲法而其中明心無自性義未明分柝於其一切法中一一別相中求心自性即無自性義也然今明於其一一法而分別求之心無自性義云也文云前説不在者此不字者爲是諸法不攝在義也疏若心不與至住意界耶者是明爲除破外人重於十八界中若執有自心性之依住處之妄執迷見故而先責問之義也文若心不與諸趣同性者是明於前第三番雖云遣執心而今重尚分柝之心無自性義也文爲住眼界等者是爲明破於彼第三番亦更問應生執著義故先責問此咎也前第三番中約諸趣明心無自心義故今更轉又迷執於十八界尚推求心有自性耶故爲遣此咎故此第四番遣執文來也疏若心住眼至有住處者是明此第四番中正遣執義也意云設心若執有能住於眼界等中義者今此所住十八界是假有即空相故以何物而可爲心之所住處耶何於虚假法中可爲實相心之所住處耶云也疏況復心之實相住在眼中者是設雖能住心是實有相義所住十八界是虚假不實法也能住所住義不相順故於十八界中不可求能住自心云也疏如眼界者至皆應廣説者是此經文且明擧十八界一科而理實可類攝餘蘊處中心不可得義也上來約外外道邪執而明心無自性也自下復次釋意是約内教之外道邪執而遣其迷執即顯心無自性也是此近正爲洗除淨菩提心門之行者邪執故遠爲制止内外外道邪執故此第四番遣執文來也疏復次前已至聲聞故者明此第四番破執文來意也疏犢子部至不可説藏中者是擧所破邪執計也於此所破邪執有二類一者犢子部計也是小乘二十部中我法倶有宗義也二者説一切有部計是二十部中法有我無宗也此文是擧我法倶有宗計也文譬如四大和合有眼法如是五衆和合有人法者是此部所立我法倶有義成立意也譬如四大和合有眼法者是立我法之同喩也此義如薩婆多宗所立故基師五根章云薩婆多師別有四大生等五因爲因縁造眼等五眼火唯身觸根雖和集並實有體云云問何以薩婆多宗義而比知犢子部立五根義耶答異部宗輪論云即於此第三百年從説一切有部流出一部名犢子部其犢子部本宗同義云云故爾知也又同論説此部所立義云謂補特伽羅非即蘊離蘊依蘊處界假施設名諸行有暫住亦有刹那滅諸法若離補特伽羅無從前世依補特伽羅可説有移轉云云又五教章云犢子部等彼立三聚法一有爲法二無爲法三非二聚初二法後一我又立五法藏一過去二未來三現在四無爲五不可説此即是我不可説是有爲無爲故云云私云犢子者是部主名也上古仙人化母牛而所令生子是爲部主也疏説一切有至實有自性者是擧第二所破邪執計也此部義意如五教章云二法有我無宗謂薩婆多等彼説諸法二種所攝一名二色或曰所攝謂三世及無爲或五謂一心二心所三色四不相應五無爲故一切法皆悉實有云云疏以如是戲論法故不識其心者是總令破彼前二部小乘所計也是於前前諸番中破邪執訖正義顯盡故今只總破之也疏若能觀心至戲論皆盡也者是顯觀行者所得正義也意云能觀心即不分別所觀境之有無相也而唯證會眞如理云也此義如密嚴經云若有勝瑜祇善住三三摩地遠離能所覺寂然心不生是名眞實修無相大乘教云云意云住淨菩提心門菩薩能縁心所縁境倶亡今不生是名無生觀也故菩提心論云當知一切法空已悟法本無生心體自如不見身心住於寂滅平等究竟眞實之智令無退失云云疏非見非顯現者至言之耳者此牒經文而先且出異人謬釋義而輕拒之義約正義意是總爲欲淨除一切執有自性之微細妄執故也就此文有二人謬釋也初人意云佛能證一切種智是於一切衆生平等共有性也然爲無始無明被覆藏故不顯現也但除無明時本有智慧顯現云意也後人意云佛所證一切境界本有性得性不新修所造也然有煩惱中伏藏時此本有功徳不現在也若除去伏藏煩惱等時本有功徳顯現云也問此二人之所釋其差別義如何答雖其菩提心之本有義彼是同意今且約能證智與所證理別義故辨其差別之意若不爾者此義難別故也問此二人所釋義是當正義何輕拒之破難也答此破意云大乘初修業人依從無始來執世諦實有本習力故尚於大乘法中即執著爲佛智見之能證智所證理者雖色心具足而從無始已來無増減相而依無明煩惱所覆弊而不顯現人則成此執著咎也此執著相者當起信論説五種人見中第三人見義也故彼論云三者聞修多羅説如來之藏無有増減體備一切功徳之法以不解故即謂如來之藏有色心法自相差別云何對治以唯依眞如義説故因生滅染義示現説差別故以證文可知破此二師所計義意也又解云存此本有性得功徳意是理實可讓法佛所證境三摩地之中所明方便爲究竟門也然未於此淨菩提心門中安此義是不可釋云也不符佛意義也重意云此淨菩提心門是遣盡一切有相執之遮情門也是非表徳謂也然物未然此中安表徳意是不契佛正意云也依此義故二教論云龍猛般若燈論觀邪見品云般若中説佛告勇猛極勇猛菩薩知色非起見處亦非斷見處亦乃至受想行識非起見處亦非斷見處者是名般若波羅密今以無起等差別縁起令開解者所謂息一切戲論及一異等種種見悉皆寂也是自覺法是如虚空法是無分別法是第一義境界法以如是等眞實甘露而令開解是一部論宗喩曰今依斯文明知中觀等息諸戲論寂滅絶離以爲宗極如是義意皆是遮情之門不是表徳之謂論主自斷入道初門文私云是文能契此處義也又解此破是破立前從修因而有果徳義也意云於一切衆生身中從本以來在佛功徳智慧色身義是實於因中在借説果位功徳云也實於凡夫因位中直不謂佛功徳智慧自然具足圓滿也但顯示依修因行其中定所可得果徳之道理故云一切衆生身中有佛功徳常住也而不解是意者妄謂法佛諸功徳智慧一切皆不修因行以前皆悉具足圓滿也但被覆無明等惑障不顯現也成此解入即不可義云也故明修因行後定當得佛功徳也如涅槃經二十七云譬如有人家有乳酪有人問言汝有蘇耶答言我有酪實非蘇以巧方便定當得故故言有蘇衆生亦爾盡皆有心凡有心者定當得成無上正等覺云云又爲破不待修因前而執佛果本有執故涅槃經三十六云若有人言一切衆生悉有佛性常樂我淨不作不生煩惱因縁故不可見當知是人謗佛法僧乃至若有説言衆生佛性非有如虚空非無如兎角何以故虚空常故兎角無故是故得言亦有亦無有故破兎角無故破虚空如是説者不謗三寶云云又同經二十七云一切衆生定得阿耨多羅三藐三菩提故是故我説一切衆生悉有佛性一切衆生眞實未有三十二相八十種好以是義故我於此經而説是偈本有今無本無今有三世有法無有是處云云私云二師不得此義意而於淨菩提心門存不依修因行而佛果本有義故成此破又解此淨菩提門是唯約心眞如門遣盡妄執門意也而於此心眞如門方存用彼心生滅門中染淨差別義即是不得此中所用淨菩提心門意故破之也問就前義若法佛功徳是不本有法但待修因生者法佛内證功徳既成無常法亦非常住本有之法佛功徳爲無明煩惱等所覆弊者既違菩提心論説當知法爾應住普賢大菩提心一切衆生本有薩埵爲貪瞋癡煩惱之所縛故諸佛大悲以善巧智説此甚深祕密瑜伽令修行者於内心中觀日月輪由作此觀照見本心湛然清淨猶如滿月光遍虚空無所分別文答此離最深今通云彼涅槃經尚對菩提心門中所被對治有執人而説佛性理故猶隱佛性本來常住不待修因本有功徳具足義也此眞言家是依淨菩提心門遣盡諸妄執義故直任如實道理而顯説本有常住功徳云也故無相違咎也疏若淨菩提至見無上菩提者此立道理而破前二師謬釋意也此師釋不得了此淨菩提心門深意云也深意者此門意而爲欲除遣盡一切有所得相執故然猶未了本有性徳三密門菩提心相以前而進執菩提心門本有義是還可増法執云也問若爾者何新華嚴第五十一云無一衆生而不具眞如智慧但以妄想顛倒執著而不證得若離妄想一切智自然智無礙智則得現前云云又起信論云本覺性具足過恒河沙功徳本有恒常云云此等經論約淨菩提心門而豈不説性得本有功徳耶答此義可有二所由一者是於因分淨菩提心門中而借説果分性得本有功徳而爲助成因分功徳故也若不爾者誰人樂修行因分教行法耶此義法藏師意也二者此淨菩提心門中本覺本有功徳義實對無明等恒河沙過患數量而假顯本有性功徳立義也故不相違依此義釋大衍論第六云本覺體中六相功徳各各待觀何等過患以之爲對建立顯示所謂根本無明熏習一心之海發業等種種諸識隱覆般若實智之明増長愚癡迷亂之暗即是不覺無明之界量明以之爲對一心之性寂滅無起即是本覺惠明之安徳云云又同論第五云一者相待相成似有意謂欲顯示染淨諸法皆悉相待而得成立無有唯自建立法故二者本無性空非有意謂欲顯示染淨諸法種種名字於本無中權假建立一切皆悉非自名故三者相待相成顯空意謂欲顯示染淨諸法由相觀故從本已來無有自體自性定故云云疏又經中自説至亦無分別者是引此經文證而破淨菩提心有相云師義意也疏猶如虚空至染汚之者以喩釋上所引經文離分別義也喩意虚空極淨故於諸色無穢汚之用云也疏心性互爾者合喩也疏一切分別至離一切相也者是明所觀淨菩提心自性遠離能分別心及所分別相義也能縁心所縁境從本已來相待建立也若無心時境即不成也若境無時心即不生故也雖然心勝是本也境劣是末義也依此義故論云一切諸法唯依妄念而有差別若離妄念即無一切境界之相云云又解經文離諸分別者於是淨菩提心不可見法云也是諸妄念之分別心不及處云也次文無分別者此淨菩提心直即無分別縁慮云也疏經云所以至滿足者此牒明本覺眞心無分別義之所由經文也此經文是釋菩提心無分別無妄念意也意云虚空是無分別性也及菩提是亦無分別性也此二種法無二無別法故倶皆無妄念分別及所分別義云也問此中虚空是世間事虚空歟爲當理虚空歟答准上文謂疏文曰如是即是毘婆沙義虚空無過無徳今如來身離一切過等又後文云實非世間虚空所能遍喩云云故知可言事虚空是能喩法也可言是中所喩之虚空是理虚空也所以者何事虚空是假立法也是於色法闕無分位假立事虚空也理虚空者釋論第三云性虚空理有十種一者無障礙義諸色法中無障礙故乃至此虚空理二種淨智親所内證相應倶有不捨離云云經中云心虚空界菩提三種無二故定可知是取所喩理虚空義故又疏云以世間易解空譬離解空也云云問此三種無差別之中有差別相如何答心者是本覺眞如心是即有神解性故名心亦有堅實義故名心也虚空者此眞如性即離障礙等十義具足故名爲虚空也菩提者是本覺始覺般若也始覺即同本覺也此三種一體有三義云也疏如上種種至求菩提義者總釋所牒經文本意也謂上來四番遣執清淨之門也是爲發明於隨染本覺自心而令起發求菩提心即滿始覺果而同於本覺眞源故云也疏今復結言至有三名耳者以散釋意令歸經本義也此性同虚空等一行經文是總結第四番遣執義文云也疏即此一法界至不壞因縁者自下爲欲建立大悲爲根方便滿足句義故明眞俗二諦互交徹事理二法各不相背義成立也意云本覺眞心理中一切諸法皆性空無明故不可有大悲爲根方便滿足義也雖然但本覺隨染心生滅門中有隨染業幻事故有佛界有衆生界也於佛界可歸依於衆生可拔濟故所以大悲爲根而方便滿足妙術最至要者也疏實相以至能所之異者是明眞如門中菩提心理絶能縁所縁能化所化義而畢竟都無義也疏以不壞故至波羅蜜滿足者是明於生滅門中隨染業幻境界而有能化佛有所化有情故佛可拔濟衆生苦故衆生可登佛果故此大悲爲根方便滿足義有云也疏即是究竟不思議中道義也者此眞如門生滅門雙觀是名中道正觀也若唯觀眞如門唯理即可闕大悲萬行故亦可墮斷滅見故也若唯觀生滅門事相者即迷滯眞性理故可増法執有病也即可墮有見邊故也二觀并修如鳥兩翅能飛漢天而於生死涅槃二道而自在無礙云也疏經云祕密主至如知識其心者是牒經文是當第四番結文也疏佛已開示至三句大宗竟者是總結此第四番義意也此於淨菩提心門直是有三句法門云也一者此發菩提心是十信位也是菩提心爲因句也二者行菩提心是三賢十地位是即大悲句也三者成菩提心是種因海之因分究竟成佛是也是第三方便句也以此已上三句法門而爲果分之而成趣入方便云也故二教論云此宗所觀不過三諦一念心中即具三諦以此爲妙至如彼百非洞遣四句皆亡唯佛與佛乃能究盡此宗他宗以此爲極此即顯教關楔但眞言藏家以此爲入道初門云云又云明知中觀等息諸戲論寂滅絶離以爲宗極如是義意皆是遮情之門不是表徳之謂論主自斷入道初門云云又寶鑰云華嚴三昧一切行果界十尊諸刹臨雖入此宮初發意五相成身可追尋云云疏即統論一部至知識其心者明説三句法門本意也意云爲令諸眞言行菩薩淨除一切有所得執心而清淨開顯本有三密菩提心故云也疏如此經者至本無異轍者意云爲證判此大日尊所説誠實義故而引餘三世十方佛説之同相同味無異説義而助成此經所説義眞實不虚由也文中如釋迦如來所説法者是引例也意云法華經中釋迦文佛爲説一乘義引十方三世諸佛説法儀式同相一味皆説一佛乘之證也文當知十方三世等者是引餘諸佛説法儀式同相義而助成大日尊所説三句之義理不虚義也疏故云我説至知識其心也者以散釋意歸經本也疏經云祕密主至不可得者是牒第五番遣執經文也疏世尊前已至一切佛法故者是明前第四番之次此第五番來所由也意云前彼四番各各番番所説義猶是狹也其各各番番所被破人是約外道小乘漸次破兩種人執而各各皆攝取之故也今此第五番所明能治法門甚廣博也是爲決了十方三世佛法故也又此番之被所機總令被一切漸頓兩種人故也前四番別別所破外道小乘者所執實我實法即是遍計所執也此第五番總令爲破悉是小乘執及大乘菩薩所觀依他如幻似有所存病及三乘定別執眞俗隔別執故又兼爲破淨菩提心門中之疑執令生決定信心故也所以擧三世十方佛説同義故此第五番來云也疏如一切經中至開實相門者是彼諸小乘經所説生空理并三乘共教大乘經所説法空理是爲漸悟鈍根人而説漸教義也故彼方異此經所説淨菩提心門諸法實相如實了義説云也彼三乘共大乘經所説意是約遍計所執空無門故密意而説一切依他圓成法自性皆空義故爲不了義經云也其方爲遣凡夫二乘之麁執故之教道法門也不顯示任諸法自性道理之證道門義云也文或説諸蘊如合乃至或説諸法乃至漸次開實相等者是明一乘即三乘義也一乘是所入理三乘是能入門云也次文彼言諸法實相乃至此經心實相者是約理明三乘即一乘義也謂彼三乘教門之所趣是一乘理法云也又心實相乃至更無別理者若約本末歸攝義釋之者是明心實相者是本覺與始覺菩提心該攝無二無別義也始覺即同於本覺義故也或若約理智釋之者亦是明本覺智與眞如理無二無別義若約權實釋之者疏彼言諸法至無別理也者彼三乘教中以密意所明諸法實義者即實是此經中所云淨菩提心門中心實相是也餘經教中隱覆不明了説此實相義也此大日經中如實明了説此諸法實相義云也疏但爲薄福至即心之印者明餘經中所明三乘教義是唯説偏單理未顯示圓頓理是爲契所被漸悟機故也彼漸悟機未根熟時雖聞此大法彼可難信受故也故於一乘中分別假説三乘教云也是一乘外更無三乘法云也文且令淨除垢障乃至然後爲説即心之印者此明三乘法本從一乘法中流出義也此即三乘即一義也是三後説一義者此是漸次説一乘儀式也故名云然後爲説即心印也疏今此經至祕密之藏者此明是經教之殊勝義也是直爲眞言行者頓悟菩薩捨假權方便而明諸法實相義故此則勝於諸經云也是無隱覆意直住法道理如實顯示諸法假有即空無自性義故是經名了義經云也此頓覺成佛入心實相者金剛頂經疏云且漸有二種謂漸漸頓漸所言漸漸者三乘教是如來誘引衆生之法未説祕密圓頓法門也是名爲漸隨此漸教經歴三無數大劫修行勤苦從淺至深是爲漸漸若祕密頓教是如來隨自意之法也一即無量無量即一入有不有入無不無有無常一名爲祕密頓一即無量故不妨於頓亦有次第是爲頓漸無量即一故不妨次第而亦有頓是故漸漸不同頓漸云云私云此義妙契此成佛經所云頓覺成佛義也疏初句云謂至差別相故者是釋分段義也此中分段者不二種生死中分段生死義也但於因縁合集法分離差別義云也爲令諸菩薩除遣依他法如約性之假有義猶存有所得相妄執故也疏行者當知至不異於心也者是明觀依他即空所顯即是眞空理性也意云於依他法中求諸法眞性處自然顯得依他即空之性眞如理云也重意云於依他諸法中求此色心等實相自性處唯無色心等實自性而但有眞如理性云也此眞如理性者是非有別物也但即依他法之性空凝寂理是也如菩提心論云當知一切法空已悟法本無生心體自如不見身心住於寂滅平等究竟眞實之智令無退失云云疏色謂青黄等者是文易了故頓不記之也疏復觀自身至尚無所有者觀五蘊性空義用五種喩如次可配五蘊無自性義也此義如密嚴經上卷具説也疏況於其中而得有心者是於外色塵中執有心自性義前文已破畢故亦今爲破内五蘊實有性執而顯示此無自性義也文況於其中而得有心者成是五蘊是即空假有也然離此即空理而亦可有心自性義耶云也意云五蘊即空性是即自性清淨心也此自性淨心之外亦更不可有五蘊之自性體義云也疏從麁至細去廣就略者意云五蘊中色蘊麁受蘊細也乃至如是展轉前後相望最後識蘊最爲細云也於此五蘊中始從麁色終至細識於一一中求心自性倶遂皆不可得云也又去廣就略者捨法總相而就別相中而分柝一一法而於分柝法中求自心性遂不可得云也疏乃至現在至無住時者明是於五蘊始從麁色終至細識蘊刹那刹那無常變壞故而無自性義也疏又復後衆生於本不生際者是如是五蘊等諸有爲法有假有性空義故即中道義亦成立也假有與性空乃之中間所顯是非空非有義也如是三諦道理成立故而離偏邪之若有執若空執若亦有亦空執若不空不有執等云也一異去來等執准之可知文遠離一切戲論至於本不生際者是明始覺智之斷諸麁細識惑染遂究竟到本覺不生理義也疏本不生際至清淨心者是雖三諦即是一體無二義而此淨菩心門實所存是即空妙理也依此義意故此文説此義名爲極無自性心也即是本不生理也是爲欲令行者洗淨無始以來所串習有所得執故殊明本不生義也本不生際者是眞如自體性義也眞如是以無生無滅而爲自體故也自性清淨心者是本覺義又是眞如之徳用也此性不染而遠離諸雜染煩惱有漏義也心是眞實義也勝鬘經云自性清淨心而有染汚難了知云云清素法師云眞如爲心心體堅實不可壞也云云眞興僧都云眞如云眞實心也心之性故名即質多心也云云疏自性清淨至阿字門者順逆明本覺與眞如相即意也是顯示於本不生際者即是眞如性眞如性有自性心徳自性心徳即是本覺心王也即以此本不生者爲其自性淨心之性云也疏以心入阿字門也者是明無生觀心之照境義也意云能作心尚假有性空何況所作境非性空耶疏已説觀諸法實相者是結前依他諸法即是眞如實相義也疏次明觀於我者是發生明遍計所執即空義也謂前觀達依他諸法自性即空理也故今還彌照所執本來不可得義也疏故云若我至若清淨者引經而證成釋意也疏如上於蔭至有心可得者意云上所明於蘊等諸法中猶其性虚假不實而無自性理也何況別有實我我所耶云也但世間謂有我是但有虚假名字及妄情謂而無實義云意也文而不可得者實我不可得也於此我性無義豈有心自性耶云也疏清淨者即至爲菩提也者擧此外道所計清淨行義也如善惡因果經第五云阿羅邏仙人答悉達太子云若欲斷此生死本者先當出家修持戒行謙卑忍辱住空閑處修習禪定離欲惡不善法有覺有觀得初禪除覺觀定生入喜心得第二禪捨喜心得正念具樂根得第三禪除苦樂得淨念入捨根得第四禪獲無想報別有一師説如是處名爲解脱從定覺已然後方知非解脱處離色想入空處滅有對想入識處滅無量識想唯觀一識入無所有處離種種想入非想非非想處此處名爲究竟解脱是諸學者之彼岸也太子若欲斷於生老病死患者應當修學如是之行云云疏如長爪梵志至而受是見者爲顯示此淨菩提心之觀行者能觀心中而求自心相而無心自性義故擧其一外道所計相爲例而顯此義也此梵志極根性聽惠人也雖不承諾諸餘見而以此不承諾諸見之見而爲所存自見而承諾此見云也故如來破此見云汝雖不受一切法存此不受見故已是有所見也然何汝云不受一切法耶此梵志了存於一切諸法不受見故佛則破之有所存見則墮負處也此義如智論及天台法花文句疏第一卷明文今亦如是至淨菩提心也者例合前義也意云行者既雖遣諸執而以觀諸法空之智慧謂爲清淨義而是亦取著之此亦爲妄見云也然於此觀空之取著心中求心自性此中心自性是不可得性也於此能觀心所觀境中倶心不可得也觀達此者名爲入眞淨菩提心云也疏以上廣對五蘊者是中結明五蘊無自性義故爲此中無心自性義云也疏次復説十至不可得者發生次於十八界十二處凡餘一切因縁所成法中明心不可得義也疏阿毘曇至攝一切法者是明已上小乘論中所明三科法中所攝盡一切法中心不可得義也疏乃至一切至廣明者是也者上來約小乘所立三科法門而明一切法中心不可得義訖自此下總約大乘義所立明一切有爲法中心不可得義云也疏如於蔭界入至亦不可得者下別釋其歴一切法中心不可得義也文如於陰界入等者是指先小乘法中心不可得之例也疏以心不可得故至不可得也者是爲成本覺自心極無性義故又爲遣心性之常樂我淨非常我淨定執故云意也夫常樂我淨義是對待無明等有爲法之無常變壞義煩惱果報繋縛不自在義三苦八苦等逼迫義煩惱染汚不淨義而對量建立本覺自心常樂我淨義云也於自性本覺不謂實有常樂我淨四徳也又對待有爲染法過患時不謂本覺無常樂我淨徳也具義意如上所引釋論第六眞如體相具六義中云也疏復次如聲聞至正法眼生者爲成依淨菩提心門眞言行菩薩得生法二空無性觀義故引小乘人見諦得果例也小乘人初入見道時用八正道則斷三界分別我執相應迷理煩惱云也八直道者是八正道云事也八正道者正見正思惟正語正業正命正精進正念正定也此八種行無邪曲而直趣入聖道故名八正道也且約聲聞人明生空觀者謂於五蘊等三科法中求我自性處究竟我性不可得又離蘊等外求我性處凡亦我體不可得也又蘊等雖有假我相義而亦其實我不可得云也是無我觀行熟得無漏生空觀時離三界分別煩惱障名云八直道中遠塵離垢也彼入見道得苦法忍等十六心名云得正法眼生也疏眞言門至得法眼淨者依前小乘例而正成眞言門淨菩提心菩薩得法眼淨義也是即菩提心爲因句耳文初觀陰界入時等者此初明於蘊等中求心心不可得義云也文相在亦不可得者五蘊等除有似我現相其實我不可得故云意也問遠塵離苦正法眼生者是小乘義何大乘意用此義耶答此義亦通用大乘中也故惠沼師金光明經疏一云遠塵離垢等者准大莊嚴論得入初地亦得法眼淨不唯聲聞等又云准瑜伽論預流果文無定説故可通云云八正道大乘中亦通用之也疏若不作如至無由悟入者若遍歴諸三科四諦十二支六度四攝乃至佛果無上菩提等法中不明心無自性義者眞言行菩薩不能解淨菩提心門義云也以此方便而欲明爲祕密教法門云也疏如餘遠離至心之影像者是勝劣相對而欲明修行淨菩提心門一乘教菩薩勝於修行餘三乘教門無方便菩薩義故先出劣者也文觀人法二空猶未能遠離之影像者三乘教之菩薩約所執空門而觀我法空無義時其二空之相是自識所變影像云也但於二空爲門所顯得眞如理不謂自心所變影像云也故修行彼三乘般若之無方便菩薩作遍計所執空之影像而爲究竟理故猶不離心之影像云也疏今眞言行至悟法門也者是正明此門之觀行殊勝於前人義也此教菩薩是初發心時眞依了達依眞言門而自心本不生眞如理云也此別雖不作所執空解自然稱究竟空理故自然而稱所執無理得正體智速疾登法佛果終離心所變影像此行者悟解有爲諸法即體眞性理故我法二執頓淨除成如淨虚空云也又義如密嚴經云若有勝瑜祇善住三摩地遠離能所覺寂然心不生是名眞實修無相大乘教若欲生密嚴常應如是觀云云意云若證達諸法空理行者究竟是能縁心所縁境倶己息義是即實離心之影像義云也又云若知唯識現離於心所得分別不現前亦不住其性是時攀縁離寂然心正受捨於世間中所取能取覺云云故此疏第十五云以此實如空者實即如空猶空也無自性名實實者即如空也實者非妄語也次云以是所見猶如佛見實即同佛也先佛亦如是見也我亦如是見故云及也實及空非妄語并見如佛云云疏經云祕密主至障三昧者是牒淨菩提心門菩薩之得益經文也疏入佛智惠有無量方門者總釋此門中得益之所由也於此義總言之者有三句法門也別論之者有菩提心爲因句大悲爲根句也疏今此宗直至如來境界者此廣釋此菩薩得益相也文則是初入一切如來境界者是入此淨菩提心門菩薩不久而當證入後方便究竟句法佛果海云也又解此淨菩提心門即是入諸佛之方便境界云意也問此三昧是菩薩三賢十地中有於何位耶答用心次第云初觀之時假月爲喩遍周之後無復延縮作此觀已即證解脱一切障三昧但此三昧者名爲地前三賢依此漸進遍周法界如法所證名爲初地云云今云是明十住中初發心住行也華嚴經云初發心時便成正覺了達諸法眞實之性所有聞法不由他悟云云於此處中可用此義也疏譬如彌勒至自知耳者是擧淨菩提心門菩薩之分證境界也於是有二義一者唯明證見因分中心眞如門理義如菩提心論云當知一切法空已悟法本無生心體自如不見身心住於寂滅平等究竟眞實之智令無退失妄心若起知而勿隨妄若息時心源空寂萬徳斯具妙窮無窮云云即當此義意也二者此初住菩薩有隨分見法佛内證境界義謂引例如上引密嚴經説金剛藏菩薩依法佛加持力而見法身境界法性密嚴國土及自心之解脱藏也若佛攝加持時即以自力不能見之義也具如上注也是以自所變影像相分而證見本質法佛也不謂直證本質法佛身也故此疏第四云若作祕釋者如來妙嚴之相法爾無滅非造作所成故不以外寶爲飾乃至十住菩薩猶因承佛加持得見加持身其於常寂之體如在羅穀故以爲況也文是義意也但明於密嚴土彼第十地人不能明見佛加持身也疏法明者至法明道也者釋法明之名也是約得智惠明義立名也疏菩薩住此至清淨除滅者此約染汚淨除義而立名也疏譬如有人至而生喜樂者是引喩意是爲明淨菩提心門菩薩所解是煩惱即菩提生死即涅槃義故引此喩也此喩文在涅槃經中可檢正文也此喩意云依迷本覺菩提之妄心而生煩惱毒起也若了本有涅槃時即煩惱皆從本已來菩提性也如利寶即雖從本不毒性妄心即生毒解也除毒相之縁是依明醫之教也解煩惱即菩提之智必待佛法教誡云也疏行人亦復至寶聚門者此行者解諸法實相故於一切染汚法中即觀實相眞理義云也依此智惠功力成三昧則彌成熟煩惱即菩提義之深解云也疏是中障已下文五障義易了故不消釋之也問第二業障與第五所知障有何異耶答體無異但約義少異也謂依過去重罪業障留離始入佛法信心故名曰業障若入佛法以後遇違縁退屈之心是所知障也是礙解行故也疏行者已得至一切佛法者明依三昧力故有見佛聞法因縁而彌其解悟轉勝疑網淨除意也此菩薩之覺諸有爲法之眞空理義邊是始可齊等妙覺位法空智邊云也疏以其自至大牟尼位者簡別因位果位差別義也意云此淨菩提心門菩薩雖了達法空理未證達法佛境界法爾常住五蘊功徳故此菩薩未及佛果云也疏猶如淨月至大海潮也者此喩意云以第十五夜月能動大海潮即喩妙覺佛一切種智以十四夜以前月喩等覺以還菩薩智也重意云佛與菩薩性徳本覺雖是等同而佛修得始覺圓滿故勝於菩薩修徳始覺此未圓滿故劣云也疏又行者至修諸度者此菩薩依内心會直理故外用發五神通而淨佛土供養佛利衆生修増自利行云也問此菩提得除一切蓋障何不云得漏盡通耶答漏盡通是果滿位可得法也此菩薩是雖除五障未究竟斷盡故云何可得漏盡通耶疏復由意根至諸陀羅尼者此明得總持益也謂淨除第六意識相應煩惱障所知礙故得一切衆生語言陀羅尼云也疏如一世間至亦如是也者是明隨所縁境界衆生心行言語差別類無盡義故能縁陀羅尼智品差別亦無盡義也疏梵本中嚕至以具翻也者是明總持中之具足梵名具難可翻得所由也陀羅尼以念惠力持爲體也疏以得陀羅尼至中廣明者是依得總持力故増明知他心用云也文謂如是等者明所知境界差別相也疏是菩薩非至互用無礙者是例意根清淨義餘五根亦成清淨云也互用無礙者此六根之一一用悉皆於一一諸根處皆互相具足云也謂眼根之聞聲耳根之見色等是也此得六根淨位是若准天台宗所判此人在十信成熟位中也疏又能觀彼至行如來事者是明此菩薩亦以除此蓋障用轉授於他人義也疏當知眞言至可得成辨者以上諸功徳勝利配屬眞言行菩薩之速疾當得益也疏復次如上至神通之力者是依外人伏疑而釋其疑意也疑云如上諸功徳若本有歟若新修成歟答此本有法也又疑云若本有法者何一切衆生現不見此功徳耶又答云一切衆生被覆無明煩惱等蓋障故不能現具足此徳也此本有功徳之爲蓋障被覆陰而顯得之方便名云祕密神通之力也疏今眞言至蓋障三昧者以上三昧功徳即配屬入眞言門菩薩之最初得益相也疏得此三昧至常不捨離者於此文有七重之相續生起次第也行者内心解諸法實相理故則得三昧得三昧故外道發五通發五通故得語言陀羅尼得語言陀羅尼故倍増而得知他心得知他心故隨衆生機根説法成利生佛事説法成利生佛事故於諸衆生佛種令不斷佛種令不斷故諸佛常隨於所生處護念此菩薩甚深重云也疏復行者至不辭勞倦者是釋經本諸佛護念乃至不辭勞倦句文也釋意云依上所云續生六種内功徳與佛外護徳故爲利生故設雖住生死中而解諸法本不生理故無怖畏生死心無染著生死心也以不繋縛之業但爲利生故權雖生在無間獄中而堅住苦患本不生理故於苦受無厭離心云也疏何以故至如金剛故者明不勞倦苦患之所由也謂此菩薩之始覺淨菩提心其性堅固如金剛有不可破壞用云也又解順其所達眞如不壞義故能達智行亦堅固無退屈云也疏如是極至不可破傷者是釋上如金剛故之句此極堅固性是本覺理性故也此理性從本已來自然性離邪非而止息惡行故此本覺名云無爲戒也此戒是性得成熟戒也但於淨菩提心門中始顯得此法時名可云住此戒歟不可破傷者此無爲戒不待持犯常恒成就妨非止惡義云也不可有破戒時也疏梵云尸羅至清冷如本者引喩重釋無爲戒義也疏眞言行者至無爲戒也者合喩也意云得除蓋障三昧覺知我是自心性從本已來恒無爲戒性義云也是約顯得爲言非謂新修所生也
