body:
  text: 大日經住心品疏私記卷第二疏薄伽梵經本地法身者此擧所具徳而顯能具此徳人是即中胎大日如來也本地法身者是自性法身也是疏第二十云次即入中惡長聲字是方便也此是毘盧遮那本地之身花臺之體超八葉絶方所非有心之境界唯佛與佛乃能知之云云又第三云毘盧遮那本地常心花臺具體云云此義如涅槃經第二十七云非因非果名爲佛性非因果故常恒無變云云又大日經云我覺本不生出過語言道遠離於因縁諸過得解脱知空等虚空如實相智生已離一切暗第一實無垢云云本地者是自他受用及變化等流身之所依止義也自他受用等功徳是末也法性身尚是本也謂自性法身者是約本有常住不變義也自受用身者是約修因覺滿而今受所顯得本有常住樂徳義即立自受用號也地者所依義也法身者是萬徳之所依性義是有爲無爲之功徳之所依之本體也法是所依止義又法身是功徳聚集義也是積集諸功徳故也若依十住心論意彼論第十云薄伽梵者總覺塵數諸尊徳號云云疏次云如來是佛加持身者此明自性自受用身也是此五佛中大日尊是即能加持者也即是自性法身佛也約一切功徳所依自性法爾常住義邊名自性法身兼即約自受法樂義邊名自受用身依此義意故高野大師二教論及付法傳等云自性自受用身又云自受用法身也疏其所住處經加持住處者此所加持身是自他受用身又變化等流身是也此自他受用身等功能是自性自受用佛之所加持故自性自受用身名能加持也如教時義云大日經云佛住如來加持義釋云能加持身住所加持身其能加持身是理法身所加持身是自受用身他受用身變化身云云此文出教時義第一也又般若僧正大日經疏略抄云加持身者是曼荼羅中胎尊此名佛加持身當報身也亦名字門是具足佛也亦名具身加持也其住所者即通受用變化身也有四種法身也文又大師抄云問四種法身者何等和尚教云一者自性身二者受用身三者變化身四者等流身問何等自性身餘亦爾號答且毘盧遮那佛云自性身四方者佛云受用身金剛蓮華等菩薩云變化身外金剛部云等流身又問上所引教時義文意何答教時義意云自他受用已下名所加持身也是處即是能加持自性自受用佛之所之處云也故此疏下第七云從此自證身復起加持身云云此疏意是以經所言住如來加持之句所表大日如來之能加持義而翻影顯此句下必可有所加持四種法身義也先徳於此處文句多雖致劬勞未盡此正意也疏如來心王諸佛住而住其中者此釋能住義也心王大日尊如三世諸佛所住法今佛亦既止住自他受用變化等流身即是所加持處云也故安然教時義第一云大日經中能加持清淨法身住所加持自受用身一切内證法身眷屬亦現自受用身集會十方界示現無盡海會莊嚴佛藏與此會同又於十方界現普賢等諸菩薩身説眞言道而此法界宮中唯有佛身都無生死中人如此一切海會諸佛皆是因地心心所法九識心王成法性身之時一切心所等皆入果界轉成法門眷屬是法身也今住加持集法界宮共受法樂是自受用身遍滿十方是他受用身現諸菩薩是變化身然此大日三身常一體故衆生隨機即一開三教分張亦復不同云云私云此釋最契此處經疏文意也此義意云約此教時義文中初能加持乃至是法身也者此意云約所加持身中有四種法身中自受用身是勝故先初雖擧自受用身而終攝他受用變化等流身也又是他受用變化等流身亦有自受用義故總亦名自受用身也能加持清淨法身者是示出纒位離垢清淨理智即一法身是即爲安樂解脱果徳也所加持身者是示自在變化所現權實二身也問何故今所加持身名云他受用身等耶答是顯示自證化他二種徳之周備義故總名自他受用身也問明此義之文證有何處耶答二教論中有此文證也故彼論下卷云大日經云一時薄伽梵住如來加持廣大金剛法界宮一切持金剛者皆悉集會乃至諸大菩薩前後圍繞而演説法所謂越三時如來之日加持故身語意平等句法門此明自性身説法時彼菩薩普賢爲上首諸執金剛祕密主爲上首毘盧遮那如來加持故奮迅示現身語意平等無盡莊嚴藏此明受用身説法毘盧遮那佛身或語或意生一切處起滅邊際不可得而毘盧遮那一切身業一切身語業一切意業一切處一切時於有情界宣説眞言道句法此明變化身説法又現執金剛普賢蓮華手菩薩等像貌普於十方宣説眞言道清淨句法此明等流身説法等者擧金剛蓮花手兼等外金剛部諸尊此經四種法身亦具竪横二義文勢可知也已上論文解云是文方辨自證化他之四種法身説法之分齊相意耳又於自性法身自證功徳彼十地滿足菩薩尚不能了知此境界也然於此自受用身更有二重一者自性自受用身是唯有自證徳也即是非餘人親見聞境界也是則能加持大日如來也此疏第三云毘盧遮那本地常心即是花臺具體云云又第二十云次即入中惡長聲字宇是方便也此是毘盧遮那佛本地之身花臺之體超八葉絶方所非有心之境界唯佛與佛乃能知之云云二者自他受用法樂身謂八葉中四佛四菩薩是也故疏第三云四佛四菩薩醍醐果徳如衆實倶成云云又安之教時義一云胎藏界會中臺八葉名自性身三部眷屬自受用身第二重中諸大心衆他受用身第三重中釋迦佛等名變化身九界眷屬名等流身文又第二十云爲欲分別如來内證之徳表于外故於一法界中作八葉分別説耳又云觀音文殊普賢彌勒已在八葉中即大日如來大法身也爲度人故漸出于外云云又云是故八葉皆是大日如來一體也若如來但住自證之法則不能度人何以故此處微妙寂絶出邊過心量法何示人耶云云故知是明八葉四佛四菩薩即自證化他二義兼備耳又變化等流二身遍自證化他二義意者如疏第二十云復以加持神方普現身口意遍滿生死中當知此則是方便也若離方便如來本地尚不可説何況以示人耶不可爲諸上道等菩薩説何況流入生死中耶以此方便同於大空而現衆像當知一切大會曼荼羅皆是一身無別身也即是普門身也即是法界身即是金剛界身又云漸次流出漸入第一院次至第二院次至第三院雖作如此流出亦不離普門之身其八部之衆皆普賢色身之境界云云又第一卷云今者心王毘盧遮那成自然覺爾時心數無不入即金剛界中成如來内證功徳差別智印云云解云此等文是明所加持之自他受用變化等流身之因證化他徳之周備義也疏既從遍一切處加持力生者意云此示其所加持身皆是即從能加持之自性受用法身如來不思議業力之所現也何以故是大日如來之周遍法界自性身之所起差別功徳分位不同義名爲所加持處故也故疏第二十云八葉及中臺五佛四菩薩豈異身乎即一毘盧遮那身等云云是義意云明能加持大日與所加持四佛四菩薩乃至三重曼荼羅雖既成能現與所現身不同而即一無別義耳此遍一切處者此疏下文所釋普賢義同意也其文云普是遍一切處義賢是最妙善義謂菩提心所起願行及身口意悉皆平等遍一切處純一妙善備具衆徳故以爲名云云此中遍一切處者是指十方法界處故如下疏文云如胡麻中油遍滿法界於中無空隙處又金剛頂經説云三十七尊皆名普賢故又用心次第云大圓鏡智是則三十七尊皆是名普賢云云故知此遍一切處加持力生義與普賢之遍法界義同意也此從大日尊遍法界加持力用即現自受用他受用等四種重曼荼羅聖衆名爲遍一切處加持已上約力生云也已上約法身果地明能現所現相對加持義也是展轉増多加持義也又是遍一切處者即是明本覺眞如理性有能周遍力用也謂此眞如本覺是爲一切法之體性故爲一切法之因縁故也此本覺能遍在一切有爲無爲諸法故云遍一切處也故經云普賢法身遍一切能爲三界自在主無始無終無生滅性相常住等虚空一切衆生所有心堅固菩提名薩埵心住不動三摩地修習決定名金剛利衆生事諸悉地慈悲哀愍爲加持此頌中以上一行二句爲此中證文也是中方明本覺正因力故也後一行是明修得助縁力也是意云所以證得此修得始覺法身者即依性得本覺之加被力故而此始覺佛果生云也又所以顯得此本覺法身理性者依修得一切加持力故方得顯得此之遍一切處法身果而攝持命不失故云遍一切處加持生也以顯得本覺即是爲始覺生義也此義如金光明經第二云智障清淨能現法身云云已上性得本覺修得始覺相對明是遍一切處加持力生義是性得修得相對加持義也又以此自性自受用身之遍現十方法界之外迹用而加被諸衆生施作利益名遍一切處加持力生也是但有成他受用身等之加持衆生用故名加持力生也若依此義意者訓釋應言隨遍一切處而生加持力方成利益諸衆生也已上約利益衆生義明加持力生義也是即感應和合加持義也此加持言通自行化他也已上略有四重加持義計應知之疏即與無相法身無二無別者意云以顯教所説無相法身遂令歸攝密嚴所功徳法身而即示無二無別義是顯與密所説法身本性雖一體法身隨所被機根淺深顯示麁細不同身義也是爲除遣妄情謂色心等有爲諸法實有之迷執故且雖建立無相法身義若迷執除遣已時遂顯説功徳法身境也所以以假立法身義而令歸入眞實自性法身而混融無隔義故即言無相法身無二無別也又解以功徳法身即爲無相法身無相法身即爲自性法身而與餘受用身等三身爲所依體故言無相法身無二無別也無二無別者爲同一體性法身義也於所加持身者此明大日能加持自性法身與所加持自他受用身倶皆相應而爲自性法身義也故三十七尊禮懺云如上金剛界大曼荼羅三十七尊并是法佛現證菩提内眷屬毘盧舍那互體云云是明自他受用及變化身爲自性身義也又瑜祇經云金剛界遍照如來五智所成四種法身等云云又分別聖位引梵本入楞伽頌云自性及受用變化并等流佛徳三十六皆同自性身并以法界身總成三十七尊云云此等文皆説能加持自性身所加持自他受用變化等流即同一自性法然法身云也問功徳法佛名無相法身意如何答法佛遠離有爲麁相五蘊故且名無相雖爾尚有無爲細相五蘊故亦名有相如密嚴經云遠離諸分別亦非無覺了無有我意根惠根常悦樂云云又云得解脱智惠如來微妙身云何爲涅槃是滅壞之法云云故涅槃經二十七云佛性者云何爲相三十二故云何非相一切衆生相不現故云何非相非非相相非相不決定故云云問功徳法身名無相云意如何答涅槃經第二十五云無相者無有十相所謂色聲香味觸生住異滅男女相云云又涅槃經三十八云第色是無常因滅是色獲得解脱常住之色受想行識亦是無常因滅是識獲得解脱常住之識如色即是苦因滅是色獲得解脱安樂之色受想行識亦復如是如色即是空因滅空色獲得解脱非空之色受想行識亦復如是如色是無我因滅是色獲得解脱眞我之色受想行識亦復如是如色是不淨因滅是色獲得解脱清淨之色受想行識亦復如是云云又祕藏記云凡佛者捨有漏五蘊等身有無漏五蘊等微細身如虚空者稱周遍法界理耳非無其體云云又解如來心王乃至加持力生即與無相法身無二無別者是明本有理性法身與修成覺滿法法身同歸無別義也是意如大唐醴泉寺超悟法師新譯六波羅蜜經疏第一云何乃令發如是願爲佛應身刹那遷變化身佛者疾入涅槃功徳法身湛然常住以是歸依清淨法身超悟師解曰言應身者是勝應身唯識論名他受用身從佛平等性智顯現應大菩薩名曰應身此是有爲無漏之身故有刹那念念生滅故言遷變化身佛者是劣應身唯識論名變化身也成所作智出現此身八相成道爲於地前二乘凡夫故現此身縁盡息化故曰疾入功徳法身湛然常住者本有功徳修成功徳總名功徳法身修成功徳自受用身性同本有倶不生滅是疑然常故曰湛然眞如法身及自受用普並具四徳常樂我淨故曰常住常是法身住是報身名爲常住佛報身者四智菩提以之爲體此菩提智金光明經名如如智佛法身者名法如如故法與報並是疑然又不生名常不生名常不滅名住亦名常住以是歸依清淨法身者總結願求又云經曰無邊眞實功徳常住不變諸根相好智惠光明周遍法界皆從出世無漏菩提之所生故不可思議超過世智疏曰無邊眞實常住不變者從者從因至果名爲所起因是能起果是所起因行有邊果徳無邊因行無常果徳是常故涅槃經云菩薩五蘊三世所攝如來五蘊非三世攝又陳如名云捨無常色獲得常色受想行識亦復如是既苻此經應信斯解諸根相好智惠光明遍法界者如來報身眼等諸根色等諸境具無量相具無量好無量智惠無量光明皆遍法界故曰智光遍法界也言智光者諸佛智惠自無暗障能破衆生無明暗障故曰光明智惠即光明持業釋也皆從出世無漏善根之所生者結果由因果即常住圓滿報因即出世無漏善根不可思議超世智者非尋思境名不可思非語言及名不可思議世智有爲佛智無爲故曰超過又同經曰諸佛妙體即法身清淨解脱同眞際唯如是等説可知此大疏深意也又重解疏如來心王諸佛住而住其中者修得始覺法界體性智之根本大日如來即依住始覺修成之大圓鏡智不動佛平等性智寶生佛妙觀察智無量壽佛成所作智不空成就佛之位及普賢文殊觀音彌勒菩薩之四攝行四無量心行四徳波羅蜜徳乃是初重曼荼羅位諸佛菩薩行位乃至第二三四重一切曼荼羅位云也法界體性智是餘諸四智等之體也四智等是法界智之相用也法界智體即住四智用中法界智性即住住四智相中故云如來心王諸佛住而住其中也疏既從遍一切處加持力生者是若有人問如是四重曼荼羅法身如來甚深無量境界是從何處顯現出生者即應答是人言是從遍一切處加持力生也此遍一切處加持力生也此遍一切處加持力有二意一者依正因力生二者依助縁力生也初依正因力生者依一切衆生普所具足本有性得遍法界本覺法身力用之加持助故一切諸佛發菩提心修菩提行遂昇始覺法身果位也依是意故起信論云眞如熏習義有二種一者自體相熏習二者用熏習自體相熏習者從無始世來具無漏法備有不思議業作境界之性依此二義恒常熏習以有力故能令衆生厭生死苦樂求涅槃自信己身有眞如法發心修行云云意云是又即兼正因外縁二種義相對而加持成也又論云答雖有外縁之力而内淨法未有熏習者且不能究厭生死苦樂求涅槃云云又金剛頂經云普賢法身遍一切能爲三界自在主無始無終無生滅性相常住等虚空一切衆生所有心堅固菩提名薩埵利衆生事諸悉地慈悲哀愍爲加持云云意云諸佛是以性得本覺普賢薩埵正因之相加助義故而顯得始覺佛果而執持不失是加持義也此意如金光明第二云依於法身得顯現故二者依應化佛身等之助縁力而得生始覺佛果者依諸佛菩薩菩提心所起願行及身口意悉皆平等遍一切處而利益安樂一切罪生之助縁力故復一切諸佛今方證得修始覺菩提果而執持不失故也亦是加持義也故起信論云雖有正因熏習力者若不遇諸佛菩薩善智識等以之爲縁能自斷煩惱入涅槃者則無有是處云云又如前金剛頂經云普賢法身遍一切能爲三界自在主乃至利益衆生事諸悉地慈悲哀愍爲加持此中意如金光明第二云依法如如如如智説種種佛法種種獨覺法種種聲聞法云云又云我法身者清淨無比無量功徳難思議一切衆生悉蒙利益等文謂應化等流身等佛則以法身佛爲本質體故理實即法身如來利益諸衆生云也又云又此疏下文云普賢菩薩者普是遍一切處義賢是最妙善義謂菩提心所起行願及身口意悉皆平等遍一切處純一妙善備具衆徳故以爲名云云解云已上文是明依佛菩薩之加被助護縁而顯得始覺佛果而攝持不令失故名加也問如是依本覺正因力及諸佛菩薩之助縁加持力故所顯得始覺智佛果與此本覺無相本有凝然常住理同異義何耶答疏即與無相法身無二無別者又是明本覺與始覺無異義也謂顯得本覺名爲始覺也始覺歸本覺時始本即一義也故法花云如是本末究竟等者是義耳是本始二覺離有爲諸相故名爲無相也萬徳所依義故名法身也又若約理智釋之者本覺本有法身性是理也修成始覺是智也始覺還本覺時理即智也智即理也境智無二義是名無相法身無二無別義也法寶師云金光明經三身品云法如如如如智爲法身即是自受用及眞如爲法身也經云法身無異異無刹那故佛身於諸常中最爲第一也云云即是義意耳問如是無相法身地是甚深境界故爲衆生不可示不可説衆生不可悟解境界也而何諸衆生可見聞覺知之耶答疏而以自在神力令一切衆生見身密之色至名加持處也者是明法佛以自在神通不可思議變化方便力住普現色身三昧而巧示現第一第二第三重曼荼羅中色身隨其所應利益安樂諸有縁衆生名爲加持云也依此因縁故諸有縁衆生得入是曼荼羅遂證法佛果也疏而自在神至加持處也者此亦明依加持如幻三昧力隨所被衆生機性所現影像佛身義也是示隨縁假有身也是中加持者感應和合義也問上已所云即與無相法身無二無別文與於此所言而以自在神力令一切衆生等者有何差別意耶答上所云是法然本有法身也此下文所明是隨縁幻化應化佛身也其文上已如所釋也但其上文中又云住於自在神力加持三昧普爲一切衆生示種種諸趣所喜見身等乃至然此應化非從大日三業生等云云彼文即亦同此今文意也問其上所云即與無相法身無二無別意如何答此無相法身無二無別者解云釋成能加持自性法身與所加持自他受用身等是即不離義也故此品下疏釋云毘盧遮那一切三業一切處時於有情界宣説眞言道句法者此轉釋佛莊嚴藏所以無盡無邊際者以不異如來遍一切處常住不滅身也文此法佛心王心數之常住不滅身亦名無相法身此法身即無有爲四相故立無相名亦滅有漏麁重十相故立無相名非無無爲細相也故密嚴上云得解脱智慧如來微妙身云何説涅槃是滅壞之法云云是明法身佛有微細色身智慧義也此中無盡莊嚴藏者是所加持之自他受用身等也常住不滅身者爲能加持法身自性自受用義也此所加持四佛四菩薩等是大日尊之智用之差別外現位故與大日尊無差別身也故亦云以不異是常住身也故疏第二十云又觀音文殊普賢彌勒已在八葉中即大日如來大法身也爲度人故漸出于外又云金剛手等者即是大日如來乃至鬼神八部一一且有此義亦即是大日如來體雖是一而義各異此等文是明無相法身地大日尊與所加持自他受用身變化身等即一不二義意也問此加持義意如何答私云此中加持可有三義一者加被義二者性得修得相對義三者展轉増多義也初義意云依法身自受用大日尊加被力故應所化衆生機感而現能化自他受用身變化身等流身之佛身云也是以法身如來之能加力而令被於彼所化利益給功能名加持義此與力助成義也此功能有二一者是法佛之所加持自他受用變化身等是也故抄記云爲欲分別如來内證之徳表于外故於一法界中作八葉分別説耳餘文證可也二者諸衆生蒙世出世利益是也第二義意云一切衆生從本以來有心性塵數萬徳是不新成法雖然爲無明煩惱等所覆弊隱沒而不顯現雖然今遇佛菩薩教化力漸次修得而加顯本覺功徳而攝持令不失故此名加持也此義如菩提心論云云何能證無上菩提當知法爾應住普賢大菩提心一切衆生本有薩埵爲貪瞋癡煩惱之所縛故諸佛大悲以善巧智説此甚深祕密瑜伽令修行者於内心中觀日月輪由作此觀照見本心湛然清淨猶如滿月光遍虚空無所分別云云又蓮華三昧經頌云歸命本覺心法身常住妙法心蓮臺本來莊嚴三身徳三十七尊住心城普門塵數諸三昧遠離因果法然具是明性得塵數心王心數本覺相也又此疏云今者心王毘盧遮那成自然覺爾時一切心數無不入即金剛界中成如來内證功徳差別智印唯佛與佛乃能持之云云此文意云性徳本覺之上更加修而顯成始覺之恒沙主伴功徳云也新修得名加加而攝此所顯徳名持欲顯不新成法也第三義意云理趣釋云加持者表於中道生十六大菩薩普賢智從此展轉流出共成三十七位以成解脱輪大曼荼羅文意云從大日尊五智而増加出現三十七尊乃至無量無數聖衆而住持云也今此經所加持聖衆亦同此義故動云加持也問此所加持身是實法身歟爲當影像化現身歟答云此可有二意此大日經之衆會諸聖衆皆是實法身體也故此疏云心王所住之處必有塵沙心數以爲眷屬今者心王毘盧遮那成自然覺爾時一切心數無不入即金剛界中成如來内證功徳差別智印乃至此衆徳悉皆一相一味到於實際故名集會等云云見此文即此會聖衆皆是法身即體也餘文證如上記也二者隨縁假有身者此自性法爾四種身之即隨所化機縁爲利他所現影像變化色身是曰隨縁身云也此經疏所云然此應化於一切時處起滅邊際不可得等義者是也問若眞言機熟者見所加持法身時直爲見法身若爲見影身答是以法身爲本質疎所縁縁而親見行者自心所現影像佛身也問此義意如何答祕藏記云問何謂因縁所生法耶答據喩以本質爲因以鏡爲縁以影像爲所生法問以因縁所生法擬三諦何耶答鏡中像者有以四不生推求此有了不可得是即空是有是空不出鏡體體即中問約法者如何答約法者以觀心爲因以三密爲縁所現普門海會即所生法問此因縁生法縁自觀耶縁他觀耶答縁自縁他並無妨礙問縁自如何答以我能觀心觀本有之身於中普門海會現前能觀心爲因所觀本有爲縁海會現前爲所生法云云意云以本有法爾三身佛爲本質而行者之能觀心之上方現影像海會諸尊也而是明了現前猶如明鏡之上現影像也而以此即爲行者之親所縁縁境以彼本質本有三種法身而爲疎所縁縁境也而觀察此自心之所現影像佛身自性以四不生義觀之即悉皆不可得云也故疏上文引本經説云然此應化非從毘盧遮那身或語意生於一切時處起滅邊際倶不可得譬如幻師以呪術力加持藥草能現種種未曾有事五情所對悦可衆心若捨加持然後隱沒如來金剛之幻亦復如是縁謝則滅機興則生即事而眞無有終盡故曰神力加持經云於此所引非從毘盧舍那身等二行文有二意一者淺略意謂此本有普門海會以爲衆縁而所現影像以四不生推求之時偏不從大日尊三業生云也此如幼影像之自性於一切時處生滅義不可得義以下疏文可得此意也更有深祕釋謂本有曼荼羅普門海會常住不滅義故云於一切時處起滅邊際不可得云云此義存十住心論意也又如仁和上金剛頂經疏云無始無終者明五方五佛言無始無終者是毘盧遮那於三際中無生滅故故大日經歡毘盧遮那三業云於一切處起滅邊際不可得云云今私云以此釋文可得此經文意也是即當深祕趣義也此文即爲顯示自受用身菩薩持金剛界無生無滅義故言此持金剛衆非從大日尊之所生云也是本有功徳法身今依新修得更所顯現云也上來明約人釋能所二加持義畢從下約法釋所居境界義也凡意云上所言住如來加持句下開明能加持與所加持人義也今於此廣大金剛法界宮句下更明此聖衆所居器界法也疏次又釋歎加持至法界宮者自此下更第二約所住依報義釋能加持所加持者之所住處也此句是讃歎法身佛之所住處意也此歎有三意一廣博義二不壞堅固義三眞實不虚義也此句含是三義可悉之問約此住如來加持廣大金剛法界宮文而釋之此疏主御意與彼十住心論論主御意其同異何答此二師御意頗異也雖然亦互顯異端而終無相違咎也此疏主御意是以此住如來加持句方令通能住所住而乃明能加持所加持義也之差別相也然於能加持處唯開中台大日如來是即能住自性法身如來也所加持處即開八業四佛四菩薩乃至第四重釋迦世天等是即自他受用變化等流身也此義中攝盡四重曼荼羅云也次廣大金剛法界宮者是只言四種法身主伴聖衆之所居住處是不謂約能居人也彼十住心論論主御意是住者是亦令通能所二住也次如來加持者是示能加持大日尊也約所加持住處者是開廣大金剛界宮而如次即配實幢開敷無量壽天鼓音佛也此廣大金法界宮者不約所居器界相也是即亦顯能居聖衆之具徳名義也但於此聖衆所居宮城者引用他文也問若爾者八葉中四菩薩乃至餘三重曼荼羅聖衆於此四佛處何相攝耶答是攝鼓音佛處或又但隨所應應攝四佛也此疏四云擧六位則攝一切諸尊云云但第二重第三重曼荼羅是多分天鼓音佛處攝盡是諸聖衆也此鼓音佛是方通自證化他之二徳故就此自證内徳與化他方便義邊而此佛處攝盡第二第三重曼荼羅之自證化他義無咎也問二師御意既殊云何無相違咎耶答此宗意是顯示人法平等依正無別義也故二師各雖似陳異端是互異説相攝衆義周備而無相違咎也人即法法即人義也正報即依報依報即正報也故即身成佛義頌云六大無礙常瑜伽四種曼荼各不離又長行云佛説六大爲法界體性諸顯教中以四大爲非情密教則説此爲如來三昧耶四大等不離心大心色雖異其性即同色即心心即色無障礙智即境境即智智即理理即智自在雖有能所二生都絶能所法爾道理云云即此義耳故亦此疏云上説金剛法界宮即是如來身次云大樓閣寶王亦即是如來身云云即是義也正今檢此疏意以廣大金剛法界宮等文方約歎法之徳義而釋所加持義也是意方約所居器界法義以釋所加持義也耳問十住心論以是薄伽梵住如來加持等一行文如次配五佛義云何答彼論意云薄伽梵者總標諸尊徳號也次住者明能住大日尊自性法身及所住自他受用變化等流身及所依止法界宮殿義也故十住心論十云大日如來廣大法界加持即於是時住法界胎藏三昧者此所依止宮殿義也而乍見論文而應云如來者是大日如來自性自受用身次加持者寶幢佛次廣大者開敷花王佛次金剛者無量壽佛次法界宮者天鼓雷佛也此論自解云如次配五佛故今且設雖應作此釋然尋之理實非爾也問方如何以如來先配大日次列寶幢佛此次列開敷花王佛此次列無量壽佛此次列天鼓雷佛如此配處於此經文云如來加持廣大金剛法界宮者有何咎耶答若言爾時既可有四佛異名不便宜咎恐可有此咎故今私案此義以欲會十住心論本意也此處云如來加持經文是且明能加持義故先初方云如來而次置加持言歟問以何義知爾耶答疏上文云如來是佛加持身如來心王諸佛住而住其中云云是即能加持義也能加持是即屬大日尊也所加持是屬四佛等也然以此通序中如來加持乃至法界宮文如次配五佛者如來加持是大日也廣大是寶幢佛金剛是開敷花佛法界是彌陀佛也宮是天鼓音佛也若以大日佛即爲能加持義而翻以加持言列配所加持之寶幢佛等者恐可失此疏意以此如來加持之言即爲能加持義此疏之本意而已故今作此釋也問何故以宮配鼓音佛耶答鼓音佛是因行證入四句中當入涅槃佛句也涅槃是法佛之所居宮城義也故涅槃經第五云大涅槃譬如宮殿者是義意耳二十七云又涅槃者名爲屋宅何以故能遮煩惱惡風雨故云云問何故如來配大日餘亦爾耶答如來是從眞如本覺來佛界本初故且配大日尊又如是所達理也來是能達智也理智即一體名法身大日如來也廣大是寶幢佛義故此經八印品此佛名大威徳生意云此佛菩提心有廣大威徳故尚如軍幢旗有廣大威徳力故也抄記云寶幢佛是菩提心如世軍中有幢是衆中之首軍標幟咸所瞻望進止之節莫不隨之尚如一切萬行以此菩提心爲標爲主云云金剛者此當第二南方金剛不壞印此印名金剛不壞者是行菩提義也行菩提是將欲登極位之行也是灌頂智位也是金剛喩定現在前而斷佛地障之位故立金剛不壞名歟大疏第四云南方觀娑羅樹王花開敷佛身相金色普放光明安住離垢三昧之標相始自菩提心種子長養大悲萬行今成遍覺萬徳開敷故以名爲離垢即大空義也證此大空時猶如眞金百練垢穢都盡故佛身相亦然菩提心論中此名金剛心亦名金剛身者是五相成身中第三第四兩心是也理趣般若經云以金剛藏灌頂故云云法界者無量壽佛名也是法部佛故名法界也八印品名蓮華藏印是亦蓮華部主故也藏者無盡義也是果徳之無盡法界藏義歟天鼓音佛者此佛八印品名萬徳莊嚴也此萬徳莊嚴義是法身所加持成所作智門所現之無盡莊嚴藏義此也以此義故十住心論爲釋宮義引大日經文云時薄伽梵大日如來廣大法界加持即於是時住法界胎藏三昧者此義意耳此論意是眞如法界理即是爲大涅槃界也乃智之所現加持無盡莊嚴藏即是爲胎藏三昧也倶皆名爲所住宮也宮及三昧與藏義稍通也謂三昧者智之所住所也藏者是珍寶之所住處也宮者是貴人所住處也故大日經抄記云次惡是大涅槃其字曰天鼓音是正等覺之果果也鼓音佛者方便也既得大果豈自受用而已及爲一切衆生演之種種方便成所作智猶如天鼓之音無思而成事業若不爾者四佛得異名次第可雜亂故也只依此疏意者宮者此明四種法身集會所住之法性眞如理都城處云也彼論意云天鼓音佛名爲宮義也是擧所居處而欲顯示能居佛故也於是宮義方有二意一者是爲自證法樂故安住大涅槃之樂徳宮殿中二者爲攝化利生故寄住普現色身三昧所現三業所作無盡莊嚴加持境界相也故言宮也是成所作智門也故十住心論云宮者顯所住處今此心王如來無始無終各各安住自法界三昧云云已上文是於論第二釋約四種曼荼羅身而釋經如來加持廣大金剛法界宮之中是且釋法界宮義文也先第一釋以此如來加持等文如次配五佛也此第二釋以如來加持等句如次配四種曼荼羅身所住宮也而今以第釋此中用之不同於前第一釋之中方釋宮之文意也凡二師意云約疏主御意是以住如來加持句而開能加持所加持二義也於所加持義即開攝四種法身四重曼荼羅義也次廣大金剛法界宮句是直爲四種法身之所居器界也是方依横義而開釋四種法身義也約論主御意以住如來加持句直爲能加持之大日尊是自性法身義此義意雖顯露示説爲能加持義而欲比示兼通所加持義意也次以廣大金剛法界宮句而如次配四佛義也是自受用身義也經次句云一切持金剛者皆悉集會乃至菩薩普賢爲上首諸執金剛祕密主爲上首文者是明他受用法身也經文云毘盧遮那如來加持故乃至宣説眞言道句法者是明變化身也經云又現執金剛普賢蓮華手菩薩乃至宣説眞言道清淨句法者是明等流身也是論主御意方依竪義而顯示所加持四種法身之正報身與之所依宮是無二無別義也凡已上二師御釋意雖似有異義遂無相違也若依論主御意者此所依宮者若此自證徳爲宮者大涅槃界宮是也故云自法界也若利他行名爲宮此宮者當此宮亦爲成所作智門是也即普賢色身三昧也故論云安住三昧也疏大謂無邊至數量者是從下釋所依宮城之中是稱讃此宮城不共妙徳也於此不共妙徳略有三種義謂一者廣大義二者不壞義三者眞實義也今此文初明廣大義也物相竪高長巨多名曰大横弘寛無邊名曰廣然若約心釋之者此宮竪高昇而超諸因分之佛菩薩二乘等識心知見之所住境界而其際限無可測量義也横廣包含十法界而無不至處是無限量義也此大疏十八云長謂人所不及也私謂此長者即高也其廣横遍於一切衆生界其高登窮佛界故云廣長也云云又義大即是廣也若約色法釋之者大者是相巨多而終離其邊際無窮盡也廣者即此大之處超踰善那等數量其廣無數義也疏次文金剛喩至故名金剛者解云此明第二不壞堅固義以要言之如世間色法中金剛自體以無俎壞爲相然法身自受用體無漏五蘊自體無生滅法而不可示故出世間言語道而離心境路言也此佛果無漏五蘊自體無生滅法而不可示故即是眞如法性也諸法之所依也依此法身眞如而雖諸法興起然更無於此眞如之所依法也此適字可用始初義也謂以法身而爲諸法之本初義是也此意如金光明經滅罪業障品云法身攝藏一切諸法一切諸法不攝法身法身常住不墮常見亦非斷見等云云意云法身如來藏雖能生諸法諸法不能生法身眞如藏云也凡此實相眞如境界不可説不可示也故十地論説因分可説果分不可説云云又摩訶衍論説果海不可説者即此意也諸衆生不可解故化佛輒爾不可開示此實相理是自性凝然常住法故也故密嚴經云此法最清淨遠離於言説化佛諸菩薩經中未開演等云云然是法無初生時分又無中間住異時分亦無後滅終盡時分云也不盡者明此理離彼終盡之行苦義謂彼有爲法有終盡是即一期無常性也是逼迫性故行苦所攝也然此無爲法無此相也同論十云修習觀者當觀一切世間有爲之法無得久停須臾變壞故言行苦者一切心行於念念中常恒遷轉速生速滅不能從此處至于彼處故云云不壞者此法明無壞苦義樂受壞是壞苦所攝也此法樂受無盡時以何可爲壞苦耶文離諸過罪者明此法無餘苦受逼迫苦等意也或又明此法無諸煩惱業果報及所知障并變易果報義也文不可變易者明此法離刹那四相義也故密嚴經云超越於三界無量諸佛國如來微妙刹淨佛子充滿定惠互相資意成堅固身遊於密嚴國思惟佛威徳密嚴中之人一切同佛相超過刹那壞常遊三摩地密嚴微妙者是阿若悉檀非諸因明者所量境界但是無功用妙智之所生云云文不可破毀者明此法無對治壞義也謂有爲有漏法皆爲無漏無爲法遂被治斷故有對治壞也摩訶衍論第十云壞苦者一切有爲清淨法能壞一切不清淨法亦一切諸不清淨法能壞一切清淨法故此法佛之功徳無漏眞實性故遠離對治壞云也疏次又如世間至中勝故者解云謂是天帝釋所持金剛杵也與修羅鬪諍時以金剛杵能摧破修羅故云爾也以此喩而歎金剛三昧徳也問以金剛三種勝用喩合法方如何答第一不可壞者合疏所云實相智不盡不壞不可變易不可破毀句也以第二寶中之上喩合過一切語言心行適無所依不爾諸法無初中後句也以第三戰具勝義合離諸過罪句也疏與此釋論至喩意大同者解云謂智度論中所明三種金剛三昧中之喩與今經所明金剛義大意同云也智度論第四十七云金剛三昧者譬如金剛無物不陷此三昧亦如是於諸法無不通達令諸三昧各得其用如車渠馬腦瑠璃金剛能穿又云問曰三種三昧何以皆言金剛答曰初言金剛中言金剛輪後言如金剛如金剛三昧佛説能貫穿一切諸法亦無不見是達金剛三昧能通達諸三昧此明三種金剛三昧也又三乘聖者所得金剛喩定總名三種金剛三昧也論同第四十七云金剛輪三昧者得是三昧能持諸三昧輪是皆佛自説義論者言如金剛三昧者能破一切諸煩惱結使無有遺餘譬如釋提桓因手執金剛破阿修羅軍即是人未後心從是心次第三種菩提聲聞菩提辟支佛菩提佛無上菩提金剛三昧者能破一切諸法入無餘涅槃更不受有譬如眞金剛能破諸山石滅盡無餘等云云釋論三種金剛三昧正尋檢正文處若是三乘人登極位時金剛喩三昧也故良賁仁王經疏第一云金剛三昧者最後勝定勝用堅固名金剛定又古徳釋云金剛喩定者如金剛斷惑之智所依之道定之名金剛喩定也云云疏法界者至實相智身者解云是正第三明眞實義也謂爲欲釋依正不二義而先釋法界性之即眞實法身如來中正法身義也此宮者是法界性是即宮也此法界性之法身如來即是宮故身立不二義也若約此義明是意者法界者是法身自性自受用佛也此法性身佛其功徳智慧是竪高昇無窮盡到眞如實際故云大也横廣逈無邊際數量遍了知一切諸法之自共相故是云廣也此智慧及法性身之心也相好遍滿盡虚空界無生滅等刹那四相及離一期四相兼無對治壞等而其無漏五蘊堅固眞實自性能斷妄染惑障故名金剛智體也法者是執持義界者體義性義因義也此眞實智性之持自體及有軌範義故名法界也此智體者如來實相智身者釋成理法身與智法身無二無別義謂智者如如智是智法身也是自性自受用佛也體者如如理是自性法身也此理即智也此智即理也又是以智爲身以理立也寂而離生滅義邊又名理法身也照而離妄執義邊又名自性自受用智法身也寂照無二無別義名如來實相智身也是究竟理智即一法身如來也此實相智身名法界體性智是約理云也又名大圓鏡智等此約智云也諸法至極究竟遂還源本處是也疏以加持故至故曰宮也者解云是遂還釋依報之宮義也意云此宮是法身自受用佛之所依法性土故是修得始覺之所顯得故云眞實功徳所成就莊嚴微妙處也此加持義者是智之所顯現也不所始新生義是不縁滅法故也若許縁成法者豈爲法性身土耶故知實相智之顯得本有法性土宮即有加増住持義故名加持云也是顯不新成法意也問此大金剛法界宮者是廣大金剛法界即爲宮歟爲當廣大金剛界之宮云事歟答有二義也一者持業釋二者依主釋也持業釋者大金剛法界即是宮云也又此疏云上説金剛法界法界宮即是如來身云云是依正不二身立無別義也二者依主釋者廣大金剛界即名如來之正報身智也此正報之身智之所依器界之宮城名云廣大金剛法界宮也爲此廣大金剛法界智之即所成立顯得物爲所住宮故名云廣大金剛法界宮也是即雖似有正報與依報之差別義而遂無二無別也而依主釋有文證即此疏意也故疏云眞實功徳所莊嚴處妙住境心王所都故曰宮也者此宮中雖無數心王心數兼住而擧其勝主者故云心王所都也疏此宮是至天宮者此指法佛土之所在也摩醯首羅天此云大自在天也此約實言之者三世諸佛證菩提之處也慈覺大師教王經疏云一切色法究竟盡處心王境界名色究竟非謂第四禪定文疏釋論云至天王是也者解云意是簡別此法身成佛處大自在天宮是非顯教所明報身成道大自在天也彼五種那含住處名淨居天者謂第四禪有九天中有生不還果聖人處名五淨居天所謂一無煩天二無熱天三善見天四善現天五色究竟天也阿那含聖者且有二類謂樂定樂慧人也樂定人生無色界樂慧人爲生五淨居天有漏定與無漏定交雜修習隨其重修品類淺深麁妙次第生五淨居天云也下品中品上之下品如次生下三天也上之中品上之上品次生善現色究竟天也過是以往乃至曰大自在天王是也者基唯識論疏第九云大自在宮者謂淨居上有實淨土即受用身初於彼起證是第十地菩薩宮乃至此唯他受用土十地菩薩報身後報利益異熟果身往彼然由異熟同一地故論説爲生據實受變易在下三天處無雲福生廣果未得生淨土智處城也今往故名生瑜伽第四説超過淨居大自在住處第十地菩薩極熏修故得生其中故既成佛已身充法界云云彼宗意云自受用身佛於彼成正覺故可云自受用土然而成正覺已身充法界非可指一處云其土但第十地能化他受用身常住其中故名他受用淨土也云云又法師云依大乘始教在色界頂爲引小乘同界説云云疏今此宗明至三界之表也者解云自在加持義如上釋也神心所宅者智之住理是即心境不二理智即一義也安公菩提心義云此宗義心王境界名色究竟爲法界宮以此心王遍一切處此宮又遍一切方處以佛法身住自受用加持身之處自受法樂云云般若寺抄云雖有彼自在天王宮殿名即不同此内證佛所都宮殿但以名同故若生疑歟言也云云問隨如來有應處之無不此宮者意如何答疏下第二十文云又説觀音文殊普賢彌勒已在八葉中即大日如來大法身也爲度人故漸出于外云云又云若如來但住自證之法則不能度人何以故此處微妙寂絶出過心量説何示人耶故漸次流至漸入第一院次至第二院次至第三院雖作如此流出亦不離普門之身其八部之衆皆是普現色身之境界也若就情機而説則三重壇從深令至淺乃至世天眞言義淺但是應身身道方便未究竟也若開實性即世天眞言與大日如來何相異耶從如來則深至淺從内漸外而成三重壇從衆生則從淺至深從外漸内而成三重壇也依今所引疏文者三重曼荼羅是依所化機遍滿十方法界故能應佛身亦周遍盡虚空法界云也依此義故云隨如來有應之處等也又四種法身自受法樂周遍法界無不到處義有也凡四種法身具自受法樂攝化利生二徳故此有二意也疏一切持至眷屬也者解云牒經本文總釋其意也疏如來在此至所集會者解云依問而答法身佛有眷屬義也眷屬是即又自性法身也疏所謂執金剛等也者解云擧指人也疏梵云伐折至爲其辭者解云梵語漢名相對明持金剛義而標二義意也隨文便互爲其辭者若云執若云持是無別所由但是持執二字是隨音韻之便宜云爾也而不用餘握取等之名言也疏若世諦至翊從侍衞者解云陳淺略釋也疏此宗密意至金剛智印者解云述祕密釋也謂爲表法身如來之塵數心數是以如金剛智而斷壞諸煩惱罪障義故此十佛刹微塵菩薩皆各持金剛杵是即標幟印驗故名智印也疏如是智印至亦復無邊者解云佛智差別無盡故表示領掌此智印人亦無數量云也疏所以然者至以爲眷屬者謂明性得本覺之第九識處從本以來具足無數心數功徳義也如蓮華三昧經頌意及有頌云法然具足薩般若心數心王過刹塵各具五智無際智圓鏡力故實覺智云云疏今者心王至差別智印者謂明性得本覺之心王佛依修成力而得修得始覺而顯得金剛不壞理智法身云也此義安然阿闍梨教時義一云大日經中能加持清淨法身住所加持自受用身一切内證法身眷屬亦現自受用身集會十方界示現無盡海會莊嚴佛藏與此會同又於十方界現普賢等諸菩薩身説眞言道而此法界宮中唯有佛身都無生死中人如此一切海會諸佛皆是因地心心所法九識心王成法性身之時一切心所等皆入果界轉成法門眷屬是法身也今住加持集法界宮共受法樂是自受用身遍滿十方是他受用身現諸菩薩是變化身然此大日三身常一體故衆生隨機即一開三教分張亦復不同云云疏如是智印至能持之者言明此金剛智印甚深所由也唯是果分所得不因人證境云也疏約菩提義至持金剛者者言明約法即有無量智惠門約人亦明無數持金剛人義也謂智無量故標幟之能持人亦以無量所謂一切智智是也是即十佛刹塵數智門也疏由此衆徳至集會也者言明如此無數金剛智印皆是一切一味疑然常住眞實不變性云也一相者此諸聖衆皆金剛不壞相也一味者此諸聖衆皆解脱無生滅甘露味也若是功徳中一分有無常虚假法者未到實際亦名一切集會義不成不契無爲實際故也疏然以自在至威猛大勢者言明心王大日始覺時依此心王力而無數心數自然成始覺而隨各各功能而助成顯發心王如來一切功徳云也此中以自在神力所加持故本覺性得是爲始覺修得所被加持現顯故云神力所加持云也又上云心王大日現加持尊特身此意同也是本有性得法身今依修行功力顯現修本有名曰現加持身也表新成意也疏譬如帝釋至修羅軍者是擧同喩也謂天帝釋與毘摩質多阿彼羅王合戰時事相也修羅爲奪天帝之所食蘇多味故成此鬪諍也云云疏今此諸至以相況也者是合法也大空之戰具者此五智金剛杵是佛法之所持也依能持此大空智而能摧壞四種魔軍故名云戰具也能持人名大空者也大空高野即身成佛義云大空位法身同虚空而無礙含衆像而常恒故曰大空云云無相之煩惱者是所破法也此因縁所成虚妄倒想法故也無實體性故名曰無相此性空假有法也或本云無明也是説非也以相況者謂此十佛刹塵數聖衆以執持金剛杵相然而標幟佛智甚多而不壞堅固所由云也況者類例義也疏如來信解至師子座也者曰牒經本而總釋成大意也此經意而先明所依法界宮次即明翊從侍衞人次明所在樓閣是初總明所在國土後別明所居宮殿也國土即宮殿宮殿即國土也次列同聞衆各有所表故爲表此翊從者内證眷屬則十佛刹塵數菩薩是即法身之萬徳作用義故法界宮次即明此翊從人也法界宮與翊從者併謂是法佛理智分齊故云爾也亦明宮殿而次列同聞衆名事是常例也亦翊從者兼同聞衆也但初總標同聞衆後別列其名也疏信解者至名信解地者且釋信解相也信者是眞實淨信心所也簡邪假信故也正者正解也是簡邪智故也十信三賢十地所有六度四攝自利利他一切有爲無爲功徳皆名信解也無爲法是信解之境界云也佛果功徳即名究竟一切智地是證達義也信者淨信心所也謂信有徳境而不孤疑義也以生眞實相爲其徳也解者勝解心所是印可義也亦智也慧也能知解其所觀境之義趣徳失而不虚謬爲其徳也信爲初而解爲後也信助解解成熟信也疏梵云至神變義者曰明此梵語含此三義也躍等三義是信解心所之所爲作用功能云也疏謂從初發至勝躍義者曰釋此三義也謂依此信解妙用而以精進不怠勤行而修學三密行時能超越無數廣劫所可修學所行諸度而一生間成辨速疾成佛果是踊躍義也又是遊戲等義者謂依此三密加持身心極喜悦而好翫三密行則莊嚴佛刹利益衆生成熟六通故即是遊戲即亦神變義又遊戲是能遊也神變是所遊也是遊戲於神通行云義也能遊是眼耳身意地四識相應喜樂受是也所遊是天眼等六種智通是也又能遊是眼耳身意四識心王是也所遊是眼等四識之相應定慧等心所是也又能遊是直六通行是也所遊是此六通之所依縁色心等境界是也疏如人掉動至名遊戲者是引喩也能善巧歌舞者撃鼓吹笛而動身分搖支節跳踏名曰舞是即遊戲之式儀也是即令見聞者生欣悦嘉見心是遊戲之能也疏如是遊戲至自在神通者曰遊戲即是神變言也疏言毘盧至法界樓觀者依大日如來因位解三密行因故即感得此大樓閣依法功徳云也一體速疾三昧者信解心之所成熟之定名也一體者是一法界體性也上所云一相一味到於實際法是也即廣大金剛界是也此法有速疾力用謂令成就能修行者一生間到究竟果地之功能故名曰速疾也即以此法爲所觀境成三昧故云一體速疾三昧也依主釋也若准此疏下釋一體者諸佛之同體性義速疾者諸佛之所作事業速疾成辨也文即依住此三昧力故成無量自利利他功徳業因故感此大樓閣報云也此大樓即是本有常住法之依了因之修成顯現也不生因之新成法殊勝第一如如意寶珠也如龍樹釋論五云如是雖無明藏中如來之性從本已來有自性清淨心而不待修行之功無以得佛故如是一切行者雖具修行無量方便而衆生心中若無本覺佛終不得佛故云云此文雖説正法依法亦爾也是依正不二義故也疏於一切實至寶王也者曰明此閣是非有爲造作物唯眞如實凝然不變殊特無比義也謂自受用佛以妙智力而顯得本有宮殿云也如密嚴經云此云此諸宮殿如連備衆綵是一切如來妙智之所生云云源氏順之和名云樓閣四聲一字苑云今謂臺上構屋爲樓音婁辨色云太賀度能野王案閣重門複道也音各今案俗謂朱雀門爲重閣是云云觀者釋名云於上觀望也云云疏其高無窮至亦徳無中者曰明此樓高下縱横量也此樓已無邊對何方城定中央義耶云也疏此是遍至一切處也者曰擧正法身廣大相返明依報樓閣廣大相也如心地觀經説法身遍滿如虚空一切如來共修證自受用身諸相好一一遍滿十方界等云云問此義云何答法藏起信論疏云色無礙者如來身自在無礙乃有多種今略辨四種一大小無礙謂一一根皆遍法界而亦不壞諸根之性又亦不離諸根之相二互用無礙謂諸根相作用而不相礙等云云此正法無邊際意也又依報正報無邊際義如華嚴經云華藏世界海法界等無別莊嚴極清淨安住於虚空此世界海中刹種難思議一一皆自在各不雜亂云云又華嚴經旨歸云九猶如帝納者彼一一微塵即各攝此無盡刹海即此刹等復有微塵彼諸塵内復有刹海是塵塵既其不盡刹刹既其不盡刹刹亦復不窮如因陀羅網重重不可説不可量也文又如三十七尊禮懺經云曩謨盡十方蓮華藏世界不可説不可説微塵刹土海會中常住三世平等一切三寶如上金剛界大曼荼羅三十七尊并是法佛現證菩提毘盧遮那互體蓮花藏世界者此樓閣之所在處也疏次明樓觀至樓閣寶王者曰釋樓閣之莊嚴中是以比況顯其嚴飾相也而用此金剛喩意是顯此樓閣諸莊嚴皆悉常住不滅堅固義故也法身如來無生無滅常住正報身之所居依報宮殿故此亦常住云也疏何以故至寂滅之相者曰擧所由釋成此樓閣常住眞實義也意云此法性樓閣寶王是諸法之至極源底而更無出過於此寶王樓閣勝法物故此是寶王滅一切有爲生滅相唯有無爲眞性理之樓閣云也第一寂滅之相云故此樓閣不謂眞空假有性也此樓閣即相眞如實際理云也疏次如來至入法界者曰此微妙樓閣依如來加被力及行者應見自善根力而以自所變影像則得見此樓閣云也此法性樓閣是本質境是疎所縁縁境也唯佛果親見此樓餘人不能親縁也令應度者隨諸法門者隨於四重曼荼羅十佛刹微塵數差別智印所樂求根性性欲則依修行如是若干法皆遂得見入此樓殿云也諸法門表像者是十佛刹微塵數持金剛者差別智印乃至世天龍神等智印是也修行此等四重本法標幟行人皆得入法界樓云也大毘婆娑論云見者眼眼識所見聞是耳耳識所聞觸是身身識所了知是意意識所了也文疏善財童子至應廣明者曰引入樓比類之相者如八十華嚴第七十九云爾時善財童子恭敬右繞彌勒菩薩已而白言唯願大聖開樓閣門令我得入時彌勒菩薩前詣樓閣彈指出聲其門即開命善財入善財心喜入已還閉見其樓閣廣博無量同於虚空阿僧祇寶以爲其地阿僧祇宮殿等乃至阿僧祇摩尼寶故大光明如是等無量阿僧祇諸莊嚴具以爲莊嚴具又見其中有無量百千諸妙樓閣一一嚴飾悉如上説廣博嚴麗同虚空不相障礙又無雜亂善財童子於一處中見一切處一切諸處悉如是見爾時善財童子見毘盧遮那莊嚴藏樓閣如是種種不可思議自在境界生大歡喜踊躍無量身心柔軟離一切想除一切障滅一切惑所見不忘所聞能憶所思不亂入於無礙解脱之門等云云文已上文略引要樞文餘文臨經本可見問此法界宮内樓閣内外安立状相如何答多如大日經第五入祕密曼荼羅品並供養法及品疏等具明臨彼文可知又樓内種種莊嚴相如已所引毘盧舍那莊嚴藏樓閣内種種莊嚴相也又如佛地論第一明受用身佛土也疏菩薩之身至當知又爾者謂法界宮者是金剛智所縁境境是智所依也身是爲所依止義故説法界宮爲身也凡是萬徳所依故説爲身也又大樓閣是不異正法三昧耶身也三昧耶身者是平等身義也是即佛身故又祕藏記云法身微細身五大所成虚空又五大所成草木又五大所成法身微細身虚空乃至草木一切處無不遍是虚空是草木即法身於肉眼雖見麁色草木於佛眼微細之色是不動本體稱佛無妨礙云云私云此文是明法佛自證身及器界事也是説者即約法然五大色等成此説也礙非約隨縁無常五大色等也故聲字實相義云顯形表等色内外依正具法然隨縁有能迷亦能悟云云又即身成佛義云佛説六大爲法界體性諸顯教中以四大爲非情密教則説此爲如來三昧耶身四大等不離心大心色雖異其性即同色即心心即色無障礙智即境境即智智即理理即智自在雖有能所二生都絶能所法爾道理云云問先所云法界宮爲身義與此所言大樓閣爲身義其差別如何答先法界宮爲身義是心所依義又大樓閣爲身義是身之所依義也心身不二故遂法界宮即大樓閣大樓閣即法界宮義也已上又解也故此義如十住心論十云不壞金剛光明心殿謂不壞金剛者總歎諸尊常住身光明心者歎心之覺徳殿者明身心互爲能所住云云疏所以云至爲師子座者謂此中身者頗異前云身義也意云以因位修行力而説爲果位成所依義爲身義故也此中唯菩薩十地爲十也妙覺果地爲第十一地也又有取十信三賢菩薩心堅固勇猛之力是與初地爲所依故也故疏釋論云至獅子座者謂引證成獅子座義也喩法可知之疏今此宗明至空過義也者謂明此密宗實義也唯入祕密位品意此大宮殿所依之大蓮華王之莖以金剛手菩薩爲其莖意即此義歟此以勇猛堅固物爲所依止義也勇健菩提心等者凡大菩提心用如金剛堅固以不屈伏力而爲諸佛作佛事所依故以菩薩身爲獅子座云也薩埵是勇健義故也唯上文云意行者以此三密方便自淨三業即爲如來三密之所加持乃至能於此生滿足地波羅蜜不復經歴劫數備修諸治行者此義意也此是約修得菩提心爲言此上所牒文分二初明法後合喩可悉又若准此疏下文本有性得菩提心名薩埵故所云獅子座理實是本有勇健菩提心可名獅子座歟故金剛頂經云普賢法身遍一切能爲三界自在主無始無終無生滅性相常住等虚空一切衆生所有心堅固菩提名菩薩埵云云即氏義意也疏若淺略至獅子座者謂如法華信解品説世尊大恩以希有事憐愍教化我等利益若以頂戴兩肩荷負於恒沙劫亦不能報云云疏故曰菩薩至獅子座也者謂結釋歸本經也
