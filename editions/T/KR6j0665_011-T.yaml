body:
  text: 大日經住心品疏私記第十二疏經云復次至闥婆城者自下牒明第六他縁大乘心相之經文也疏即是明第二重觀法無我性也者是總釋説此住心之經文也前所言證寂然界大乘者是大乘通教菩薩也亦名大乘共教菩薩也彼菩薩於初重始依遍計所執空門而纔觀法空義故而今對彼麁劣法空觀而安立此第二重深妙法無我性觀法言也今於此住心處所觀法無我義是依唯識無外境道理而悉觀察遍計所執依他圓成三性法之各各法無我性義也謂所執性是情有理無法即體用都無性也故不可爲實我實法也依他起性是衆縁所成法故無別自性也非有法之合衆縁而似有假現故不可爲實我法也圓成實性是諸法眞性理寂滅都無相性也諸色心等諸法者是理中絶離而不可得也此理中可爲我法物都無故圓成性是法無我性也以作如是觀名爲無縁乘發菩提心也文大乘行發無縁乘心者是明能發菩提心相也文法無我性者是明所觀菩提心境也以發我法無所得觀爲無縁乘本意也疏梵音莽鉢至名他縁乘者是以一莽鉢羅梵語通爲無縁及他縁兩義之中先釋他縁義也是約平等大悲無遮弘願而攝取法界有情即運載佛果大菩提彼岸義故得是他縁乘名也法界衆生者所攝取物也是地獄等十法界之有情是也爲利益安樂是等衆生齊三大僧祇耶大劫發修習六度萬行弘願也此弘願等是皆爲利他行故也文乃至諸一闡提等者是擧難教化者辨能教化之用也是中諸一闡提者是有五種一闡提皆悉施利益遂令成佛道也五種一闡提者莊嚴論一云無性有二一時邊無般涅槃二畢竟無般涅槃時邊無般涅槃法有四一者一向行惡行二者普斷諸善法三者無解脱分善根四者善因不具足畢竟無般涅槃法者以無因故無般涅槃性但求生死不求涅槃文問若爾者是無佛性人云何終可成佛耶答如前序分中大那羅延金剛中具釋也又勝鬘經云謂離善知識無聞非法衆生以人天善根而成就之求聲聞者授聲聞乘求縁覺者授縁覺乘求大乘者授大乘是名攝受正法堪能荷負四種重任云云法寶師釋云離善知識無聞非法衆生授人天乘求聲聞者授聲聞乘等故知無性非必定也離善知識無聞非法後可近善知識有依聞法故又諸衆生今時不得三乘法者皆先於無量生中不得三乘道得人天樂故知先是無性後有性也云云又既入二乘正位者等者如前大那羅延中釋也問他縁大乘心者是法相大乘家所立義同意也而彼宗建立五性各別一分不成佛義也而是大日宗所立他縁大乘明一切衆生皆成佛道義也彼是二宗相違云何答彼宗且偏約帶權方便説存五性各別義也是宗依佛隨自意趣正理而説成立是一切有情普皆成佛義也是權實二宗別故無違返咎也文約此無縁大悲故名他縁乘者結義而屬名也依是無怨親差別因縁發平等一子慈悲故名爲無縁乘也是乘是無遮大悲行故運載一切衆生令到大菩提道故名云無縁乘也疏又無縁者至名無縁乘也者明第二復次名無縁乘釋也謂唯識道理一切諸法皆以識心爲本體也識心之外無一法而成所縁境界物也約無心外境界之所執實我實法義故名云無縁乘也是大乘行者是相對前第一僧祇劫後第二僧祇寂然界心而其次正始得是唯識無境觀云也阿陀那識者是阿頼耶之異名也此翻爲執持也爲成唯識義故先擧根本識而成唯心義也此時爲有爲諸法之根本所依而生長諸法執持諸法種子五根器界故名云執持識也是蘊阿頼耶之別縁起義也阿毘達摩經頌云由攝藏諸法一切種子識故名阿頼耶勝者我開示云云又解深密經頌云阿陀那識甚深細一切種子如暴流我爲凡愚不開演恐爲分別執爲我云云已上二頌以第八阿頼耶識爲別縁起根本義也花嚴經頌云三界唯一心心外無別法心佛及衆生是三無差別文是明無縁乘中義之第二釋大意也疏此無縁乘至法無我性者是明依是無縁乘之唯識觀門之二空所顯眞如理性名云法無我性也疏以行者初至對治悉檀者爲明是唯識觀深妙義者以説是諸因縁成法上所成立中道義而爲對遣彼前證寂然界大乘人方於所執空門之偏空理妄謂究竟至極理麁劣之觀解而示是唯識觀門之中道徳也前住心中所以其用五種譬喩是遣小乘法執而爲成此偏空理故用幻等即空無性喩也今至此住心所用六喩是以幻等假有及眞空二義爲依他之假有眞空義譬況也文初劫修觀行時心沒蘊中故者指彼前所對治第一劫中所有小乘法執失也對治悉檀者彼證寂然界中法空理是實非眞勝義道理義也但治小乘有執病之空藥也不是至極法空理也悉檀或翻遍施或翻宗也此中意者爲除遣前劫小乘所執諸法實有之法執故今觀所執法空而爲能治藥也而所治病若除以後能治藥不可存也而尚雖除有執病而存空觀藥時藥返成毒云也文般若方便者般若者此翻智惠也智惠有二種一者有觀智惠二者空觀智惠也有觀智者依他圓成之智也空觀智者悟遍計所執空觀智也有觀智對治空執病空觀智惠對治有執病也故有觀空觀二智雙行名云方便也是猶如治病方藥隨所治衆病有巧妙便宜令得救療靈驗也般若是智體也方便者智之妙用也若捨是隨病救療之方便妙術而強存空藥時即墮斷滅之空見即被名惡取空見人也此意如密嚴經頌云譬如須彌量我見未爲惡憍慢而著空此惡過於彼空性隨應説不應演非處若演於非處甘露即爲毒一切諸衆生生於種種見欲令斷諸見爲説於空理聞空執爲實不能斷諸見此見不可除如病醫所捨云云此文是呵責著空見人也文濫方廣道人者准法相家説者恐是似指大乘空宗清辨菩薩也具至下文應知此義也又天台摩訶止觀第十云又方廣道人以自聰明讀佛十喩自作義云不生不滅如幻如化空幻爲宗龍樹斥云非佛法方廣所作亦是邪人法也云云疏今大乘不至空相亦不可得者是明遍計所執之離言義也謂於遍計所執上凡不可論空不空義也所以者何凡此遍計所執法之體相是有於是上論若有義若無義然所執法是從本已來體用都無也爾物上何更立有無義耶云也又解文云今大乘不可得空空相亦不可得等者是明此他縁大乘所觀依他圓成之上圓空理也意云爲遣所執實我實法而且説諸法空義也若遣所執我法畢後於依他圓成二法不可成空不空之定相也其有空之定相皆不可得故云也且依他圓成二性其體非定有義故云不可得空相也意云此依圓二性是不可得法也依他法是非有法之似有而假現故是非眞有非眞有故即是有不可得義也圓成實性者凝然寂滅理而絶離衆相無所可存法也此圓成者自性空無故亦此圓成性即不可得義也是爲除遣依他圓成之上有執之病故且假説依圓之空義云也理實依圓二性不定空性云也故基法師唯識章記云凡云中道廣百論有三師釋一清辨菩薩此菩薩立給俗有眞空俗有義非空眞空義非有云立給非空非有中道道理今破此偏俗有眞無立給以偏有偏空非中道二不善瑜伽師即護法門徒也此師意三性之法立置偏偏計所執云無依他圓成云有此偏有遍空非中道三護法正義即廣百論云爲破有執假説爲無爲破無執假説爲有有無二説皆世俗言勝義理中有無倶遣聖智所證非有非無而有而無又有釋云然其眞體即是俗無非離俗無別有眞體云云此第一師釋也問就護法正義爲破有執假説無爲破無執假説有云意何耶答法非有非無然爲破有執假説無爲破空執假説有云也問於此勝義道理云事也問爾於世俗道理如何云耶答於世俗道理依他法似有法也圓成法實有法言也問何故爾云耶答世俗門淺淺故就是淺淺道理依他似有法圓成實有法云就勝義道理不可言有不可言無也問爾其依他圓成法體有不可言有不可言無耶爲當無不可言有不可言無耶答清辨御意空不可言有不可言無云護法御意依他法非有似有不可言有不可言無云圓成法凝然常住實有法不可言有不可言無也問其爲破有執假説無者誰爲破有執假説無云事耶爲破空執假説有者誰爲破空執假説有云事耶答愚夫異生起有執爲破此有執假説無撥無外道及清辨等起空執爲破此空執假説有也問愚夫異生何起有執耶答愚夫異生執實色心法有遣此執無實色心法云假説無撥無外道清辨等執一切法皆空遣此空執假説有然於眞勝義道理不可言有不可言無也云云疏雖觀諸法至法無所空故者是約遍計所執都無義而釋成可離所執空之定執義也謂所執都無法也何於是不可得法上敢可論定無義耶云也又解文雖觀諸法無所有者是且擧依圓二性之空義而遂欲顯示二性非空義也謂二性空者是於依圓二性而明無實我實法義也是依圓二性之非有義也文然亦於諸法無所空者是遂明依圓二性之非空義也是二智之境故非空也亦是縁起法之相及性故非空也都無法豈成縁起法之相亦成其性耶云也都無法是不成因縁義故疏須離有至法無我性者是重結成此中道法無我正觀義也問此妙義深旨以何知爾耶答慈恩法師唯識章云一遣虚存實觀遍計所執唯虚妄起都無體用應正遣空情有理無故觀依他圓成諸法體實二智境界應正存有理有情無故又云由無始來執我法爲有撥事理爲空故此觀中遣者空觀對破有執存者有觀對遣空執今觀空有而遣有有空空若無亦無空有以彼空有相待觀成純有純空誰之空有故欲證入離言法性皆須依此方便而入非謂有空皆即決定證眞觀位非有非空法無分別性離言故要觀空方證眞者謂要觀彼遍計所執空爲門故入於眞性眞體非空云云今私云此疏中所云諸法非空非有義相當彼基師唯識章中所云遣虚存實之中道觀法也此中遣虚觀下正遣増益有執傍遣損減空執存實觀下正遣損減執傍遣増益執也遣虚存實觀者一念相雙運正觀故於一時中此二執同時除遣也彼増減二執互相待成立故以此二觀互各傍正除遣彼二執也今此私意爲最要殊妙也疏爲欲淨除至蘊阿頼耶者是爲除所知障成滿一切種智故隨順往昔諸菩薩修唯識觀而得佛果者今行者如彼觀法可登佛果也是爲如先達者所行道軌則故也故云觀察蘊阿頼耶識自相自性等也前證寂然界菩薩但解了所執空門義未解知生滅阿頼耶識之變現色等有爲諸法義故猶未離智障又未成種智云也蘊阿頼耶者是識蘊所攝第八識云也凡於阿頼耶有二種一者識蘊所攝依他生滅阿頼耶識是如唯識論等常途説也二者非識蘊所攝是如來藏眞如阿頼耶也如密嚴經云佛説如來藏以爲阿頼耶頼耶即密嚴妙體本清淨頼耶體常住衆識與之倶云云此二阿頼耶之中但此教菩薩之所觀是生滅阿頼耶識也未逮觀無生滅阿頼耶但得一分生滅之義以於眞如未能融通但説凝然不作諸法故就縁起生滅事中建立阿頼耶從業等種辨體而生異熟報識爲諸法依方便漸漸引向眞理故説熏等悉皆即空等云云疏即楞伽至皆是此意者是於此他縁乘句中總攝盡明諸唯識教迹一切經論云也疏經言知自至界唯心也者觀此生滅阿頼耶自性時了知三界一切色等諸法皆是唯心所變現法云也謂依此阿頼耶而三界一切諸法興起故云也疏幻陽炎影至雙辨有無者是明觀此生滅之藏識假有非實義之喩云也此幻等六喩是帶似有眞無義故也以此喩合似有藏識非眞有者是似有性即空義云也疏明蘊阿頼耶至有殊矣者是明此他縁乘中所明藏識如幻等六喩與前證寂然界大乘所用如幻等五喩淺深不等云也此大乘意是爲明依他第八識之自從四縁生起亦成諸法之所依縁體與縁起諸法雖爲因縁而唯非眞有性似有現義也彼前證寂然界大乘是唯爲觀顯遍計所執之諸法自性都無義故唯觀無性空義不知是別縁起諸法因縁由而用幻等遍空喩意也而不用幻等假有喩義意云也故彼此兩意異云也疏阿頼耶義至正翻爲室者是從下釋蘊阿頼耶義之中是明翻譯之異説也唐玄奘三藏阿頼耶義翻云藏識故唯識論云謂與雜染互爲縁故有情執爲自内我故則能顯示初能變識攝持因果爲自相故云云意云此識則含攝諸法種子及現行根身器世界等而令不失壞亦有情妄執此識而成我愛與彼我愛被伏藏而今被隱如幻假有性故名云含藏也又阿毘達磨經頌云由攝藏諸法一切種子識故名阿頼耶勝者我開示云云又正翻云室也是室宅義也疏謂諸蘊於至故以爲名者是釋室義也謂色受想行識諸蘊是從此識家所持種子現生行彼現行之刹那刹那而終盡時位亦留自生種子則熏習於此識而後亦令生自類現行也故以此第八識爲五蘊所依窟宅故云室也疏然阿頼耶至三者眞實義者從下約遍計所執依他起圓成實三性明阿頼耶差別義也於三性法各有阿頼耶義其遍計所執阿頼耶義者此第八識則與妄情以爲成我見之所依義故有我愛執藏義故唯識論云有情執爲自内我故者此義也約依他性立阿頼耶義者謂此第八識則唯非有之似有法而與縁起諸法爲其根本體性能攝持諸法種子而成諸法現行又爲諸法種子之所熏所依處故名爲阿頼耶阿頼耶是藏義也故成唯識論云謂與雜染互爲縁者此義意也又眞實阿頼耶者約眞如性名爲阿頼耶云也此眞如性與前依他性藏識是爲其眞實自性體云也唯識宗所云識自性唯識者是義也又此眞如性是與迷悟法爲所依縁而依持諸功徳及過患法故名爲藏也又楞伽經云如來藏者爲善不善因受苦樂與因倶若生若滅等者此義意也又勝鬘經不増不減經等所明不空如來藏者是即此眞實性頼耶義也眞如性之即攝持恒沙萬徳義名爲眞實性之頼耶義故但約此莊嚴論正意者眞如理爲阿頼耶意者爲依他之第八識之自性故也又是眞如理者即爲一切凡聖之迷悟所依故則立阿頼耶義也非謂眞如自受染熏習而成諸法也若唯約遍計所執而立眞如阿頼耶義者法藏師云所攝名藏謂諸衆生取爲我故所以然者良以眞心不守自性隨熏和合似一似常故諸愚者以似爲眞取爲内我我見所攝故名爲藏云又此疏上文云然世尊密意説如來藏爲阿頼耶若佛法中人不觀自心實相分別執著亦同我見也云云此等義約所執分別頼耶爲言也問何故名分別義答此唯有妄情執取想而無其道理之實境界故云分別也故基師云遍計所執唯虚妄起情有理無故云云又中邊論云虚妄分別有於此二都無云云又成唯識論疏説遍計所執名無體隨情假者即此意也又説眞實性頼耶義如密嚴經云如來清淨藏亦名無垢智常住無垢終離四句言説佛説如來藏以爲阿頼耶惡慧不能知藏即頼耶識云云以此文若是寄釋此莊嚴論意者是依他頼耶識之性眞如理義即爲如來藏阿頼耶云也楞伽勝鬘所説如來藏者即此義同也疏如大乘莊嚴至無戲論者是從下引莊嚴論第四頌文明三性法之阿頼耶義也此莊嚴論頌是彌勒菩薩所造也釋論是無著菩薩所造云云此離二及迷依無説無戲論二句頌是明頼耶識之有於三性差別義云也疏故應知三性倶眞實所依者此二句結上意也又有二句偈其文云三應及二淨二淨三譬顯云云但於此二句偈此疏不引用此二句頌也疏故應知三性倶眞實所依者明此三性各各互相待建立義也且從下是述釋論之釋此四句頌意之文也有人云撿彼釋論文無故字只云此中應知三性倶眞實也云云疏云離二者至畢竟無故者是引釋論之釋彼離二言之所表分別頼耶義文也是分別性頼耶者如法藏師云所攝名藏謂諸衆生取爲我故所以然者良以眞心不守自性隨熏習和合似一似常故諸愚者以似爲眞取爲内我我見所攝故名爲藏云云又云離二者謂分別性眞實者是初釋成遍計所執性名爲阿頼耶識之義也謂離於依他内心之外境及與離於依他内境之外心倶爲不可得法也而外人強令此二法相離故云離二也謂是執著於心境互相捨離而不互相待義而是即虚妄成立能取心所取境説名遍計所執之二取性也又是所執分別法是情有理無而唯妄執心之所分別境故亦名分別性也故成唯識論破遍計所執二取云既無實境離能取識寧有實識離所取境所執能取相待立故云云此文意云初二句破遍計所執之所取能取心境實有虚妄義也後二句成立依他能所二取之正義也問何故遍計所執名眞實性耶答有二義一者約迷情前執實有法之念故抂隨迷情且與眞實名也二者約覺悟前是所執能取所取畢竟都無理故此二取畢竟都無義者是所執之眞實性云也故次文云由能取所取畢竟無故者此句釋分別性之眞實義云也謂以理無義爲眞實義云也然不稱道理而即遠離此心内境境内心之所成所取能取互爲因義而虚狂妄情執謂有心外境境外心令互相離則説名分別性云也又唯妄心之所分別縁慮之法名曰分別性也故唯識論大疏云所執性名無體隨情假者是也是遍計所執性者是以能取所取畢竟都無爲顯分別性之眞實義也疏迷依者至諸分別故者是明依他起性阿頼耶識也以是頼耶識爲遍計所執成所依縁也謂遍計所執之情有分別妄執無獨起也要待依他起性非有似有法爲所依詫而被計是似有義起實我實法執云也故是依他法是爲所執之迷亂法成所依義而成所遍計境故名迷依又凡總言之者此第八識爲一切虚妄分別心成所依止根本也謂一切有漏虚妄分別心心所法皆從第八識之所持種子生起故指是第八識名迷依也或於第八識所變境界而成妄分別想故名迷依也又別言之者第七識於是第八識見分成我法執故名爲迷依也然是第八阿頼耶識是依他起性而如幻假有性非無故亦名眞實性也疏無説無戲至無戲論故者是第三明頼耶識之圓成實性義也此眞如性即遠離前遍計所執妄有與依他起性假有相而衆相寂滅自性凝然常住不變理性也是眞如理性是言語道斷心行處滅唯正體智之内所證境也是諸法之眞實性故名云眞實性也成唯識論第二云謂空無我所顯眞如有無倶非心言路絶與一切法非一非異等乃至此五皆依眞如假立眞如亦是假施設名遮撥爲無故説爲有遮執爲有故説爲空勿謂虚幻故説爲實理非妄倒故名眞如云云解云此眞如性無戲論義也此義如密嚴經云如來清淨藏亦名無垢智常住無始終離四句言説等云云疏次説求眞實譬喩偈云如彼起幻師譬説虚分別者釋前第一句中所標迷依言之義也釋論釋曰如幻師乃至爲顛倒因者是釋上如彼起幻師譬説虚分別二句頌意也此二句偈中第一句開喩第二句合喩也譬者比類義也釋論文云如幻師依呪術乃至以爲迷因者是釋第一句開喩義也釋論云如是虚分別乃至爲顛倒因者是釋第二句合喩義也意云虚妄分別者是能遍計心是即喩幻師也此能遍計心之幻術師是以所迷依他性爲迷倒因縁而能生遍計所執分別性云也猶如彼幻師以實草木等爲依縁此草木上狂以呪術力而妄人前令現見人畜等金銀等物也而但以妄現幻事而爲妄見人之執實有人馬等之迷體云也凡於虚妄分別有二義一者能遍計分別心是染分依他也此分別者心心所之妄縁分別所縁境界之名也二者遍計所執分別是離於心之所取境與離於境之能取心也但此中譬説虚分別者是能遍計心之分別是也故名分別義不分離義也偈云如彼諸幻事譬説二種迷者此二句偈是釋前偈中所云離二言所標是所執分別性義也上一句偈開喩下一句合喩也釋論釋曰又如幻師像金乃至二迷恒時顯現者是釋此下第二句偈之文也意云如彼幻術師之所作諸幻事之虚妄變現種種象馬金銀等人物是皆妄有非實物也然此虚妄遍計心所分別性是似實我實法也是違道理境而以執離於心而有境執離於境有心之迷情妄執生故云二迷恒時顯現也所起分別性者是遍計所執之所取能取性也疏次偈云如彼無體故得入第一義者此二句偈是依了知前所云所執之理無義與依他之假有而無自性義故即得悟入圓成實性云也上所云求眞實偈中者求入此圓成云也疏如彼可得故通達世諦實者是二句偈是明了知前所云所執之情有義與依他似有義云也疏此中意言者釋論總釋是一行偈大意也疏如彼幻事至第一義諦者是約合喩以釋上二句意也謂以幻事無實體義喩所執之二取理無義與依他之心境似有虚假義故云無有實體也是行者依了達所執二取都無義與依他心境似有虚假義故證入以此法爲門所顯眞如性名爲悟入圓成實性第一義諦也以此義喩了達幻事無體義也疏又如幻事至世諦之實者是釋下二句偈之合喩也謂以約虚誑迷情前者幻者及幻事非都無義喩世諦非無義也幻者者是指起幻事之師也幻事者幻師所現虚妄人馬等幻法是也是等法妄情之前似有顯現也理實者是都無法也是以能迷妄分別及所執二取之情有義而喩幻師妄業與幻事之似有二義也疏又偈云彼事無體至得眞實義者是一偈是釋以所執二取空爲門而得入生法二空眞如而證菩提涅槃之利益義也從此已下有二行偈是釋上一行偈意也謂初一偈釋上二句偈後一偈釋下二句偈也是其初一偈也疏釋云若人至眞實性義也者是以喩釋此偈意也意云若依依他性之如幻假有義與圓成實性凝然寂滅性義而遣去所執之二取虚妄相時即證入二空理云也於此義中法喩合者彼幻術師依呪術力故以草木瓦石等妄念變現金銀等人畜等也然迷人則見其妄所現金銀等而則妄情謂實金銀等也其妄念所執金銀等是即所執性也依彼呪術因縁力故於草木等上假施設顯現似金銀等物是依他性也是雖非實金等不無假現金等故彼幻師之變現之所依詫實草木等是喩圓成實性也圓成實是諸有爲法之性空眞實自性故也若捨幻事實執而見虚假非實幻事人必知見其所依詫者實草木等云也又解凡於幻師所作幻事者不論之迷悟執非執義皆喩遍計所執性也以幻事之所依詫實草木等喩依他圓成二性也是妄分別之所迷境界故也是依他圓成不即不離義故合喩一種草木等也若細合喩者以草木等總通相喩依他性也以是草木等所有色香味觸四微塵性喩圓成性也疏偈云事彼處至是故説是幻者一偈但約幻喩明幻事似有而非眞有義也若是所執義者是情有理無故若依他起性者非有似有義故皆無體無性義也彼處者依他起處是也有者前二迷是也依此所執似有非眞有義故幻事義成立也文此偈明幻事有而非有者是擧標幻事似有非有義而明前二迷無體義也文何以故者徴問也文有者謂幻像事彼處顯現故者是細釋此義意也幻像事者是幻術所現金銀人畜等假施設相貌形像也是喩遍計所執性也是幻事即無體義也彼處顯現者是於彼實草木等處而此幻事現也是依他起性即是迷依義也依幻師呪術因縁力故假現幻事像云也此幻事像雖顯此草木等處而所現人馬金寶等是相似而非實人馬金寶等云也疏如是有體至説彼是幻者依此上幻事像似有非眞有義故成立幻化義云也謂非眞有物是猶虚無義也此虚無物之似有現故幻事義成也疏文偈云無體非無體非無體即體無體體無二是故説是幻者此偈意云重成前偈中以幻事像之似有非眞意而成立此幻義之意也今此頌意是以幻事像之非有似有義而成立此幻事義也謂非有法之被引發於衆縁似有顯現是猶不都無法云也偈中無體者是幻事也是非實有之法故云無也非無體者是此幻事即似有顯現故云非無體也又云非無體即體無體體無二者是似有非眞義與非有似有義是遂無二無別義云也依此無二義故幻義成云也問何名非有似有似有非有法義耶答色即是空者是似有非有義空即是色者方非有之似有義也問於遍計所執及依他性倶有非有似有似有非有義耶答二性倶有非有似有似有非有義也問何云所執非有似有似有非有義耶答所執從本以來唯體用都無道理存也是名云所執非有義也然雖此所執從本以來唯有體用都無道理而於迷情前似有實我法體用此情有之我法説名所執之似有義也問依他之非有似有似有非有義意何答依他諸法之未衆縁和合以前又設雖衆縁和合後成色等諸法此性空寂而終可滅無性也而無有一法獨實有色心等法而唯有不生不滅凝寂理名曰依他之非有義也然此寂滅無生理被引發衆因縁積集和合力而忽然成假僞之生滅有爲法説名依他之似有義也此依他起衆縁和合成法是本無之假有法故名曰似有義也問凡有非有似有似有非有義何答非有似有義是順向下流轉門義也謂背本覺眞空理而下流生死有法中義也似有非有義是順向上還源門義也謂雖流轉生死有法中而依不失此此性空理義終有還歸本覺眞心力云也故此下文所辨非有似有似有非有義倣此可解也問依他性名云非有似有義爾也若有指所執性名非有似有之文證耶答此莊嚴論頌云許心似二現如是似貪等云云成唯識論基師疏解云此中似言似心外所執實二分等法故名爲似云云此文意是非明所執之非有似有義耶疏此偈明幻事非有而有者是總擧此上一行偈而成此偈大意所明非有似有義也疏何以故者是徴問也疏非有謂彼幻事無體者釋上偈初句之無體之二字義也無體者是非有義也疏由無實體故而有者是釋上初句中非無體三字之義也非無體者是假有義也疏謂幻事非無體由像顯現故者是釋成上句非無體義也謂幻事者幻師所現人馬等是也是雖無其實體而其實無法之妄似有顯現故假説爲有也此假有物者約迷情之前是非都無義云也疏如是無體與有體無二者釋成理無之所執之非有義與情有似有義即一無別意也疏由此義故説彼是幻者是結成譬喩之幻事非有似有義也此意者欲顯示所執性之非有似有義也疏此幻即譬諸蘊者是合喩文也以非有似有之幻事之即似有非有義而喩遍計所執性之五蘊即空義也是情有理無法即非有似有顯現意也是非指依他起性之五蘊也依他性不情有理無法故也疏何以故至不可得故者是明所執之似有之非眞有義也謂雖所取能取之二執性像顯現於迷情之前而其所執之二取性者於道理中都無義云也是二影顯現者是指遍計所執性之當情現之相也是非心中現相分也疏故説色等有體即是無體者是結成所執性之二取之五蘊似有非有義也疏復次虚妄分別非有而有者是對前文所辨所執性之似有非有義今更亦明所執性之非有似有義也疏何以故彼二都無實體然有影顯現故者是釋成所執性之非有似有之當情現之妄有相也是即理無即情有而妄相現也疏故説色等無體與有體無二者是結成所執之理無與情有義遂明無二無別義也此義意云非有似有與似有非有義者是無二無別意也疏由此有無不二能遮建立誹謗及趣小乘寂滅者是歎其悟入者之徳也謂明悟入所執性與彼依他性之倶皆非有似有似有即空及不二中道義者是能不違世俗勝義二諦道理而勝進大乘大菩提道法即遠離小乘道之趣寂滅灰炭之小涅槃失云也遮建立者示捨増益所執之咎是明由悟入勝義諦義也是即由悟入圓成實性性空理義故也遮誹謗者示捨損減之失也是明由悟入依他起性似有義及遍計所執性妄有義也疏所以然者不應安立者是悟入無相此道理大乘行者是依悟入彼圓成實性之性空義及所執性之似有即空義與依他性似有即空義故不應安立色等五蘊法云也疏由於有體知世諦故不應誹謗者明依悟入世俗諦故大乘行者不應起廢無之斷見義也謂悟入依他性之非有似有義故應安立五蘊等法四諦十二因縁等道理義也疏又以彼無別故不應厭有體入小涅槃者是明依悟入二諦中道道理故不應生極厭生死苦果想生樂求入小涅槃樂想也謂趣寂二乘者是極厭患有漏身心心自體有生死之過失而欣求入小涅槃灰炭之樂云也而此大乘行菩薩者悟入諸法如幻假有義故不可生生死極厭離心不可入小涅槃欣樂之心也爲上求菩提下化衆生故盡未來際久住于世間不可入無餘涅槃也疏彼偈又云幻像及取幻迷故説有二如是無彼二而有二可得者是一行偈者是約迷人之所取虚狂所執著幻事即分此所取幻事與能取迷人也謂約迷人之取虚狂幻事時分所取幻事與能取之幻人云也所取幻像者是妄僞所現之人馬金銀草木等衆像是物也故彌勒四禮文爲誘諸天現都率其猶幻士出衆形元無人馬迷情有達者幻知未曾然者此義意也此所取幻事與能取幻心之二法者是非道理所可有之心境法也幻事之人馬等衆像者是幻師之呪術力所爲之虚狂所現物也而彼能縁執是虚狂幻事之能取心者約道理義者凡不應生起法云也謂依他内心即生諸境界也而亦還依託境界即生心識故也而彼境界既實無也能縁慮是無境界之心豈可生起耶云也疏骨像及取骨觀故亦説二無二而説二可得亦如是者是前文約迷心則明所執幻事與能取迷心二法差別畢也今者更約不淨觀覺悟心即明所取境能取心二法差別義也此偈約依他起性法而明所取相能取心之二而不二義也此偈是總標示此所取能取法互相待成立不二義也疏前偈意云者此文者是釋論文也是文正釋而前二偈義文也此釋論釋意云於偈即有二偈也謂初一偈者謂幻像及取幻乃至二有可得者是也後一偈者是其偈云骨像及取骨乃至可得亦如是者是其後一偈也其初一偈者是約迷心明遍計所執之所取境與能遍計之能取心是迷心前是雖似所取能取二法顯現而遂無二義也覺悟前所執都無故能取心不可生云也後一偈意者是約覺悟心則明依他起性之中所取能取之境與心二而遂無二義也此後偈所云骨像及取骨等一行偈者是約骨鎖觀中所觀白骨相而辨所取能取義也所取者依他之相分是也能取者依他之見分是也疏於骨像及取骨至由觀顯現故者是其釋論廣釋觀行心中所安敷依他起性中爲所取境爲能取之心相待成立義也謂彼不淨觀之中所取與能取二法是互相待成立故説爲二取也是無離心之境無離境之心故名爲無二也雖爾心與境相待假立名爲二也是依他相見二分之非有似有義是也故釋論云由觀顯現故也疏問曰如是觀已何法爲所治者是上來諸偈明遍計所執性及依他性非有似有似有即空義畢也而以何法爲此觀行之所治法耶云也疏故彼復説二偈至有非有如幻者是依前問而答説此非有似有等觀行之所治法體也文云謂彼法迷相者是指所執性法也是即迷心之所取之虚妄境界故也即遍計所執性是也謂觀察此遍計所執性非有似有似有即空義故即除遣此所執性云也是所治義意也文如是體無體者是指所執之所取能取法也指情有義云如是體也以理無義名云無體也文非有如幻者又是如次當情有與理無所執性云也文有非有如幻者以有情名有也以理無名云非有也如幻者幻喩有二義一者虚狂似有義謂幻化所現人馬等幻事是也二者幻事性從本空性義也謂幻事性者體用都無法也但以幻師呪術力故虚狂令愚人見幻事人馬等物是也以此二義喩所執性之似有非有義也上來明所治法畢故從下明能治法也疏應知能治體念處等諸法者是正指能對治之方法也此念處等諸法者四念處等法也謂以無常苦無我不淨義即對治常樂我淨四顛倒法也所謂諸法無常有漏皆苦諸法無我涅槃寂靜義是也又以不淨苦無常無我觀對治身之淨想受之樂想心之常想法之我想也是爲能對治藥法也或處者是等取十遍處八勝處等也此等觀行門是對治三界貪等諸煩惱法此能治四念處等法門亦如幻假立法不可眞實著處也疏前偈意云至如是如是體故者是釋論意委爲明所治迷法相故重又更返釋前所標釋所治迷法相之所執義之偈意也於遍計所執性既有二取義所謂所取與能取二義也指此二取所執差別義名云如是如是體也疏然如是至由虚妄分別故者是依情有義故説爲二取所執妄有也疏亦説非有至非體無別故者是依理無義故説二取非有義也謂所執所取能取之差別二體者是雖有迷情之前而約悟情之前及道理中即爲成二取體都無重成此釋云也疏如是有亦如幻無亦如幻者謂以情有與理無義同合幻事之畢竟空無義也謂以情有之似有義合幻事妄有義也以理無之眞空義合幻事畢竟自性空義也疏故説此相如幻者結用幻喩義也疏後偈意至彼體亦皆如幻者釋論意重釋成能治法體亦不可留存遂以歸畢竟空理義也四念住八解脱十遍處等衆多法門有故名云如是如是也疏何以故至如是如是無體故者是約能治法體釋成其自性空義也謂諸凡夫者執著虚妄法者也爲對治其執著妄心故佛説能治淨法給也而依此能治法即悉對治彼執病也故約凡夫前者此能治藥法悉有體用也但約煩惱障所知障諸惑已斷盡之佛果者能治藥法尚不可留存云也此能治法方歸畢竟空理云也佛證達此理而説此義也如菩提心論云諸佛慈悲從眞起用救攝衆生應病與藥施諸法門隨其煩惱對治迷津遇栰達於彼岸法己應捨無自性故云云疏如是體無相至而影顯現者是通外人之伏難之義也謂外人伏難云約佛世尊無上果滿位者而歸萬法畢竟空無相妙理者何應化身諸佛示現八相成道儀給耶云也故通此伏難云如是體無相而乃至而影顯現云云此通答意云佛世尊雖遠離諸相而爲對治衆生妄想執著過失故強示現衆相影像給云也譬如巧幻師爲妄狂世人示現虚幻之幻事人馬等衆像也故此疏上第一卷云譬如幻師以呪術力故加持藥草能現種種未曾有事五情所對悦可衆心若捨加持然後隱沒如來金剛之幻亦復如是縁謝即滅機興即生即事而眞無有終盡故曰神力加持經云云疏是故説幻者是總結幻喩義也疏問曰若諸至爲所治者是外人亦伏難也難意云一切染淨諸法同一如幻法者以何義成能治所治差別義耶云也疏彼偈答云至令餘幻王即退者是答意云雖萬法都盡幻化義約是幻事許有勝有劣故如以勝幻主作幻事而即妨劣幻主之幻事義也疏如是清淨法能令染法盡者是合喩義也是釋成能治所治義也由此義菩薩雖修衆行而無所得也者是令除遣有所得執意也除遣染著執病以後不可存淨法方藥云也上來引莊嚴論文了也疏彼論明觀至故具出之者是疏主明引用彼莊嚴論説文意也是大日經他縁大乘住心義與彼莊嚴論所明三性妙義及唯識義彼此最相互契當故引用其文云也疏當知陽炎至應知是廣説者是且擧幻喩一義之似有非有畢竟空無義而例顯示餘陽炎影像谷響旋火輪乾闥婆城等五箇喩之亦同似有非有畢竟空無義也疏前劫五喩至明無性空者是文方明於此他縁大乘心中不依用芭蕉等之三喩意也拆法觀之無性空者是分拆色法時待破去麁色漸漸至極微細色遂無所存色自性故是即至空無性理時名爲拆法空義也是小乘觀空義也疏此中幻焔等至故不論也者是明前劫中唯蘊拔業二種住心中不用此幻炎等喩唯心六喩甚深妙義之意也體法難解之空者是遍計所執性與依他起性之非有似有似有即空之道理云也此遍計與依他之空有二義互相具足者一往相融妙理有故不能彼唯蘊拔業二種小乘行者所觀境界云也疏行者解諸至是知法自性者是明此他縁大乘住心之觀行者修唯識觀之徳也此意云五蘊等諸法者皆是不離唯心義也此諸蘊法皆名唯心義者基師唯識章云成唯識言識言總顯一切有情各有八識六位心所所變相見分位差別及彼空理所顯眞如識自相故識相應故二所變故三分位故四實性故如是諸法皆不離識總立識名云云唯識疏釋云所以許有識自體者識自相故許心所者識相應法故許見相分者即心及心所二所變故許不相應者即前三種分位故許眞如者即前四種實性故如是之法皆不離識總名爲識非無心所等云云文即是知法自性者了知唯識義者即是了知三性法也若不了知唯識道理時不能了達遍計所執等三性法也疏未了如是至見空未盡者是更明前劫所明證寂然界大乘行者之未了達三性法故動應墮偏有偏空之執見之咎也謂依不了知蘊阿頼耶識之根本唯心道理故既迷三性道理迷三性道理故不能如理作依他似有觀與遍計所執都無觀也若彼證寂然界大乘行者彼欲觀依他法之非有似有義時恐殆墮遍計所執之増益之法執有見也故恣不能作妙有觀行也若又欲觀依他法之似有即空性之圓成實之眞空妙理時恐殆墮損減之遍計所執之斷滅見故恣不能作眞空觀行也唯依止遍計所執空門之諸法偏空之觀行而如實不能觀證遍計所執之都無義依他之似有非有義圓成實性之凝然寂滅理義之行云也又是如實不能了達中道理云也故彼證寂然界行人者是如實盡理不了達依他之非有似有之虚幻法故亦即迷不觀達所執之都無體用義云也疏今以如幻至悟唯識性故者是明此他縁大乘心之行者所觀達得唯識三性觀契當盡理義也文照有空不二者是有各依他圓成之妙有法也空者是遍計所執之都無法也不二者不存依他圓成之有義不存遍計所執之都無義云也諸法實相不可爲有不可爲空也是離言絶相法也問此照有無不二者具義云何答唯識章古私記云章云所觀唯識以一切法而爲自體通觀有無爲唯識故云云以一切法而爲自體者即三性法通觀有無者上擧依他圓成無者上擧遍計所執也意云所觀唯識以三性一切法而爲自體何以故者即次出所以通觀有無之諸法爲唯識故問爾遍計所執偏無依他圓成偏有云答爾云問爾遍計所執云無依他圓成有者作不善瑜伽師義不護法正義答護法御意遍計所執無依他圓成有云所以今於是遍計所執無依他圓成有云護法正義也問何故護法義偏遍計所執無依他圓成有云答彼能觀智於觀中道時云爾時必指一法觀有無云云今於是三性法於擧遍計所執無依他圓成有者於擧唯識中道所觀物體非正顯中道道理也問此有依他圓成無遍計所執何觀中道答遍計所執觀有無依他圓成亦觀有無也問何爾觀答於遍計所執當情似有故有也擧體無故無也此指遍計所執一法觀中道也於依他圓成非其體無故有依他圓成處我法無故無也所以觀唯識中道時指一法觀有無也文問疏文云而人法二空之相亦不當心乃名眞入法空悟唯識性故者意云何答是明唯識觀之至極分齊也謂得生空法空二無我智而證會二空眞如之唯識性眞勝諦云也此義意者如慈恩唯識章云由無始來執我法爲有撥事理爲空故此觀中遣者空觀對破有執存者有觀對遣空執今觀空有而遣有空有空若無亦無空有以彼空有相待觀成純有純空誰之空有故欲證入離言法性皆須依此方便而入非謂有空皆即決定證眞觀位非有非空法無分別性離言故説要觀空方證眞者謂要觀彼遍計所執空爲門故入於眞性眞體非空云云是説最順苻此處疏文義也此疏主一行御意與基法師釋其義懸以稱會也
